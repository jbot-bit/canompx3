<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORB Bot Dashboard</title>
<link id="favicon" rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23ef4444'/></svg>">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
  body { font-family: 'JetBrains Mono', monospace; background: #0a0e14; color: #e0e0e0; }
  .pulse { animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
  .pulse-warning { animation: pulse-warning 1s infinite; }
  @keyframes pulse-warning { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 50% { box-shadow: 0 0 20px 4px rgba(239,68,68,0.6); } }
  .lane-card { transition: border-color 0.3s, box-shadow 0.3s; }
  .lane-card:hover { box-shadow: 0 0 20px rgba(59,130,246,0.15); }
  .btn-control { transition: transform 0.1s; cursor: pointer; }
  .btn-control:active { transform: scale(0.95); }
  .progress-bar { transition: width 0.5s ease; }
  #preflight-output { max-height: 300px; overflow-y: auto; }
</style>
</head>
<body class="min-h-screen p-4 md:p-6">

<!-- KILL BUTTON — TOP OF PAGE, FULL WIDTH, ALWAYS VISIBLE -->
<button id="btn-kill" class="btn-control w-full py-4 mb-4 rounded-xl font-bold text-lg bg-red-700 hover:bg-red-600 text-white tracking-wider">
  KILL ALL TRADES
</button>

<!-- NEXT SESSION BANNER + DATA FRESHNESS -->
<div class="flex flex-wrap items-center gap-4 mb-4 p-3 rounded-xl bg-[#111922] border border-[#1e2d3d]">
  <div class="flex items-center gap-2">
    <span class="text-xs text-gray-500 font-bold">NEXT</span>
    <span id="next-session" class="text-sm font-bold text-cyan-400">Loading...</span>
  </div>
  <div class="flex-1"></div>
  <div class="flex items-center gap-2">
    <span class="text-xs text-gray-500 font-bold">DATA</span>
    <span id="data-status" class="text-xs text-gray-400">Checking...</span>
  </div>
  <button id="btn-preflight" class="btn-control px-3 py-1.5 rounded-lg font-bold text-xs bg-gray-700 hover:bg-gray-600 text-white">
    PREFLIGHT
  </button>
  <button id="btn-refresh" class="btn-control px-3 py-1.5 rounded-lg font-bold text-xs bg-cyan-700 hover:bg-cyan-600 text-white">
    REFRESH ALL
  </button>
</div>

<!-- ACTIVE SESSION STATUS (only visible when bot running) -->
<div id="session-status-bar" class="hidden flex flex-wrap items-center gap-4 mb-4 p-4 rounded-xl bg-[#111922] border border-[#1e2d3d]">
  <div id="mode-badge" class="px-5 py-2 rounded-lg text-xl font-bold tracking-wider bg-gray-800 text-gray-400">STOPPED</div>
  <div class="flex-1 min-w-[200px]">
    <div class="text-xs text-gray-500">ACCOUNT</div>
    <div id="account-info" class="text-sm truncate">&mdash;</div>
  </div>
  <div class="text-right">
    <div class="text-xs text-gray-500">DAILY P&amp;L</div>
    <div id="daily-pnl" class="text-lg font-bold">0.00R</div>
  </div>
  <div class="w-full md:w-48">
    <div class="flex justify-between text-xs text-gray-500 mb-1">
      <span>DD USED</span>
      <span id="dd-pct">0%</span>
    </div>
    <div class="h-3 bg-[#1a2332] rounded-full overflow-hidden">
      <div id="dd-bar" class="progress-bar h-full bg-green-500 rounded-full" style="width:0%"></div>
    </div>
  </div>
  <div class="text-right">
    <div class="text-xs text-gray-500">HEARTBEAT</div>
    <div id="heartbeat" class="text-sm">&mdash;</div>
  </div>
  <div class="text-right">
    <div class="text-xs text-gray-500">BARS</div>
    <div id="bars-count" class="text-sm">0</div>
  </div>
</div>

<!-- ACCOUNT CARDS -->
<div id="accounts-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3 mb-4">
  <div class="p-4 rounded-xl bg-[#111922] border border-[#1e2d3d] text-center text-gray-600 text-sm">Loading accounts...</div>
</div>

<!-- LANE CARDS (visible when session running) -->
<div id="lanes-grid" class="grid grid-cols-2 xl:grid-cols-4 gap-3 md:gap-4 mb-4"></div>

<!-- ACTIVITY LOG (preflight, refresh, session output) -->
<div id="activity-panel" class="hidden mb-6 p-4 rounded-xl bg-[#111922] border border-[#1e2d3d]">
  <div class="flex justify-between items-center mb-2">
    <span id="activity-title" class="text-sm font-bold text-gray-400">OUTPUT</span>
    <button id="btn-close-activity" class="text-gray-500 hover:text-white text-xs cursor-pointer">CLOSE</button>
  </div>
  <pre id="activity-output" class="text-xs text-green-400 whitespace-pre-wrap max-h-[300px] overflow-y-auto">Ready</pre>
</div>

<!-- TRADE LOG -->
<div class="rounded-xl bg-[#111922] border border-[#1e2d3d] overflow-hidden">
  <div class="p-4 border-b border-[#1e2d3d]">
    <span class="text-sm font-bold text-gray-400">TODAY'S TRADES</span>
  </div>
  <div class="overflow-x-auto">
    <table class="w-full text-xs">
      <thead>
        <tr class="text-gray-500 border-b border-[#1e2d3d]">
          <th class="p-2 text-left">TIME</th>
          <th class="p-2 text-left">INST</th>
          <th class="p-2 text-left">LANE</th>
          <th class="p-2 text-left">DIR</th>
          <th class="p-2 text-right">ENTRY</th>
          <th class="p-2 text-right">EXIT</th>
          <th class="p-2 text-right">P&amp;L (R)</th>
          <th class="p-2 text-left">STATUS</th>
        </tr>
      </thead>
      <tbody id="trade-log">
        <tr><td colspan="8" class="p-4 text-center text-gray-600">No trades today</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="mt-4 text-center text-xs text-gray-600">
  ORB Bot Dashboard &middot; Auto-refreshes every 5s &middot; <span id="last-update">&mdash;</span>
</div>

<script>
"use strict";

// Default lanes — overridden dynamically from API on first poll
let LANES = [
  { name: "NYSE_CLOSE",      color: "text-blue-400",    borderActive: "#3b82f6" },
  { name: "SINGAPORE_OPEN",  color: "text-purple-400",  borderActive: "#a855f7" },
  { name: "COMEX_SETTLE",    color: "text-amber-400",   borderActive: "#f59e0b" },
  { name: "NYSE_OPEN",       color: "text-emerald-400", borderActive: "#10b981" },
];

const LANE_COLORS = [
  { color: "text-blue-400",    borderActive: "#3b82f6" },
  { color: "text-purple-400",  borderActive: "#a855f7" },
  { color: "text-amber-400",   borderActive: "#f59e0b" },
  { color: "text-emerald-400", borderActive: "#10b981" },
  { color: "text-cyan-400",    borderActive: "#06b6d4" },
  { color: "text-rose-400",    borderActive: "#f43f5e" },
  { color: "text-lime-400",    borderActive: "#84cc16" },
  { color: "text-orange-400",  borderActive: "#f97316" },
];
let lanesBuilt = false;

function rebuildLanesFromApi(laneKeys) {
  if (lanesBuilt && laneKeys.length === LANES.length &&
      laneKeys.every((k, i) => k === LANES[i].name)) return;
  LANES = laneKeys.map((name, i) => ({
    name,
    color: LANE_COLORS[i % LANE_COLORS.length].color,
    borderActive: LANE_COLORS[i % LANE_COLORS.length].borderActive,
  }));
  const grid = document.getElementById("lanes-grid");
  while (grid.firstChild) grid.removeChild(grid.firstChild);
  buildLaneCards();
  lanesBuilt = true;
}

function buildLaneCards() {
  const grid = document.getElementById("lanes-grid");
  for (const lane of LANES) {
    const card = document.createElement("div");
    card.id = "lane-" + lane.name;
    card.className = "lane-card p-4 rounded-xl bg-[#111922] border border-[#1e2d3d]";
    card.dataset.borderActive = lane.borderActive;

    const header = document.createElement("div");
    header.className = "flex justify-between items-center mb-3";
    const title = document.createElement("span");
    title.className = "text-sm font-bold " + lane.color;
    title.textContent = lane.name;
    const badge = document.createElement("span");
    badge.className = "lane-status px-2 py-0.5 rounded text-xs font-bold bg-gray-700 text-gray-300";
    badge.textContent = "WAITING";
    header.appendChild(title);
    header.appendChild(badge);

    const filterDiv = document.createElement("div");
    filterDiv.className = "lane-filter text-xs text-gray-500 mb-2";
    filterDiv.textContent = "\u2014";

    const details = document.createElement("div");
    details.className = "grid grid-cols-2 gap-2 text-sm";
    for (const [label, cls] of [["Dir", "lane-dir"], ["Entry", "lane-entry"], ["P&L", "lane-pnl"], ["RR", "lane-rr"]]) {
      const cell = document.createElement("div");
      const lbl = document.createElement("span");
      lbl.className = "text-gray-500";
      lbl.textContent = label + ": ";
      const val = document.createElement("span");
      val.className = cls;
      val.textContent = "\u2014";
      cell.appendChild(lbl);
      cell.appendChild(val);
      details.appendChild(cell);
    }

    const countdown = document.createElement("div");
    countdown.className = "lane-countdown text-xs text-gray-600 mt-2 text-right";
    countdown.textContent = "";

    card.appendChild(header);
    card.appendChild(filterDiv);
    card.appendChild(details);
    card.appendChild(countdown);
    grid.appendChild(card);
  }
}

// Session countdowns from server (DST-correct). Cached from /api/sessions.
let sessionCountdowns = {};

function getCountdown(sessionName) {
  const mins = sessionCountdowns[sessionName];
  if (mins == null) return "";
  if (mins <= 0) return "NOW";
  const hrs = Math.floor(mins / 60);
  const m = mins % 60;
  if (hrs > 0) return "in " + hrs + "h " + m + "m";
  return "in " + m + "m";
}

function updateFavicon(mode) {
  const color = (mode === "STOPPED" || mode === "OFFLINE") ? "%23ef4444" : "%2322c55e";
  const svg = "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='" + color + "'/></svg>";
  document.getElementById("favicon").setAttribute("href", "data:image/svg+xml," + svg);
}

function setText(id, text) { const el = document.getElementById(id); if (el) el.textContent = text; }
function setClass(id, cls) { const el = document.getElementById(id); if (el) el.className = cls; }

async function fetchStatus() {
  try {
    const r = await fetch("/api/status");
    const d = await r.json();
    updateStatus(d);
  } catch (_e) {
    setText("mode-badge", "OFFLINE");
    setClass("mode-badge", "px-5 py-2 rounded-lg text-xl font-bold tracking-wider bg-gray-800 text-gray-400");
  }
}

async function fetchTrades() {
  try {
    const r = await fetch("/api/trades");
    const d = await r.json();
    updateTrades(d.trades || []);
  } catch (_e) {}
}

function updateStatus(d) {
  const mode = d.mode || "STOPPED";
  // Show/hide session status bar based on whether bot is running
  const statusBar = document.getElementById("session-status-bar");
  if (mode === "STOPPED") {
    statusBar.classList.add("hidden");
  } else {
    statusBar.classList.remove("hidden");
  }
  const badge = document.getElementById("mode-badge");
  badge.textContent = mode;
  const colors = {
    LIVE:    "px-5 py-2 rounded-lg text-xl font-bold tracking-wider bg-red-600 text-white",
    DEMO:    "px-5 py-2 rounded-lg text-xl font-bold tracking-wider bg-blue-600 text-white",
    SIGNAL:  "px-5 py-2 rounded-lg text-xl font-bold tracking-wider bg-green-700 text-white",
    STOPPED: "px-5 py-2 rounded-lg text-xl font-bold tracking-wider bg-gray-800 text-gray-400",
  };
  badge.className = colors[mode] || colors.STOPPED;
  updateFavicon(mode);

  setText("account-info", d.account_name ? d.account_name + " (#" + d.account_id + ")" : "\u2014");

  const pnl = d.daily_pnl_r || 0;
  setText("daily-pnl", (pnl >= 0 ? "+" : "") + pnl.toFixed(2) + "R");
  setClass("daily-pnl", "text-lg font-bold " + (pnl >= 0 ? "text-green-400" : "text-red-400"));

  const limit = Math.abs(d.daily_loss_limit_r || 5);
  const used = Math.abs(Math.min(pnl, 0));
  const pct = Math.min(100, (used / limit) * 100);
  setText("dd-pct", pct.toFixed(0) + "%");
  const bar = document.getElementById("dd-bar");
  bar.style.width = pct + "%";
  bar.className = "progress-bar h-full rounded-full " + (pct > 80 ? "bg-red-500" : pct > 50 ? "bg-yellow-500" : "bg-green-500");
  // Pulse the entire DD container when over 70%
  const ddContainer = bar.parentElement;
  if (pct > 70) { ddContainer.classList.add("pulse-warning"); } else { ddContainer.classList.remove("pulse-warning"); }

  const hbEl = document.getElementById("heartbeat");
  const age = d.heartbeat_age_s || 9999;
  if (age < 30) {
    hbEl.textContent = age.toFixed(0) + "s ago";
    hbEl.className = "text-sm text-green-400";
  } else if (age < 120) {
    hbEl.textContent = age.toFixed(0) + "s ago";
    hbEl.className = "text-sm text-yellow-400";
  } else if (mode === "STOPPED") {
    hbEl.textContent = "\u2014";
    hbEl.className = "text-sm text-gray-500";
  } else {
    hbEl.textContent = age.toFixed(0) + "s STALE";
    hbEl.className = "text-sm text-red-400 pulse";
  }

  setText("bars-count", String(d.bars_received || 0));

  const lanes = d.lanes || {};
  const laneKeys = Object.keys(lanes);
  if (laneKeys.length > 0) rebuildLanesFromApi(laneKeys);
  for (const laneInfo of LANES) {
    const card = document.getElementById("lane-" + laneInfo.name);
    if (!card) continue;
    const lane = lanes[laneInfo.name] || {};
    const status = lane.status || "WAITING";

    const statusEl = card.querySelector(".lane-status");
    statusEl.textContent = status;
    const sc = {
      WAITING:  "lane-status px-2 py-0.5 rounded text-xs font-bold bg-gray-700 text-gray-300",
      ARMED:    "lane-status px-2 py-0.5 rounded text-xs font-bold bg-yellow-700 text-yellow-200",
      IN_TRADE: "lane-status px-2 py-0.5 rounded text-xs font-bold bg-blue-600 text-white",
      FLAT:     "lane-status px-2 py-0.5 rounded text-xs font-bold bg-green-800 text-green-300",
    };
    statusEl.className = sc[status] || sc.WAITING;
    card.style.borderColor = status === "IN_TRADE" ? laneInfo.borderActive : (status === "FLAT" ? "#22c55e33" : "#1e2d3d");

    card.querySelector(".lane-filter").textContent = lane.filter_type || "\u2014";
    card.querySelector(".lane-dir").textContent = lane.direction || "\u2014";
    card.querySelector(".lane-entry").textContent = lane.entry_price ? lane.entry_price.toFixed(2) : "\u2014";
    const pnlEl = card.querySelector(".lane-pnl");
    if (lane.current_pnl_r != null) {
      pnlEl.textContent = (lane.current_pnl_r >= 0 ? "+" : "") + lane.current_pnl_r.toFixed(2) + "R";
      pnlEl.className = "lane-pnl " + (lane.current_pnl_r >= 0 ? "text-green-400" : "text-red-400");
    } else { pnlEl.textContent = "\u2014"; pnlEl.className = "lane-pnl"; }
    card.querySelector(".lane-rr").textContent = lane.rr_target ? "RR" + lane.rr_target : "\u2014";
    // Countdown to next session
    const cdEl = card.querySelector(".lane-countdown");
    if (cdEl) {
      const cd = getCountdown(laneInfo.name);
      cdEl.textContent = cd ? cd : "";
    }
  }
  setText("last-update", new Date().toLocaleTimeString());
}

function updateTrades(trades) {
  const tbody = document.getElementById("trade-log");
  while (tbody.firstChild) tbody.removeChild(tbody.firstChild);
  if (!trades.length) {
    const tr = document.createElement("tr");
    const td = document.createElement("td");
    td.colSpan = 8; td.className = "p-4 text-center text-gray-600"; td.textContent = "No trades today";
    tr.appendChild(td); tbody.appendChild(tr); return;
  }
  let totalR = 0;
  for (const t of trades) {
    const pnl = t.actual_r;
    if (pnl != null) totalR += pnl;
    const tr = document.createElement("tr");
    tr.className = "border-b border-[#1e2d3d] hover:bg-[#1a2332]";
    const statusText = t.exited_at ? (t.exit_reason || "CLOSED") : "OPEN";
    const statusCls = t.exited_at ? "text-gray-400" : "text-blue-400";
    const cells = [
      { text: t.created_at ? new Date(t.created_at).toLocaleTimeString() : "\u2014", cls: "p-2" },
      { text: t.instrument || "\u2014", cls: "p-2 text-gray-400" },
      { text: extractSession(t.strategy_id), cls: "p-2" },
      { text: (t.direction || "\u2014").toUpperCase(), cls: "p-2 " + (t.direction === "long" ? "text-green-400" : "text-red-400") },
      { text: fmtP(t.fill_entry || t.engine_entry), cls: "p-2 text-right" },
      { text: fmtP(t.fill_exit), cls: "p-2 text-right" },
      { text: fmtR(pnl), cls: "p-2 text-right " + rCol(pnl) },
      { text: statusText, cls: "p-2 " + statusCls },
    ];
    for (const c of cells) {
      const td = document.createElement("td"); td.className = c.cls; td.textContent = c.text; tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  // Total row
  const totalTr = document.createElement("tr");
  totalTr.className = "border-t-2 border-[#2a3a4a] font-bold";
  const totalCells = [
    { text: "", cls: "p-2" },
    { text: "", cls: "p-2" },
    { text: "", cls: "p-2" },
    { text: "", cls: "p-2" },
    { text: "", cls: "p-2" },
    { text: "TOTAL", cls: "p-2 text-right text-gray-400" },
    { text: fmtR(totalR), cls: "p-2 text-right " + rCol(totalR) },
    { text: trades.length + " trades", cls: "p-2 text-gray-500" },
  ];
  for (const c of totalCells) {
    const td = document.createElement("td"); td.className = c.cls; td.textContent = c.text; totalTr.appendChild(td);
  }
  tbody.appendChild(totalTr);
}

function extractSession(s) {
  if (!s) return "\u2014";
  // Strategy IDs: CB1_SESSION_NAME_E2_FILTER... — extract between CB1_ and _E[0-9]
  const m = s.match(/^CB1_(.+?)_E[0-9]/);
  if (m) return m[1];
  return s;
}
function fmtP(v) { return v != null ? v.toFixed(2) : "\u2014"; }
function fmtR(r) { return r != null ? ((r >= 0 ? "+" : "") + r.toFixed(2) + "R") : "\u2014"; }
function rCol(r) { return r == null ? "" : (r >= 0 ? "text-green-400" : "text-red-400"); }

// Activity panel helpers
function showActivity(title, text, color) {
  const panel = document.getElementById("activity-panel");
  panel.classList.remove("hidden");
  setText("activity-title", title);
  const output = document.getElementById("activity-output");
  output.textContent = text;
  output.className = "text-xs whitespace-pre-wrap max-h-[300px] overflow-y-auto " + (color || "text-yellow-400");
}
function appendActivity(text) {
  const output = document.getElementById("activity-output");
  output.textContent += "\n" + text;
  output.scrollTop = output.scrollHeight;
}

// Firm badge colors
const FIRM_COLORS = {
  "Apex Trader Funding": { bg: "bg-orange-900", text: "text-orange-300", border: "border-orange-700" },
  "TopStep": { bg: "bg-blue-900", text: "text-blue-300", border: "border-blue-700" },
  "Tradeify": { bg: "bg-green-900", text: "text-green-300", border: "border-green-700" },
  "MyFundedFutures": { bg: "bg-purple-900", text: "text-purple-300", border: "border-purple-700" },
  "Self-Funded": { bg: "bg-gray-800", text: "text-gray-300", border: "border-gray-600" },
};

async function fetchAccounts() {
  try {
    const r = await fetch("/api/accounts");
    const d = await r.json();
    const grid = document.getElementById("accounts-grid");
    while (grid.firstChild) grid.removeChild(grid.firstChild);
    const accounts = (d.accounts || []).sort((a, b) => {
      if (a.active !== b.active) return b.active - a.active;
      const aAuto = a.auto_trading === "full" || a.auto_trading === "semi";
      const bAuto = b.auto_trading === "full" || b.auto_trading === "semi";
      if (aAuto !== bAuto) return bAuto - aAuto;
      return b.lane_count - a.lane_count;
    });
    for (const acct of accounts) {
      const colors = FIRM_COLORS[acct.firm] || FIRM_COLORS["Self-Funded"];
      const isAuto = acct.auto_trading === "full" || acct.auto_trading === "semi";
      const opacity = acct.active ? "" : "opacity-40";

      const card = document.createElement("div");
      card.className = `p-4 rounded-xl bg-[#111922] border ${acct.active ? colors.border : "border-[#1e2d3d]"} ${opacity}`;

      // Header: Firm + Size + Mode badge
      const header = document.createElement("div");
      header.className = "flex items-center justify-between mb-2";
      const title = document.createElement("div");
      const firmSpan = document.createElement("span");
      firmSpan.className = "font-bold " + colors.text;
      firmSpan.textContent = acct.firm;
      const sizeSpan = document.createElement("span");
      sizeSpan.className = "text-gray-400 ml-1";
      sizeSpan.textContent = "$" + (acct.account_size/1000) + "K";
      title.appendChild(firmSpan);
      title.appendChild(sizeSpan);
      const badge = document.createElement("span");
      badge.className = `px-2 py-0.5 rounded text-xs font-bold ${isAuto ? "bg-green-800 text-green-300" : "bg-gray-700 text-gray-400"}`;
      badge.textContent = isAuto ? "AUTO" : "MANUAL";
      header.appendChild(title);
      header.appendChild(badge);

      // Info: instruments, lanes, DD
      const info = document.createElement("div");
      info.className = "text-xs text-gray-500 mb-2";
      const instruments = acct.instruments.length ? acct.instruments.join("+") : "ALL";
      info.textContent = instruments + " | " + acct.lane_count + " lane" + (acct.lane_count!==1?"s":"") + " | DD $" + acct.max_dd.toLocaleString() + (acct.dll ? " | DLL $"+acct.dll.toLocaleString() : "") + (acct.copies > 1 ? " | x"+acct.copies+" accounts" : "");

      // Lanes list
      const lanesList = document.createElement("div");
      lanesList.className = "text-xs text-gray-400 mb-3";
      for (const lane of acct.lanes.slice(0, 3)) {
        const div = document.createElement("div");
        div.textContent = `${lane.session} ${lane.filter}`;
        lanesList.appendChild(div);
      }
      if (acct.lanes.length > 3) {
        const more = document.createElement("div");
        more.className = "text-gray-600";
        more.textContent = `+ ${acct.lanes.length - 3} more`;
        lanesList.appendChild(more);
      }

      card.appendChild(header);
      card.appendChild(info);
      card.appendChild(lanesList);

      // Mode buttons (only for auto-capable active profiles with lanes)
      if (isAuto && acct.active && acct.lane_count > 0) {
        const btnRow = document.createElement("div");
        btnRow.className = "flex gap-2 mt-2";

        // Signal button
        const btnSignal = document.createElement("button");
        btnSignal.className = "btn-control flex-1 py-2 rounded-lg font-bold text-xs bg-green-700 hover:bg-green-600 text-white";
        btnSignal.textContent = "SIGNAL";
        btnSignal.addEventListener("click", () => launchSession(acct.profile_id, acct.firm, instruments, "signal"));
        btnRow.appendChild(btnSignal);

        // Demo button
        const btnDemo = document.createElement("button");
        btnDemo.className = "btn-control flex-1 py-2 rounded-lg font-bold text-xs bg-blue-700 hover:bg-blue-600 text-white";
        btnDemo.textContent = "DEMO";
        btnDemo.addEventListener("click", () => launchSession(acct.profile_id, acct.firm, instruments, "demo"));
        btnRow.appendChild(btnDemo);

        // Live button (requires safety gate)
        const btnLive = document.createElement("button");
        btnLive.className = "btn-control flex-1 py-2 rounded-lg font-bold text-xs bg-red-800 text-gray-500 cursor-not-allowed";
        btnLive.textContent = "LIVE";
        btnLive.disabled = true;
        btnLive.dataset.profileId = acct.profile_id;
        btnLive.dataset.firm = acct.firm;
        btnLive.dataset.instruments = instruments;
        btnRow.appendChild(btnLive);

        card.appendChild(btnRow);

        // Live safety gate: text input to unlock
        const liveGate = document.createElement("div");
        liveGate.className = "flex gap-2 mt-1";
        const liveInput = document.createElement("input");
        liveInput.type = "text";
        liveInput.placeholder = "Type LIVE to unlock";
        liveInput.className = "flex-1 px-2 py-1 rounded text-xs bg-gray-800 border border-gray-700 text-white";
        liveInput.addEventListener("input", () => {
          const armed = liveInput.value.trim() === "LIVE";
          btnLive.disabled = !armed;
          btnLive.className = armed
            ? "btn-control flex-1 py-2 rounded-lg font-bold text-xs bg-red-600 hover:bg-red-500 text-white"
            : "btn-control flex-1 py-2 rounded-lg font-bold text-xs bg-red-800 text-gray-500 cursor-not-allowed";
        });
        liveGate.appendChild(liveInput);
        card.appendChild(liveGate);

        btnLive.addEventListener("click", () => {
          if (liveInput.value.trim() !== "LIVE") return;
          launchSession(acct.profile_id, acct.firm, instruments, "live");
          liveInput.value = "";
          btnLive.disabled = true;
          btnLive.className = "btn-control flex-1 py-2 rounded-lg font-bold text-xs bg-red-800 text-gray-500 cursor-not-allowed";
        });
      } else if (!isAuto && acct.active) {
        const label = document.createElement("div");
        label.className = "text-center text-xs text-gray-600 py-2";
        label.textContent = "Manual trading only";
        card.appendChild(label);
      } else if (!acct.active) {
        const label = document.createElement("div");
        label.className = "text-center text-xs text-gray-600 py-2";
        label.textContent = "Inactive";
        card.appendChild(label);
      }

      grid.appendChild(card);
    }
  } catch (_e) {}
}

async function launchSession(profileId, firmName, instruments, mode) {
  const modeLabels = { signal: "SIGNAL-ONLY", demo: "DEMO (paper)", live: "LIVE (real money)" };
  const label = modeLabels[mode] || mode;
  const warn = mode === "live" ? "\n\nREAL MONEY orders will be placed!" : (mode === "demo" ? "\n\nPaper orders on demo account." : "\n\nNo orders will be placed.");
  if (!confirm(`Start ${label} session?\n\n${firmName} - ${instruments}\nProfile: ${profileId}${warn}`)) return;
  const color = mode === "live" ? "text-red-400" : (mode === "demo" ? "text-blue-400" : "text-green-400");
  showActivity(`${label} START`, `Launching ${profileId}...`, color);
  try {
    const params = new URLSearchParams({ profile: profileId, mode: mode });
    const r = await fetch("/api/action/start?" + params, { method: "POST" });
    const d = await r.json();
    appendActivity(d.message || d.status);
    if (d.pid) appendActivity("PID: " + d.pid);
  } catch (e) { appendActivity("Error: " + e.message); }
}

async function fetchSessions() {
  try {
    const r = await fetch("/api/sessions");
    const d = await r.json();
    // Cache countdowns for lane cards (server-side DST-correct)
    for (const s of (d.sessions || [])) { sessionCountdowns[s.name] = s.minutes_away; }
    const el = document.getElementById("next-session");
    if (d.next) {
      const n = d.next;
      const hrs = Math.floor(Math.abs(n.minutes_away) / 60);
      const mins = Math.abs(n.minutes_away) % 60;
      const timeStr = `${String(n.hour).padStart(2,"0")}:${String(n.minute).padStart(2,"0")}`;
      if (n.minutes_away <= 0) {
        el.textContent = `${n.name} ${timeStr} - NOW`;
        el.className = "text-sm font-bold text-green-400 pulse";
      } else if (hrs > 0) {
        el.textContent = `${n.name} ${timeStr} - in ${hrs}h ${mins}m`;
        el.className = "text-sm font-bold text-cyan-400";
      } else {
        el.textContent = `${n.name} ${timeStr} - in ${mins}m`;
        el.className = "text-sm font-bold text-yellow-400";
      }
    } else {
      el.textContent = "No upcoming sessions";
      el.className = "text-sm text-gray-500";
    }
  } catch (_e) {}
}

// Data freshness
async function fetchDataStatus() {
  try {
    const r = await fetch("/api/data-status");
    const d = await r.json();
    const el = document.getElementById("data-status");
    const btn = document.getElementById("btn-refresh");
    if (d.error) { el.textContent = "Error: " + d.error; return; }
    const parts = [];
    for (const [inst, info] of Object.entries(d.instruments || {})) {
      const gap = info.gap_days;
      const color = gap <= 1 ? "text-green-400" : gap <= 3 ? "text-yellow-400" : "text-red-400";
      parts.push(inst + ": " + (info.last_bar_date || "?") + " (" + gap + "d)");
    }
    el.textContent = parts.join(" | ");
    el.className = "text-xs " + (d.any_stale ? "text-red-400" : "text-green-400");
    // Highlight refresh button if stale
    if (d.any_stale) {
      btn.className = "btn-control px-3 py-1.5 rounded-lg font-bold text-xs bg-red-600 hover:bg-red-500 text-white pulse";
      // Auto-refresh on first load if stale (no manual click needed)
      if (!autoRefreshTriggered && !refreshPolling) {
        autoRefreshTriggered = true;
        console.log("Data stale — auto-triggering refresh...");
        document.getElementById("btn-refresh").click();
      }
    } else {
      btn.className = "btn-control px-3 py-1.5 rounded-lg font-bold text-xs bg-cyan-700 hover:bg-cyan-600 text-white";
    }
  } catch (_e) {}
}

// Refresh data
let refreshPolling = false;
let autoRefreshTriggered = false;  // One-shot: auto-refresh on first stale detection
document.getElementById("btn-refresh").addEventListener("click", async function() {
  showActivity("DATA REFRESH", "Starting data refresh (Databento download + pipeline rebuild)...", "text-cyan-400");
  try {
    const r = await fetch("/api/action/refresh", { method: "POST" });
    const d = await r.json();
    appendActivity(d.message || d.status);
    if (d.status === "started" || d.status === "running") {
      // Poll for completion
      if (!refreshPolling) {
        refreshPolling = true;
        const poll = setInterval(async () => {
          try {
            const sr = await fetch("/api/action/refresh-status");
            const sd = await sr.json();
            if (sd.status === "done") {
              appendActivity("\nDONE: Data refresh complete.");
              document.getElementById("activity-output").className = "text-xs whitespace-pre-wrap max-h-[300px] overflow-y-auto text-green-400";
              clearInterval(poll);
              refreshPolling = false;
              fetchDataStatus();
            } else if (sd.status === "failed") {
              appendActivity("\nFAILED:\n" + (sd.output || "Unknown error"));
              document.getElementById("activity-output").className = "text-xs whitespace-pre-wrap max-h-[300px] overflow-y-auto text-red-400";
              clearInterval(poll);
              refreshPolling = false;
            }
          } catch (_e) {}
        }, 3000);
      }
    }
  } catch (e) { appendActivity("Error: " + e.message); }
});

// Kill
document.getElementById("btn-kill").addEventListener("click", async function() {
  if (!confirm("KILL ALL TRADES?\n\nThis writes the stop file and shuts down the bot.\nOpen positions will be closed at market.")) return;
  if (!confirm("SECOND CONFIRMATION:\nAre you sure? This stops all trading immediately.")) return;
  try {
    const r = await fetch("/api/action/kill", { method: "POST" });
    const d = await r.json();
    showActivity("KILL", d.message || "Kill signal sent", "text-red-400");
  } catch (e) { showActivity("KILL", "Kill failed: " + e.message, "text-red-400"); }
});

// Preflight
document.getElementById("btn-preflight").addEventListener("click", async function() {
  showActivity("PREFLIGHT", "Running pre-flight checks...", "text-cyan-400");
  try {
    const r = await fetch("/api/action/preflight", { method: "POST" });
    const d = await r.json();
    const color = d.status === "pass" ? "text-green-400" : "text-red-400";
    showActivity("PREFLIGHT — " + (d.status || "").toUpperCase(), d.output || "No output", color);
  } catch (e) { appendActivity("Error: " + e.message); }
});

// Close activity panel
document.getElementById("btn-close-activity").addEventListener("click", function() {
  document.getElementById("activity-panel").classList.add("hidden");
});

// Init — load everything on page open
buildLaneCards();
fetchAccounts();
fetchSessions();
fetchStatus();
fetchTrades();
fetchDataStatus();
setInterval(fetchStatus, 5000);
setInterval(fetchTrades, 10000);
setInterval(fetchDataStatus, 30000);
setInterval(fetchSessions, 30000);  // Update session countdown from server every 30s
</script>
