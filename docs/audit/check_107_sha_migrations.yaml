# Check 107 — Hypothesis-file SHA migration manifest
#
# PURPOSE
# Some hypothesis YAML files under docs/audit/hypotheses/ are legitimately
# edited in place after discovery (e.g., bulk doctrine migrations like
# Amendment 3.3, which added `metadata.theory_grant` to 203 files). When
# this happens, every `experimental_strategies.hypothesis_file_sha` row
# that was stamped against the pre-edit content becomes orphaned —
# `find_hypothesis_file_by_sha` returns None, and Check 107
# (`pipeline.check_drift.check_phase_4_sha_integrity`) flags the row.
#
# The strategies themselves are real; only the SHA pointer is stale. This
# manifest preserves the evidence trail: each entry asserts
#
#   "orphan SHA X was the content SHA of file F as of `introducing_commit`,
#    and was invalidated by `migration_commit` which produced `current_sha`."
#
# Check 107 reads this manifest and accepts orphan SHAs that resolve to a
# verified manifest entry. A sibling check
# (`check_phase_4_sha_migration_manifest_integrity`) verifies every entry
# in this file is well-formed: the cited commits exist, the migration
# commit touched the cited file, the introducing commit's blob SHA of the
# file matches `orphan_sha`, and `current_sha` matches the file's on-disk
# SHA today.
#
# AUTHORITY
# - Drift check that consumes this:
#     pipeline/check_drift.py :: check_phase_4_sha_integrity
# - Drift check that audits this manifest:
#     pipeline/check_drift.py :: check_phase_4_sha_migration_manifest_integrity
# - Audit MD that justifies each entry:
#     docs/audit/results/2026-05-17-check-107-orphan-sha-audit.md
#
# RULES
# - NEVER add an entry without an audit MD citation justifying it.
# - NEVER add an entry whose `migration_commit` did not touch the cited
#   `current_file` (sibling check fails closed if this drifts).
# - NEVER backfill or mutate `experimental_strategies.hypothesis_file_sha`.
#   The original (orphan) SHA is preserved AS-IS as discovery-time evidence;
#   this manifest is the bridge to current-state.
# - If a future migration produces new orphans, append entries here; do not
#   delete or edit existing entries (audit-trail immutability).
# - Field `current_sha` is informational/operator-facing; the sibling drift
#   check recomputes it from the file on every run.

