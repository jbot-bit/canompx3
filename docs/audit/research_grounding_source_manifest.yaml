# Research Grounding — Source Manifest
#
# SINGLE SOURCE OF TRUTH for literature-source provenance verification.
# Read by BOTH:
#   - pipeline/check_drift.py :: check_literature_source_integrity (the gate)
#   - docs/audit/research_grounding_gap_ledger.md (the human-facing ledger)
#
# Why machine-readable (not prose): the drift check and the ledger must agree on
# every source's status. A markdown prose ledger forced fragile key-matching
# (stub label -> ledger row). This YAML is the key. Each `source_id` is stable;
# the ledger references the same ids.
#
# Grounding doctrine (CLAUDE.md § Local Academic / Project-Source Grounding;
# RESEARCH_RULES § Discovery Layer Discipline):
#   retrieval (we have the extract) != verification (the cited source is present).
#   A source absent from disk is UNSUPPORTED, never "probably fine".
#
# FIELD CONTRACT
#   source_id          : stable slug; ledger + check key on this.
#   extract_files      : list of grounding extracts that cite this source.
#                        (literature/ is canonical; chatgpt_bundle/LIT_* is a
#                         parallel bundle copy of the same Source: convention.)
#   expected_resource  : the filename (under resources/) or URL the extract cites.
#                        For multi-edition sources the per-extract value is noted
#                        in `notes`; expected_resource is the canonical citation.
#   source_tier        : peer-reviewed | unreviewed-preprint | book | web | derived
#   tracked            : is `expected_resource` committed to git? (y/n)
#                        n = local-only PDF (copyright/size); NOT gitignored, just
#                        never committed. CI clones will NOT have it -> CI-safe
#                        mode must not require it.
#   ci_verifiable      : can a fresh CI clone verify this row WITHOUT the binary?
#                        y when the claim resolves to a tracked artifact (extract,
#                        URL provenance, or another tracked extract).
#   gap_id             : PASS-1 audit gap id, or null when fully grounded.
#   status             : VERIFIED_LOCAL  - RUNTIME-ONLY: PDF present on disk HERE and
#                                          fitz page-count matches. NEVER a committed
#                                          status for an untracked PDF (it would assert
#                                          a verification a CI clone cannot reproduce).
#                                          strict-local emits this as a runtime result;
#                                          the check FAILS a committed VERIFIED_LOCAL
#                                          whose PDF is absent on disk.
#                        WEB_DERIVED      - source is a URL; provenance recorded in extract
#                        STUB_LEDGERED    - extract is a known stub; ledgered, not silent
#                        MISSING_LOCAL    - PDF cited but absent from this checkout (located
#                                          elsewhere / untracked). The honest COMMITTED status
#                                          for an untracked PDF, even one verified locally.
#                        DERIVED_NOTE     - extract derives from another tracked extract, not a PDF
#                        UNSUPPORTED      - no source located anywhere (none currently)
#
# STATUS NOTE (this worktree): resources/ here carries ZERO committed PDFs (the
# ~17-PDF institutional library is local-only on the main checkout, never
# committed). So in a fresh clone every PDF-backed row is `tracked: n` and absent.
# The committed status for such rows is MISSING_LOCAL — including G1-G3, which were
# located + fitz-verified locally and copied into resources/ (untracked). Their
# local verification is recorded in notes + the gap ledger CLOSED table; strict-local
# UPGRADES them to a runtime verified-PASS when the PDF is present. A committed
# VERIFIED_LOCAL is reserved for a tracked (committed) PDF only.

