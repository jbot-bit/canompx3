# ---------------------------------------------------------------------------
# OUT-OF-SCOPE FOR PDF VERIFICATION (enumerated, NOT silently excluded).
# These surfaces ARE grounding surfaces but do not carry a `Source: resources/*.pdf`
# convention to verify against a binary. Recorded here so a green check never
# implies they were PDF-verified. See ledger § "Enumerated grounding surfaces".
out_of_scope:
  - surface: docs/institutional/literature/PENDING_ACQUISITION_market_profile.md
    reason: >
      Acquisition-tracking doc, not an extract. Has no own Source: line. The
      check skips files without a Source: line (so it is not a false MISSING).
  - surface: docs/audit/hypotheses/*.yaml (authority blocks)
    reason: >
      219 prereg files. Their *_authority: keys point at OTHER repo paths
      (intra-repo provenance), and they cite literature only by author surname
      inline. No `resources/*.pdf` to verify. Author->extract grounding is
      captured by the rows above; config-value provenance is enforced separately
      by drift #45 (@research-source). Boundary is explicit, not a silence.
  - surface: inline author-name cites in docs/STRATEGY_BLUEPRINT.md, TRADING_RULES.md,
      mechanism_priors.md, RESEARCH_RULES.md, chatgpt_bundle/00_INDEX.md, 01_OPERATING_RULES.md
    reason: >
      Prose cites by surname (Carver, Fitschen, Chordia, Bailey...). PASS-2 task F
      adds the missing literature/ cross-links (G7/G8) so a reader can resolve the
      surname to its extract row above. PDF verification of prose is out of scope;
      grounding resolves through the named extract.
