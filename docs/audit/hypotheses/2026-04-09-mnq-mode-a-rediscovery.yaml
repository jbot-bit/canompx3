  # -------------------------------------------------------------------------
  #
  # Theoretical basis (two primary citations):
  #   Andersen, T. G., Bollerslev, T., Diebold, F. X., & Vega, C. (2003).
  #   "Micro Effects of Macro Announcements: Real-Time Price Discovery in
  #   Foreign Exchange." American Economic Review 93(1), 38–62. Documents
  #   that scheduled 08:30 ET US macro releases (NFP, CPI, PPI, GDP,
  #   retail sales, consumer confidence, FOMC statements) produce
  #   measurable price discovery in the first 5-30 minutes post-release
  #   in liquid futures and FX markets.
  #
  #   Ederington, L. H., & Lee, J. H. (1993). "How Markets Process
  #   Information: News Releases and Volatility." Journal of Finance
  #   48(4), 1161–1191. Shows that the price discovery following a
  #   scheduled information release proceeds in stages, with the
  #   largest directional move in the first minutes and continued
  #   gradual incorporation over the subsequent half hour.
  #
  # Economic mechanism for MNQ at US_DATA_830:
  #   The 08:30 ET release window concentrates multi-day macro news into
  #   seconds. Index futures prices adjust via Andersen-Bollerslev-
  #   Diebold-Vega's real-time discovery process. The 5-minute opening
  #   range at this session captures the initial directional consensus.
  #   A range ≥ G-threshold filters for sessions where the release
  #   produced meaningful first-5-minute discovery; breakouts should
  #   continue because the market has not yet fully discounted the news
