  # -------------------------------------------------------------------------
  # Hypothesis family 4 — Overnight information range at NYSE_OPEN
  # -------------------------------------------------------------------------
  #
  # Theoretical basis:
  #   Ito, T., Engle, R. F., & Lin, W.-L. (1992). "Where Does the Meteor
  #   Shower Come From? The Role of Stochastic Policy Coordination."
  #   Journal of International Economics 32(3-4), 221-240. Established
  #   that non-US-session information ("meteor shower" contribution)
  #   persists in volatility into subsequent sessions — overnight
  #   information carries directional implications into the next day.
  #
  #   Barclay, M. J., Litzenberger, R. H., & Warner, J. B. (1990).
  #   "Private Information, Trading Volume, and Stock-Return Variances."
  #   Review of Financial Studies 3(2), 233-253. Documented that
  #   private-information-driven price movement during a trading period
  #   predicts continued movement in the next period.
  #
  # Economic mechanism for MNQ OVNRNG at NYSE_OPEN:
  #   The overnight range (high minus low during the non-US trading
  #   hours preceding the NYSE cash open) measures how much information
  #   accumulated in the futures price while US equity markets were
  #   closed. A LARGE overnight range indicates high-information
  #   conditions under Ito-Engle-Lin's meteor shower framework; under
  #   Barclay-Litzenberger-Warner's information-variance relationship,
  #   this informs the subsequent NYSE_OPEN breakout direction.

  - id: 13
    name: "High overnight range OVNRNG_50 at NYSE_OPEN"
    theory_citation: "Ito, Engle, Lin (1992) JIE; Barclay, Litzenberger, Warner (1990) RFS"
    economic_basis: |
      Overnight range ≥ 50 MNQ points filters for non-US trading hours
      that produced substantial information-driven price movement.
      Under Ito-Engle-Lin meteor shower persistence and
      Barclay-Litzenberger-Warner information-variance linkage, the
      subsequent NYSE_OPEN breakout is more likely to continue the
      overnight direction.
    filter:
      type: OVNRNG_50
      column: overnight_range_points
    scope:
      instruments: [MNQ]
      sessions: [NYSE_OPEN]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
