# Hypothesis Registry — 2026-04-09 MNQ Mode A rediscovery (strict Bailey)
#
# Locked:                2026-04-09T00:00:00+10:00
# Author:                Claude Code session (Phase 4 Stage 4.2 authoring gate)
# Committing commit SHA: (filled in by pre-commit hook)
# Holdout mode:          A (Mode A, holdout-clean) per Amendment 2.7
# Sacred boundary:       2026-01-01 onwards — no discovery may consume this window
# Data horizon:          6.65 years clean real-micro MNQ (2019-05-06 →
#                        2025-12-31 = 1,951 pre-holdout trading days). No
#                        proxy data needed or used. Per Amendment 2.8
#                        (2026-04-09) which corrected the stale "~2.2 years"
#                        narrative in pre_registered_criteria.md.
#
# Strict Bailey compliance: N=16 trials pre-registered. At E[max_N]=1.0
# annualized (Bailey 2013 Theorem 1 default), MinBTL = 2·Ln(16)/1.0² =
# 5.55 years < 6.65 years available → strict PASS with 20% headroom.
# Noise floor Sharpe = 0.91 annualized. Any candidate with IS Sharpe
# below 0.91 is within noise at N=16 and should not be promoted.
#
# Theoretical framework: all 16 hypothesis bundles derive from the
# institutional microstructure literature on opening-range breakouts,
# scheduled announcement-induced volatility, cross-border information
# flow, and volatility clustering. No hypothesis is sourced from prior
# repo `validated_setups`, `edge_families`, `live_config`, `prop_profiles`,
# or any deployment artifact. See `docs/audit/hypotheses/README.md`
# § Forbidden and `trading_app/hypothesis_loader.py` module docstring
# § "Bias control".
#
# Why N=16 and not 300: the locked criterion 2 cap is 300 (clean) / 2000
# (proxy), but Amendment 2.8 establishes that the locked caps are
# operational ceilings looser than strict Bailey at the actual 6.65-year
# horizon. Strict Bailey at E=1.0 caps MNQ at N ≤ 28. N=16 operates at
# 43% headroom below strict Bailey — the most rigorous defensible choice
# given 6.65 years of clean real-micro data.
#
# Why 1 RR per bundle and 1 entry model per bundle: within-hypothesis
# parameter sweeps (e.g., testing 5 RR levels per bundle) constitute
# within-hypothesis optimization per Lopez de Prado 2020 § 1.4.2.
# Pre-committing to RR=2.0 (practitioner-standard breakout RR; Crabel 1990 used EOD exits, RR=2.0 is intraday convention) and E2
# (TRADING_RULES.md industry-standard stop-market entry) eliminates
# within-bundle parameter search and keeps each hypothesis a SINGLE
# pre-registered prediction.

# Cross-instrument correlation disclosure:
#   MNQ and MES are ~87% correlated (same US equity asset class, see
#   RESEARCH_RULES.md). Results on shared sessions (NYSE_OPEN, US_DATA_830,
#   EUROPE_FLOW) are NOT independent for portfolio diversification. Testing
#   both instruments is CONFIRMATION of the Crabel/macro thesis, not
#   independent evidence. Survivors from both files on the same session
#   count as ONE portfolio bet, not two.

