# ---------------------------------------------------------------------------
# Hypothesis family 1 — Crabel opening range breakout at NYSE_OPEN
# ---------------------------------------------------------------------------
#
# Theoretical basis (verbatim-referenceable, external literature only):
#   Crabel, Toby (1990). "Day Trading with Short Term Price Patterns and
#   Opening Range Breakout." Traders Press, Greenville SC. Chapter 3,
#   "Opening Range Breakout." The book establishes the first-N-minute
#   opening range as a microstructural commitment device: during the
#   opening range, overnight order imbalances are absorbed and the
#   session's initial directional consensus is revealed. Breakouts of
#   this range are more likely to continue than mean-revert because
#   large participants have committed capital before the breakout and
#   will defend their direction. RR=2.0 is the dominant intraday breakout
#   practitioner convention (Crabel 1990 used EOD exits).
#
# Economic mechanism for MNQ at NYSE_OPEN:
#   US equity index futures concentrate institutional flow at the NYSE
#   cash equity open (09:30 ET). Retail and professional equity desks
#   transact against overnight futures positioning during the first
#   minutes of cash-equity trading. The 5-minute opening range at this
#   session captures the bulk of this flow imbalance. Under Crabel's
#   commitment hypothesis, LARGER opening ranges indicate stronger
#   overnight positioning that, when broken, has higher follow-through
#   probability because the committed flow supplies continuation.
#
# Why G4, G5, G6, G8 as separate bundles and not smaller thresholds:
#   Crabel's thesis requires the range to represent *meaningful*
#   commitment, not microstructure noise. On MNQ at NYSE_OPEN, typical
#   range is 5-15 points; G2/G3 (2-3 points) is comparable to bid-ask
#   spread × 10 and is dominated by noise. G4/G5/G6/G8 bracket the
#   plausible "meaningful commitment" zone. Each is pre-committed as
#   its own bundle because the loader stores filter_type as an exact
#   match string — we cannot declare a "range" at the bundle level.

hypotheses:
  - id: 1
    name: "Crabel opening range G4 at NYSE_OPEN"
    theory_citation: "Crabel (1990) Day Trading with Short Term Price Patterns and Opening Range Breakout, ch. 3"
    economic_basis: |
      Opening range ≥ 4 points on MNQ at NYSE_OPEN filters for sessions
      where overnight-to-cash positioning produced at least 4 points of
      committed two-way commitment in the first 5 minutes. Under
      Crabel's commitment hypothesis, breakouts of this range continue
      with above-chance probability because institutional participants
      anchored the range. RR=2.0 is the dominant intraday breakout practitioner
      convention. E2 (stop-market at the range boundary + slippage) is the
      industry-standard honest entry per TRADING_RULES.md with no
      backtest biases.
    filter:
      type: ORB_G4
      column: orb_size_points
    scope:
      instruments: [MNQ]
      sessions: [NYSE_OPEN]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "BH FDR q=0.05 fails on the pre-registered 16-hypothesis family (Criterion 3, Harvey-Liu 2015)"
      - "Chordia t-statistic < 3.00 (Criterion 4 with theory, Amendment 2.2)"
      - "Walk-forward efficiency < 0.50 (Criterion 6, LdP 2020)"
      - "2026-01-01 → current OOS ExpR < 0 OR < 0.40 × IS ExpR (Criterion 8, Amendment 2.7)"
      - "Any era with N ≥ 50 and ExpR < -0.05 (Criterion 9)"
      - "IS Sharpe < 0.91 annualized — within Bailey noise floor at N=16"

