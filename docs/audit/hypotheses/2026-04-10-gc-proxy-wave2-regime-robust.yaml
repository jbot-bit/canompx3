  # --- US_DATA_1000: strongest gold session, expand filter coverage ---

  - id: 1
    name: "GC US_DATA_1000 OVNRNG_50 RR1.0 — macro + overnight info"
    theory_citation: "Andersen, Bollerslev, Diebold, Vega (2003) AER; Ito, Engle, Lin (1992) JIE"
    economic_basis: |
      High overnight range (above median) signals active Asian/European
      session that feeds information into the 10:00 ET macro window.
      Combination of two mechanisms: overnight info accumulation and
      macro-driven price discovery.
    filter: {type: OVNRNG_50, column: overnight_range}
    scope: {instruments: [GC], sessions: [US_DATA_1000], rr_targets: [1.0], entry_models: [E2], confirm_bars: [1], stop_multipliers: [1.0]}
    expected_trial_count: 1
    kill_criteria: ["Raw p >= 0.05", "Negative Sharpe", "WFE < 0.50", "Any era N>=50 ExpR < -0.05"]

