kill_conditions:
  - "Zero cells survive BH-FDR at K=12."
  - "Any feature shows IS coverage < 90% on the scoped universe."
  - "Any survivor is explained entirely by one year with all other eligible years negative."

success_action: "Advance surviving cells to Phase 4 adversarial audit."
failure_action: "Log the family to the NO-GO registry with the surviving mechanistic lesson, if any."

outputs_required_after_run:
