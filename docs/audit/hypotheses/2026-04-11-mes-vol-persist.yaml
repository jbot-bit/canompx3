# Hypothesis Registry — MES Volatility Persistence Gate
#
# Locked:        2026-04-11T01:00:00+10:00
# Author:        Claude Code session (wave 4 lit-grounded discovery)
# Holdout mode:  A (2026-01-01 sacred)
# Data horizon:  6.65 calendar years (MES real micro 2019-05-06 to 2025-12-31)
# Testing mode:  family (Pathway A, BH FDR at K=24)
#
# AUDIT NOTE: ATR_P70 requires ATR(20) percentile >= 70.
# Passes ~32% of MES trading days — meaningful selectivity.
# GARCH volatility clustering: high-vol regimes persist and produce
# larger ORBs that clear MES's relatively high friction.

metadata:
  name: "mes-vol-persist"
  purpose: |
    Test whether high volatility regime (ATR(20) pctl >= 70) predicts
    stronger MES ORB breakout edge. GARCH volatility clustering means
    high-vol regimes persist, producing larger ORBs that clear MES's
    relatively high friction ($2.42 RT on $1.25/pt).
  date_locked: "2026-04-11T01:00:00+10:00"
  holdout_date: "2026-01-01"
  data_horizon_years_clean: 6.65
  data_source: "real CME Micro E-mini S&P 500 futures 2019-05-06 onwards"
  testing_mode: "family"
  bailey_compliance:
    trials: 24
    horizon_years: 6.65
    e_max_n: 1.0
    min_btl_required_years: 6.36
    headroom_pct: 4.4
    status: "PASS"
  total_expected_trials: 24

hypotheses:
  - id: 1
    name: "MES TOKYO_OPEN ATR_P70 RR1.0"
    theory_citation: "Bollerslev (1986) JBES GARCH; Engle (1982) Econometrica ARCH"
    economic_basis: |
      GARCH volatility clustering: high-vol regimes persist over multiple
      days. When ATR(20) percentile >= 70, the current vol regime produces
      larger ORBs that clear MES's high friction-to-range ratio. Engle (1982)
      and Bollerslev (1986) establish that conditional variance is
      time-varying and persistent in financial time series.
    filter:
      type: ATR_P70
      column: atr_pctl
      thresholds: [70]
    scope:
      instruments: [MES]
      sessions: [TOKYO_OPEN]
      rr_targets: [1.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "BH FDR q=0.05 fails at K=24"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0"
      - "Any era with N >= 50 and ExpR < -0.05"

