upstream_discovery_provenance:
  role: "PROVENANCE_ONLY"
  note: |
    Closes the short-direction audit gap left by Phase 6 (long-only).
    Sibling spec family-killed (commit a8208674). This pre-reg tests
    whether MGC has a short-direction edge not tested in Phase 6.
    Pre-scan baselines (2026-04-19, Mode A IS, ORB_G5 short on rr=1.5):
      LONDON_METALS N=32 ExpR+0.157 approx_t 0.77
      COMEX_SETTLE  N=20 ExpR-0.078 approx_t -0.31
      US_DATA_1000  N=123 ExpR+0.036 approx_t 0.35
      EUROPE_FLOW   N=29 ExpR+0.115 approx_t 0.54
    All approx_t well below Chordia 3.00. Pre-reg explicitly anticipates
    KILL; writing it is the honest audit step, not an over-optimistic
    hypothesis. Symmetric session scope with long sibling eliminates
    post-hoc cherry-pick hazard.

