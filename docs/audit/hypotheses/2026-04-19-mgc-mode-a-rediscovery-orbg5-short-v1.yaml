    type: primary
    theory_citation:
      source: "docs/institutional/literature/fitschen_2013_path_of_least_resistance.md"
      extract: "Table 3.9 (p.41) commodity intraday trend-follow. Symmetric to long direction — Fitschen framework grounds both sides."
    statement: "MGC LONDON_METALS O5 RR1.5 short ORB-G5 breakouts produce positive Mode A IS ExpR materially above the unfiltered baseline (-0.155)."
    pass_metric: {metric: "ExpR_on_IS", threshold_gte: 0.0}
    gate:
      - "bh_pass_family (q_family < 0.05)"
      - "abs(t_IS) >= 3.00"
      - "N_IS_on >= 100"
      - "years_positive_IS >= 3 (absolute over 4 full years 2022-2025; N<10 years excluded)"
      - "bootstrap_p < 0.10 (moving-block centered-H0, block=5, B=10000)"
      - "ExpR_on_IS > 0"
    counted_against_trial_budget: true
  - id: H2_COMEX_SETTLE
    type: primary
    theory_citation:
