trial_budget:
  primary_selection_trials: 4
  schema_locked_before_any_metric: true
  minbtl_bound:
    formula: "MinBTL = 2 * ln(N_trials) / E[max_N]^2"
    N_trials: 4
    within_cap: true

kill_criteria:
  - id: K1
    metric: "Number of H1-H4 that pass all 6 gate clauses"
    threshold: 0
    action: "PERMANENT KILL — MGC ORB_G5 short on 4 sessions does not yield Pathway A edge. No re-runs."
  - id: K2
    metric: "Baseline sanity smoke-test"
    threshold: 0.001
    action: "SMOKE FAIL — harness-implementation discrepancy."
  - id: K3
    metric: "Any cell tautology/extreme_fire/arithmetic_only"
    threshold: 1
    action: "FLAG — exclude from survivors per RULE 8."

decision_rule:
  continue_if: "At least 1 of H1-H4 passes all 6 gate clauses AND no K2 smoke fail AND cell not K3-flagged."
  park_if: "At least 1 cell passes BH-FDR family but fails EXACTLY ONE of {bootstrap_p, years_positive} with N_IS_on >= 100."
  kill_if: "K1 fires OR K2 smoke fail."

