    statement: "Same as H1 for US_DATA_1000. Unfiltered baseline -0.049."
    pass_metric: {metric: "ExpR_on_IS", threshold_gte: 0.0}
    gate:
      - "bh_pass_family (q_family < 0.05)"
      - "abs(t_IS) >= 3.00"
      - "N_IS_on >= 100"
      - "years_positive_IS >= 3"
      - "bootstrap_p < 0.10"
      - "ExpR_on_IS > 0"
    counted_against_trial_budget: true
  - id: H4_EUROPE_FLOW
