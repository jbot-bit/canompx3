    - "Same-author governance note (per recommendation MD Caveat 5 line 218): ATR_P50 sibling is being authored in the same session by the same author. Both share session/instrument/RR/CB/aperture and differ only in the ATR percentile threshold (50 vs 70). Sequential authorship is intentional; SR-review-registry governance gap is disclosed."

scope:
  instrument: MNQ
  strategy_id: "MNQ_COMEX_SETTLE_E2_RR1.0_CB1_ATR_P70"
  session: COMEX_SETTLE
  orb_minutes: 5
  entry_model: E2
  confirm_bars: 1
  rr_target: 1.0
  direction: pooled
  filter_type: ATR_P70
  filter_source: "trading_app.config.ALL_FILTERS['ATR_P70']"
  baseline: "same geometry, exact canonical lane replay"
  out_of_scope:
    - "ATR_P30 / ATR_P50 sibling cells (ATR_P50 has its own paired prereg authored same day)"
    - "RR1.5 or RR2.0 siblings"
    - "O15 / O30 aperture siblings"
    - "theory-grant attempt for ATR_P70 or INTRA_ASSET_PERCENTILE family"
    - "cross-instrument mirrors (MES, MGC)"
    - "allocator, sizing, or deployment changes"
    - "writes to validated_setups before execution evidence exists"
    - "writes to chordia_audit_log.yaml without separate post-verdict authorization"

data_policy:
  is_window:
    description: "trading_day < HOLDOUT_SACRED_FROM"
    constant_source: "trading_app.holdout_policy.HOLDOUT_SACRED_FROM"
    locked_boundary: "2026-01-01"
  oos_window:
    description: "trading_day >= HOLDOUT_SACRED_FROM"
    policy: "read-only descriptive corroboration only; never used to rescue or kill the IS verdict; OOS power floor per research/oos_power.py::POWER_TIERS applies."
  cohort_lower_bound:
    description: "trading_day >= WF_START_OVERRIDE['MNQ']"
    constant_source: "trading_app.config.WF_START_OVERRIDE"
    locked_boundary: "2020-01-01"
    rationale: "Match canonical promoter cohort (strategy_discovery._load_outcomes_bulk). Without this, audit fires on pre-2020 micro-launch trades the promoter excludes."
  tuning_against_oos: false
  canonical_layers_only: true

scratch_policy:
  policy: "realized-eod"
  justification: >
    Capital-routing-class decision (downstream allocator-gate audit consumes the verdict).
    Per pre_registered_criteria.md Criterion 13 (BINDING) and feedback_scratch_pnl_null_class_bug.md,
    realized-eod is required for any capital-impact pre-reg to ensure scratch rows are not
    silently dropped via `WHERE pnl_r IS NOT NULL`.

feature_definition:
  feature_name: ATR_P70
  canonical_source_of_truth: "trading_app.config.OwnATRPercentileFilter (registered at trading_app.config.ALL_FILTERS['ATR_P70'])"
  delegation_wrapper: "research.filter_utils.filter_signal(df, 'ATR_P70', 'COMEX_SETTLE')"
  trade_time_knowable: true
  first_complete_time: "session start (ATR_20 is computed from prior-day close per pipeline/build_daily_features.py)"
  temporal_alignment_note: >
    `atr_20_pct` is the asset's own ATR(20) expressed as a percentile of its own historical
    distribution, computed at prior-day close. ATR_P70 fires when atr_20_pct >= 70. The filter
    is trade-time-knowable at session open and predates ORB end. This prereg does NOT claim
    the filter has a Pathway-B-quality theory basis (see grounding.filter_grounding_status).
  lookahead_check: "Required PASS before execution. atr_20_pct is in `safe (always trade-time-knowable) features` per backtesting-methodology.md RULE 6.1."

grounding:
  core_orb_premise:
    - source_file: "resources/Building_Reliable_Trading_Systems.pdf"
      extract_proxy: "docs/institutional/literature/fitschen_2013_path_of_least_resistance.md"
      use: "grounds intraday trend-follow / breakout continuation on equity-index class"
      with_theory_claim: false
    - source_file: "resources/Algorithmic_Trading_Chan.pdf"
      extract_proxy: "docs/institutional/literature/chan_2013_ch7_intraday_momentum.md"
      use: "grounds stop-cascade / intraday momentum base for ORB breakout entries"
      with_theory_claim: false
  filter_grounding_status:
    verdict: "NO_THEORY_GRANT"
    basis: >
      INTRA_ASSET_PERCENTILE filter family is CLASS_GROUNDED_POLARITY_PENDING per
      docs/audit/results/2026-05-12-chordia-audit-queue-top3-prereg-recommendation.md lines 169-202.
      Fitschen Ch 6 grounds the volatility-percentile filter CLASS but his empirically-positive
      direction is skip-high-vol; ATR_P70 fires include-high-vol (opposite polarity). The
      include-high-vol polarity mechanism ("high realized ATR -> larger stop cluster -> larger
      post-cascade momentum window for E2 to harvest") is a PLAUSIBLE_SYNTHESIS drawn from
      Harris 2002 Ch 28 cascade mechanics and Ch 20 volatility decomposition combined with
      Chan 2013 Ch 7 intraday momentum framing. Verbatim Harris OCR text (resources/harris_ocr/
      full_text.txt verified 2026-05-16) does NOT assert the volatility-magnitude ->
      cascade-magnitude monotonicity on any verified page. Therefore this prereg makes
      NO_THEORY_GRANT claim and the strict no-theory Chordia threshold (t >= 3.79) applies.
      Strict threshold absorbs the synthesis weakness: if the edge survives t >= 3.79 it
      survives without the polarity grant either way.
  mechanism_status: "plausible_synthesis_not_locally_verified"
  mechanism_status_explanation: >
    The mechanism narrative above is internally coherent and consistent with adjacent
    Harris+Chan material, but the load-bearing monotonicity claim is NOT directly quoted
    from any local /resources source. Labeling honestly per institutional-rigor.md § 7 and
    feedback_literature_before_prereg.md. The same mechanism narrative applies to the paired
    ATR_P50 prereg authored same day; the only difference is the percentile threshold (70 vs 50).

