  notes:
    - "This prereg is an unlock audit for one rank-2 chordia-audit-queue candidate, not a fresh discovery scan."
    - "No theory grant is claimed for ATR_P70 in this file (theory_citation field intentionally OMITTED per feedback_chordia_theory_citation_field_presence_trap.md + feedback_lhp_validator_vs_field_presence_trap_n1_2026_05_13.md)."
