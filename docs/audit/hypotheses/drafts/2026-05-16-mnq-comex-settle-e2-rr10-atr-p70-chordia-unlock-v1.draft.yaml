  max_allowed_proxy: 2000
  status: "under budget"
  minbtl_note: "K=1 Pathway-B confirmatory verify; estimate_k_budget.py n_trials <= 1 short-circuit at line 126-128 returns required_years = 0.0 (auto-pass)."

decision_rule:
  continue_if: "H1 clears strict t >= 3.79 with positive IS ExpR and no harness failure; OOS verdict labeled UNVERIFIED_INSUFFICIENT_POWER if power < 0.50."
  park_if: "H1 clears strict IS gates but OOS directional corroboration is ambiguous AND OOS power tier == STATISTICALLY_USELESS"
  kill_if: "H1 fails t or ExpR gates, or execution integrity fails, or OOS sign opposes IS sign with OOS power >= DIRECTIONAL_ONLY"

methodology_rules_applied:
