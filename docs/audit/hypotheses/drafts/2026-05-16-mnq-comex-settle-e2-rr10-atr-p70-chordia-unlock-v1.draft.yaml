    application: "IS and OOS are partitioned by HOLDOUT_SACRED_FROM only."
  - rule: "RULE 3.3 OOS power floor"
    application: "research/oos_power.py::oos_ttest_power computed before any binary OOS kill; dir_match cannot kill an underpowered OOS."
  - rule: "RULE 4 multiple testing"
    application: "Current family K is exactly 1; no multiplicity correction required."
  - rule: "RULE 6 trade-time knowability"
    application: "atr_20_pct must be shown trade-time-knowable at session start; included in RULE 6.1 safe-features list."
  - rule: "RULE 9 canonical data source"
    application: "Reads only canonical layers (bars_1m, daily_features, orb_outcomes); no derived-layer proof."
  - rule: "research-truth-protocol canon filter delegation"
    application: "Filter fire mask must come from canonical delegation (trading_app.config.ALL_FILTERS['ATR_P70']), never inline re-implementation."
  - rule: "Criterion 13 (BINDING) scratch policy"
    application: "scratch_policy: realized-eod declared above; runner must honor."

