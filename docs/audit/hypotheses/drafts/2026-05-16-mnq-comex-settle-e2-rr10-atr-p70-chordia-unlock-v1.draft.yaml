  purpose: "Bounded exact-lane Chordia-strict (has_theory: false) unlock audit for MNQ COMEX_SETTLE O5 RR1.0 CB1 ATR_P70. No theory grant is claimed."
  date_locked: "2026-05-16T00:00:00+10:00"
  holdout_date: "2026-01-01"
  total_expected_trials: 1
  testing_mode: "family"
  research_question_type: "conditional_role"
  theory_grant: false  # Amendment 3.3 (2026-05-17): no-theory Pathway-B, strict Chordia t>=3.79; theory_citation intentionally OMITTED per feedback_chordia_theory_citation_field_presence_trap.md

