hypotheses:
  - id: 1
    name: "MNQ COMEX_SETTLE O5 RR1.0 CB1 ATR_P70 exact-lane strict (has_theory: false) unlock"
    economic_basis: >
      MECHANISM_STATUS: plausible_synthesis_not_locally_verified.
      The include-high-vol polarity for ATR_P70 (fires when daily ATR_20 >= 70th percentile of
      MNQ asset-own distribution at session-start) is hypothesised to coincide with larger
      stop-cluster cascades per Harris Ch 28 § 28.1.1 cascade mechanics + Ch 20 § 20.1
      volatility decomposition, combined with Chan Ch 7 intraday-momentum framing. Verbatim
      Harris OCR (resources/harris_ocr/) does NOT state volatility-magnitude ->
      cascade-magnitude monotonicity on any verified page; the chain is synthesis, not
      extraction. LITERATURE_CITATION_STATUS: omitted (theory_citation field intentionally
      absent per field-presence trap). THRESHOLD_RATIONALE: chordia_strict_t>=3.79 default
      loader path (has_theory: false). FALSIFICATION: if bounded-runner verify produces
      chordia_t < 3.79 OR (dir_match=FALSE with OOS power >= 0.50 per research/oos_power.py::
      POWER_TIERS), this single-cell hypothesis is refuted (verdict = PARK or FAIL_CHORDIA).
      Portfolio-EV motivation: COMEX_SETTLE MNQ is currently underrepresented in deployed
      lanes; ATR_P70 is the rank-2 chordia-audit-queue candidate by chordia_t. Selectivity
      tradeoff vs paired ATR_P50: ATR_P70 fires ~30% less often (N=602 vs N=886) but with
      higher conditional ExpR (0.1761 vs 0.1363) — both ranks are independently testable.
    role:
      kind: "standalone"
      parent: "Exact MNQ_COMEX_SETTLE_E2_RR1.0_CB1_ATR_P70 canonical lane replay on orb_outcomes x daily_features (O5)."
      comparator: "Replay-selected trades versus the strict Chordia threshold and descriptive OOS sign monitor; no sibling rescue or parameter variation."
      primary_metric: "selected_trade_mean_r"
      promotion_target: "chordia_audit_unlock_only"
    filter:
      type: "ATR_P70"
      column: "atr_20_pct (daily_features)"
      thresholds:
        - "atr_20_pct >= 70.0"
    scope:
      instruments: [MNQ]
      sessions: [COMEX_SETTLE]
      rr_targets: [1.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
      orb_minutes: [5]
    expected_trial_count: 1
    kill_criteria:
      - "IS t-stat < 3.79"
      - "IS ExpR <= 0.0"
      - "N_IS_on < 100"
      - "If OOS N >= 30 AND OOS power tier >= DIRECTIONAL_ONLY per research/oos_power.py::POWER_TIERS, OOS sign opposes IS sign"
      - "Canonical filter delegation diverges from trading_app.config.ALL_FILTERS['ATR_P70']"
      - "Scratch/null handling is not explicit in the measured trade stream (scratch_policy: realized-eod must be honored)"
      - "Lookahead check fails (atr_20_pct must be confirmed trade-time-knowable at session start)"
    statement: >
      On the fixed MNQ COMEX_SETTLE O5 E2 CB1 RR1.0 lane using the canonical ATR_P70 filter,
      the IS sample remains positive and strong enough to clear the strict no-theory Chordia
      severity gate (t >= 3.79) when recomputed honestly on canonical Mode-A data with
      adversarial split reporting.
    pass_metric:
      metric: "t_IS"
      formula: "compute_chordia_t(sharpe_IS, N_IS) on canonical IS fired trades after canonical filter delegation"
      threshold_gte:
        t_is: 3.79
        n_is_on: 100
        expr_is: 0.0
      extra_gates:
        - "dir_match_oos = true when OOS N is sufficient AND OOS power tier >= DIRECTIONAL_ONLY"
        - "adversarial split table emitted; no hidden subgroup collapse"
        - "scratch-inclusive accounting required if scratch rows exist (realized-eod policy)"
    counted_against_trial_budget: true

trial_budget:
  primary_selection_trials: 1
  schema_locked_before_any_metric: true

total_hypothesis_count: 1
total_expected_trials: 1
budget_check:
