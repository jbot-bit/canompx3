data_policy:
  oos_role: "descriptive_for_audit_verdict; deployment_eligibility_uses_separate_haircut_gate"
  oos_role_rationale: |
    Per Harvey-Liu 2015 Eq.5 (resources/backtesting_dukepeople_liu.pdf p.14), the haircut
    formula deflates IS Sharpe by N-trial inflation. It is an IS-side correction, NOT an
    OOS substitute. At single-direction N_OOS ~22 (half of Stage B3 pooled OOS), measured
    power is well below 0.50 (STATISTICALLY_USELESS tier per backtesting-methodology.md
    RULE 3.3). Audit verdict here is the per-cell Chordia hurdle on IS clustered-SE alone.
    Deployment eligibility is decided by the four-gate chain (Chordia / Harvey-Liu / cost-
    aware / correlation) computed by the Stage 2 runner.
  is_window:
    description: "trading_day < HOLDOUT_SACRED_FROM"
    constant_source: "trading_app.holdout_policy.HOLDOUT_SACRED_FROM"
    locked_boundary: "2026-01-01"
  oos_window:
    description: "trading_day >= HOLDOUT_SACRED_FROM"
    policy: "read-only descriptive corroboration only; never used to rescue or kill the IS verdict."
  cohort_lower_bound:
    description: "trading_day >= WF_START_OVERRIDE['MNQ']"
    constant_source: "trading_app.config.WF_START_OVERRIDE"
    locked_boundary: "2020-01-01"
    rationale: "Match Stage B3 cohort exactly (strategy_discovery._load_outcomes_bulk)."
  tuning_against_oos: false
  canonical_layers_only: true
  scratch_policy: "realized-eod"
  scratch_policy_justification: "Capital-decision-relevant; C13 BINDING per pre_registered_criteria.md and feedback_chordia_unlock_deployment_gate_audit_checklist.md. Scratches counted as R=0 in trade stream."

