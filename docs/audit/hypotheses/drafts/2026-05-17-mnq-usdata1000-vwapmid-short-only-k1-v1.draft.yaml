decision_rule:
  continue_if: |
    H1 clears (t_clustered >= 3.79 AND N_unique_trading_days >= 30 AND ExpR_IS > 0)
    AND reconciliation within 0.005 ExpR -> PASS_K1_CHORDIA. Deployment eligibility
    is then determined by deployment_gate_chain (independent four-gate audit). Live
    deployment requires PASS on all four gates AND explicit human review (Stage 4 of
    the surrounding plan).
  kill_if: |
    H1 fails (t_clustered < 3.79, cluster-skew kill, naive-flip kill, ExpR_IS <= 0,
    canonical delegation divergence, scratch handling unexplicit, reconciliation
    divergence > 0.030 ExpR) -> FAIL_K1. No deployment.
  # OOS is NOT a kill axis at audit-time per RULE 3.3 power-tier mandate.

