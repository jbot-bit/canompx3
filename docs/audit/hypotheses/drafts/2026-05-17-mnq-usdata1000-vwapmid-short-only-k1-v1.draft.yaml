primary_schema:
  cell:
    id: "MNQ_US_DATA_1000_O15_RR1.5_VWAP_MID_ALIGNED_SHORT"
    strategy_id: "MNQ_US_DATA_1000_E2_RR1.5_CB1_VWAP_MID_ALIGNED_O15"
    instrument: MNQ
    session: US_DATA_1000
    orb_minutes: 15
    rr_target: 1.5
    filter: VWAP_MID_ALIGNED
    direction: short
    expected_N_IS: 354  # from docs/audit/results/2026-05-17-mnq-usdata1000-vwapmid-family-pooled-oos-v1.md directional split
    expected_ExpR_IS: 0.2572  # from same source; runner must reconcile within 0.005
    reconciliation_tolerance:
      pass_silent: 0.005   # |delta_ExpR| <= 0.005 (no reconciliation block needed)
      audit_integrity_failure: 0.030   # |delta_ExpR| > 0.030 -> HALT + investigate upstream
  k_family: 1
  k_global: 1
  k_lane: 1
  k_session: 1
  k_effective_informational: 8  # 4 Stage B3 cells x 2 directions; Lopez de Prado false-strategy Eq.1 (informational only; check_hypothesis_minbtl_compliance reads n_trials=1).
  chordia_threshold_basis: "Chordia 2018 no-theory strict t-hurdle: t_clustered >= 3.79 (absolute, K-independent ASCII >= mandatory)."
  clustered_se_guard:
    estimator: "statsmodels.regression.linear_model.OLS with cov_type='cluster', cluster=trading_day"
    rationale: |
      Multiple SHORT trades within the same trading_day share intraday volatility
      regime, gap context, news flow. Naive i.i.d. SE understates variance / overstates
      t-stat. Structural argument grounded in Harris 2002 Ch 4 sec 4.5.2.
    required_reporting:
      - "N_trades, N_unique_trading_days, cluster_size_mean, cluster_size_max"
      - "t_naive (i.i.d.) and t_clustered side-by-side"
      - "If t_clustered < t_naive by >= 0.5 then result MD frontmatter MUST set clustering_inflation_warning: true"
    kill_clauses:
      naive_flip_kill: "If cell would PASS at t_naive >= 3.79 but FAIL at t_clustered < 3.79, the cell FAILS. No mid-run methodology flip."
      cluster_skew_kill_threshold: 30  # operator-chosen; no external literature anchor.
      cluster_skew_kill_rule: "If N_unique_trading_days < 30, clustered-SE estimator unreliable. Cell verdict = UNVERIFIED regardless of t_clustered."
  verdict_test: "Single-cell clustered-SE Chordia no-theory strict t_clustered >= 3.79 — sole verdict-driving test."
  promotion_gate: |
    PASS_K1_CHORDIA if cell t_clustered >= 3.79 AND N_unique_trading_days >= 30 AND ExpR_IS > 0.
    FAIL_K1 otherwise. Audit verdict is decided on IS clustered-SE alone (OOS power-tier
    excluded from verdict per RULE 3.3). Deployment eligibility is computed by the
    deployment_gate_chain (see below) and reported in deployment.csv adjacent to but
    separate from this audit verdict.

