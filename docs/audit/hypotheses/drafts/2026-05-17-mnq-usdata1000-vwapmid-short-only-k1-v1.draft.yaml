    to power tier label.

deployment_gate_chain:
  description: "Four orthogonal gates that ALL must clear independently for the cell to be deployment-eligible. Reported in deployment.csv (rows: gate, value, threshold, PASS/FAIL). Audit verdict (H1 above) is INDEPENDENT of these gates — a PASS_K1_CHORDIA cell can still fail any deployment gate and be parked."
  gates:
    - id: 1
      name: "Chordia no-theory strict (verdict-aligned)"
      formula: "t_clustered (from H1)"
      threshold: 3.79
      threshold_basis: "Chordia 2018 no-theory strict t-hurdle (resources/Two_Million_Trading_Strategies_FDR.pdf)."
      direction: ">="
    - id: 2
      name: "Harvey-Liu IS Sharpe haircut at K_effective=8"
      formula: |
        Harvey-Liu 2015 Eq.5 (resources/backtesting_dukepeople_liu.pdf p.14):
        Sharpe_haircut = Sharpe_IS * (1 - haircut_pct), where haircut_pct is computed
        from K_effective_informational=8 via the Harvey-Liu haircut table. IS-side
        deflation only — NOT an OOS substitute (memory/feedback_harvey_liu_haircut_not_oos_validation_substitute.md).
      threshold_floor: 0.5
      threshold_basis: "Project doctrine post-haircut Sharpe floor; reviewer-overridable but pre-committed before run."
      direction: ">="
    - id: 3
      name: "Cost-aware ExpR positive"
      formula: "ExpR_IS - COST_SPECS['MNQ'].total_friction / risk_dollars_per_R (per-trade cost expressed in R units)"
      threshold: 0.0
      threshold_basis: "pipeline.cost_model.COST_SPECS['MNQ'] (canonical; F-4 commission fix). Query at runtime via from pipeline.cost_model import COST_SPECS — do NOT inline numeric value (per feedback_doctrine_drift_cost_specs_2026_05_01.md)."
      direction: ">"
    - id: 4
      name: "Pairwise correlation vs current lane_allocation.json"
      formula: "max pairwise Pearson correlation of daily pnl_r vs every active lane in docs/runtime/lane_allocation.json::lanes[] (trading_app.lane_correlation._load_lane_daily_pnl + _pearson)"
      threshold: "trading_app.lane_correlation.RHO_REJECT_THRESHOLD"
      threshold_value_runtime: 0.85  # informational only; runner MUST read at runtime, not inline this value.
      threshold_basis: "Allocator correlation gate (NOT subsumed by Harvey-Liu haircut per memory/feedback_harvey_liu_haircut_not_correlation_gate_substitute.md)."
      direction: "<"
  reporting_contract: |
    deployment.csv MUST have exactly 4 rows (one per gate id 1..4) with columns:
    gate_id, gate_name, measured_value, threshold, direction, pass_fail. Result MD
    frontmatter MUST carry deployment_gate_chain_pass: <bool> = AND over the four
    pass_fail flags. Audit verdict (PASS_K1_CHORDIA / FAIL_K1) is REPORTED separately
    in the verdict section and is NOT a function of the deployment_gate_chain.
  no_canonical_writes: |
    Stage 2 runner is read-only on all canonical layers and runtime files. NO writes
    to validated_setups, experimental_strategies, lane_allocation.json,
    chordia_audit_log.yaml, bot_state.json, live_config.json. Lane mutation is a
    separate Stage 4 plan step gated on human review.

