trial_budget:
  n_trials: 1  # Check 57 / MinBTL. ONE hypothesis test: the single pre-committed
               # (0.5R, 120s) time-exit vs the price-stop baseline, paired. The
               # per-lane breakdown is a REPORTING requirement (pooled-finding-
               # rule), NOT 7 separate trials — it is one rule tested across the
               # deployed population, reported per-cell.
  standalone_k_budget:
    # Live-verified via research-catalog estimate_k_budget on 2026-05-31:
    instrument: MNQ
    n_trials: 1
    clean_years: 6.65
    minbtl_years_required: 0.0
    n_max_at_horizon: 27
    headroom_years: 6.65
    verdict: PASS
    authority: >
      pre_registered_criteria.md Criterion 2;
      literature/bailey_et_al_2013_pseudo_mathematics.md Theorem 1.
  family_aggregate_note:
    # From the H0 pre-reg downstream-family block (2026-05-31-adaptive-stops-h0-
    # ...v1.yaml). H4 is the H4=1 term. The aggregate matters because the family
    # is NEAR the MinBTL ceiling — H4's K=1 is the cheapest live branch.
    downstream_family_K: 21  # H1 + H2 + H3 + H4=1
    family_minbtl_years_required: 6.09
    family_headroom_years: 0.56  # tight; no room to expand any one hypothesis.
    implication: >
      H4 (K=1) is budget-rational; MES_CME_PRECLOSE H1/H3 (up to 12 trials) is
      not budget-rational to draft first even though it survived the H0 gate.

decision_rule:
  primary_gate: per_lane_paired_delta_r  # B (time-exit) minus A (price-stop),
                                         # realized mean pnl_r, IS, per lane.
  proceed:
    condition: >
      At least one deployed lane shows paired-deltaR (time-exit minus price-stop)
      STRICTLY POSITIVE on the IS slice with N_IS >= 50 traded trades, AND the
      gain is not solely regime-concentrated (flag per mechanism.regime_
      concentration), AND the per-lane breakdown is reported.
    consequence: >
      That lane's time-exit overlay is worth heavyweight Chordia review +
      independent positive-EV validation. PROCEED routes to a heavyweight pre-reg,
      NEVER to capital (edge_claim_summary "less bad, not good").
  kill:
    condition: >
      NO deployed lane shows positive IS paired-deltaR at N_IS >= 50 (time-exit is
      monotone-non-improving vs the price-stop across all lanes).
    consequence: >
      The single-layer time-based no-progress exit is dead for these lanes. Does
      NOT kill the full 7-layer Howard stack (untested here) but removes the
      cheapest isolated layer from the live set.
  insufficient_n:
    condition: "N_IS < 50 traded trades for a lane."
    consequence: "No per-lane verdict; descriptive output only (N>=50 floor)."
  oos_handling:
    rule: >
      The OOS paired-deltaR is reported WITH its one-sample power tier
      (research.oos_power.power_verdict). An IS->OOS sign change is NOT treated as
      refutation unless power tier == CAN_REFUTE (RULE 3.3). No kill on OOS alone.

nogo_overlap_disclosure:
  # STRATEGY_BLUEPRINT §5 NO-GO registry — distinguish H4 from the dead adjacents.
  adjacent_paths:
    - adjacent: "Breakeven trail stops (blueprint:281, -0.12..-0.17 Sharpe, DEAD)"
      verdict: DEAD
      difference: >
        A trailing/breakeven stop moves a PRICE level as the trade progresses.
        H4's no-progress exit is a TIME condition (exit if no 0.5R MFE within
        120s) — it does not trail price. Howard's stack contained BOTH layers;
        H4 isolates only the no-progress (time) layer, explicitly NOT the
        trailing/breakeven layers that are dead in our registry.
    - adjacent: "Vol-regime parameter switching (blueprint:287, DEAD)"
      verdict: DEAD
      difference: >
        H4 uses ONE fixed (0.5R, 120s) rule applied uniformly to all trades. It
        does not switch parameters by volatility bucket. Regime is a REPORTING
        flag (is the gain regime-concentrated?), never a parameter selector.
    - adjacent: "H1/H3 price-stop family (PARKED by H0 audit c80db6ee)"
      verdict: "PARK / largely DEAD"
      difference: >
        H1/H3 condition the PRICE stop geometry; H0 found symmetric MFE/MAE makes
        that value-destroying on 4/7 lanes. H4 conditions on TIME, a different
        axis — explicitly declared independent of the H0 symmetry verdict in the
        H0 pre-reg's `decision_rule.h4_independence` clause.
  decision_variable_statement: >
    The "what's different this time" is NOT "another stop parameter." It is the
    AXIS: time-based no-progress discrimination, the one exit mechanism Howard
    showed POSITIVE (relative) evidence for, isolated to its single cheapest
    layer, tested paired against the incumbent price-stop on our own deployed
    lanes with a literature-fixed parameter and no sweep.

methodology_gates:
  triple_join:
    rule: >
      Reuse strategy_fitness._load_strategy_outcomes (already joins orb_outcomes
      to daily_features on (trading_day, symbol, orb_minutes) for filter
      application). No hand-rolled join. RULE 9 / daily-features-joins.md
      satisfied by delegation.
  canonical_delegation:
    rule: >
      institutional-rigor §4: H4 CALLS _load_strategy_outcomes,
      holdout_policy.HOLDOUT_SACRED_FROM, oos_power.power_verdict,
      prop_profiles.ACCOUNT_PROFILES, cost_model.get_cost_spec. The no-progress-
      exit counterfactual is computed by READING the existing orb_outcomes
      excursion path (the same path apply_tight_stop reads), NOT by building a new
      simulation engine. Re-encodes NONE of the canonical modules.
  no_db_write:
    rule: "Read-only. DuckDB opened read_only=True. No INSERT/UPDATE/DELETE."
  cost_neutrality:
    rule: >
      Identical cost_model.get_cost_spec friction applied to BOTH arms so the
      paired-deltaR reflects exit timing only, never a cost asymmetry. RULE 7
      (tautology) guard: the time-exit must not be able to 'win' by avoiding a
      cost the price-stop pays.
  howard_illegitimate_uses_guard:
    # Carried verbatim-in-spirit from the extract's "ILLEGITIMATE uses" section.
    rules:
      - "NOT positive-EV proof: Howard's stack has negative pooled mean on his
         data; a PROCEED here is RELATIVE (less value-destroying), never a
         standalone deployment claim."
      - "NOT OOS evidence: Howard's 2025-01..2026-01 period overlaps our
         HOLDOUT_SACRED_FROM=2026-01-01. Howard's numbers are informational
         priors only; our own OOS slice (post-holdout) is the only OOS evidence."
      - "NOT an MGC basis: Howard is single-instrument ES. H4 scope is the
         existing MES/MNQ deployed lanes only; no MGC extension from this draft."
      - "NOT the full 7-layer stack: H4 tests only the single no-progress layer."

