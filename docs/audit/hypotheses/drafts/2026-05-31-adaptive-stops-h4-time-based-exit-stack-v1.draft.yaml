edge_claim_summary: >
  CLAIM: a time-based no-progress exit produces realized IS mean pnl_r >= the
  current price-based stop, per-lane, on the 7 deployed E2 lanes. GROUNDING:
  Howard 2026 (ES) found a time-based exit STACK outperformed the price-based
  baseline in 11 of 13 months (sign test p = 0.023, extract lines 28/102), with
  the largest gains in the two most volatile months — the mechanism is temporal
  conditioning ("exit if no progress within a time window") providing the
  discrimination price stops lack (extract §6.2). CRITICAL CAVEAT carried from
  the extract's "ILLEGITIMATE uses" section: Howard's stack is "LESS BAD, not
  good" — BOTH arms had negative pooled mean on his data; the stack is not shown
  to be positive-EV standalone. Therefore H4's verdict is a RELATIVE comparison
  (time-exit vs price-stop, paired on the same trades), NOT a standalone positive-
  EV deployment claim. A PROCEED here means "the time-exit is measurably less
  value-destroying than the price-stop on our lanes" and routes to heavyweight
  Chordia + independent positive-EV validation, never to capital.

mechanism:
  summary: >
    Price-based stops exit on instantaneous price crossing a fixed level; under
    near-symmetric early MFE/MAE (which H0 measured on 4/7 of these lanes) such a
    stop removes eventual winners at roughly the rate it removes eventual losers
    and cannot discriminate. A time-based no-progress exit conditions instead on
    TEMPORAL evolution: a trade that has not made meaningful favorable progress
    (>= +0.5R MFE) within a fixed window is statistically more likely to be an
    eventual loser, so terminating it diverts capital away from the structural
    stop that (per Howard §5.6) fires on ~77-100% of events in volatile regimes.
    The discrimination is in TIME, not PRICE — a different axis than H1/H3, which
    is exactly why H4 is independent of the H0 symmetry verdict.
  literature_descriptors:
    source: docs/institutional/literature/howard_2026_value_area_breakouts_es.md
    note: >
      REPORTED as the external prior, NOT a gating threshold. The exit-stack
      table and the sign-test result frame the mechanism; the verdict gates only
      on our own measured paired-deltaR (see decision_rule).
    exit_stack_outperformance:
      ref: "Howard §5.4 (extract lines 28, 102)"
      value: "stack beat price-baseline 11/13 months, sign test p = 0.023"
    exit_layer_table:
      ref: "Howard Table 7 (extract lines ~106-116)"
      note: >
        Full 7-layer stack reduces structural-stop exit share from ~77-100% to
        37-50%. H4 tests ONLY the single no-progress layer (10-15% share in
        Howard's stack), NOT the full 7-layer system — the minimal K=1 isolation
        of the layer with the clearest temporal-conditioning mechanism.
    regime_concentration:
      ref: "Howard §5.6 + §5.4 (extract lines ~118, 102)"
      note: >
        The stack's edge concentrated in the two most-volatile months
        (April +32.20 ticks, August +18.20 ticks). H4 must report per-lane AND
        flag whether any per-lane gain is regime-concentrated rather than broad
        (a regime-concentrated gain is weaker evidence per Tolušić balance/
        imbalance phase-transition concerns).

hypothesis:
  H0_null: >
    The time-based no-progress exit produces realized IS mean pnl_r EQUAL TO or
    WORSE THAN the current price-based stop, per-lane (paired-deltaR <= 0).
  H1_alt: >
    The time-based no-progress exit produces realized IS mean pnl_r STRICTLY
    GREATER THAN the current price-based stop on at least one deployed lane
    (paired-deltaR > 0), with the per-lane breakdown reported (not pooled-only).
  pre_committed_parameters:
    # FIXED BEFORE ANY RUN. Anchored to Howard extract line 188 ("exit if no 0.5R
    # MFE within 120s after entry"). These are LITERATURE values, NOT tuned on our
    # data — zero researcher degrees of freedom (Bailey 2013). No sweep, no grid.
    mfe_progress_threshold_r: 0.5  # Howard line 188.
    no_progress_window_seconds: 120  # Howard line 188 (120s acceptance/horizon).
    window_granularity_note: >
      Howard's 120s is on a 1-second tick series; our orb_outcomes is bar-based.
      The 120s is resolved as a WALL-CLOCK window against bar entry/exit
      timestamps (e.g. on 1m bars, the first 2 bars after entry), NOT as a free
      bar-count we get to choose. The wall-clock anchor is the pre-commit; the
      bar mapping is a deterministic consequence of bar size, not a tunable.
    forbidden: [parameter_sweep, grid_search, post_hoc_threshold_rescue, multi_window_argmax]

