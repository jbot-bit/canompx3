  pathway_set: true
  theory_citation_per_hypothesis: true
  upstream_K_separated_from_test_K: true
  kill_criteria_numeric: true  # K1-K6 all numeric/binary, no "reconsider"
  no_to_fill_other_than_sha: true
  k_effective_accounting: |
    None of the 8 pairs has a prior pass on this specific (specification
    audit) test. K_effective = K_prior + K_declared = 0 + 8 = 8.
  pooled_t_verdict_role_locked: |
    pooled_t_role=DESCRIPTIVE_ONLY. The Spearman rs in H3 is a
    population-level statistic but its verdict role is to gate the entire
    experiment as INCONCLUSIVE_TAUTOLOGY, not to drive a per-pair
    deployment decision.
  clustered_se_required: false  # justified above
  oos_size_at_design_time: |
    N/A — OOS is FORBIDDEN_IN_THIS_EXPERIMENT.
  holm_vs_bh_choice: |
    BH-FDR. Capital-protection rationale is INVERTED for this experiment
    — a false positive here means we ESCALATE to design, which costs
    research time but does NOT touch capital. BH is appropriate for the
