      - "Chordia t-statistic < 3.00"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0 OR < 0.40 x IS ExpR"
      - "Any era with N >= 50 and ExpR < -0.05"
      - "IS Sharpe < 0.70 annualized"

  - id: 5
    name: "End-of-day institutional rebalancing at CME_PRECLOSE"
    theory_citation: "Market microstructure (pre-close auction literature)"
    economic_basis: |
      The CME pre-close session concentrates institutional rebalancing
      flow before the daily maintenance shutdown. Traders must close or
      roll positions, creating forced directional flow. The 5-minute
      opening range captures the initial rebalancing consensus. Breakouts
      continue as the remaining rebalancing flow sustains direction.
    filter:
      type: ORB_G5
      column: orb_size_points
    scope:
      instruments: [MNQ]
      sessions: [CME_PRECLOSE]
      rr_targets: [2.0]
