hypotheses:
  - id: 1
    name: "Crabel commitment at NYSE_OPEN"
    theory_citation: "Crabel (1990) Day Trading with Short Term Price Patterns, ch. 3"
    economic_basis: |
      NYSE 09:30 ET cash open concentrates the largest block of
      institutional equity flow globally. The 5-minute opening range
      captures overnight-to-cash positioning. Under Crabel's commitment
      hypothesis, breakouts of ranges representing meaningful capital
      commitment (G5) continue with above-chance probability. MNQ is
      the Micro Nasdaq-100 — direct beneficiary of this flow.
    filter:
      type: ORB_G5
      column: orb_size_points
    scope:
      instruments: [MNQ]
      sessions: [NYSE_OPEN]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "BH FDR q=0.05 fails on the pre-registered 5-hypothesis family"
      - "Chordia t-statistic < 3.00 (with theory)"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0 OR < 0.40 x IS ExpR"
      - "Any era with N >= 50 and ExpR < -0.05"
      - "IS Sharpe < 0.70 annualized (Bailey noise floor at N=5 on 6.66yr)"

  - id: 2
    name: "Cross-border information spillover at EUROPE_FLOW"
    theory_citation: "French & Roll (1986) JFE; Hamao, Masulis, Ng (1990) RFS"
    economic_basis: |
      European institutional participants trade US index futures throughout
      their trading day. Information accumulated during the European session
      (FTSE, DAX, ECB) is incorporated into NQ futures at the European flow
      window. Under French-Roll information arrival and Hamao-Masulis-Ng
      spillover, breakouts of the opening range at this session capture
      cross-border price discovery.
    filter:
      type: ORB_G5
      column: orb_size_points
    scope:
      instruments: [MNQ]
      sessions: [EUROPE_FLOW]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "BH FDR q=0.05 fails on the pre-registered 5-hypothesis family"
      - "Chordia t-statistic < 3.00"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0 OR < 0.40 x IS ExpR"
      - "Any era with N >= 50 and ExpR < -0.05"
      - "IS Sharpe < 0.70 annualized"

  - id: 3
    name: "Macro announcement price discovery at US_DATA_830"
    theory_citation: "Andersen, Bollerslev, Diebold, Vega (2003) AER; Ederington & Lee (1993) JF"
    economic_basis: |
      08:30 ET US macro releases (NFP, CPI, PPI, GDP) concentrate multi-day
      news into seconds. NQ futures reprice via real-time discovery per
      Andersen-Bollerslev-Diebold-Vega. Breakouts of the 5-minute opening
      range capture the initial directional consensus; continuation occurs
      as the market completes gradual information incorporation per
      Ederington-Lee.
    filter:
      type: ORB_G5
      column: orb_size_points
    scope:
      instruments: [MNQ]
      sessions: [US_DATA_830]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
