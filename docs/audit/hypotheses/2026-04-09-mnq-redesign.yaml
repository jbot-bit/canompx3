      - "Chordia t-statistic < 3.00"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0 OR < 0.40 x IS ExpR"
      - "Any era with N >= 50 and ExpR < -0.05"
      - "IS Sharpe < 0.70 annualized"

  - id: 4
    name: "Settlement microstructure at COMEX_SETTLE"
    theory_citation: "O'Hara (1995) Market Microstructure Theory"
    economic_basis: |
      COMEX settlement concentrates mandatory flow from hedgers, producers,
      and index rebalancers who must transact at or near settlement prices.
      Under O'Hara's microstructure framework, this forced flow creates
      directional imbalance that a breakout entry captures. NQ futures
      participate in the COMEX settlement window as part of cross-product
      rebalancing.
    filter:
      type: ORB_G5
      column: orb_size_points
    scope:
      instruments: [MNQ]
      sessions: [COMEX_SETTLE]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
