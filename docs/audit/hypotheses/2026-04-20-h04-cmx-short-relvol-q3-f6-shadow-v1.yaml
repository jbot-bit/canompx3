title: "H04 narrow shadow / deployment-shape pre-reg — MNQ_COMEX_SETTLE_E2_RR1.5_CB1_ORB_G5 short confluence (rel_vol_HIGH_Q3 AND F6_INSIDE_PDR)"
owner: claude
parent_prereg: "docs/audit/hypotheses/2026-04-20-mnq-live-context-overlays-v1.yaml"
parent_result: "docs/audit/results/2026-04-20-mnq-live-context-overlays-v1.md"
