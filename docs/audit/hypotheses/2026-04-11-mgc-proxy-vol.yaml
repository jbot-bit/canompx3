# Hypothesis Registry — MGC Proxy Volatility Regime Gate
#
# Locked:        2026-04-11T01:00:00+10:00
# Author:        Claude Code session (wave 4 lit-grounded discovery)
# Holdout mode:  A (2026-01-01 sacred)
# Data horizon:  17.60 calendar years (GC proxy 2010-06-07 to 2025-12-31)
# Testing mode:  family (Pathway A, BH FDR at K=54)
#
# AUDIT NOTE: GC parent gold futures as proxy for MGC micro.
# Price-safe per Amendment 3.1 (price-based features only).
# Two ATR filters (P50, P70) x 9 sessions x 3 RR = 54 trials.
# Gold's high friction ($3.74 RT) requires vol regime gating.
# 5 strategies already validated on GC proxy in prior session.

metadata:
  name: "mgc-proxy-vol"
  purpose: |
    Test whether volatility regime gating (ATR pctl >= 50 or >= 70) predicts
    stronger MGC ORB breakout edge using GC parent as proxy. Gold's high
    friction ($3.74 RT on $1.00/tick) requires vol regime gating to ensure
    ORBs are large enough to clear costs. Two ATR thresholds tested to
    find the optimal selectivity level.
  date_locked: "2026-04-11T01:00:00+10:00"
  holdout_date: "2026-01-01"
  data_horizon_years_clean: 17.60
  data_source_mode: "proxy"
  data_source_disclosure: "GC parent gold futures 2010-06-07 onwards as proxy for MGC micro (price-safe per Amendment 3.1)"
  data_source: "GC parent gold futures 2010-06-07 onwards"
  testing_mode: "family"
  bailey_compliance:
    trials: 54
    horizon_years: 17.60
    e_max_n: 1.0
    min_btl_required_years: 7.98
    headroom_pct: 54.7
    status: "PASS"
  total_expected_trials: 54

hypotheses:
  # --- ATR_P50 x 9 sessions x RR1.0 (ids 1-9) ---
  - id: 1
    name: "MGC TOKYO_OPEN ATR_P50 RR1.0"
    theory_citation: "Bollerslev (1986) JBES GARCH; Engle (1982) Econometrica ARCH"
    economic_basis: |
      GARCH volatility clustering: high-vol regimes persist. Gold's high
      friction ($3.74 RT) means low-vol ORBs are consumed by costs.
      ATR pctl >= 50 ensures minimum viable volatility for profitable
      breakouts. Tested on 17.60yr GC proxy for statistical power.
    filter:
      type: ATR_P50
      column: atr_pctl
      thresholds: [50]
    scope:
      instruments: [GC]
      sessions: [TOKYO_OPEN]
      rr_targets: [1.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "BH FDR q=0.05 fails at K=54"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0"
      - "Any era with N >= 50 and ExpR < -0.05"

