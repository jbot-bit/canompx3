    (A) the current price-based stop (baseline,
    opposite-ORB-boundary anchor), and (B) a time-based no-progress exit (exit if
    the trade has not reached +0.5R MFE within 120s wall-clock of entry; otherwise
    the trade's existing exit stands). Report per-lane and pooled realized mean
    pnl_r delta (B - A), with the OOS slice carrying its one-sample power tier.
