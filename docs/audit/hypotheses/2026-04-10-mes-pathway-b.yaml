# MES Pathway B — Individual Hypothesis Testing (Amendment 3.0)
#
# Locked:        2026-04-10T15:30:00+10:00
# Author:        Claude Code session (discovery execution plan Phase 2)
# Holdout mode:  A (2026-01-01 sacred)
# Data horizon:  6.92 calendar years (2019-05-06 to 2026-04-06)
# Testing mode:  individual (Pathway B, Amendment 3.0)
#
# MES is the Micro S&P 500 — cost constraints ($3.74 RT) narrow the viable
# sessions to NYSE_OPEN (highest liquidity, strongest Crabel baseline) and
# US_DATA_1000 (10:00 AM macro releases). G5/G6 are the two ORB size filters
# with theoretical grounding (Crabel commitment = meaningful range size).
# RR2.0 tests continuation, RR1.0 tests minimum directional follow-through.

metadata:
  name: "mes-pathway-b"
  purpose: |
    Individual hypothesis testing for MES under Pathway B (Amendment 3.0).
    5 hypotheses tested at raw p < 0.05. Downstream gates (WFE >= 0.50,
    2026 OOS positive, era stability) non-waivable.
  date_locked: "2026-04-10T15:30:00+10:00"
  holdout_date: "2026-01-01"
  data_horizon_years_clean: 6.92
  data_source: "real CME Micro E-mini S&P 500 futures 2019-05-06 onwards"
  testing_mode: "individual"
  bailey_compliance:
    trials: 5
    horizon_years: 6.92
    e_max_n: 1.0
    min_btl_required_years: 3.22
    headroom_pct: 115
    status: "PASS"
  total_expected_trials: 5

hypotheses:
  - id: 1
    name: "MES NYSE_OPEN G5 RR2.0 — Crabel on S&P benchmark"
    theory_citation: "Crabel (1990) ch. 3"
    economic_basis: |
      The S&P 500 is the deepest equity index. NYSE cash open concentrates
      institutional order flow. A meaningful ORB (G5) broken at cash open
      should travel 2x the range as committed capital follows through.
      The benchmark effect amplifies Crabel commitment: index-tracking flows
      are mechanical and persistent.
    filter:
      type: ORB_G5
      column: orb_size_points
    scope:
      instruments: [MES]
      sessions: [NYSE_OPEN]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "Raw p >= 0.05 (Pathway B)"
      - "Negative annualized Sharpe (direction gate)"
      - "Walk-forward efficiency < 0.50 (non-waivable)"
      - "2026 OOS ExpR < 0 (non-waivable)"
      - "Any era with N >= 50 and ExpR < -0.05 (non-waivable)"

  - id: 2
    name: "MES NYSE_OPEN G6 RR2.0 — Crabel monotonic filter"
    theory_citation: "Crabel (1990) ch. 3"
    economic_basis: |
      G6 is a stricter ORB size filter than G5 — it requires a larger
      opening range, implying stronger commitment from institutional flow.
      The monotonic relationship between ORB size and continuation strength
      predicts that G6 should produce higher edge than G5, with fewer but
      higher-quality trades.
    filter:
      type: ORB_G6
      column: orb_size_points
    scope:
      instruments: [MES]
      sessions: [NYSE_OPEN]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "Raw p >= 0.05 (Pathway B)"
      - "Negative annualized Sharpe"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0"
      - "Any era with N >= 50 and ExpR < -0.05"

  - id: 3
    name: "MES NYSE_OPEN G5 RR1.0 — Crabel minimum continuation"
    theory_citation: "Crabel (1990) ch. 3"
    economic_basis: |
      At RR=1.0, the prediction is minimal: the breakout travels at least
      1x the ORB range. This is the strongest baseline prediction (highest
      win rate, most stable year-over-year). If committed capital cannot
      push price even 1x, the commitment was illusory.
    filter:
      type: ORB_G5
      column: orb_size_points
    scope:
      instruments: [MES]
      sessions: [NYSE_OPEN]
      rr_targets: [1.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "Raw p >= 0.05 (Pathway B)"
      - "Negative annualized Sharpe"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0"
      - "Any era with N >= 50 and ExpR < -0.05"

  - id: 4
    name: "MES NYSE_OPEN G6 RR1.0 — monotonic at minimum continuation"
    theory_citation: "Crabel (1990) ch. 3"
    economic_basis: |
      G6 + RR1.0 combines the stricter ORB filter with the minimum
      continuation target. Predicts that larger opening ranges have
      even more reliable 1x follow-through due to stronger institutional
      commitment behind the range formation.
    filter:
      type: ORB_G6
      column: orb_size_points
    scope:
      instruments: [MES]
      sessions: [NYSE_OPEN]
      rr_targets: [1.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "Raw p >= 0.05 (Pathway B)"
      - "Negative annualized Sharpe"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0"
      - "Any era with N >= 50 and ExpR < -0.05"

  - id: 5
    name: "MES US_DATA_1000 G5 RR1.0 — macro minimum continuation"
    theory_citation: "Andersen, Bollerslev, Diebold, Vega (2003) AER"
    economic_basis: |
      10:00 AM ET releases (ISM, Consumer Confidence) drive S&P 500
      repricing. At RR=1.0, the prediction is that the macro-driven
      opening range achieves at least 1x follow-through as the market
      completes information incorporation.
    filter:
      type: ORB_G5
      column: orb_size_points
    scope:
      instruments: [MES]
      sessions: [US_DATA_1000]
      rr_targets: [1.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "Raw p >= 0.05 (Pathway B)"
      - "Negative annualized Sharpe"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0"
      - "Any era with N >= 50 and ExpR < -0.05"

