# ---------------------------------------------------------------------------
# Failure / promotion policy
# ---------------------------------------------------------------------------
on_KILL: |
  Cell flagged DEAD-FOR-ORB at this aperture. Memory entry written.
  No retest without new mechanism (memory rule per ml_v3_dead.md pattern).
on_PASS_PROTOCOL_A: |
  Cell becomes a CANDIDATE for Phase-2 overlay pre-reg writing. Not
  promoted to deployable. OOS accumulation continues.
on_PASS_CHORDIA: |
  Cell becomes a strong candidate for allocator-rebalance consideration
  via the standard rebalance flow (scripts/tools/rebalance_lanes.py).
  NEVER auto-promotes — the allocator's session-regime + cost gates apply.

