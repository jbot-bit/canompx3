# ---------------------------------------------------------------------------
# Literature-grounding correction (honesty before mechanism)
# ---------------------------------------------------------------------------
literature_grounding_correction: |
  EARLIER FRAMING (rejected): the v2 plan cited Fitschen Ch 5-7 as grounding
  "institutional-entry timing on O15/O30." Per local extract at
  docs/institutional/literature/fitschen_2013_path_of_least_resistance.md,
  the resources/ extract covers Ch 3 (intraday trend tendencies) only. No
  Ch 5-7 extract exists locally. Per .claude/rules/institutional-rigor.md
  § 7 (Extract-Before-Cite) and pre_registered_criteria.md Criterion 1,
  the original framing was UNSUPPORTED.

  CORRECTED FRAMING: this pre-reg tests aperture extension on the
  intraday-trend mechanism that Ch 3 EXPLICITLY grounds. Ch 3 p.40-42
  reports trend-follow on hourly bars beats baseline by +70% on stocks
  (intraday) and +40% on commodities (intraday). The mechanism — "intraday
  trend persistence is robust across multiple sub-daily timescales" —
  directly supports testing 15min and 30min ORB apertures alongside the
  default 5min, on instruments where intraday trend is grounded
  (MGC commodities, MNQ stock indices).

# ---------------------------------------------------------------------------
# Why these specific sessions (Rule 5.3 narrow-scope justification)
# ---------------------------------------------------------------------------
narrow_scope_justification: |
  Per Rule 5.3 (.claude/rules/backtesting-methodology.md), narrowing scope
  below the default 324 lane combos requires explicit justification. This
  pre-reg restricts to TWO sessions on TWO instruments at TWO apertures
  (4 cells, not 324) for these reasons:

  1. **MGC clean-data horizon.** Per Amendment 2.8, MGC has 2.7 clean years
     vs MNQ/MES 6.65. MGC sessions OUTSIDE the LONDON_METALS / COMEX_SETTLE
     pair have insufficient power for O15/O30 testing (N would fall below
     Criterion 4 N>=100 floor at split aperture). LONDON_METALS is the
     canonical MGC liquidity pool.

  2. **MNQ session selection.** Of currently-deployed MNQ sessions
     (EUROPE_FLOW, COMEX_SETTLE, NYSE_OPEN, TOKYO_OPEN — see lane_allocation.json
     2026-04-18), all are O5. Aperture extension on EUROPE_FLOW or
     COMEX_SETTLE would overlap with the D6 GARCH overlay pre-reg (already
     locked 54b7b948); avoiding overlap so claims stay separable. NYSE_OPEN
     uses COST_LT12 cost-gate that breaks at O15/O30 (cost-as-%-of-range
     denominator changes). US_DATA_830 is the cleanest MNQ session NOT
     currently allocator-deployed at any aperture; it's the under-tested
     direct comparison cell.

  3. **K=4 budget.** Bailey 2013 MinBTL bound at our IS horizon (1,951 days
     MNQ, 671 days MGC) trivially admits K=4. Per-cell tests will be
     individually significant or fail; no FDR inflation worry at K=4.

