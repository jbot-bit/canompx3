# ---------------------------------------------------------------------------
# Methodology guards (the easy-to-skip, hard-won ones)
# ---------------------------------------------------------------------------
methodology_guards:
  feature_temporal_alignment: |
    No window-derived features used. If a future overlay pre-reg adds
    overnight_* or session_london_* on these cells, Rule 1.2 valid-domain
    gates apply.
  filter_application: |
    No filter overlay on this pre-reg — pure aperture extension. Future
    overlay tests must be SEPARATE pre-regs and use the canonical
    StrategyFilter.matches_row() per Rule 2.
  IS_OOS_discipline: |
    IS-only Pathway B test. OOS dir_match check on full 2026-01-01 → present
    accumulating window. Per Rule 3.2: if N_OOS < 30, treat as
    directional-only evidence not confirmatory.
  multiple_testing: |
    K_budget = 4 cells. Per Criterion 3 Pathway B individual; per-cell raw
    p<0.05 + Chordia t-gate. K_lane=1 (most natural cut). K_session=2 per
    session, K_instrument=2 per instrument. All four framings reported in
    result doc per Rule 4.
  comprehensive_scope: |
    Rule 5 narrow-scope per § narrow_scope_justification above. Not
    hand-picked — explicit pre-reg justification with literature
    grounding for each restriction.
  trade_time_knowability: |
    Default ORB E2 entry uses bar-range-cross detection per
    trading_app.entry_rules.detect_break_touch(); no break_bar_* or
    rel_vol_* features (Rule 6.3 BANNED on E2). filter_type=NONE means
    no feature predicate at all. Only the entry rule itself fires.
  tautology_check: |
    Tautology check N/A on filter_type=NONE — no overlay correlation to
    measure. T0 reactivates if/when overlay pre-reg is written.
  fire_rate_check: |
    Fire-rate ~100% by definition (no filter). Extreme-fire flag does NOT
    apply — this is the unfiltered baseline aperture test, not an overlay.
  data_source: orb_outcomes + bars_1m only; no validated_setups read.

