    instrument: MGC
    session: LONDON_METALS
    orb_minutes: 15
    entry_model: E2
    confirm_bars: 1
    rr_target: 1.5
    filter_type: NONE                   # baseline aperture extension; filter overlay deferred
    direction: BOTH                     # report per-direction breakdown per pooled-finding-rule
    economic_theory: |
      Fitschen Ch 3 — commodities trend on intraday bars (+40% trend-follow
      vs baseline on hourly horizon). 15min ORB aperture sits between 5min
