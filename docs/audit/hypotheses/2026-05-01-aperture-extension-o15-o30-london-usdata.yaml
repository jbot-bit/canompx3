result_doc_requirements:
  path: docs/audit/results/2026-05-01-aperture-extension-o15-o30-london-usdata.md
  frontmatter:
    pooled_finding: false               # 4 individual hypotheses; per-cell only
  required_sections:
    - "Per-cell verdict table — H1..H4 each with: t, p, BHY-haircut t, N_IS,
       IS Sharpe, IS ExpR, OOS dir_match, per-direction breakdown,
       verdict (KILL / PASS_PROTOCOL_A / PASS_CHORDIA)."
    - "Sign-flip audit — for any cell with PASS verdict, report fraction of
       years where per-year sign flips vs IS pooled sign. >25% flip = NOT
       deployable per memory/feedback_per_lane_breakdown_required.md."
    - "Doctrine action — what each PASS cell unlocks. Default action on
       any PASS_CHORDIA: write Phase-2 overlay pre-reg (filter overlay on
       cleared aperture-extended lane). Default action on PASS_PROTOCOL_A:
       monitor for additional confirmatory data, no immediate deployment."
    - "What this scan does NOT do — does NOT promote to validated_setups,
       does NOT touch lane_allocation.json, does NOT pool across cells."

