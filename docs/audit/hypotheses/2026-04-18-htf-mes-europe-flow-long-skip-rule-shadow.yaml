    Script reads existing ledger rows; each row's first column is
    trading_day. Before appending a new row, confirm the candidate
    trading_day does not appear in the existing rows set. Duplicate
    candidates are skipped silently.
  read_source: orb_outcomes JOIN daily_features (canonical only)

runtime_prerequisites:
  drift_check:
    name: pipeline.check_drift.check_htf_levels_integrity
    expected_result: zero violations
    rationale: >
      Shadow evidence depends on prev_week_high stored value. Integrity
      check 59 was pressure-tested 2026-04-18 (commit 668d2680) across 4
      divergence classes. If this check ever regresses, recorded signals
      between last-pass and regression are suspect and must be requeried.
  holdout_import:
    rule: "HOLDOUT_SACRED_FROM imported from trading_app.holdout_policy, never hardcoded"
  canonical_tables_only:
    permitted: [bars_1m, daily_features, orb_outcomes]
    forbidden_for_decisions: [validated_setups, edge_families, live_config]

review_conditions:
  fires_first:
    - name: sufficient_fresh_oos
      rule: "N_fire_days (trading_day >= 2026-04-18) >= 30"
      rationale: ".claude/rules/backtesting-methodology.md RULE 3.2 (>=30 confirmatory floor)"
    - name: calendar_cap
      rule: "review_date <= 2028-06-30"
      rationale: >
        Measured fresh OOS fire rate 8.6% on long-break days (3 fires /
        35 long-break days in 3.5 months post-holdout). Fresh window
        2026-04-18 -> 2028-06-30 = ~26.3 months ~= 550 trading days. At
        the IS rate of 132 long-break-days/year (= 876/6.65), expected
        long-break days in fresh OOS ~= 290. At 8.6% fire rate,
        expected fresh fire days ~= 25. This is BELOW the N=30
        confirmatory floor; at-cap verdict is expected to be directional-
        only per RULE 3.2. See review_verdict_at_cap below.
  review_method: one-off single-use-fresh-OOS test; no repeated looking
  review_artifacts:
    - docs/audit/results/YYYY-MM-DD-htf-mes-europe-flow-long-skip-rule-shadow-review.md
    - docs/audit/hypotheses/YYYY-MM-DD-htf-mes-europe-flow-long-skip-rule-shadow-postmortem.md

test_statistic:
  # Correct independence unit: each fire day is one independent event.
  # RR 1.5 and RR 2.0 trades on the same day have correlated payoffs
  # (same entry / same stop / different targets). Pooling them as two
  # independent trades overstates N_eff.
  unit_of_observation: fire_day
  per_day_statistic: "mean(pnl_r over RR 1.5 and RR 2.0 for that day)"
  statistic: "one-sample two-tailed t-test of per-day statistic vs 0"
  df: "N_fire_days - 1"

review_verdict_gates:
  # Evaluated ONCE on accumulated FRESH OOS fire days.
  pass_all_of_these:                   # confirmatory pass (requires N>=30)
    - "N_fire_days >= 30"
    - "delta_OOS_per_day < 0 (per-day mean pnl_r < same-lane same-window unconditional long per-day mean)"
    - "two-sided t on per-day mean: |t_OOS| >= 3.79 (Chordia no-theory severity)"
    - "raw p_OOS < 0.00015 (implied by |t| >= 3.79 at large df; confirms Chordia gate)"
    - "sign confirmation: v1 IS sign was negative (established in scan doc); OOS per-day mean must also be negative"
    - "single-day outlier cap (heuristic — not formally grounded in local literature; included as a pragmatic guard against one-day pathology): no single fire day's abs(pnl_r_per_day_mean) contributes more than 25% of the sum of abs(pnl_r_per_day_mean) across all fires"
    - "drift_check 59 zero violations at review moment"
  hard_kill_any_of:
    - "delta_OOS_per_day >= 0 (fires improved vs baseline on fresh OOS -> v1 mechanism partially vindicated or null)"
    - "|t_OOS| < 3.79 with N_fire_days >= 30 (confirmatory fail)"
    - "any drift_check regression during observation window (invalid recorded signals)"

review_verdict_at_cap:
  # If calendar_cap fires before sufficient_fresh_oos, we are in
  # RULE 3.2 directional-only territory. Not actionable; retired as null
  # unless N and sign are both extreme.
  applies_when: "review_date == 2028-06-30 AND N_fire_days < 30"
  tiers:
    - condition: "N_fire_days < 15"
      verdict: "INSUFFICIENT_DATA -> retire shadow as null"
    - condition: "15 <= N_fire_days < 30 AND per-day mean sign NEGATIVE AND |t| >= 3.79"
      verdict: "DIRECTIONAL_ONLY -> record observation; no deployment; no pathway-B upgrade without fresh data or new mechanism"
    - condition: "15 <= N_fire_days < 30 AND anything else"
      verdict: "DIRECTIONAL_NULL -> retire shadow as null"

informational_observations:
  # Not gates. Recorded in review document for context only.
  short_side_mirror:
    cell: MES EUROPE_FLOW short pwl_break_short
    note: >
      If the mechanism is truly direction-specific (long-only exhaustion),
      short-side OOS delta should be >= 0 (or at least not mirror the long-
      side negative). If short-side OOS delta also goes negative, the
      finding is a generic MES EUROPE_FLOW HTF-fire effect, not direction-
      specific — which conflicts with the stated mechanism and should
      lower confidence in the pre-registered interpretation.
    source: documented in review artefact; not a pass/fail gate
  mnq_instrument_class_twin:
    cell: MNQ EUROPE_FLOW long pwh_break_long
    note: "if OOS delta is same-sign negative, adds weak instrument-class support; not a gate."

next_stage_if_validated:
  permissions_granted:
    - "Criterion 6 WFE check on the skip-rule metric"
    - "Criterion 9 era-stability combined IS+OOS (full history)"
    - "Pathway B re-pre-reg at t >= 3.00 with theory IF Chan Ch 4 / Dalton / Murphy extracted by then"
    - "Criterion 11 Monte Carlo + Criterion 12 Shiryaev-Roberts monitor design"
  permissions_explicitly_not_granted:
