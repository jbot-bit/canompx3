  script_path: research/shadow_htf_mes_europe_flow_long_skip.py  # TO BE BUILT IF LOCKED
  cadence: >
    Manual or scheduled daily run against canonical DB. Queries for HTF
    fires with trading_day >= 2026-04-18 AND not already in the ledger.
    Appends one row per (fire trading_day) to the ledger.
  ledger_path: docs/audit/shadow_ledgers/htf-mes-europe-flow-long-skip-rule-ledger.md
  ledger_row_schema:
    - trading_day
    - orb_EUROPE_FLOW_break_ts
    - orb_EUROPE_FLOW_high
    - prev_week_high
    - orb_EUROPE_FLOW_break_bar_volume
    - rel_vol_EUROPE_FLOW
