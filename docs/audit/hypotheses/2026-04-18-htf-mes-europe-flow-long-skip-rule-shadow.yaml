  session: EUROPE_FLOW
  orb_minutes: 15
  direction: long
  rr_targets: [1.5, 2.0]              # pooled via per-fire-day mean (NOT as K=2)
  entry_model: E2
  confirm_bars: 1
  stop_multiplier: 1.0
  role: R1_FILTER_SKIP_RULE
  canonical_predicate: >
    orb_EUROPE_FLOW_break_dir = 'long'
    AND prev_week_high IS NOT NULL
    AND orb_EUROPE_FLOW_high > prev_week_high
  canonical_feature_sources:
    - pipeline/init_db.py:303          # prev_week_high column declaration
    - pipeline/build_daily_features.py::_apply_htf_level_fields
  out_of_scope_rejected:
