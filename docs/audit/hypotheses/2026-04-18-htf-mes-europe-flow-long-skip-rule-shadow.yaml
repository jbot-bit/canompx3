  created_at: 2026-04-18
  status: DRAFT  # pre-reg-writer gate self-review required before LOCKED
  testing_mode: research_only_signal_shadow
  pathway: A                         # no local Pathway-A-qualifying extract for level-filter fade
  supersedes: none
  exemplar: docs/audit/hypotheses/2026-04-18-h1-mes-london-metals-signal-only-shadow.yaml
  depends_on:
    - docs/audit/hypotheses/2026-04-18-htf-path-a-prev-week-v1.yaml
    - docs/audit/results/2026-04-18-htf-path-a-prev-week-v1-scan.md
    - pipeline/build_daily_features.py  # _apply_htf_level_fields canonical source
    - pipeline/check_drift.py           # check_htf_levels_integrity (pressure-tested 2026-04-18)
    - trading_app/holdout_policy.py     # HOLDOUT_SACRED_FROM binding
  authority:
