edge_claim_summary: >
  On MES EUROPE_FLOW O15 E2 CB1 long trades, when the ORB break is
  direction-aligned with a prior-week-high break (`break_dir = 'long' AND
  prev_week_high IS NOT NULL AND orb_EUROPE_FLOW_high > prev_week_high`),
  the per-trade pnl_r was NEGATIVE on the v1 IS window with
  |t| = 4.13 (RR 1.5) and |t| = 4.04 (RR 2.0), raw p = 0.0001 each,
  q_family at K=24 = 0.001 each (v1 scan result doc cells #17 / #18 —
  N_trades = 215 per RR cell, equivalent to 215 fire days). v2 tests
  whether this survives on FRESH OOS fires (trading_day >= 2026-04-18,
  AFTER the v1 scan's observation moment) using the per-fire-day mean
  pnl_r across RR 1.5 and RR 2.0 as the test statistic (see
  test_statistic block below).

prior_assessment:
  mechanism_candidate: >
    London-open overnight-chase exhaustion on equity-index micros. Post-hoc
    narrative authored after seeing v1's signed result; acknowledged as
    storytelling-bias risk per Aronson Ch 6 (training-memory citation; PDF
    at resources/Evidence_Based_Technical_Analysis.pdf; NOT extracted to
    docs/institutional/literature/).
  falsifying_evidence:
    - name: short_side_mirror_contradiction
      finding: >
        MES EUROPE_FLOW short-side HTF (prev_week_low break short) IS
        delta_IS = +0.153 (RR1.5) / +0.099 (RR2.0). A genuine London-open
        exhaustion would produce same-sign skip-rule effect on both
        directions; it does not.
      source: docs/audit/results/2026-04-18-htf-path-a-prev-week-v1-scan.md (cells #19 / #20)
    - name: false_strategy_theorem_at_K_24
      finding: >
        Per Lopez de Prado Bailey 2018 Theorem 1 (False Strategy Theorem)
        extract anchor points: K=10 -> E[max SR]=1.5, K=100 -> 2.3,
        K=1000 -> 3.26. Log-linear interpolation in K at K=24 gives
        E[max SR] ~= 1.5 + 0.38 * (2.3 - 1.5) = 1.80 under the null with
        iid Gaussian tests. Observed v1 cell #17 per-trade SR = 4.13 /
        sqrt(215) = 0.282 (annualised-equivalent differs; FST numbers are
        per-observation SR). Selection-space framing is ambiguous:
        conservatively K=48 (24 cells x 2 signed interpretations; sign
        explicit), pessimistically K=24 (cells as the unit; sign baked in).
        Bonferroni-rank-1 thresholds: at M=24, alpha=0.002 -> t ~= 3.10;
        at M=48, alpha=0.001 -> t ~= 3.29. Chordia 3.79 exceeds both.
        Observed v1 IS |t|=4.13 therefore clears the selection-corrected
        null under both framings, but by only ~0.3-0.7 t units of margin.
      source: docs/institutional/literature/lopez_de_prado_bailey_2018_false_strategy.md:48-55
    - name: bh_fdr_expected_false_discoveries
      finding: >
        Harvey-Liu 2015 Eq. 5 + BHY framework: under the null at M=24 with
        q=0.05, E[# false rejections] is bounded by q*M = 1.2. One
        surviving cluster is within the null-compatible range.
      source: docs/institutional/literature/harvey_liu_2015_backtesting.md:55-66
    - name: storytelling_risk
      finding: >
        v2 direction was chosen after seeing v1's signed outcome. Classic
        Seven Sins pattern.
      source: .claude/rules/quant-agent-identity.md (Seven Sins table)
  supportive_evidence:
    - name: mnq_instrument_class_twin
      finding: >
        MNQ EUROPE_FLOW long HTF IS delta_IS = -0.083 / -0.099 — same
        negative sign as MES, weaker, not individually significant at
        |t|<0.4. Weak directional consistency, not a signal.
      source: docs/audit/results/2026-04-18-htf-path-a-prev-week-v1-scan.md (cells #5 / #6)
  subjective_prior: >
    Honest subjective prior ~20-30% that the effect is genuine. NOT a
    literature-calibrated probability — it is my gut calibration weighted
    by the three falsifying findings vs one weak-supportive finding above.
    Stated here for transparency per quant-audit-protocol.md "bias rule"
    (no hidden priors). Shadow exists to cheaply update this prior.
  confirmatory_feasibility:
    # Calibration against observed v1 effect size to assess whether the
    # shadow can realistically clear Chordia 3.79 at fire-day sample sizes
    # feasible within the calendar cap.
    observed_per_trade_SR_v1_IS: 0.282
    per_day_SR_implied: >
      ~0.307 assuming RR 1.5 and RR 2.0 pnl correlation ~0.7 on same fire
      day (per-day averaging reduces variance modestly; per-day-mean
      SR ~= 1.09 * per-trade SR).
    N_fire_days_required_at_observed_effect_for_t_ge_3p79: ~152
    N_fire_days_expected_at_cap_2028_06_30: ~25
    implication: >
      Even if the v1 IS effect magnitude persists exactly on fresh OOS,
      at N_fire_days = 25 the fresh OOS t-stat lands near 1.5 — far below
      Chordia 3.79. Confirmatory pass would require EITHER a genuine
      fresh-OOS effect several times larger than v1 IS (unlikely for real
      effects) OR a cap extension well beyond 2028-06-30. The shadow is
      realistically a directional-only observation vehicle at the declared
      cap. See review_verdict_at_cap for the honest cap-outcome tiers.

peek_contamination:
  # Explicit acknowledgement of what has and has not been observed by v1.
  already_observed_by_v1:
    - window: "2019-05-06 -> 2025-12-31 (IS)"
      observation: "v1 scan reported full IS per-cell stats; window EXHAUSTED"
    - window: "2026-01-01 -> 2026-04-18 (pre-v1-scan OOS stub)"
      observation: >
        Exactly 1 fire day (2026-02-26) with 2 trades (RR 1.5 pnl_r=-1.0;
        RR 2.0 pnl_r=-1.0; per-day mean=-1.0). v1 scan at commit 93b06712
        reported ExpR_on_OOS=-1.0 per RR cell. Treat this stub as PEEKED
        and EXCLUDE from the shadow's fresh-OOS gate test.
  not_yet_observed:
    - window: "2026-04-18 onward (fresh OOS)"
      role: "sole evidence window for the shadow's review gate"
      current_state_at_draft: >
        Zero fresh OOS fires in DB at draft (DB max MES trading_day =
        2026-04-17). Accumulation begins with the next business day after
        the shadow ledger is initialised.
  enforcement: >
    Review script computes N_fire_days and t-stat ONLY on fires with
    trading_day >= 2026-04-18. Any attempt to include pre-2026-04-18 OOS
    fires in the gate test is a scope violation.

peek_penalty:
  source: docs/institutional/literature/harvey_liu_2015_backtesting.md
  framing: >
    v1 tested K=24 cells (sign baked into each cell via direction field).
    This v2 selects one cell AND inverts its sign hypothesis. Effective
    selection-space M depends on framing: M=24 if we count cells (pessimistic
    — sign already fixed per cell in v1), M=48 if we count cell x signed-
    interpretation combinations (conservative — sign is a free parameter of
    the follow-up). Both framings are defensible; the gate is chosen to be
    robust to both.
  chosen_gate:
    raw_p_threshold: 0.05
    chordia_t_threshold: 3.79          # Criterion 4 no-theory
    bhy_sanity_cross_check: >
      Bonferroni-rank-1: at M=24 alpha_adj=0.05/24=0.00208 -> t~=3.10;
      at M=48 alpha_adj=0.05/48=0.00104 -> t~=3.29 (large-df limits).
      Chordia 3.79 (two-sided raw p ~= 0.00015 at large df) exceeds both
      thresholds by >=0.5 t units. The additional t=4.5 threshold proposed
      in the v1 draft had no formal basis; it is replaced with Chordia
      3.79 + BHY sanity headroom documented here.
  not_applied:
    - name: Sharpe_haircut_Eq_5
      reason: >
        Harvey-Liu Eq. 5 delivers a haircut on the discovered Sharpe
        ratio after multiple testing. Because the shadow's OOS window is
        independent of v1, the haircut applies only to the original v1
        finding (which was KILL anyway). No additional Sharpe haircut on
        the fresh OOS test.

mechanism_note: >
  Pathway A / no-theory gate applies because no local Pathway-A-qualifying
  extract grounds level-fade as an equity-index-micros mechanism. Fitschen
  is trend-follow and excludes level filters (extract lines 67-75). Chan
  2008 Ch 7 is regime-switching, not level-specific. Dalton / Murphy
  absent. A Pathway B upgrade would require Chan Ch 4 (Algorithmic Trading,
  level mean-reversion) to be extracted to
  docs/institutional/literature/ BEFORE review_date and a fresh Pathway B
  pre-reg filed at t >= 3.00 with-theory. Until then, Chordia 3.79 binds.

