  session: COMEX_SETTLE
  orb_minutes: 5
  entry_model: E2
  confirm_bars: 1
  rr_target: 1.0
  direction: long
  signal_name: F6_INSIDE_PDR
  feature_predicate: "prev_day_low < ((orb_COMEX_SETTLE_high + orb_COMEX_SETTLE_low)/2.0) < prev_day_high"
