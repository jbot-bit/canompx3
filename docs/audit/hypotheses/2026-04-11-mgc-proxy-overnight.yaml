# Hypothesis Registry — MGC Proxy Overnight Range Gate
#
# Locked:        2026-04-11T01:00:00+10:00
# Author:        Claude Code session (wave 4 lit-grounded discovery)
# Holdout mode:  A (2026-01-01 sacred)
# Data horizon:  17.60 calendar years (GC proxy 2010-06-07 to 2025-12-31)
# Testing mode:  family (Pathway A, BH FDR at K=27)
#
# AUDIT NOTE: GC parent gold futures as proxy for MGC micro.
# Price-safe per Amendment 3.1 (price-based features only).
# OVNRNG_10 requires overnight_range >= $10 for gold.
# Passes ~57% of MGC trading days — moderate selectivity.
# 9 sessions x 3 RR = 27 trials.

metadata:
  name: "mgc-proxy-overnight"
  purpose: |
    Test whether large overnight range (>= $10) predicts stronger MGC
    ORB breakout edge using GC parent as proxy. Overnight range captures
    institutional repositioning in gold during off-hours. Threshold
    calibrated to gold price scale. 57% pass rate provides moderate
    selectivity while retaining adequate sample size.
  date_locked: "2026-04-11T01:00:00+10:00"
  holdout_date: "2026-01-01"
  data_horizon_years_clean: 17.60
  data_source_mode: "proxy"
  data_source_disclosure: "GC parent gold futures 2010-06-07 onwards as proxy for MGC micro (price-safe per Amendment 3.1)"
  data_source: "GC parent gold futures 2010-06-07 onwards"
  testing_mode: "family"
  bailey_compliance:
    trials: 27
    horizon_years: 17.60
    e_max_n: 1.0
    min_btl_required_years: 6.59
    headroom_pct: 62.6
    status: "PASS"
  total_expected_trials: 27

hypotheses:
  # --- OVNRNG_10 x 9 sessions x RR1.0 (ids 1-9) ---
  - id: 1
    name: "MGC TOKYO_OPEN OVNRNG_10 RR1.0"
    theory_citation: "Barclay & Hendershott (2003) RFS overnight price discovery; Crabel (1990) opening range"
    economic_basis: |
      Large overnight range (>= $10 gold) signals institutional repositioning
      during off-hours. Gold trades 23 hours/day on COMEX Globex; significant
      overnight movement indicates information arrival from Asian/European
      markets that produces higher-quality ORB breakouts.
    filter:
      type: OVNRNG_10
      column: overnight_range
      thresholds: [10]
    scope:
      instruments: [GC]
      sessions: [TOKYO_OPEN]
      rr_targets: [1.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "BH FDR q=0.05 fails at K=27"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0"
      - "Any era with N >= 50 and ExpR < -0.05"

