hypotheses:
  - id: 1
    name: "MES EUROPE_FLOW composite ORB_G5 AND CROSS_SGP_MOMENTUM RR1.5 long"
    theory_citation: |
      Two independent literature sources ground the mechanism:

      1. Chan 2013 Ch 7 (docs/institutional/literature/chan_2013_ch7_intraday_momentum.md)
         p.155: stop-triggering breakout strategies cause intraday momentum
         cascades. p.156-157: the opening-gap momentum strategy on Dow Jones
         STOXX 50 futures (FSTX) — same equity-index family as MES — achieved
         Sharpe 1.4 APR 13% on 2004-2012. Mechanism: overnight periods
         without trading concentrate stop orders; the Europe_Flow session open
         (18:00 Bris, ~08:00 London) is the canonical stop-cascade trigger
         point for European equity-index futures.

      2. Fitschen 2013 Ch 3 (docs/institutional/literature/fitschen_2013_path_of_least_resistance.md)
         grounds intraday trend-follow on commodities AND stock indices. MES is
         micro-S&P, an equity index future. ORB breakout is the canonical
         path-of-least-resistance signal.

      Cross-session component: SINGAPORE_OPEN (11:00 Bris) establishes Asian
      institutional positioning. By EUROPE_FLOW (18:00 Bris), 7 hours have
      elapsed — short enough that flows persist, long enough that noise has
      diluted. Conditioning the ORB_G5-filtered entry on SGP-direction-aligned
      days tests whether cross-session flow memory lifts equity-index breakout
      edge. This is the Chan Ch 7 "cascading stop trigger" mechanism augmented
      by prior-session directional confirmation.

      Why composite (not standalone): the third-pass adversarial reframe found
      standalone SGP on MES fails T8 (+0.0012 lift, noise-grade). The edge
      lives in the intersection — SGP-aligned days that ALSO pass a minimum
      ORB-size gate. Each filter alone is insufficient; the conjunction
      captures "large-enough break + prior-session aligned flow."

    filter:
      type: COMPOSITE_AND
      constituent_filters:
        - ORB_G5
        - CROSS_SGP_MOMENTUM
      # Semantics: lane fires only when BOTH filter_signal(df, 'ORB_G5', 'EUROPE_FLOW')
      # AND filter_signal(df, 'CROSS_SGP_MOMENTUM', 'EUROPE_FLOW') return True.
      # Canonical delegation via research.filter_utils.filter_signal — no
      # re-encoded logic. CompositeFilter class NOT yet implemented in
      # trading_app/config.py; this audit stages only the research-layer
      # verification. Live deployment requires separate design-proposal +
      # CompositeFilter implementation + validator run.

    scope:
      instruments: [MES]
      sessions: [EUROPE_FLOW]
      orb_minutes: [5]
      rr_targets: [1.5]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
      directions: [long]

    expected_trial_count: 1

    # Baseline IS values computed under Mode A strict (trading_day < 2026-01-01)
    # via canonical orb_outcomes JOIN daily_features + research.filter_utils.
    # Independently reproduced 2026-04-19 in the Phase 2.4 script and a
    # standalone SQL verification (see Phase 2.4 result doc § Third-pass).
    baseline_mode_a_computed:
      unfiltered_N: 850
      unfiltered_expr: -0.1573
      composite_N: 112
      composite_expr: 0.0459
      composite_lift_vs_unfiltered: 0.2032
      g5_alone_N: 207
      g5_alone_expr: -0.0460
      sgp_alone_N: 530
      sgp_alone_expr: -0.1561

    kill_criteria:
      # All numeric. Any one triggered = KILL. "Reconsider" / "investigate" is forbidden.
      - "C4: Chordia t-stat < 3.00 (with-theory threshold, grounded in Chan Ch 7 + Fitschen Ch 3)"
      - "C6: Walk-forward efficiency < 0.50 (LdP 2020)"
      - "C7: N_composite < 100 (Harvey-Liu Exhibit 4 deployable threshold)"
      - "C8: 2026 OOS ExpR < 0 AND N_OOS >= 5"
      - "C8b: OOS direction flips sign (sign(delta_IS) != sign(delta_OOS))"
      - "C9: any year with N>=50 has ExpR < -0.05"
      - "C10: composite has any pre-micro-launch (pre-2019-05-06) trade — sanity"
      - "T0: |corr(composite_fire, g5_fire)| > 0.90 (if composite is merely g5 repackaged)"
      - "T0b: |corr(composite_fire, sgp_fire)| > 0.90 (if composite is merely sgp repackaged)"
      - "T5: short direction composite ExpR > long composite ExpR (direction symmetry failure)"
      - "T8: standalone composite on MNQ shows directionally opposite sign vs MES"

    pass_criteria:
      # All must be TRUE to pass audit (not deploy; deploy is a separate gate).
      - "C1: this pre-reg file committed before audit script runs"
      - "C2: MinBTL satisfied (K=1, trivially)"
      - "C3: BH FDR q<0.05 at K=1 (single hypothesis, so p<0.05)"
      - "C4: Chordia t-stat >= 3.00"
      - "C6: WFE >= 0.50 via expanding-window per-year split"
      - "C7: N_composite >= 100"
      - "C8: 2026 OOS ExpR consistent-sign with IS (report N_OOS)"
      - "C9: no year with N>=50 has ExpR < -0.05"
      - "C10: MICRO-era only (first trade >= 2019-05-06)"

    deferred_gates:
