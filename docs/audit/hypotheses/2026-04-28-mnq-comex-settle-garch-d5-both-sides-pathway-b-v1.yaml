    detail: "Sizing rule applied at session start using prior-day-close GARCH only."
  rule_3_is_oos_discipline:
    applied: true
    detail: "Mode A holdout 2026-01-01 sacred; tuning_against_oos: false. EXTENDED_PARK milestone schedule pre-registered."
  rule_4_multiple_testing:
    applied_to_upstream_only: true
    detail: |
      D4 evidence (referenced as upstream provenance) was K=1. D5 inherits
      the threshold from D4 lock; this is a SECOND K=1 test on the SAME
      cohort with a DIFFERENT transformation (sizing vs inclusion). Per
      prereg-writer-prompt.md, two related K=1 tests on the same cohort
      do NOT compound to K=2 because each is a separate theory-driven
      hypothesis. Cumulative individual hypothesis count disclosed above.
  rule_5_comprehensive_scope:
    applied_to_upstream_only: true
    detail: "Single-cell test."
  rule_6_trade_time_knowability:
    applied: true
    detail: "Identical to D4. § 6.1 safe."
  rule_7_tautology:
    applied: true
    detail: |
      D5 is intentionally OVERLAPPING with the deployed COMEX_SETTLE ORB_G5
      lane — it IS the deployed lane with a sizing modulation. RULE 7's
      |corr| > 0.70 tautology gate does not apply because D5 is not
      proposing a NEW filter to add — it's proposing a MODIFICATION of how
      the EXISTING deployed lane is sized. Phase E portfolio admission is
      not required because D5 does not add a slot; it modifies an existing
      slot's exposure profile. RULE 7 is N/A by design.
  rule_8_fire_rate:
    applied: true
    detail: |
      Combined cohort fire rate = 100% (all ORB_G5 fires are in the test
      universe). On-branch (1.0× sizing) = 199 / 1577 = 12.6% combined IS;
      off-branch (0.5× sizing) = 87.4%. Both branches within 5%-95% band;
      the test is not vacuous.
  rule_9_data_source:
    applied: true
    detail: "Canonical layers only: orb_outcomes JOIN daily_features. No validated_setups read."
  rule_10_pre_registration:
    applied: true
    detail: "This file IS the pre-registration. Committed before run."
  rule_11_audit_trail:
    applied: true
    detail: "research/<runner>.py committed alongside; result MD under docs/audit/results/."
  rule_12_red_flags:
    applied: true
    self_review:
      - "|t| > 7? Pre-pre-reg estimates paired-t will be modest (per-trade R uplift +0.018). Not red-flag."
      - "Δ_IS > 0.6 R per trade? D5 REDUCES per-trade R (from +0.094 to +0.076 mean). Not red-flag — opposite direction."
      - "Same feature class everywhere? Single hypothesis; N/A."
      - "Window-derived early-ORB? COMEX_SETTLE @ ~04:30 BNE; garch is prior-day-close. Clean."
      - "Variance-reduction-as-Sharpe-improvement is a known Carver framing — NOT a novel-mechanism red flag."
  rule_13_pressure_test:
    applied: true
    detail: |
      Runner asserts that LOCKED["sizing_rule"] applies the canonical 1.0/0.5
      transformation and not any other multiplier. Structural assertion that
      the test cannot silently substitute a different sizing schedule.
  rule_14_pooled_finding:
    applied: false
    not_applicable_reason: "K=1 single-cell test. Per-cell breakdown is the test."
  rule_15_validated_universe:
    applied_to_run: true
    detail: "Test scopes via concrete (instrument, session, orb_minutes, rr, entry_model, confirm_bars, BOTH-sides direction segmentation, ORB_G5 cohort)."
  rule_16_e2_lookhead_contamination:
    applied: true
    detail: |
      orb_COMEX_SETTLE_break_dir used ONLY for direction segmentation, RULE 6.3
      exception. ORB_G5 uses orb_size which is RULE 6.1 safe (range size at
      ORB end, before E2 breakout). All banned E2 break-bar predictors
      explicitly EXCLUDED. garch_forecast_vol_pct is § 6.1 safe.

outputs_required_after_run:
  - reproduced_n_is_combined, reproduced_n_is_long, reproduced_n_is_short
  - reproduced_n_oos_combined, reproduced_n_oos_long, reproduced_n_oos_short
  - reproduced_sr_pt_flat_is, reproduced_sr_pt_d5_is
  - reproduced_sr_ann_flat_is, reproduced_sr_ann_d5_is
  - reproduced_abs_sr_ann_diff_is, reproduced_rel_sr_ann_uplift_pct_is
  - paired_t_is, paired_t_p_two_tailed_is
  - bootstrap_p_is (block=5, B=10000)
  - per_year_breakdown (year, n, sr_pt_flat, sr_pt_d5, diff)
  - era_stability_verdict_d5 (C9_PASS / C9_FAIL)
  - oos_descriptive: n_oos_combined, sr_pt_flat_oos, sr_pt_d5_oos, abs_sr_ann_diff_oos
  - oos_dir_match_descriptive (DIR_MATCH / DIR_FLIP / NA_INSUFFICIENT_N)
  - kill_criterion_results (each KILL_* line PASS/FAIL with computed value)
  - decision_rule_verdict (CANDIDATE_READY / EXTENDED_PARK / KILL)
  - audit_pressure_test_passed (rule 13)
  - amendment_3_2_classification_verified (EXTENDED_PARK, with milestone date if not yet reached)

execution_gate:
  allowed_now:
    - Read-only reproduction of IS/OOS metrics on canonical layers
    - Computation of all gates listed in outputs_required_after_run
    - Writing the result MD with the locked decision_rule verdict
  forbidden_now:
    - Re-running with different sizing multipliers (post-hoc rescue forbidden)
    - Re-running with different threshold values (70 is locked from D4)
    - Promoting CANDIDATE_READY without all KILL criteria passing
    - Writing to validated_setups, edge_families, lane_allocation, live_config
    - Any capital deployment action — modification of deployed lane sizing requires Phase E + capital-review skill
    - Tuning the 0.5 off-branch multiplier (continuous scaling is a separate pre-reg if D5 passes)

not_done_by_this_pre_reg:
  - No live deployment
  - No update to lane_allocation.json or any prop_profiles allocation
  - No change to deployed lane filters
  - No CPCV (Pathway B K=1 doesn't require CPCV; if D5 passes and a follow-up continuous-scaling pre-reg is written, CPCV will apply at that point)
  - No paper-trade simulation
  - No write to experimental_strategies
  - No portfolio additivity audit (RULE 7 N/A — D5 modifies existing lane, doesn't add a slot)
  - No 65/75 threshold sensitivity test (locked at 70 per D4 inheritance)
  - No continuous-scaling test (binary 1.0/0.5 only; continuous is a separate pre-reg if this passes)
