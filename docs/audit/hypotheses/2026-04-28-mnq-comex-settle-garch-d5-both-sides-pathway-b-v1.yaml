testing_discipline:
  pathway: B_individual
  k: 1
  significance_threshold:
    abs_sharpe_ann_diff_floor: 0.05      # Phase D D-0 v2 floor (canonical)
    rel_sharpe_ann_uplift_floor_pct: 15  # Phase D D-0 v2 floor (canonical)
    annual_no_flip_floor_abs_sr: 0.10    # any IS year worse on D5 than flat by >0.10 abs SR = KILL
  mandatory_downstream_gates_non_waivable:
    - C6_walk_forward_efficiency_gte_0p50_when_n_oos_powered
    - C8_oos_positive_when_n_oos_powered
    - C9_era_stability_no_era_lt_neg_0p05_with_n_era_gte_20
  theory_citation:
    - source: docs/institutional/literature/carver_2015_volatility_targeting_position_sizing.md
      claim: "Position size should be conditioned on forecast confidence; high-confidence forecasts warrant full size, low-confidence forecasts warrant reduced size. Daily vol forecast → intraday position sizing is the framework."
      role: filter-mechanism citation (the actual prediction's theory grounding) — for the SIZING TRANSFORMATION specifically, not the binary on-vs-off question of D4
    - source: docs/institutional/literature/carver_2015_ch12_speed_and_size.md
      claim: "Holding-period × stop-level matching: signal horizon must match the implied holding period of the position-sizing decision. (Addendum 2026-04-28 self-corrected as cell-specific, not universal.)"
      role: aperture-mechanism grounding
    - source: docs/institutional/literature/chan_2013_ch7_intraday_momentum.md
      claim: "Stop-cascade mechanism on 5-30-min horizon following high-vol regimes — supports the residual edge in the on-cohort."
      role: mechanism for WHY the on-cohort carries the residual edge that the off-cohort lacks
    - source: docs/institutional/literature/bailey_lopezdeprado_2014_dsr_sample_selection.md
      claim: "Sharpe-ratio confidence intervals are sample-size-dependent; risk-adjusted return improvements via variance reduction are first-order portfolio metric per de Prado / Bailey."
      role: metric-choice grounding (Sharpe diff, not ExpR diff, is the right gate for a risk-overlay test)
  filter_mechanism_grounding: |
    The D5 cut is grounded in Carver Ch 9-10 vol-targeting (position size ∝
    forecast confidence). D4 evidence shows the on-cohort (garch>70) carries
    a within-cohort residual edge; the off-cohort (garch≤70) carries deployed-
    lane noise. Halving exposure to the noise cohort is the Carver-prescribed
    response to a forecast-conditional confidence assessment. The 0.5× factor
    is the simplest non-trivial reduction (binary halving); a continuous
    scaling (e.g. ∝ percentile) would expand the test's degrees of freedom
    and is explicitly NOT pre-registered here. If D5 PASSES, a follow-up
    pre-reg may test continuous scaling as a separate K=1 test.

    Distinct from D4 (binary on-vs-off ExpR comparison): D5 keeps ALL trades
    in the test universe but transforms their R-multiple via sizing. The
    metric-of-interest is Sharpe (risk-adjusted), not ExpR (raw mean).

    Distinct from D-0 v2 (Q5-up sizing): D-0 v2 amplified the on-cohort
    (1.5×) and parked at +0.009 abs SR < 0.05 floor. D5 does the INVERSE —
    protects the off-cohort by shrinking it (0.5×) — exploiting the same
    cohort split but in the opposite direction. Carver Ch 10 supports both
    framings; the empirical question is which direction works on this lane.
  cumulative_individual_hypothesis_count_disclosure:
    purpose: per Amendment 3.0 condition 6
    cumulative_count_for_MES: 1
    cumulative_count_for_MNQ: 2   # D4 was the 1st MNQ Pathway B; this is the 2nd
    cumulative_count_for_MGC: 0
    overall: 3

trial_budget:
  primary_selection_trials: 1     # Pathway B K=1 — single sizing rule, no enumeration
  schema_locked_before_any_metric: true
  minbtl_bound:
    formula: "MinBTL = 2*ln(N_trials) / E[max_N]^2"
    n_trials: 1
    minbtl_value_years: 0.0
    available_clean_data_years: 7.0   # 2019..2025 IS coverage on combined cohort
    within_cap: true
    cap_reference: "Bailey et al 2013 — at K=1 MinBTL is trivially satisfied"

# Amendment 3.2 MinTRL classification — REQUIRED at pre-reg time
amendment_3_2_min_trl_classification:
  computation:
    sd_R_pooled_is: 1.0       # conservative; the cohort sd is ~1.05-1.16; using 1.0 yields fewer required trades, so a tighter upper bound on min_trl
    expected_effect_R: 0.018  # mean ExpR uplift per trade IS (NOT the SR diff; the OOS evaluation is on per-trade R, not on aggregate SR — conservative because per-trade effect is small even when SR diff is large from variance reduction)
    z_alpha: 1.96             # α=0.05 one-sided
    z_beta: 0.84              # power=0.80 (Cohen)
    required_n_oos: 24159     # = ceil((sd/effect * (z_a+z_b))^2) = ceil((1.0/0.018 * 2.8)^2)
    floor_n_oos: 50           # Amendment 3.1 floor
    required_n_oos_above_floor: 24159
    n_is_combined: 1577
    years_of_is_data: 7
    expected_oos_per_year_combined: 225.3   # = N_IS / years
    min_trl_years_per_trade_metric: 107.2   # = 24159 / 225.3
  alternate_metric_sharpe_diff:
    note: |
      The per-trade R-uplift framing is conservative because the test's PRIMARY
      metric is Sharpe-difference (variance reduction), not per-trade R. The OOS
      evaluation is computed on per-period (per-month) Sharpe diff, which
      compresses the effective N.
    sd_monthly_sharpe_diff: 0.0475       # EMPIRICAL — computed 2026-04-28 from canonical IS data, 80 month-pairs (months with N>=5 trades), 2019..2025
    sd_monthly_sharpe_diff_provenance: |
      Computed by direct query against canonical layers (orb_outcomes JOIN
      daily_features), same SQL pattern as independent_sql_baseline above,
      partitioned by year-month, restricted to months with N>=5 trades. Per-month
      SR_pt computed for both flat and D5 variants; difference series taken.
      Mean diff = +0.0028, sd_diff = 0.0475, median diff = +0.0000, N=80.
      The earlier draft of this pre-reg used a rough estimate of 0.30 which
      was approximately 6.3x too conservative — the empirical sd is 0.0475.
      The independent evidence-auditor (separate context, 2026-04-28) flagged
      the rough estimate as the highest-leverage unverified number in the
      pre-reg; this commit replaces it with the empirical value.
    expected_monthly_sharpe_diff: 0.05   # locked target effect size
    required_n_oos_months: 7             # ((0.0475/0.05) * 2.8)^2 = ~7 months
    required_n_oos_years: 0.59           # 7/12
  classification:
    chosen_metric_for_classification: monthly_sharpe_diff
    min_trl_years: 0.59
    classification_label: STANDARD
    classification_revised_from: EXTENDED_PARK
    revision_reason: |
      Initial pre-reg classified EXTENDED_PARK (min_trl_years=1.5) using a
      rough sd_monthly_sharpe_diff estimate of 0.30. Independent evidence-
      auditor (2026-04-28) required computing the empirical sd from
      canonical IS data. Empirical sd=0.0475 yields min_trl_years=0.59,
      which falls in the STANDARD bucket per Amendment 3.2 (≤1.0 year).
      The classification was revised PRE-RUN — no metric was computed
      under the EXTENDED_PARK label that would taint the STANDARD
      revision. Honest disclosure: rough estimate was 6.3x conservative;
      data-grounded estimate produces a different (less restrictive)
      classification. This is a strict improvement in pre-reg discipline,
      not a post-hoc rescue.
    rationale: |
      Per Amendment 3.2: min_trl_years <= 1.0 → STANDARD. D5 is STANDARD.
      Standard Amendment 3.1 PARK_PENDING_OOS_POWER applies as written if
      the K=1 confirmatory test produces CANDIDATE_READY-conditional
      and OOS power is insufficient at run time. Current N_OOS_combined
      as of 2026-04-28 = ~70 (per pre-pre-reg sanity, to be verified by
      runner output).
    interim_milestone_descriptive_only:
      n_oos_months_target: 7              # under STANDARD, this is the confirmatory target
      n_oos_combined_target_descriptive: 100
      expected_calendar_date: ~2026-09-15
      action_at_milestone: "Compute monthly Sharpe diff series across OOS; if monthly_sd_diff_oos in [empirical_is_sd ± 0.02] AND mean_monthly_diff_oos > 0, report C8_PASS. Otherwise C8_GATE_INACTIVE_LOWPOWER per Amendment 3.1."
    fallback_classification_if_metric_changed: |
      If a future amendment re-frames the primary metric as per-trade-R
      (instead of Sharpe-diff), this cell is NOT_OOS_CONFIRMABLE under the
      strict per-trade framing (per-trade required_n=24159, min_trl=107y).
      Pre-registered metric choice (monthly Sharpe-diff) is LOCKED;
      classification is locked at STANDARD per the empirical sd_diff=0.0475.

primary_metric:
  metric_name: SR_ann_diff_D5_minus_flat_IS
  formula: |
    SR_pt_flat = mean(pnl_r_flat) / std(pnl_r_flat, ddof=1)
    SR_pt_D5   = mean(pnl_r_D5)   / std(pnl_r_D5,   ddof=1)
    SR_ann_flat = SR_pt_flat × sqrt(N / years_of_IS_data)
    SR_ann_D5   = SR_pt_D5   × sqrt(N / years_of_IS_data)
    primary_metric = SR_ann_D5 - SR_ann_flat
    where pnl_r_flat = pnl_r,  pnl_r_D5 = pnl_r if garch>70 else 0.5*pnl_r
  pre_committed_target: positive
  raw_p_method: paired t-test on (pnl_r_D5 - pnl_r_flat) IS, two-tailed
  bootstrap_p_method: |
    Block-bootstrap (block=5, B=10000) of paired (pnl_r_flat, pnl_r_D5)
    differences; p = fraction of bootstraps where shuffled abs(diff) >= obs abs(diff).
    Phipson-Smyth +1 correction.

secondary_descriptive_only:
  - id: SD1
    statement: "OOS SR_ann diff direction match with IS sign (descriptive; full C8 evaluation is at confirmatory milestone)"
    counted_against_trial_budget: false
  - id: SD2
    statement: "Per-year IS SR_pt diff breakdown (variance reduction per year)"
    counted_against_trial_budget: false
  - id: SD3
    statement: "Cohort fire-rate per year (% of trades on-branch vs off-branch)"
    counted_against_trial_budget: false
  - id: SD4
    statement: "Combined IS+OOS pathway-B-v1 evidence summary for cross-reference with D4 result file"
    counted_against_trial_budget: false

baseline:
  baseline_label: SR_ann_flat_1x_IS_combined_BOTH_SIDES_ORB_G5
  computation_method: |
    SAME pipeline path as the variant — direct duckdb via the runner's
    load_cell function. K2 baseline-sanity smoke-test threshold: |delta_repro|
    < 0.0001 in SR_pt absolute. Independent SQL committed below.
  expected_baseline_value_sr_ann_flat_is: 1.2381
  expected_variant_value_sr_ann_d5_is: 1.5086
  expected_abs_sr_ann_diff_is: 0.2705
  expected_rel_sr_ann_uplift_pct: 21.85
  independent_sql_baseline: |
    -- Reproduces the pre-pre-reg numbers exactly. Run with read-only
    -- DUCKDB_PATH=pipeline.paths.GOLD_DB_PATH.
    WITH cell AS (
      SELECT o.trading_day,
             COALESCE(o.pnl_r, 0.0) AS pnl_r,
             d.garch_forecast_vol_pct,
             d.orb_COMEX_SETTLE_break_dir AS bdir,
             d.orb_COMEX_SETTLE_size      AS osize
      FROM orb_outcomes o
      JOIN daily_features d
        ON o.trading_day = d.trading_day
       AND o.symbol = d.symbol
       AND o.orb_minutes = d.orb_minutes
      WHERE o.symbol = 'MNQ'
        AND o.orb_label = 'COMEX_SETTLE'
        AND o.orb_minutes = 5
        AND o.rr_target = 1.5
        AND o.entry_model = 'E2'
        AND o.confirm_bars = 1
        AND o.outcome IN ('win','loss','scratch')
        AND d.orb_COMEX_SETTLE_break_dir IN ('long','short')
        AND d.orb_COMEX_SETTLE_size IS NOT NULL
        AND d.orb_COMEX_SETTLE_size >= 5
        AND o.trading_day < DATE '2026-01-01'
    ),
    sized AS (
      SELECT pnl_r AS r_flat,
             CASE WHEN garch_forecast_vol_pct > 70 THEN pnl_r ELSE 0.5*pnl_r END AS r_d5
      FROM cell
    )
    SELECT
      COUNT(*) AS N,
      AVG(r_flat) AS mu_flat, STDDEV_SAMP(r_flat) AS sd_flat,
      AVG(r_d5)   AS mu_d5,   STDDEV_SAMP(r_d5)   AS sd_d5,
      AVG(r_flat) / NULLIF(STDDEV_SAMP(r_flat),0)                                  AS sr_pt_flat,
      AVG(r_d5)   / NULLIF(STDDEV_SAMP(r_d5),0)                                    AS sr_pt_d5,
      (AVG(r_flat) / NULLIF(STDDEV_SAMP(r_flat),0)) * SQRT(COUNT(*)::DOUBLE / 7.0) AS sr_ann_flat,
      (AVG(r_d5)   / NULLIF(STDDEV_SAMP(r_d5),0))   * SQRT(COUNT(*)::DOUBLE / 7.0) AS sr_ann_d5
    FROM sized;

kill_criteria:
  - id: KILL_DIR
    metric: sign(SR_ann_D5 - SR_ann_flat) on IS
    threshold: "negative"
    action: KILL  # If D5 reduces Sharpe, kill — the whole hypothesis is variance-reduction-improves-SR
  - id: KILL_ABS_FLOOR
    metric: abs(SR_ann_D5 - SR_ann_flat) on IS
    threshold: "< 0.05"
    action: KILL  # Absolute floor per Phase D D-0 v2 canonical
  - id: KILL_REL_FLOOR
    metric: 100 * (SR_ann_D5 - SR_ann_flat) / SR_ann_flat on IS
    threshold: "< 15.0"
    action: KILL  # Relative uplift floor per Phase D D-0 v2 canonical
  - id: KILL_PAIRED_P
    metric: paired_t_p_two_tailed (pnl_r_D5 - pnl_r_flat) on IS
    threshold: ">= 0.05"
    action: KILL_OR_PARK   # paired-t will have low power because per-trade R uplift is small even when SR diff is large; this is informative but NOT promotion-binding alone — see decision_rule
    note: "Per Amendment 3.0 condition: significance gate at α=0.05; the paired-t framing is honest for per-trade R uplift even though the primary metric is Sharpe."
  - id: KILL_YEAR_FLIP
    metric: max( SR_pt_flat_year - SR_pt_D5_year ) for any IS year with N_year >= 50
    threshold: "> 0.10"
    action: KILL  # Year-stability floor: if any IS year worsens by more than 0.10 SR_pt under D5, the rule is unstable
  - id: KILL_N
    metric: N_IS_combined
    threshold: "< 100"
    action: KILL  # C7 floor (combined cohort N; pre-pre-reg shows N=1577 ≫ 100, so this should never fire)
  - id: KILL_ERA
    metric: any_era_SR_pt_D5_with_N_era_gte_50
    threshold: "< -0.05"
    action: KILL  # C9 era-stability gate on the D5 variant (not flat — flat is grandfathered)
  - id: KILL_BASELINE_SANITY
    metric: abs(reproduced_sr_pt_flat - expected_sr_pt_flat)
    threshold: "> 0.0001"
    action: KILL  # Smoke-test that the runner reproduces canonical numbers

decision_rule:
  candidate_ready_if: |
    All KILL criteria PASS (none fire) AND
    abs(SR_ann_D5 - SR_ann_flat) >= 0.05 AND
    100 * (SR_ann_D5 - SR_ann_flat) / SR_ann_flat >= 15.0 AND
    no IS year with N_year >= 50 worsens by > 0.10 SR_pt under D5 AND
    paired_t_p_two_tailed_IS < 0.05 AND
    C9 era_stability == PASS AND
    OOS direction-match (descriptive; full C8 deferred to confirmatory milestone per Amendment 3.2 EXTENDED_PARK)
  extended_park_if: |
    All KILL criteria PASS (none fire) AND
    abs SR diff >= 0.05 AND rel uplift >= 15% AND year-no-flip floor PASS AND
    paired_t_p < 0.10 (relaxed for Sharpe-primary framing) AND
    C9 PASS AND
    OOS N_combined < 100 (interim milestone not yet reached)
  kill_if: any KILL criterion fires

