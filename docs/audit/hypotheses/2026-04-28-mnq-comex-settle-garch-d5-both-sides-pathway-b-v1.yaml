  institutional_validity_check: |
    Independent SQL reproduction (2026-04-28) of the D5 cohort against
    canonical layers confirms N_combined_IS=1577 (long=839, short=738),
    SR_pt flat=+0.0825, SR_pt D5=+0.1005, SR_ann flat=+1.238, SR_ann D5=+1.509,
