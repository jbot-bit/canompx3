primary_hypothesis_statement: |
  On the deployed `MNQ COMEX_SETTLE O5 RR1.5 E2 CB1 BOTH-SIDES ORB_G5` cohort,
  applying a conditional sizing rule of `1.0× when garch_forecast_vol_pct > 70
  else 0.5×` produces a higher annualized Sharpe ratio than flat 1.0× sizing,
  while reducing per-trade ExpR (the trade-off is variance reduction, not
  expectancy improvement). The mechanism: garch_forecast_vol_pct > 70 cohort
  carries the residual edge per D4 evidence; the garch ≤ 70 cohort carries
  noise around the deployed-lane mean and contributes mostly variance. Halving
  exposure on the noise cohort improves risk-adjusted return (Carver Ch 9-10
  vol-targeting framework: position size ∝ forecast confidence). This is a
  RISK-OVERLAY test, not an alpha test.

