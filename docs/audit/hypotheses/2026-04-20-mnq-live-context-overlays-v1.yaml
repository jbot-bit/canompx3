    - "Filter delegation is canonical via research.filter_utils.filter_signal."
    - "Quantile features must compute thresholds on IS-only data per prereg-writer prompt quantile look-ahead check."

reproducibility:
  repo_root: "C:/Users/joshd/canompx3"
  commit_sha: "TO_FILL_AFTER_COMMIT"
  committed_required_before_run: true

scope:
  instrument: MNQ
  deployed_lane_ids:
    - "MNQ_NYSE_OPEN_E2_RR1.0_CB1_COST_LT12"
    - "MNQ_COMEX_SETTLE_E2_RR1.5_CB1_ORB_G5"
  verified_active_in_validated_setups: true
  lane_definitions:
    - lane_id: "MNQ_NYSE_OPEN_E2_RR1.0_CB1_COST_LT12"
      session: NYSE_OPEN
      orb_minutes: 5
      entry_model: E2
      confirm_bars: 1
      rr_target: 1.0
      deployed_filter: COST_LT12
      directions_in_scope:
        - short
    - lane_id: "MNQ_COMEX_SETTLE_E2_RR1.5_CB1_ORB_G5"
      session: COMEX_SETTLE
      orb_minutes: 5
      entry_model: E2
