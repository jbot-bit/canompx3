primary_schema:
  k_family: 10
  k_global: 10
  k_lane: 5
  k_session: 2
  k_instrument: 10
  primary_promotion_gate: "K_family BH-FDR q < 0.05"
  family_cells_structured_as: |
    Five primary hypotheses. Each hypothesis must pass BOTH:
      Pass A = unfiltered lane universe
      Pass B = exact deployed-filter subset
    Honest trial budget = 5 hypotheses × 2 passes = 10 tests.

hypotheses:
  - id: H01_NYO_SHORT_PREV_BEAR
    type: primary
    theory_citation: |
      Within-class refinement on an already-grounded intraday breakout strategy.
      Prior-day direction is a prior-day sentiment state; NYSE_OPEN is the cash-open
      session where overnight positioning and short fragility should matter most.
      Empirical grounding only: 2026-04-20 lane verify showed IS delta +0.157R on
      the exact deployed lane but underpowered OOS.
    statement: |
      On MNQ_NYSE_OPEN_E2_RR1.0_CB1_COST_LT12 short trades, bear-prior-day rows
      outperform bull-prior-day rows on both the unfiltered lane universe and the
      deployed-filter subset.
    pass_metric:
      metric: "delta_IS = ExpR_on_signal - ExpR_off_signal"
      formula: "Compare short-only rows where prev_day_direction='bear' vs 'bull'"
      threshold_gte:
        unfiltered_delta_is: 0.05
        filtered_delta_is: 0.05
        years_positive_filtered: 5
        wr_spread_filtered: 0.03
      threshold_lt:
        unfiltered_raw_p: 0.05
        filtered_raw_p: 0.05
      extra_gate: "filtered_ExpR_on_IS > 0"
    counted_against_trial_budget: true

  - id: H02_NYO_LANE_OPEX_TRUE
    type: primary
    theory_citation: |
      Calendar effect. TRADING_RULES.md records MNQ NYSE_OPEN as BETTER on OPEX
      (+0.201R, p_bh<0.001) at session level. Current test asks whether that live-
      detectable calendar state persists on the exact deployed lane rather than the
      broader session pool.
    statement: |
      On MNQ_NYSE_OPEN_E2_RR1.0_CB1_COST_LT12, OPEX days outperform non-OPEX days
      on both the unfiltered lane universe and the deployed-filter subset.
    pass_metric:
      metric: "delta_IS = ExpR_on_signal - ExpR_off_signal"
      formula: "Compare is_opex_TRUE vs is_opex_FALSE on all lane rows"
      threshold_gte:
        unfiltered_delta_is: 0.05
        filtered_delta_is: 0.05
        years_positive_filtered: 4
      threshold_lt:
        unfiltered_raw_p: 0.05
        filtered_raw_p: 0.05
      extra_gate: "filtered_ExpR_on_IS > 0"
    counted_against_trial_budget: true

  - id: H03_CMX_SHORT_RELVOL_Q3
    type: primary
    theory_citation: |
      Within-class refinement on intraday breakout continuation. High relative
      volume is a participation / conviction proxy at ORB end. rel_vol_HIGH_Q3
      survived broad decomposition as an independent predictor beyond vol, gap,
      and calendar proxies in prior audits.
    statement: |
      On MNQ_COMEX_SETTLE_E2_RR1.5_CB1_ORB_G5 short trades, rel_vol_HIGH_Q3 rows
      outperform off-signal rows on both the unfiltered lane universe and the
      deployed-filter subset.
    pass_metric:
      metric: "delta_IS = ExpR_on_signal - ExpR_off_signal"
      formula: "Compare rel_vol_COMEX_SETTLE > IS-only P67 vs <= P67 on short rows"
      threshold_gte:
        unfiltered_delta_is: 0.05
        filtered_delta_is: 0.05
        years_positive_filtered: 4
        wr_spread_filtered: 0.03
      threshold_lt:
        unfiltered_raw_p: 0.05
        filtered_raw_p: 0.05
      extra_gate: "filtered_ExpR_on_IS > 0"
    counted_against_trial_budget: true

  - id: H04_CMX_SHORT_RELVOL_Q3_AND_F6
    type: primary
    theory_citation: |
      Two-factor confluence: range-context plus participation. F6_INSIDE_PDR alone
      is often a breakout headwind, but prior volume-confluence work suggests that
      COMEX short rows with high relative volume inside the prior-day range may be
      a distinct trapped-liquidity / forced-displacement subset rather than generic
      range chop.
    statement: |
      On MNQ_COMEX_SETTLE_E2_RR1.5_CB1_ORB_G5 short trades, the composite
      rel_vol_HIGH_Q3 AND F6_INSIDE_PDR rows outperform off-signal rows on both
      the unfiltered lane universe and the deployed-filter subset.
    pass_metric:
      metric: "delta_IS = ExpR_on_signal - ExpR_off_signal"
      formula: "Compare composite fire vs non-fire on short rows"
      threshold_gte:
        unfiltered_delta_is: 0.08
        filtered_delta_is: 0.08
        years_positive_filtered: 4
        wr_spread_filtered: 0.03
      threshold_lt:
        unfiltered_raw_p: 0.05
        filtered_raw_p: 0.05
      extra_gate: "filtered_ExpR_on_IS > 0"
    counted_against_trial_budget: true

  - id: H05_CMX_LANE_OPEX_TRUE
    type: primary
    theory_citation: |
      Calendar effect. TRADING_RULES.md records MNQ COMEX_SETTLE as WORSE on OPEX
      (-0.172R, p_bh<0.001) at session level. Current test asks whether that
      calendar penalty persists on the exact live lane and therefore belongs in
      the execution-overlay layer.
    statement: |
      On MNQ_COMEX_SETTLE_E2_RR1.5_CB1_ORB_G5, OPEX days underperform non-OPEX
      days on both the unfiltered lane universe and the deployed-filter subset.
    pass_metric:
      metric: "delta_IS = ExpR_off_signal - ExpR_on_signal"
      formula: "Compare is_opex_FALSE vs is_opex_TRUE on all lane rows"
      threshold_gte:
        unfiltered_skip_uplift_is: 0.05
        filtered_skip_uplift_is: 0.05
        years_positive_filtered: 4
      threshold_lt:
        unfiltered_raw_p: 0.05
        filtered_raw_p: 0.05
      extra_gate: "filtered_ExpR_off_IS > 0"
    counted_against_trial_budget: true

baseline:
  type: independent_method_dual_pass
  definition: |
    For each hypothesis:
      Pass A baseline = same exact lane rows without applying the deployed filter.
      Pass B baseline = same exact lane rows after canonical deployed filter
      delegation, then compare signal-on vs signal-off within the filtered subset.
  trade_count_invariants:
    - "For each pass, N_on + N_off == total valid rows in that pass"
    - "Filtered pass rows must equal rows where canonical deployed filter fires"

trial_budget:
  primary_selection_trials: 10
  schema_locked_before_any_metric: true
  minbtl_bound:
    formula: "MinBTL = 2 * ln(N_trials) / E[max_N]^2"
    N_trials: 10
    expected_max_N: 1740
    minbtl_value: "2 * ln(10) / 1740^2 ~ 1.5e-6"
    within_cap: true
    cap_reference: "backtesting-methodology.md RULE 4.2"

kill_criteria:
  - id: K1
    metric: "Number of H01-H05 that pass all required gates on both unfiltered and filtered passes"
    threshold: 0
    action: "PERMANENT KILL for this exact-lane live-context overlay bundle. No rerun with broadened scope or new features without a new pre-reg."
  - id: K2
    metric: "Implementation integrity checklist failures"
    threshold: 1
    action: "SCAN ABORT — integrity failure"
  - id: K3
    metric: "Any hypothesis flagged tautology (|corr| > 0.70), extreme_fire (<5% or >95%), or arithmetic_only (|WR_spread| < 0.03 and |Delta_IS| > 0.10)"
    threshold: 1
    action: "FLAG AND EXCLUDE that hypothesis from survivors"
  - id: K4
    metric: "Observed primary trial count != 10"
    threshold: 1
    action: "SCAN ABORT with K mismatch"
  - id: K5
    metric: "Any quantile threshold for rel_vol computed using OOS rows"
    threshold: 1
    action: "SCAN ABORT — look-ahead contamination"

decision_rule:
  continue_if: "At least 1 of H01-H05 passes all required gates on both passes, and no K2/K4/K5 fire."
  park_if: "At least 1 hypothesis passes the filtered pass but fails exactly one of {years_positive_filtered, raw_p_filtered, OOS_direction_match when N_OOS_on>=10}."
  kill_if: "K1 fires OR any of K2/K4/K5 fire."

methodology_rules_applied:
  - rule: "backtesting-methodology.md RULE 2 — overlay testing must pass unfiltered and filtered"
    application: "Built directly into family design and honest trial budget (10 tests)."
  - rule: "backtesting-methodology.md RULE 3 — sacred holdout"
    application: "All thresholds and selection use IS only; OOS descriptive only."
  - rule: "backtesting-methodology.md RULE 4 — BH-FDR"
    application: "Current family K=10, lane K=5."
  - rule: "backtesting-methodology.md RULE 6 — trade-time knowability"
    application: "All five features are prior-day, calendar, or ORB-end complete."
  - rule: "prereg-writer prompt — quantile look-ahead check"
    application: "rel_vol_HIGH_Q3 threshold computed on IS-only rows."

implementation_integrity_checklist:
  - "IS/OOS split emitted explicitly and no OOS rows used in threshold calibration"
  - "For rel_vol hypotheses, printed IS-only P67 threshold and row counts used"
  - "Canonical deployed-filter fire mask emitted via research.filter_utils.filter_signal"
  - "Two-pass counts emitted: unfiltered total/on/off and filtered total/on/off"
  - "Feature values sourced from canonical daily_features columns only"
  - "Short-only hypotheses enforce short-direction row filter before signal split"

outputs_required_after_run:
  - "Per hypothesis, both passes: N_total, N_on, N_off, ExpR_on, ExpR_off, WR_on, WR_off, Delta_IS, raw_p_IS"
  - "Per hypothesis, both passes: year-by-year 2019-2025 breakdown"
  - "Per hypothesis, both passes: OOS descriptive Delta_OOS and sign match when N_OOS_on >= 10"
  - "For rel_vol hypotheses: frozen IS-only threshold value"
  - "T0 tautology corr vs deployed filter proxies"
  - "Arithmetic-only and extreme-fire flags"
  - "BH-FDR q_family and q_lane"
  - "Result doc path under docs/audit/results/2026-04-20-*.md"

