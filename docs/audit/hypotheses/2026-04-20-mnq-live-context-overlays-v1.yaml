    - "Any other instrument than MNQ"
    - "Any long-direction hypothesis"
    - "Any aperture other than O5"
    - "Any RR other than each lane's live RR"
    - "Any feature not listed under features_in_scope"

data_policy:
  is_window:
    description: "trading_day < HOLDOUT_SACRED_FROM"
    constant_source: "trading_app.holdout_policy.HOLDOUT_SACRED_FROM"
    locked_boundary: "2026-01-01"
    expected_coverage: "2019-01-01 through 2025-12-31 where lane rows exist"
  oos_window:
    description: "trading_day >= HOLDOUT_SACRED_FROM"
    policy: "Mode A sacred; descriptive only"
  holdout_rule:
    constant_source: "trading_app.holdout_policy.HOLDOUT_SACRED_FROM"
    locked_boundary: "2026-01-01"
  tuning_against_oos: false

feature_definitions:
  - feature_name: prev_day_direction_bear
    column_source: "daily_features.prev_day_direction"
    canonical_source_of_truth: "pipeline/build_daily_features.py -> daily_features.prev_day_direction"
    trade_time_knowable: true
    first_complete_time: "Prior daily bar close before current session open"
    temporal_alignment_note: "RULE 6.1 safe prior-day feature"
    lookahead_check: "PASS"
  - feature_name: is_opex_TRUE
    column_source: "pipeline.calendar_filters / daily_features calendar flags"
    canonical_source_of_truth: "TRADING_RULES.md calendar effects + canonical calendar filter functions"
    trade_time_knowable: true
    first_complete_time: "Calendar-known before session starts"
    temporal_alignment_note: "RULE 6.1 safe calendar feature"
    lookahead_check: "PASS"
  - feature_name: rel_vol_HIGH_Q3
    column_source: "daily_features.rel_vol_{session}"
    canonical_source_of_truth: "daily_features rel_vol session columns"
    trade_time_knowable: true
    first_complete_time: "ORB end"
    temporal_alignment_note: "RULE 6.1 safe ORB-end feature; threshold must be IS-only"
    lookahead_check: "PASS if 67th percentile threshold is computed on IS rows only"
  - feature_name: F6_INSIDE_PDR
    column_source: "daily_features prev_day_high/low + ORB high/low midpoint"
    canonical_source_of_truth: "prior_day_features_orb.py / t0_t8 audit definitions"
    trade_time_knowable: true
    first_complete_time: "ORB end"
    temporal_alignment_note: "RULE 6.1 safe because prior-day levels are fixed and ORB midpoint is known at ORB end"
    lookahead_check: "PASS"

calibration:
  quantile_source:
    rel_vol_HIGH_Q3: "IS-only 67th percentile of rel_vol_COMEX_SETTLE on the exact lane universe under test"
  threshold_source:
    prev_day_direction_bear: "Categorical split from canonical column"
    is_opex_TRUE: "Calendar flag"
    F6_INSIDE_PDR: "Binary geometric predicate on ORB midpoint vs prior-day range"
  lock_policy: |
    No threshold may be recalibrated after first metric inspection. For rel_vol,
    the IS-only percentile is frozen once computed from the locked lane universe
    and then applied unchanged to IS and OOS.

