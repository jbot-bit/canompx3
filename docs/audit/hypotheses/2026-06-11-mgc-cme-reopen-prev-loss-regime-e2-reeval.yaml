# =============================================================================
# HYPOTHESES
# =============================================================================
hypotheses:
  - id: 1
    type: primary
    name: "MGC CME_REOPEN prev=LOSS regime survives E2 re-eval (K=1 confirmatory)"
    theory_citation:
      - "harris_2002_trading_exchanges_microstructure.md Key claim 1 (Ch28 p.557 — failed-break trapped stops → next-break cascade)"
      - "harris_2002_trading_exchanges_microstructure.md Key claim 6 (Ch4 p.78 — E2 stop-market rides the cascade)"
      - "fitschen_2013_path_of_least_resistance.md Ch3 pp.31-43 (MGC commodity intraday trend-follow premise)"
    economic_basis: |
      A failed break yesterday (prev_day_outcome=LOSS on this lane) leaves a known
      cluster of trapped stop orders at the broken level (Harris Ch28 p.557).
      Today's break of the same level triggers that cluster — an aggressive
      repositioning cascade — so prev=LOSS days should show stronger follow-through
      than the all-prev baseline. Originally seen under E0 (+0.585R vs +0.273R
      baseline, N=49); E0 is purged. HYPOTHESIS: on E2 entries, the exact
      MGC CME_REOPEN O5 CB1 G4+ prev=LOSS cell retains positive ExpR above the
      all-prev baseline at raw p<0.05 and Chordia t>=3.00. NO directional claim.
    measurement: |
      Single K=1 cell: MGC CME_REOPEN orb_minutes=5 E2 CB1, G4+ size gate, on
      outcome rows where prev_day_outcome (same lane, LAG) = LOSS. Compare
      prev=LOSS ExpR vs all-prev baseline ExpR on the SAME E2 lane. Derive
      prev_outcome via LAG on canonical orb_outcomes; realized-EOD scratch policy;
      triple-join daily_features (orb_minutes=5) to apply the G4+ filter via
      research.filter_utils. Report the E2 delta as headline (NOT the E0 seed).
      Compute OOS power (RULE 3.3) BEFORE applying any 2026 dir-match kill.
    scope:
      instruments: [MGC]
      sessions: [CME_REOPEN]
      orb_minutes: [5]
      rr_targets: [1.5]        # the deployed/canonical CME_REOPEN RR; single cell
      entry_models: [E2]       # E1 is a SEPARATE follow-up K=1, not part of this trial
      confirm_bars: [1]
      filter: "G4+ size gate (ORB_G4 floor), delegated via research.filter_utils — not re-encoded"
      condition: "prev_day_outcome (same lane, LAG) == LOSS"
    pass_metric:
      metric: "prev=LOSS ExpR minus all-prev baseline ExpR on MGC CME_REOPEN E2 outcome rows"
      formula: "mean(pnl_r | prev_outcome=LOSS) - mean(pnl_r | all prev), same lane"
      threshold_gte: "delta > 0 AND prev=LOSS ExpR > 0 AND raw p < 0.05 AND Chordia t(prev=LOSS one-sample) >= 3.79"
    counted_against_trial_budget: true
    kill_criteria:
      - "Raw p >= 0.05 on the prev=LOSS subset (Pathway B Amendment 3.0)"
      - "Chordia t < 3.79 on prev=LOSS subset (Criterion 4, strict no-theory bar per AM3.4 Check 69)"
      - "prev=LOSS ExpR NOT > all-prev baseline ExpR — refutes the cascade prior"
      - "prev=LOSS ExpR <= 0 (no absolute edge)"
      - "WFE < 0.50 (Criterion 6, non-waivable)"
      - "2026 OOS ExpR < 0 when N_oos >= 30 AND OOS power >= 0.80 (Criterion 8 + RULE 3.3 power floor; if power < 0.50 → UNVERIFIED not DEAD)"
      - "Any era (N >= 50) ExpR < -0.05 R (Criterion 9, non-waivable)"
      - "N_on (prev=LOSS) < 30 → cannot confirm at REGIME tier; report DIRECTIONAL_ONLY, not a pass"

