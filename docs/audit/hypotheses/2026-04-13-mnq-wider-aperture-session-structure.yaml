# Hypothesis Registry — MNQ Wider Aperture (Session-Structure Mechanism)
#
# Locked:        2026-04-13T09:00:00+10:00
# Author:        Claude Code session (aperture opportunity analysis)
# Holdout mode:  A (2026-01-01 sacred)
# Data horizon:  6.65 calendar years (MNQ real micro 2019-05-06 to 2025-12-31)
# Testing mode:  family (BH FDR at K=24)
#
# BLUEPRINT NO-GO AUDIT:
# Blueprint §5 NO-GO entry: "O15/O30 ORB aperture (as portfolio) |
# ARITHMETIC_ONLY | Friction artifact"
# Reopening criterion: "New mechanism hypothesis (not friction/size related)"
#
# THIS HYPOTHESIS IS MECHANISM-DISTINCT from the NO-GO:
# The NO-GO tested whether 15m/30m REPLACES 5m per-trade (answer: no,
# 0.031R worse). This hypothesis tests whether wider apertures unlock
# SESSIONS WHERE 5m FAILS — a portfolio-diversification question, not a
# per-trade-R question. Evidence: SINGAPORE_OPEN has NEGATIVE 5m edge
# (Sharpe -0.15) but POSITIVE 30m edge (Sharpe +1.01). A friction
# artifact cannot flip the SIGN of the edge — that is a structural
# session-mechanism difference. The information-aggregation timescale
# of Asian sessions differs from US sessions.
#
# BIAS PREVENTION:
# - ALL 12 sessions tested at BOTH 15m and 30m — no cherry-picking
# - RR fixed at 1.5 (standard mid-grid, not optimized)
# - Filter grid is the same as wave4 (ORB_G5 baseline)
# - Unfiltered baselines were observed BEFORE this file was written
#   but NO filter selection or RR optimization was performed
# - Kill criteria defined BEFORE any filtered results are seen
#
# LOOK-AHEAD CHECK:
# - daily_features at orb_minutes=15 and orb_minutes=30 contain
#   orb_{SESSION}_size, break_dir, break_ts — all computed from
#   bars WITHIN the aperture window (t < entry_time)
# - No 5m features used to predict 15m/30m outcomes
# - No cross-aperture leakage in the outcome_builder
#
# LITERATURE GROUNDING:
# - Crabel (1990) "Day Trading with Short Term Price Patterns": the
#   original ORB methodology tested multiple aperture widths and found
#   optimal width varies by market structure. FROM TRAINING MEMORY —
#   not verified against local PDF (no Crabel PDF in resources/).
# - Chan (2009) "Quantitative Trading" Ch 1-2: regime-conditional
#   signal behavior. Different market structures produce different
#   optimal parameters. @canonical-source resources/Quantitative_Trading_Chan_2008.pdf
# - French & Roll (1986) JFE: information arrival rates differ across
#   trading sessions. Asian hours have slower information incorporation.
#   FROM TRAINING MEMORY — not verified against local PDF.
# - Ito, Engle, Lin (1992) JIE: intraday volatility patterns differ
#   by timezone/session due to institutional trading flows.
#   FROM TRAINING MEMORY — not verified against local PDF.

metadata:
  name: "mnq-wider-aperture-session-structure"
  purpose: |
    Test whether 15m and 30m ORB apertures produce tradeable edges on
    sessions where 5m already works (additive diversification) or on
    sessions where 5m has no edge (new session access). The mechanism
    is session-structure information-aggregation timescale: slow-build
    sessions (Asian, pre-data) need wider apertures to establish a
    meaningful range, while fast sessions (NYSE_OPEN, COMEX_SETTLE)
    are fully captured by 5m.
  date_locked: "2026-04-13T09:00:00+10:00"
  holdout_date: "2026-01-01"
  data_horizon_years_clean: 6.65
  data_source: "real CME Micro E-mini Nasdaq-100 futures 2019-05-06 onwards"
  testing_mode: "family"
  bailey_compliance:
    trials: 24
    horizon_years: 6.65
    e_max_n: 1.0
    min_btl_required_years: 6.36
    headroom_pct: 4.4
    status: "PASS"
  total_expected_trials: 24

