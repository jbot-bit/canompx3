# ADDITIONAL CONTROLS (mandatory per this hypothesis):
#
# 1. T1 WR MONOTONICITY: every survivor must show WR spread > 5% across
#    ORB-size quintiles. If WR is flat + only payoff rising, classify as
#    ARITHMETIC_ONLY and do NOT deploy (NO-GO still applies for friction
#    artifacts).
#
# 2. CORRELATION GATE: every survivor must pass the trade-level
#    correlation gate (trading_app/lane_correlation.py) against the
#    deployed 5m portfolio before deployment. rho > 0.70 or same-session
#    subset > 0.80 = reject.
#
# 3. 5m-vs-wider PORTFOLIO SHARPE: after individual screening, build a
#    combined 5m+survivor portfolio and verify Sharpe improves vs
#    5m-only. If portfolio Sharpe DECREASES, the survivors add noise
#    not signal.
#
# 4. SIGN-FLIP REQUIREMENT for NO-GO-reopening claims: any session
#    claimed as "new access via wider aperture" must show NEGATIVE or
#    near-zero 5m edge AND POSITIVE wider-aperture edge. If 5m is
#    already positive, wider aperture is NOT opening a new session —
#    it's an inferior duplicate.
