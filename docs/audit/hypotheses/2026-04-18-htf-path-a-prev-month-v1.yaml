                  # committed_sha: TO_FILL_AFTER_COMMIT per research-truth-protocol §2a.
  testing_mode: family       # Pathway A per Criterion 3 Amendment 3.0
  pathway: A                 # BH-FDR family search (no local Pathway A extract)
  chordia_threshold_basis: Criterion_4_no_theory
  supersedes: none
  parent_stub: docs/audit/hypotheses/2026-04-15-htf-level-break-pre-reg-stub.md
  sibling_family_killed: docs/audit/hypotheses/2026-04-18-htf-path-a-prev-week-v1.yaml
  depends_on:
    - pipeline/build_daily_features.py  # _apply_htf_level_fields — populates prev_month_*
    - pipeline/check_drift.py           # check_htf_levels_integrity covers 12 HTF fields
    - trading_app/holdout_policy.py     # HOLDOUT_SACRED_FROM binding
  authority:
    - docs/institutional/pre_registered_criteria.md
    - docs/institutional/literature/chordia_et_al_2018_two_million_strategies.md  # t>=3.79 no-theory
    - docs/institutional/literature/harvey_liu_2015_backtesting.md   # BH-FDR / BHY framework
    - docs/institutional/literature/bailey_et_al_2013_pseudo_mathematics.md  # MinBTL
    - docs/institutional/literature/lopez_de_prado_bailey_2018_false_strategy.md  # FST at K=24
    - .claude/rules/backtesting-methodology.md
    - .claude/rules/research-truth-protocol.md
    - docs/institutional/mechanism_priors.md  # R1 FILTER role
  committed_sha: "TO_FILL_AFTER_COMMIT"
  head_sha_at_draft: daaed1be
  do_not_run_until_committed: true
  do_not_run_until_fire_rate_precheck: false   # pre-check artefact already committed (see precheck_artefact below)
  precheck_artefact: docs/audit/hypotheses/2026-04-18-htf-path-a-prev-month-v1-fire-rate-precheck.txt
  scope_note: >
    Pathway A family scan of prev-MONTH HTF level-break as a binary
    skip/take FILTER (R1) overlay on existing E2 ORB entries. Tests
    whether direction-aligned breakouts of the prior calendar-month
    extreme produce higher ExpR than unconditional ORB entries on the
    same (instrument, session, RR) lane. Structurally analogous to the
    prev-week v1 family but at a longer timescale — see mechanism block
    for the distinctive causal story. Scope stays SINGLE-FAMILY, SINGLE-
    ROLE; not a reopen of prev-week v1 (which is family-killed).

prev_family_precedent:
  # Institutional-rigor guard per Amendment 2.6/2.7 + research-truth-protocol:
  # we are aware of the prev-week v1 kill and treating this as a distinct
  # mechanism, NOT a soft reopen.
  prev_week_v1_verdict: "FAMILY KILL FK1 (zero cells pass gates + BH_family)"
  prev_week_v1_scan_doc: docs/audit/results/2026-04-18-htf-path-a-prev-week-v1-scan.md
  honest_prior_given_prev_family_killed: >
    Base rate for prev-month-v1 genuine effect: low (~20-35%) given prev-
    week at similar structural scope failed to produce a single surviving
    cell under identical gates. If prev-month also kills, the HTF-level-
    break-as-filter research class is effectively closed pending a
    structurally new mechanism OR new literature extract.
  why_this_is_a_new_family_not_a_reopen:
    - "Different event class: prev-month break is a calendar-institutional-
       rebalancing marker, not a weekly liquidity-sweep event."
    - "Different participant base: month-end fund flows, monthly option
       expiry, longer-horizon rebalancers — distinct from overnight chase."
    - "Different fire rate structure: prev-month-high fires at ~35-39% long
       / ~10% short; prev-week fires at ~10-16% long / ~5-8% short under
       the first-touch gate (or 12-27% unfiltered). Different event density
       implies different statistical structure, not identical test."
    - "Separate MinBTL budget: 24 pre-month trials under Bailey strict
       E=1.0 N<=28 bound. Prev-week budget was already consumed on its
       own scan; prev-month gets fresh N budget."

edge_claim_summary: >
  On MNQ and MES, during TOKYO_OPEN / EUROPE_FLOW / NYSE_OPEN at O15,
  an ORB break whose direction aligns with a break of the prior-month
  calendar extreme (prev_month_high for longs, prev_month_low for shorts)
  has positive per-trade ExpR and the effect size meets Chordia-2018
  without-theory severity (|t| >= 3.79), with family-level BH-FDR q=0.05
  at K=24. Pre-registered direction is TAKE the aligned trade; an
  inverted SKIP-rule interpretation is NOT pre-registered here (would
  require a separate pre-reg if a survivor emerges with wrong sign).

mechanism:
  summary: >
    Prior-calendar-month highs and lows mark institutional rebalancing
    and option-expiry boundaries. Breakouts of monthly extremes draw
    longer-horizon participants (pension rebalancers, macro funds, monthly
    systematic allocators) into the directional move, producing stronger
    continuation than within-month ORB breaks. Distinct from prev-week's
    "overnight liquidity sweep" story by timescale, participant base, and
    event class (trend-qualifying vs liquidity-chase).
  tier_1_literature_support:
    - file: docs/institutional/literature/fitschen_2013_path_of_least_resistance.md
      lines: "1-90"
      relevance: "CORE ORB intraday-trend premise (equity-index futures)"
      with_theory_claim: false
      note: >
        Fitschen extract lines 67-75 explicitly EXCLUDES level-based
        filters from its Pathway-A scope. We honour that exclusion: this
        pre-reg invokes Pathway A family BH-FDR with Criterion 4 NO-
        theory severity (t >= 3.79).
  tier_1_literature_absent:
    - "Dalton (Markets in Profile) — month-profile context; absent from local literature/"
    - "Murphy (Technical Analysis) — level-break patterns; absent"
    - "Chan 2013 (Algorithmic Trading) Ch 4 — level mean-reversion; absent"
  pathway_upgrade_path: >
    Adding any of the above extracts to docs/institutional/literature/
    BEFORE an eventual v2 opens a Pathway B re-pre-reg at Criterion 4
    t >= 3.00 with-theory, applied to any single surviving cell with a
    specific theory citation.

canonical_features_in_scope:
  primary_predictors:
    - name: prev_month_high
      source_file: pipeline/init_db.py
      source_line: 313
      build_source: pipeline/build_daily_features.py::_apply_htf_level_fields
      temporal_validity: >
        Populated at trading-day start (09:00 Brisbane) from fully-closed
        prior calendar month. Stable for every intraday session fire on
        the current trading day. Drift check 59 (merged in daaed1be)
        pressure-tested with 4 injected divergence classes.
    - name: prev_month_low
      source_file: pipeline/init_db.py
      source_line: 314
      build_source: pipeline/build_daily_features.py::_apply_htf_level_fields
      temporal_validity: same as prev_month_high
  context_only_not_predictors:
    # Populated by canonical builder; NOT tested as predictors in v1 to
    # keep trial budget under strict Bailey. May enter v2.
    - prev_month_open
    - prev_month_close
    - prev_month_range
    - prev_month_mid
  out_of_scope_for_v1:
    - prev_week_high
    - prev_week_low
    # prev-week killed in docs/audit/results/2026-04-18-htf-path-a-prev-week-v1-scan.md

scope:
  instruments: [MNQ, MES]
  sessions: [TOKYO_OPEN, EUROPE_FLOW, NYSE_OPEN]
  orb_minutes: [15]
  rr_targets: [1.5, 2.0]
  entry_models: [E2]
  confirm_bars: [1]
  stop_multipliers: [1.0]
  directions_cells:
    - pmh_break_long:
        predicate: >
          orb_{session}_break_dir = 'long'
            AND prev_month_high IS NOT NULL
            AND orb_{session}_high > prev_month_high
        direction: long
    - pml_break_short:
        predicate: >
          orb_{session}_break_dir = 'short'
            AND prev_month_low IS NOT NULL
            AND orb_{session}_low < prev_month_low
        direction: short
  role: R1_FILTER
  data_source_mode: clean_real_micro
  data_source_disclosure: >
    MNQ + MES 1m bars from 2019-05-06 (CME Micro E-mini launch) through
    2025-12-31 (pre-holdout). No proxy, no parent-futures backfill.
    Clean real-micro horizon 6.65 years per pre_registered_criteria.md
    Amendment 2.8.

trial_budget:
  cells:
    instruments: 2
    sessions: 3
    apertures: 1
    rr_targets: 2
    directions_cells: 2
    total_per_instrument: 12
    total: 24   # 2 * 3 * 1 * 2 * 2
  minbtl:
    source: docs/institutional/literature/bailey_et_al_2013_pseudo_mathematics.md
    formula: "2 * ln(N_trials) / E_max^2 <= available_clean_years"
    E_max_assumed: 1.0
    computed: "2 * ln(24) / 1.0^2 = 6.356 years"
    clean_years_MNQ: 6.65
    clean_years_MES: 6.65
    verdict: "24 <= 28 strict Bailey bound at E=1.0 — PASS"
  cumulative_pathway_a_htf_family_note: >
    Combined HTF-level-break research across prev-week-v1 (K=24) and
    prev-month-v1 (K=24) sums to 48 pre-registered trials on the same
    horizon. This is still within Bailey E=1.0 strict bound extended to
    multi-family work at this level; each family has independent gates
    and separate BH-FDR. If BOTH families kill, any subsequent HTF-level
    family pre-reg must justify a structurally new mechanism to avoid
    implicit soft reopen.

holdout:
  source: trading_app/holdout_policy.py::HOLDOUT_SACRED_FROM
  value_at_draft: "2026-01-01"
  binding_rule: >
    Scan script imports HOLDOUT_SACRED_FROM; no hardcoded date literals.
  is_window:
    start: "2019-05-06"
    end_exclusive: HOLDOUT_SACRED_FROM
  oos_window:
    start: HOLDOUT_SACRED_FROM
    end_exclusive: "run_date"
  mode: A
  forbidden: [discovery_on_oos, tuning_on_oos, multiple_looks_at_oos]

