per_cell_gates:
  - id: G1_fire_rate
    rule: "fire_rate in [0.05, 0.95]"
    authority: .claude/rules/backtesting-methodology.md RULE 8.1
    precheck_status: "all 12 cells in band (9.6% - 39.2%) per precheck_artefact"
  - id: G2_sample
    rule: "N_on >= 50"
    authority: backtesting-methodology.md RULE 4.1
  - id: G3_raw_p_screen
    rule: "raw two-tailed p < 0.05"
    authority: Criterion 3 Pathway A
  - id: G4_chordia_t
    rule: "abs(t) >= 3.79"
    authority: Criterion 4 no-theory severity
  - id: G5_dir_match
    rule: "sign(ExpR_IS) == sign(ExpR_OOS) on the OOS window"
    authority: backtesting-methodology.md RULE 3.1 + Criterion 8 non-waivable
  - id: G6_tautology
    rule: "abs(corr(fire_vector, orb_{session}_size)) <= 0.70"
    authority: backtesting-methodology.md RULE 7 (T0), implemented as size-proxy per prev-week v1 scan precedent
  - id: G7_arithmetic_only
    rule: "NOT (abs(wr_spread) < 0.03 AND abs(delta_IS) > 0.10)"
    authority: backtesting-methodology.md RULE 8.2
  - id: G8_walk_forward
    rule: "WFE = Sharpe_OOS / Sharpe_IS >= 0.50 AND WFE < 0.95 (LEAKAGE_SUSPECT ceiling)"
    authority: Criterion 6 + RULE 3.2
  - id: G9_era_stability
    rule: "ExpR >= -0.05 in every era with N >= 50 (eras per Criterion 9: 2019-2020, 2021-2022, 2023, 2024-2025)"
    authority: Criterion 9

dsr_informational:
  threshold: "DSR > 0.95"
  status: informational_cross_check
  authority: pre_registered_criteria.md Amendment 2.1

primary_promotion_gate:
  name: BH_FDR_family
  K: 24
  q: 0.05
  unit_of_correction: cell
  rule: "cell passes BH-FDR at K_family=24, q=0.05"
  authority: Criterion 3 Pathway A

pass_criteria:
  - "cell passes all per_cell_gates G1..G9"
  - "cell passes primary_promotion_gate (BH-FDR family K=24 q=0.05)"
  - "no family_kill_criteria fires"
  next_stage_if_passed:
    - "signal-only shadow pre-reg per the H1 Apr-18 exemplar pattern"
    - "NO capital deployment without Criterion 11 Monte Carlo + Criterion 12 SR monitor"

park_criteria:
  - "cell passes G1..G9 on IS but fails primary BH-FDR at K_family"
  - "cell passes G1..G9 on IS but G5 dir_match fails with N_OOS >= 30"

kill_per_cell:
  - "raw p >= 0.05 across both RR cells of the hypothesis"
  - "abs(t) < 3.79 on best RR cell"
  - "N_on < 50 on best RR cell"
  - "tautology: abs(corr(fire_vector, orb_size)) > 0.70"
  - "OOS direction flip on best cell with N_OOS >= 30"

family_kill_criteria:
  - id: FK1
    rule: "< 1 of 24 cells pass all G1..G9 AND BH-FDR K_family q=0.05"
    meaning: "signal absent after multi-testing correction — HTF level-break-as-filter research class near-closed; requires structural new mechanism before reopening"
  - id: FK2
    rule: "> 20 of 24 cells pass all gates"
    meaning: "uniform-survivor pattern — pipeline artefact red flag per RULE 12"
  - id: FK3
    rule: "every top-5 survivor shares identical (session, direction)"
    meaning: "look-ahead / data-snooping suspicion per RULE 1 / RULE 12"
  - id: FK4
    rule: "best-cell delta_IS > 0.6 R per trade"
    meaning: "RULE 12 red flag — investigate before publishing"

multi_framing_bh_fdr:
  primary_reported_framing: K_family
  primary_K: 24
  informational_framings:
    - K_global: 24
    - K_lane: 2       # (instrument, session, direction) lane — 2 RR cells
    - K_instrument: 12
    - K_session: 8
    - K_direction: 12
  reporting_rule: "per-cell BH-FDR q-value at each framing reported in results MD"

anti_lookahead_statement:
  feature_side:
    source: pipeline/build_daily_features.py::_apply_htf_level_fields
    invariant: >
      prev_month_{high,low,open,close,range,mid} populated at trading-day
      start from fully-closed prior calendar month. Month-anchor via
      date.replace(day=1) with Jan->Dec prior-year rollover. Running
      per-(symbol, month_key) aggregate dict read BEFORE today's OHLC is
      inserted. No look-ahead.
    drift_guard: >
      check_htf_levels_integrity (check #59 post-merge) covers all 12 HTF
      fields against DuckDB DATE_TRUNC('month') aggregation; symmetric-
      diff, phantom, and stale-miss divergence classes caught. Pressure-
      tested on merge commit 668d2680 (now in main).
  decision_side:
    at_ORB_close:
      known_safely:
        - prev_month_high / prev_month_low (known at 09:00 Brisbane trading-day start)
        - orb_{session}_break_dir (final at ORB window close + break detection)
        - orb_{session}_high / orb_{session}_low (final at ORB window close)
      forbidden_as_predictor:
        - "daily_high / daily_low of the CURRENT trading day"
        - "orb_{session}_outcome / mae_r / mfe_r (post-entry)"
        - "double_break (post-entry — banned)"
    trading_day_boundary: "09:00 Brisbane — prior-month aggregate stable before every session fires"

