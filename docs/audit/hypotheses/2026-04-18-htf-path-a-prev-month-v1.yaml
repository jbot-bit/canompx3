pre_reg_checklist:
  - "[x] Every hypothesis has a mechanism_ref"
  - "[x] Total trial_count = 24, within strict Bailey E=1.0 bound (<= 28)"
  - "[x] Kill criteria pre-registered (G1..G9 + family FK1..FK4)"
  - "[x] No volume-based filter on parent-proxy data (MNQ/MES real-micro only — N/A here)"
  - "[x] Holdout bound via Python import, not date literal"
  - "[x] Fire-rate pre-check artefact in place — all 12 cells in band"
  - "[x] testing_mode = family — survivors selected by BH-FDR at K_family=24 q=0.05"
  - "[x] pathway = A — justified in metadata; Chordia t threshold from Criterion 4 independent of pathway"
  - "[x] Prev-week v1 kill acknowledged in prev_family_precedent with honest prior (low, ~20-35%)"
  - "[x] Mechanism distinctness vs prev-week articulated (timescale, participant base, event class)"
  - "[x] FST K=24 null-max interpolation documented (E[max SR] ~= 1.80 via log-linear)"
  - "[ ] File committed BEFORE scan script runs"
  - "[ ] prereg-writer gate self-review per research-truth-protocol §2a"
