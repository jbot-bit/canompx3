data_policy:
  is_window:
    description: "trading_day < HOLDOUT_SACRED_FROM"
    constant_source: "trading_app.holdout_policy.HOLDOUT_SACRED_FROM"
    locked_boundary: "2026-01-01"
  oos_window:
    description: "trading_day >= HOLDOUT_SACRED_FROM"
    policy: >-
      Descriptive corroboration only. Never tunes IS verdict, never rescues,
      never kills without OOS power floor per research.oos_power.POWER_TIERS.
      dir_match (or sign-match equivalent on the filtered subset's ExpR) cannot
      kill an underpowered OOS. Stage 4b's same 4-month OOS window is expected
      to underpower a meaningful fraction of cells; this is declared expected,
      NOT surprise.
  tuning_against_oos: false
  canonical_layers_only: true
  canonical_layers:
    - "bars_1m"
    - "daily_features"
    - "orb_outcomes"
  holiday_exclusion:
    required: true
    source_status: "CANONICAL_IN_REPO"
    source: "pipeline.calendar_filters.is_nyse_holiday (Stage 2 of NYSE_PREOPEN session build, commit 296c54f2)"
    note: "NYSE official holiday calendar exclusion is mandatory for both IS and OOS counts on both source and target sessions. Holiday-bar contamination is an explicit kill criterion. Stage 2 wiring is already on origin/main; runner must confirm at execution time."

scratch_policy:
  policy: "realized-eod"
  justification: >-
    Capital-routing-class research (verdict could motivate adjacent-lane overlay
    deployment). Per pre_registered_criteria.md Criterion 13 (BINDING), realized-eod
    is required to ensure scratch rows are not silently dropped via
    WHERE pnl_r IS NOT NULL. Origin: 2026-04-27 silent-scratch-dropout discovery
    inflated measured ExpR by 10-45% on MNQ E2 confirm_bars=1 survivor lanes.

