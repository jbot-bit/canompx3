metadata:
  theory_grant: false
  name: "mnq_nyse_preopen_o30_size_adjacent_overlay_v1"
  purpose: |
    Test whether restricting MNQ {NYSE_OPEN, US_DATA_1000} E2 CB1 O5 RR{1.0,1.5,2.0}
    entries to days where NYSE_PREOPEN O30 ORB size exceeds the IS-only median produces
    a strict-Chordia-significant overlay edge (t_IS >= 3.79, N_IS_on >= 100, ExpR_IS > 0,
    ExpR_overlay > ExpR_baseline_unfiltered, BH-FDR q < 0.05 at K_family=6) over the
    unfiltered baseline, with DST-balanced IS sample. K=6 family Pathway A. Mechanism is
    plausible synthesis from 4b's aperture-significance finding (NYSE_PREOPEN O30 cells
    were strict-IS positive standalone) extrapolated to adjacent US-cash lanes within
    90min of NYSE_PREOPEN ORB close. Theory grant: false. No /resources PDF anchors
    "09:00 ET imbalance publication size -> adjacent cash-lane price discovery" — same
    posture as 4a/4b.
  date_locked: "2026-05-29T00:00:00+10:00"
  holdout_date: "2026-01-01"
  total_expected_trials: 6
  testing_mode: "family"
  pathway: "A_family"
  research_question_type: "overlay_filter_family"
  notes:
    - "theory_grant=false; theory_citation is INTENTIONALLY OMITTED on every hypothesis per memory/feedback_chordia_theory_citation_field_presence_trap.md — any truthy string silently flips loader has_theory=True and downgrades strict 3.79 -> 3.00 via trading_app/hypothesis_loader.py:262-269."
    - "Quarantine route per memory/feedback_lhp_validator_vs_field_presence_trap_n1.md — file lives under drafts/ until human review and explicit promotion."
    - "Stage 4b lead evidence is upstream discovery provenance, NOT validation. The 4b K=27 family is closed; this K=6 family is independent at Bailey per-discovery family accounting (pre_registered_criteria.md Criterion 2)."
