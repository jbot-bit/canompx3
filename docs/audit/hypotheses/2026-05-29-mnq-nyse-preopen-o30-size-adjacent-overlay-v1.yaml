hypotheses:
  - id: 1
    name: "MNQ {NYSE_OPEN, US_DATA_1000} E2 CB1 O5 RR{1.0,1.5,2.0} NYSE_PREOPEN O30 size-above-IS-median overlay"
    economic_basis: >-
      MECHANISM_STATUS: plausible_synthesis_not_locally_verified.
      Hypothesised mechanism: the NYSE 09:00 ET Order Imbalance publication, when it
      produces a large 30-minute ORB aperture on MNQ, indicates that the imbalance
      regime materially expressed into the futures tape. On those days, the subsequent
      cash-open auction (09:30 ET = NYSE_OPEN) and the post-equity-open data window
      (10:00 ET = US_DATA_1000) inherit directional momentum from the pre-open
      price-discovery process, producing tradable ORB breakouts. On days when the
      NYSE_PREOPEN aperture is small (below IS-median), the imbalance regime did NOT
      express, and the subsequent adjacent-lane ORB breakouts are noise-dominated.
      The overlay restricts entry to "regime expressed" days. No /resources PDF directly
      anchors this specific mechanism on equity-index futures; the chain is synthesis from
      Fitschen 2013 Ch 3 (intraday trend-follow class), Chan 2013 Ch 7 (intraday momentum
      class), and Harris 2002 Ch 14 (auction-print microstructure adjacency). Therefore
      theory_grant=false and strict Chordia t>=3.79 applies.
      Lead evidence: Stage 4b's 6 strict-IS-positive O30 NYSE_PREOPEN cells are consistent
      with the regime-expression hypothesis (the standalone signal was significant ONLY at
      the full 30min aperture, suggesting the imbalance prior needs the full window to
      express). 4b is LEAD ONLY, not validation.
    role:
      kind: "overlay_filter"
      parent: "Single-feature binary overlay on 2 adjacent target lanes (NYSE_OPEN + US_DATA_1000) at 3 RR each."
      comparator: "Each filtered cell tested against (a) strict Chordia threshold AND (b) unfiltered baseline ExpR on the same (instrument, target_session, orb_minutes, rr_target, entry_model, confirm_bars) cell. Both gates required for promotion."
      primary_metric: "selected_trade_mean_r on overlay-fire days"
      promotion_target: "deployment_eligibility_decision_only (allocator correlation gate adjudicates downstream — out of scope for this pre-reg)"
    scope:
      instruments: [MNQ]
      target_sessions: [NYSE_OPEN, US_DATA_1000]
      rr_targets: [1.0, 1.5, 2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
      target_orb_minutes: [5]
      source_orb_minutes: [30]
      source_feature: "orb_NYSE_PREOPEN_size_above_IS_median"
      direction: pooled
    expected_trial_count: 6
    pass_metric:
      metric: "t_IS_overlay AND ExpR_overlay_uplift"
      formula: |
        t_IS_overlay = compute_chordia_t(sharpe_overlay_IS, N_overlay_IS) on overlay-fire IS trades
        ExpR_overlay_uplift = ExpR_overlay_IS - ExpR_unfiltered_baseline_IS
        where ExpR_unfiltered_baseline_IS = ExpR over ALL IS trades on the same (target_session, RR, instrument, entry_model, confirm_bars) cell (regardless of NYSE_PREOPEN size)
      threshold_gte:
        t_is_overlay: 3.79
        n_is_overlay_on: 100
        expr_overlay_uplift: 0.0
        expr_overlay_is: 0.0
      extra_gates:
        - "BH-FDR q<0.05 at K_family=6 (Benjamini-Hochberg 1995)"
        - "dir_match_oos = true when OOS N_overlay >= 30 AND OOS power tier >= CAN_REFUTE per research.oos_power.POWER_TIERS (RULE 3.3)"
        - "WR_spread (overlay vs unfiltered baseline) >= 3 percentage points OR delta_payoff < 0 — guards against ARITHMETIC_ONLY arithmetic-of-costs class (RULE 8.2)"
        - "fire_rate of overlay on target lane in [0.25, 0.75] — guards against EXTREME_FIRE (RULE 8.1)"
        - "T0 |corr(overlay_fire, deployed_filter_fire)| < 0.70 on the relevant target lane (RULE 7)"
        - "T6 bootstrap permutation p_overlay < 0.05 (1000 perms, seed 20260529, RULE 3 / Phipson-Smyth)"
        - "DST-balanced: N_EST_overlay_on >= 30 AND N_EDT_overlay_on >= 30 (else UNVERIFIED_DST_IMBALANCE not DEAD)"
        - "Adversarial per-year split: at least 4/7 IS-years positive on the overlay subset (RULE 7 absolute count, years with N<10 excluded from positive count, denominator 7 fixed)"
        - "Scratch-inclusive realized-eod accounting (Criterion 13)"
    kill_criteria:
      - id: K1
        metric: "t_IS_overlay"
        threshold: "< 3.79"
        action: "kill_cell as FAIL_CHORDIA_STRICT"
      - id: K2
        metric: "ExpR_overlay_uplift"
        threshold: "<= 0.0 (overlay does not beat unfiltered baseline ExpR)"
        action: "kill_cell as NO_ADDITIVE_EDGE (cost-screen at best)"
      - id: K3
        metric: "ExpR_overlay_IS"
        threshold: "<= 0.0"
        action: "kill_cell as ABSOLUTE_NEGATIVE_OVERLAY (overlay-fire days losing money on average)"
      - id: K4
        metric: "N_overlay_IS_on"
        threshold: "< 100"
        action: "kill_cell as UNDERPOWERED_DEPLOYABLE (HL 2015 Exhibit 4)"
      - id: K5
        metric: "OOS sign vs IS sign on overlay subset"
        threshold: "OOS sign opposes IS sign AND OOS power tier == CAN_REFUTE"
        action: "kill_cell as FAIL_OOS_REFUTED (RULE 3.3 binary kill only at CAN_REFUTE)"
      - id: K6
        metric: "|corr(overlay_fire, deployed_filter_fire)|"
        threshold: "> 0.70"
        action: "kill_cell as DUPLICATE_FILTER (RULE 7 tautology)"
      - id: K7
        metric: "WR_spread overlay vs unfiltered"
        threshold: "< 0.03 AND delta_payoff > 0 (WR flat, only payoff improving)"
        action: "downgrade_cell to ARITHMETIC_ONLY (RULE 8.2 cost-screen, NOT signal — not deployable as edge)"
      - id: K8
        metric: "fire_rate of overlay"
        threshold: "< 0.25 OR > 0.75"
        action: "kill_cell as EXTREME_FIRE (RULE 8.1, exception: not applicable here as binary-median by construction targets ~0.5)"
      - id: K9
        metric: "bootstrap p_overlay"
        threshold: "> 0.05"
        action: "kill_cell as NO_EDGE (T6 null-floor failure)"
      - id: K10
        metric: "years_positive_IS"
        threshold: "< 4 (absolute count, denominator 7 fixed, years with N<10 excluded from positive count)"
        action: "kill_cell as ERA_DEPENDENT (RULE 7 / writer-prompt absolute-count requirement)"
      - id: K11
        metric: "DST split: N_EST_overlay_on AND N_EDT_overlay_on"
        threshold: "N_EST_overlay_on < 30 OR N_EDT_overlay_on < 30"
        action: "verdict UNVERIFIED_DST_IMBALANCE (NOT DEAD, deferred per canonical DST-split rule)"
      - id: K12
        metric: "look-ahead column usage in runner code"
        threshold: "any column in {orb_NYSE_PREOPEN_break_ts, _break_delay_min, _break_bar_*, _break_dir, _double_break, _mae_r, _mfe_r, _outcome, _pnl_r} referenced"
        action: "kill_pre_reg (RULE 6.3 hard-coded look-ahead family)"
      - id: K13
        metric: "holiday-bar contamination"
        threshold: "any IS or OOS row included where is_nyse_holiday(trading_day) returns True for NYSE_PREOPEN, NYSE_OPEN, or US_DATA_1000"
        action: "kill_pre_reg (data discipline)"
      - id: K14
        metric: "BH FDR at K_family=6"
        threshold: "q >= 0.05"
        action: "kill_cell as FAIL_BH_FDR_FAMILY"
    statement: >-
      On MNQ {NYSE_OPEN, US_DATA_1000} E2 CB1 O5 RR{1.0,1.5,2.0} enumerated across
      3 RR targets and 2 target sessions (6 cells total), restricting trade entry to
      days where orb_NYSE_PREOPEN_size > IS-only median produces strict-Chordia overlay
      uplift: at least one cell clears t_IS_overlay >= 3.79 AND N_overlay_IS_on >= 100
      AND ExpR_overlay_uplift > 0 AND ExpR_overlay_IS > 0 AND survives family-level
      BH-FDR at K_family=6 AND survives T0 tautology + T6 null-floor + per-year stability
      + DST-balanced subgroup checks, justifying a separate downstream allocator gate
      for overlay deployment on the surviving cell.
    counted_against_trial_budget: true

trial_budget:
  primary_selection_trials: 6
  schema_locked_before_any_metric: true
  minbtl_bound:
    formula: "MinBTL = 2 * ln(N_trials) / E[max_N]^2"
    n_trials: 6
    e_max_n: 1.0
    minbtl_required_years: 3.58
    available_clean_years: 6.65
    within_cap: true
    cap_reference: "pre_registered_criteria.md Criterion 2 (Bailey et al 2013 loose-form; MNQ horizon per scripts/tools/minbtl_retro_report.CLEAN_YEARS_BY_INSTRUMENT)"
    headroom_years: 3.07

total_hypothesis_count: 1
total_expected_trials: 6
budget_check:
  max_allowed_clean: 300
  max_allowed_proxy: 2000
  status: "under budget"
  minbtl_note: >-
    K=6 family overlay-discovery. MNQ horizon 6.65yr at E=1.0 noise floor allows
    N_max=27. estimate_k_budget.py PASS expected with substantial headroom.

decision_rule:
  continue_if: >-
    At least one cell clears strict t_overlay >= 3.79 with N_overlay_IS_on >= 100,
    ExpR_overlay_uplift > 0, ExpR_overlay_IS > 0, survives BH-FDR at K_family=6,
    survives T0 + T6 + per-year + DST-balanced subgroup checks. OOS verdict labeled
    CONDITIONAL_OOS_UNDERPOWERED if OOS power tier < CAN_REFUTE (NOT killed; deferred
    per RULE 3.3).
  park_if: >-
    Cells clear strict IS gates but OOS directional corroboration is ambiguous AND
    OOS power tier == STATISTICALLY_USELESS (same class as 4b's 6 held-back O30 cells).
    PARK as CONDITIONAL_OOS_UNDERPOWERED; do NOT promote to allocator review until OOS
    matures or until a Harvey-Liu Sharpe haircut framing (separate pre-reg, FRAMING 3
    enumerated by 4b) is built and applied.
  kill_if: >-
    All 6 cells fail strict t_overlay or ExpR_overlay_uplift or ExpR_overlay_IS gates,
    OR execution integrity fails (banned look-ahead column, holiday contamination,
    non-canonical data source, IS-quantile look-ahead), OR every cell with any IS signal
    is killed at OOS sign-flip when OOS power tier == CAN_REFUTE.

methodology_rules_applied:
  - rule: "RULE 1 feature temporal alignment"
    application: "Source feature `orb_NYSE_PREOPEN_size_above_IS_median` derived from orb_NYSE_PREOPEN_size, knowable at 09:30 ET (NYSE_PREOPEN O30 close). Target ORB-decision moments are 09:35 ET (NYSE_OPEN O5 + CB1) and 10:05 ET (US_DATA_1000 O5 + CB1), both STRICTLY AFTER source feature fixed. No look-ahead. Canonical implementation: research/comprehensive_deployed_lane_scan.py::_valid_session_features() to be imported, not re-derived."
  - rule: "RULE 1.2 window-derived feature gates"
    application: "NYSE_PREOPEN ORB is itself a window-derived feature for US-cash hours. Per backtesting-methodology RULE 1.2 valid-domain table, US-cash session features are valid for ORB sessions starting at or after 02:00 Brisbane (NYSE_OPEN and later). NYSE_OPEN (09:30 ET) and US_DATA_1000 (10:00 ET) both qualify. NYSE_PREOPEN starts at 09:00 ET (BEFORE 02:00 Brisbane equivalent), but is the SOURCE not the target — overlay direction is source -> target, and the valid-domain check applies to the target ORB consuming the source feature."
  - rule: "RULE 2 filter application timing"
    application: "Two-pass testing per canonical research/comprehensive_deployed_lane_scan.py::test_cell(pass_type): (a) unfiltered baseline on target lane full universe; (b) overlay-filtered subset where NYSE_PREOPEN size > IS-median. Overlay fires at NYSE_PREOPEN O30 close (09:30 ET), target trade decision happens at target ORB end + CB1. Filtered subset is what the lane WOULD trade with the overlay deployed."
  - rule: "RULE 3 sacred holdout"
    application: "IS and OOS partitioned by HOLDOUT_SACRED_FROM = 2026-01-01 only. Mode A. Quantile threshold (IS-only median) computed BEFORE OOS rows are touched and frozen."
  - rule: "RULE 3.3 OOS power floor"
    application: "research.oos_power.one_sample_power(d, N_OOS) computed before any binary OOS kill. cohen_d = |t_IS_overlay| / sqrt(N_overlay_IS). dir_match cannot kill underpowered OOS. Binary sign-flip kill admissible only at CAN_REFUTE tier. Expected: at least 1-3 cells land CONDITIONAL_OOS_UNDERPOWERED, declared up front."
  - rule: "RULE 4 multiple testing"
    application: "K_family = 6 (this pre-reg's family). BH-FDR at q=0.05. K_lane = 3 (per target session). K_session = 3. Upstream 4b K=27 is PROVENANCE_ONLY, NOT summed for Bailey MinBTL purposes per per-discovery family rule; IS disclosed under upstream_discovery_provenance.k_effective_informational for deflated-Sharpe / Harvey-Liu haircut accounting downstream."
  - rule: "RULE 6 trade-time knowability"
    application: "Feature audit completed in scope.feature_definition.lookahead_check. Only orb_NYSE_PREOPEN_size is consumed; all banned columns (RULE 6.3 E2 break-bar family) explicitly excluded with K12 kill criterion."
  - rule: "RULE 7 tautology check"
    application: "T0 correlation computed on overlay_fire vs deployed_filter_fire on each target lane (NYSE_OPEN ORB_G5; US_DATA_1000 VWAP_MID_ALIGNED, the latter at O15 not O5 but tested on the O5 universe as a sanity overlap). K6 kill at |corr| > 0.70."
  - rule: "RULE 8 fire-rate and ARITHMETIC_ONLY guards"
    application: "K8 fire-rate in [0.25, 0.75] (binary-median construction targets 0.5 absent strong correlation with target-lane subset selection). K7 WR_spread >= 3 percentage points or delta_payoff < 0 (cost-screen guard)."
  - rule: "RULE 9 canonical data source"
    application: "bars_1m, daily_features, orb_outcomes only. is_nyse_holiday from pipeline.calendar_filters (Stage 2). Filter delegation via research.filter_utils.filter_signal for any deployed-filter T0 fire-vector reference. No validated_setups / edge_families / live_config reads."
  - rule: "RULE 10 pre-registration before discovery"
    application: "This pre-reg file is the artifact. Promotion to docs/audit/hypotheses/ (out of drafts/) is gated on human review."
  - rule: "RULE 13 pressure-test"
    application: "Runner shall include a pressure-test that injects orb_NYSE_PREOPEN_break_dir as a sham feature and confirms it is rejected by K12 kill (not silently used). Pre-commit sanity."
  - rule: "Criterion 13 (BINDING) scratch policy"
    application: "scratch_policy: realized-eod."
  - rule: "Pathway A theory-citation specificity"
    application: "Theory grant intentionally false. Adjacent literature class citations (Fitschen, Chan, Harris, Chordia) live in `authority.primary` for reviewer reference. No hypothesis-level theory_citation field is present — this PRESERVES theory_grant=false at loader level per Amendment 3.3 and avoids the field-presence trap."

