  dst_resolver: "pipeline.dst.is_us_dst(trading_day)"
  source_edt_brisbane_start: "23:00 same-cal-day"
  source_est_brisbane_start: "00:00 next-cal-day"
  target_nyse_open_edt_brisbane_start: "23:30 same-cal-day"
  target_nyse_open_est_brisbane_start: "00:30 next-cal-day"
  target_us_data_1000_edt_brisbane_start: "00:00 next-cal-day"
  target_us_data_1000_est_brisbane_start: "01:00 next-cal-day"
  dst_split_reporting_required: true
  dst_imbalance_kill: "If N_EST_filtered < 30 OR N_EDT_filtered < 30 on any cell, verdict is UNVERIFIED_DST_IMBALANCE (NOT DEAD) per canonical DST-split rule. Stage 4b's 9 NFP-only cells were UNVERIFIED on N_EST=26 < 30 floor; the all-days cells here are EDT-heavy (EDT N ~1118 / EST N ~556 over 4b's 1674-row sample) and unlikely to thin out under above-IS-median filtering provided fire rate is >= 25%."
  orb_window_function: "pipeline.dst.orb_utc_window(trading_day, orb_label, orb_minutes) — single canonical source; never derive from break_delay_min, never fall back to break_ts"

feature_definition:
  feature_name: "orb_NYSE_PREOPEN_size_above_IS_median"
  column_source: "derived; computed at runtime from daily_features.orb_NYSE_PREOPEN_size"
  canonical_source_of_truth: "daily_features.orb_NYSE_PREOPEN_size (materialised Stage 3B commit 6aed3f72 over 2019-05-06..2026-05-22)"
  trade_time_knowable: true
  first_complete_time: "09:30 ET = NYSE_PREOPEN O30 ORB close; NYSE_OPEN ORB starts at 09:30 ET (sequential abutment); US_DATA_1000 ORB starts at 10:00 ET (30min gap)"
  temporal_alignment_note: |
    Source ORB size is computed at NYSE_PREOPEN O30 close (09:30 ET). Target lane
    ORB-decision moments are:
      - NYSE_OPEN E2 CB1 O5: 09:35 ET (5min after ORB start at 09:30 ET, plus CB1 confirm)
      - US_DATA_1000 E2 CB1 O5: 10:05 ET (5min after ORB start at 10:00 ET, plus CB1 confirm)
    Both target decisions are STRICTLY AFTER source feature is fixed. No look-ahead.
    Median threshold is computed on IS-only sample (trading_day < 2026-01-01) and frozen
    before any OOS row is evaluated, per writer prompt § QUANTILE LOOK-AHEAD CHECK.
  lookahead_check: |
    Verified column-by-column:
      - orb_NYSE_PREOPEN_size: SAFE (ORB end primitive; no break detection involved)
      - orb_NYSE_PREOPEN_break_dir: BANNED (RULE 6.3 E2 break-bar family; break-detection
        window overlaps NYSE_OPEN ORB)
      - orb_NYSE_PREOPEN_break_ts / _break_delay_min / _break_bar_*: BANNED (same)
      - orb_NYSE_PREOPEN_double_break / _mae_r / _mfe_r / _outcome: BANNED (RULE 1.1
        hard-coded look-ahead family)
      - orb_NYSE_PREOPEN_pre_velocity: SAFE (pre-ORB window)
      - orb_NYSE_PREOPEN_vwap: SAFE (computed pre-ORB)
      - orb_NYSE_PREOPEN_high / _low: SAFE (ORB end primitives)
      - orb_NYSE_PREOPEN_volume: SAFE (ORB end primitive)
    This pre-reg uses ONLY orb_NYSE_PREOPEN_size.

calibration:
  quantile_source: "IS-only sample of orb_NYSE_PREOPEN_size where trading_day < HOLDOUT_SACRED_FROM AND NOT is_nyse_holiday(trading_day) AND target session has a valid ORB on the same trading_day"
  threshold_source: "median of the IS-only sample, computed once at calibration time, frozen for IS and OOS evaluation"
  lock_policy: "Median value is committed in the runner emission MD before per-cell evaluation. Re-computing the median on full IS+OOS sample is a look-ahead violation per RULE 1 and the writer prompt § QUANTILE LOOK-AHEAD CHECK."

