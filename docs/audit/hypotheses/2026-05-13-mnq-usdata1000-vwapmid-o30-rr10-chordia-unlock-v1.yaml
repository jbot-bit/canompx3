hypotheses:
  # NOTE: theory_citation is INTENTIONALLY OMITTED on every hypothesis.
  # See metadata.notes above and grounding.filter_grounding_status.basis
  # for the field-presence-trap rationale.
  - id: 1
    name: "MNQ US_DATA_1000 O30 RR1.0 VWAP_MID_ALIGNED exact-lane strict unlock"
    economic_basis: >
      This is a bounded exact-lane replay of the rank-3 audit-queue candidate
      and a sibling-aperture variant (O30) of the 2026-05-02 PASS_CHORDIA
      O15 RR1.0 unlock on the same instrument/session/filter. The honest
      question is whether the complete configured lane clears the strict
      no-theory Chordia hurdle under canonical Mode A replay at the wider
      30-minute aperture. The filter class receives no theory grant here.
      Portfolio-EV motivation: O30 may add aperture-diversified geometry
      to the already-PASSED O15 RR1.0 sibling within the same filter
      family at the same session.
    role:
      kind: "standalone"
      parent: "Exact MNQ_US_DATA_1000_E2_RR1.0_CB1_VWAP_MID_ALIGNED_O30 canonical lane replay on orb_outcomes x daily_features."
      comparator: "Replay-selected trades versus the strict Chordia threshold and descriptive OOS sign monitor; no sibling rescue or parameter variation."
      primary_metric: "selected_trade_mean_r"
      promotion_target: "chordia_audit_unlock_only"
    filter:
      type: "VWAP_MID_ALIGNED"
      column: "orb_US_DATA_1000_vwap, orb_US_DATA_1000_break_dir"
      thresholds:
        - "fire_vs_off"
    scope:
      instruments: [MNQ]
      sessions: [US_DATA_1000]
      rr_targets: [1.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
      orb_minutes: [30]
    expected_trial_count: 1
    kill_criteria:
      - "IS t-stat < 3.79"
      - "IS ExpR <= 0.0"
      - "N_IS_on < 100"
      # OOS is NOT a kill axis for the unlock verdict — see data_policy.oos_role above.
      # Criterion 8 OOS deployment gates (positive OOS ExpR, OOS Sharpe >= 0.40 * IS Sharpe)
      # apply ONLY to a downstream deployment pre-reg authored after PASS_CHORDIA, not here.
      - "Canonical filter delegation diverges from trading_app.config"
      - "Scratch/null handling is not explicit in the measured trade stream"
    statement: >
      On the fixed MNQ US_DATA_1000 O30 E2 CB1 RR1.0 lane using the canonical
      VWAP_MID_ALIGNED filter, the IS sample remains positive and strong enough
      to clear the strict no-theory Chordia severity gate when recomputed
      honestly on canonical Mode-A data with adversarial split reporting.
    pass_metric:
      metric: "t_IS"
      formula: "compute_chordia_t(sharpe_IS, N_IS) on canonical IS fired trades after canonical filter delegation"
      threshold_gte:
        t_is: 3.79
        n_is_on: 100
        expr_is: 0.0
      extra_gates:
        - "OOS dir_match reported descriptively only; NOT a refutation axis at audit-time. Binary OOS refutation requires CAN_REFUTE tier (power >= 0.80) per RULE 3.3; measured power = 0.1732 (tier STATISTICALLY_USELESS, n_oos = 46). Pre-committed OOS verdict: UNVERIFIED_INSUFFICIENT_POWER. See data_policy.oos_role + oos_power_floor below."
        - "adversarial split table emitted; no hidden subgroup collapse"
        - "scratch-inclusive accounting required if scratch rows exist"
    counted_against_trial_budget: true

oos_power_floor:
  required_tier_for_kill: "CAN_REFUTE (power >= 0.80)"
  measured_power_at_audit_time: 0.1732
  measured_n_oos: 46
  measured_tier: "STATISTICALLY_USELESS"
  source: "research.oos_power.oos_ttest_power"
  rule: |
    Per backtesting-methodology.md RULE 3.3, with OOS power 0.1732 the
    binary OOS gate (dir_match, sign-flip, p_oos) cannot kill or confirm
    the IS signal. The pre-committed OOS verdict default is
    UNVERIFIED_INSUFFICIENT_POWER. Capital decision in this pre-reg rests
    on IS gates ONLY. Path to OOS power crossing 0.50 is more trading
    days (passive), not more analysis.

