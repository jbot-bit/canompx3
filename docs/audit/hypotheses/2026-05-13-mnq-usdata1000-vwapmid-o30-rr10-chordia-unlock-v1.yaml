  name: "mnq_usdata1000_vwapmid_o30_rr10_chordia_unlock_v1"
  purpose: "Bounded exact-lane Chordia unlock audit for MNQ US_DATA_1000 O30 RR1.0 VWAP_MID_ALIGNED. No theory grant is claimed."
  date_locked: "2026-05-13T10:00:00+10:00"
  holdout_date: "2026-01-01"
  total_expected_trials: 1
  testing_mode: "family"
  research_question_type: "conditional_role"

