    - "Criterion 4 strict threshold t >= 3.79 applies."
    - "Mode A holdout remains sacred from 2026-01-01."
    - "Sibling of the just-passed O15 RR1.0 audit (2026-05-02). Differs only in orb_minutes."

scope:
  instrument: MNQ
  strategy_id: "MNQ_US_DATA_1000_E2_RR1.0_CB1_VWAP_MID_ALIGNED_O30"
  session: US_DATA_1000
  orb_minutes: 30
  entry_model: E2
  confirm_bars: 1
  rr_target: 1.0
  direction: pooled
  filter_type: VWAP_MID_ALIGNED
  filter_source: "trading_app.config.ALL_FILTERS['VWAP_MID_ALIGNED']"
  baseline: "same geometry, exact canonical lane replay"
  out_of_scope:
    - "RR1.5 sibling strategy (separate audit required)"
    - "RR2.0 sibling strategy"
    - "VWAP_BP_ALIGNED or any other VWAP variant"
    - "theory-grant attempt for VWAP_MID_ALIGNED"
    - "cross-instrument mirrors (MES, MGC)"
    - "confluence overlays of any kind"
    - "allocator, sizing, or deployment changes"
    - "writes to validated_setups before execution evidence exists"

data_policy:
  oos_role: "descriptive_for_chordia_unlock; binding_only_for_later_deployment_eligibility"
  oos_role_rationale: >
    OOS in THIS pre-reg is descriptive only — the unlock verdict (PASS_CHORDIA / FAIL_CHORDIA)
    is decided on IS gates alone. Criterion 8 OOS deployment gates (positive OOS ExpR,
    OOS Sharpe >= 0.40 * IS Sharpe) are binding ONLY for a separate downstream
    deployment pre-reg authored after PASS_CHORDIA — not here. This resolves the
    prior template's three-way OOS contradiction (descriptive vs kill-at-0.50 vs
    refute-at-0.80) per user review 2026-05-13.
  is_window:
    description: "trading_day < HOLDOUT_SACRED_FROM"
    constant_source: "trading_app.holdout_policy.HOLDOUT_SACRED_FROM"
    locked_boundary: "2026-01-01"
  oos_window:
    description: "trading_day >= HOLDOUT_SACRED_FROM"
    policy: "read-only descriptive corroboration only; never used to rescue or kill the IS verdict."
  cohort_lower_bound:
    description: "trading_day >= WF_START_OVERRIDE['MNQ']"
    constant_source: "trading_app.config.WF_START_OVERRIDE"
    locked_boundary: "2020-01-01"
    rationale: "Match canonical promoter cohort (strategy_discovery._load_outcomes_bulk). Without this, audit fires on pre-2020 micro-launch trades the promoter excludes."
  tuning_against_oos: false
  canonical_layers_only: true
  scratch_policy: "realized-eod"
  scratch_policy_justification: "Capital-decision-relevant; C13 BINDING per pre_registered_criteria.md and feedback_chordia_unlock_deployment_gate_audit_checklist.md."

feature_definition:
  feature_name: VWAP_MID_ALIGNED
  canonical_source_of_truth: "trading_app.config.VWAPBreakDirectionFilter"
  delegation_wrapper: "research.filter_utils.filter_signal(df, 'VWAP_MID_ALIGNED', 'US_DATA_1000')"
  trade_time_knowable: true
  first_complete_time: "ORB end (O30)"
  temporal_alignment_note: >
    Pre-session VWAP plus ORB-level geometry are known by ORB close, so the
    filter is trade-time-knowable. This prereg does not claim the filter has
    a Pathway-B-quality theory basis.
  lookahead_check: "Required PASS before execution."

grounding:
  core_orb_premise:
    - source_file: "resources/Building_Reliable_Trading_Systems.pdf"
      extract_proxy: "docs/institutional/literature/fitschen_2013_path_of_least_resistance.md"
      use: "grounds intraday trend-follow / breakout continuation on equity-index class"
      with_theory_claim: false
    - source_file: "resources/Algorithmic_Trading_Chan.pdf"
      extract_proxy: "docs/institutional/literature/chan_2013_ch7_intraday_momentum.md"
      use: "grounds stop-cascade / intraday momentum base for ORB breakout entries"
      with_theory_claim: false
  filter_grounding_status:
    verdict: "NO_THEORY_GRANT"
    basis: >
      The 2026-05-02 O15 RR1.0 sibling pre-reg ran a feasibility scan that
      found no local resource-backed citation grounding VWAP-mid alignment
      as a causal mechanism for this lane. The 2026-05-12 audit-queue
      rank-3 recommendation (docs/audit/results/2026-05-12-chordia-audit-queue-top3-prereg-recommendation.md
      § Rank 3) explicitly elects no-theory strict-3.79 default. The
      theory_citation field is therefore OMITTED on the hypothesis per
      memory/feedback_chordia_theory_citation_field_presence_trap.md;
      any truthy theory_citation value would silently flip the runtime
      threshold to 3.00 via trading_app/hypothesis_loader.py:262-269.

upstream_discovery_provenance:
  role: "PROVENANCE_ONLY"
  sources:
    - "docs/audit/results/2026-05-12-chordia-audit-queue-top3-prereg-recommendation.md (Rank 3 of top-3)"
    - "docs/audit/results/2026-05-02-mnq-usdata1000-vwapmid-o15-rr10-chordia-unlock-v1.md (O15 sibling PASS_CHORDIA)"
  note: >
    The 2026-05-12 audit-queue MD identified this exact strategy as rank-3
    on chordia_t descending among AUDIT_GAP_ONLY survivors. Live recompute
    on validated_setups shows derived t = 4.230 (sharpe=0.1600, N=699 stored
    / N=952 Mode-A). The O15 sibling at the same instrument+session+filter
    +RR+CB passed Chordia strict on 2026-05-02 (t=4.266, N=806). Those
    statistics motivate this audit but are not the evidence for this
    pre-reg's verdict. Fresh execution against canonical layers is required.

