metadata:
  name: garch-a4c-routing-selectivity-allocator
  owner: claude-code
  created_at: 2026-04-17
  predecessor: garch-a4b-binding-budget-allocator
  predecessor_verdict: null_by_construction_and_harness_throughput_mis_metric
  design_doc: docs/plans/2026-04-17-garch-a4c-routing-selectivity-design.md
  audit_grounding: docs/audit/results/2026-04-17-allocator-scarcity-surface-audit.md
  holdout_date: 2026-01-01
  authority:
    - docs/institutional/pre_registered_criteria.md
    - docs/plans/2026-04-16-garch-institutional-attack-plan.md
    - docs/plans/2026-04-16-garch-a4b-binding-budget-design.md

edge_claim: >
  The locked A4b pre-entry garch composite, re-scored on a dimension-neutral
  routing/selectivity metric (R per filled slot-day), improves the canonical
  shelf allocator over a random-uniform null and a trailing-Sharpe comparator,
  on two independently binding scarcity surfaces (raw slots at budget 5,
  rho-survivor slots at budget 3). This is a routing/selectivity claim (R8
  allocator input), NOT a standalone garch edge claim, NOT a throughput claim,
  NOT a profile or deployment claim.

utility_definition:
  primary: r_per_filled_slot_day_IS
  primary_definition: >
    total_forward_R divided by total_filled_slot_days across all IS rebalance
    months and all selected lanes. "Filled slot-day" = one (selected_lane,
    forward_day) pair where the selected lane actually fired.
  secondary: selected_slot_sharpe_IS_annualized
  descriptive_only:
    - annualized_total_R_IS
    - integer_contract_DD_realized_IS
    - selection_churn_jaccard_IS
    - mean_slot_hit_rate_per_day_IS
    - per_month_r_per_fill_IS_time_series
    - r_per_filled_slot_day_2026_OOS
    - direction_match_2026_OOS
    - effect_ratio_2026_OOS

dimension_match_protocol:
  candidate_mechanism_class: routing_selectivity
  requirement: >
    All pass/fail metrics must be normalized by scarce-resource consumption
    (slot-days filled). A throughput metric (annualized total R) is structurally
    incompatible with a selectivity ranker because a more selective ranker fires
    fewer slots; A4b's predecessor failure demonstrated the arithmetic (baseline
    2.92 slots/day, candidate 2.29, positive control 2.06). R-per-fill is
    scale-free in slot count and firing frequency, so selectivity is neither
    rewarded nor punished on dimensional grounds.

comparator:
  canonical_allocator_file: trading_app/lane_allocator.py
  canonical_allocator_function: build_allocation
  rho_gate: 0.70
  rho_gate_constant: CORRELATION_REJECT_RHO
  hysteresis_pct: 0.20
  deploy_window_months: 12
  stop_multiplier: 0.75
  dd_budget_dollars: 2500.0
  dd_budget_profile_id_for_scalar_only: bulenox_50k
  baselines:
    primary_null:
      name: RANDOM_UNIFORM_UNDER_BINDING
      description: >
        Seeded deterministic random permutation of deployable lanes passed
        through build_allocation with correlation_matrix and max_dd gates
        identical to the candidate run. No ranking key.
      seed_rule: 20260417 + rebalance_date.toordinal()
    secondary_comparator:
      name: TRAILING_SHARPE
      description: >
        Ranking key = sharpe_ann_adj from _compute_scores (literature-grounded,
        pre-computed). Otherwise identical build_allocation mechanics.
  explicitly_not_used:
    - name: LIT_GROUNDED_EFFECTIVE_ANNUAL_R
      reason: A4b baseline that failed positive control; carries dimension-mismatch bug

candidate:
  identity: A4b_LOCKED_GARCH_COMPOSITE
  inherited_from: docs/audit/hypotheses/2026-04-17-garch-a4b-binding-budget.yaml
  score_formula: >
    locked_garch_composite(rebalance_date, lane) =
      w1 * trailing_expr_within_garch_high_state + w2 * _effective_annual_r
  weights:
    w1: 0.5
    w2: 0.5
  weights_note: >
    Inherited verbatim from A4b; NOT re-tuned. Stage 2 reserved below for
    pre-registered sensitivity check only if Stage 1 passes.
  garch_threshold_forecast_vol_pct: 70.0
  min_sample_n_garch_high: 20
  fallback_on_thin: exclude_lane_from_candidate_ranking_only
  rationale_for_reuse: >
    Re-running the identical A4b candidate on a corrected baseline and
    dimension-neutral metric is the cleanest experimental separation of
    "candidate was bad" from "A4b harness was mis-metric'd". Any outcome
    is informative. A new candidate would conflate the two sources of failure.

scarcity_surfaces:
  both_tested: true
  surface_A:
    role: primary
    name: RAW_SLOTS
    max_slots: 5
    supply_definition: >
      Count of deployable lanes at rebalance_date with status in
      (DEPLOY, RESUME, PROVISIONAL).
    bind_pass_ratio_audit: 0.944
    bind_pass_at_audit: true
  surface_B:
    role: challenger
    name: RHO_SURVIVOR_SLOTS
    max_slots: 3
    supply_definition: >
      Count of lanes surviving greedy rho < 0.70 prune via build_allocation
      with max_slots=100 and max_dd=1e12 to isolate the rho gate.
    bind_pass_ratio_audit: 0.931
    bind_pass_at_audit: true
  bind_pass_ratio_gate: 0.80
  dropped:
    - name: SURFACE_C_RISK_R_DOLLARS
      budget: 2500
      bind_ratio_audit: 0.167
      reason: Not salvageable without remeasurement as daily firing-overlap
    - name: SURFACE_D_CONTRACT_INTEGER
      reason: Demoted; identical to surface_A at 1-contract minimum

universe:
  shelf: validated_replayable_shelf
  sql_relation: trading_app.validated_shelf.deployable_validated_relation
  instruments:
    - MNQ
    - MES
    - MGC
  session_filter: none
  profile_filter: none

evaluation:
  rebalance_cadence: monthly
  rebalance_boundary: first_trading_day_of_each_calendar_month_UTC
  rebalance_dates_IS:
    start: 2020-01-01
    end: 2025-12-31
    expected_count: 72
  rebalance_dates_OOS_descriptive:
    start: 2026-01-01
    end: current
  forward_window: from_rebalance_date_inclusive_to_next_rebalance_date_exclusive
  look_ahead_rule: all scoring uses trading_day < rebalance_date (strict)
  per_rebalance_output:
    - selected_lanes_primary_null
    - selected_lanes_secondary_comparator
    - selected_lanes_candidate
    - selected_lanes_positive_control
    - filled_slot_days_per_ranker
    - total_R_per_ranker
    - daily_sharpe_per_ranker
  applied_per_surface: [A, B]

harness_sanity_gate:
  mandatory: true
  runs_before: candidate_evaluation
  positive_control:
    name: POSITIVE_CONTROL_TRAILING_EXPR
    description: Use trailing_expr directly as ranking key in build_allocation.
  required_outcome_per_surface: >
    r_per_filled_slot_day_positive_control
      >= r_per_filled_slot_day_primary_null + min_lift_per_fill
  abort_semantics: >
    If positive control fails on EITHER surface, harness does not discriminate;
    candidate math is not interpretable. Do NOT rescue, re-run, or tune.
    Return to framing; reconsider the primary rule. A4c cannot proceed.

pass_fail:
  primary_pass_rule_per_surface: >
    r_per_filled_slot_day_candidate
      >= r_per_filled_slot_day_primary_null + min_lift_per_fill
    AND selected_slot_sharpe_candidate
      >= selected_slot_sharpe_secondary_comparator + min_sharpe_lift
    AND dd_ratio_candidate_over_primary_null <= max_dd_inflation
    AND selection_churn_candidate <= selection_churn_cap
  min_lift_per_fill: 0.01
  min_sharpe_lift: 0.05
  max_dd_inflation: 1.20
  selection_churn_cap: 0.50
  dual_surface_verdict_matrix:
    strong_pass:
      description: Pass on A AND pass on B
      interpretation: Routing edge on raw supply AND operative mechanic
    standard_pass:
      description: Pass on A, fail on B
      interpretation: Raw-supply edge; no rho-structure lift
    structural_pass:
      description: Fail on A, pass on B
      interpretation: Operative-mechanic edge; investigate why A fails
    null_verdict:
      description: Fail on A AND fail on B
      interpretation: No rescue; do not tune
    abort:
      description: Positive control fails on A or B
      interpretation: Harness bug; not a candidate verdict
  controls:
    destruction_shuffle:
      description: >
        Shuffle garch_forecast_vol_pct across days within instrument; rerun
        candidate ranking. Shuffled version MUST fail primary_pass_rule on
        BOTH surfaces.
      kill_if: shuffled_passes_primary_on_either_surface
    positive_control_secondary:
      description: >
        If Stage 1 passes, positive control is additionally reported as a
        reference point on surfaces where candidate passes.

oos_treatment:
  rule: descriptive_only
  holdout_boundary: 2026-01-01
  holdout_policy_source: docs/institutional/pre_registered_criteria.md (v2.7)
  usage: >
    After IS evaluation completes and verdict is locked, compute OOS R-per-fill
    and selected-slot Sharpe per surface per ranker. OOS may falsify an IS pass
    (kill criteria below) but MAY NOT rescue an IS fail.
  direction_match_required: true
  oos_effect_ratio_required_per_surface: ">= 0.40 of IS effect on R-per-fill"

kill_criteria:
  - binding_check fails on surface A or surface B (NULL_BY_CONSTRUCTION per-surface)
  - harness_sanity_gate aborts (positive control fails on A or B)
  - destruction_shuffle passes primary on either surface
  - selection_churn > selection_churn_cap
  - OOS direction flips from IS on either surface that passed IS
  - OOS effect_ratio < 0.40 on either surface that passed IS
  - any weight, threshold, budget, min_lift, or K tuned after first result seen

scope_hard_boundaries:
  - no_deployment_claim_from_this_test
  - no_profile_translation_inside_this_test
  - no_new_state_variables_beyond_garch_forecast_vol_pct
  - no_per_session_tuning
  - no_post_hoc_weight_search
  - no_ad_hoc_baseline_invention
  - no_revised_metric_after_results_seen
  - routing_claim_only_not_edge_claim

k_budget:
  total_trials: 1
  note: >
    Single locked composite (candidate) vs single locked primary null
    (random-uniform) AND single locked secondary (trailing-Sharpe), evaluated
    on two pre-declared surfaces. K = 1 at composite level, K = 2 at surface
    level. Well within MinBTL budget (Bailey et al 2013).

stage_1_outputs:
  - docs/audit/results/2026-04-17-garch-a4c-routing-selectivity-replay.md
  - research/output/garch_a4c_routing_selectivity_replay.json
  - research/garch_a4c_routing_selectivity_replay.py (committed before execution)

stage_2_reserved:
  trigger: Stage 1 verdict in {STRONG_PASS, STANDARD_PASS, STRUCTURAL_PASS}
  scope: >
    +/- 50% sensitivity on w1 and w2 (same candidate formula) on the surface(s)
    that passed Stage 1. Pre-declared axes: w1 in (0.25, 0.50, 0.75) with
    w2 = 1 - w1. Not a new hypothesis; pre-registered here so it cannot be
    invented as rescue.
