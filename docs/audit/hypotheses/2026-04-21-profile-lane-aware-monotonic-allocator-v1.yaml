score_construction:
  lane_fit_scope: independent fit per deployed lane
  training_data: trades with trading_day < 2025-01-01 only
  feature_transform: >
    Convert each continuous feature into an in-sample empirical-CDF score on
    [0, 1]. For `high_better`, score = CDF(x). For `low_better`, score = 1 - CDF(x).
  composite_score: >
    Simple arithmetic mean of the transformed feature scores for that lane. No
    learned model weights and no tree-based interaction learner in v1.
  monotonic_buckets: >
    Fit composite-score quintile cutpoints on in-sample data only. Map the five
    ordered buckets to desired size multipliers `[0.5, 0.75, 1.0, 1.25, 1.5]`.
  capital_neutrality: >
    Re-center the desired multipliers so the in-sample mean desired weight is
    exactly 1.0 before any out-of-sample replay.
  live_translation: >
    Translate desired weight into live-feasible contracts for a 1-contract base:
    weight < 0.75 -> 0 contracts; 0.75 <= weight < 1.50 -> 1 contract;
    weight >= 1.50 -> 2 contracts.

replay_plan:
  primary_comparator: static 1-contract baseline book
  oos_cv_year: 2025
  sacred_forward_years:
    - 2026+
  required_outputs:
    - daily portfolio pnl dollars
    - total pnl dollars
    - annualized Sharpe
    - max drawdown dollars
    - Calmar ratio
    - percentage of trades with translated size change
    - zero-contract skip rate
    - two-contract boost rate

success_condition: >
  The overlay survives only if the 2025 replay beats the static baseline on the
  profile-level economic objective hierarchy: higher annualized Sharpe and no
  material worsening of max drawdown, with total dollars not lower.

kill_condition: >
  Kill immediately if the 2025 replay fails to beat the static baseline, if the
  gains depend on banned features or guard-unsafe fields, or if the effect
  disappears after live contract translation.

stops_before_execution:
  - Pre-registration file committed and SHA recorded.
  - Exact lane feature contract reviewed by user.
  - No replay execution before explicit user nod.
