date: 2026-04-21
title: Profile lane-aware monotonic allocator replay
status: active
testing_mode: individual
purpose: >
  Test whether a lane-aware, monotonic, pre-trade-safe sizing overlay can
  improve the 2025 out-of-sample economic performance of the deployed
  `topstep_50k_mnq_auto` book versus the static 1x baseline, using the live-like
  replay path in `trading_app/account_survival.py`.

authority_chain:
  - CLAUDE.md
  - RESEARCH_RULES.md
  - TRADING_RULES.md
  - docs/institutional/pre_registered_criteria.md
  - trading_app/account_survival.py
  - pipeline/session_guard.py
  - trading_app/meta_labeling/monotonic.py

profile:
  profile_id: topstep_50k_mnq_auto
  canonical_surface: trading_app/account_survival.py
  account_size: 50000
  stop_multiplier: 0.75
  copies: 2
  lane_count: 6

evaluation_windows:
  train_is_end_exclusive: 2025-01-01
  oos_cv_start: 2025-01-01
  oos_cv_end_inclusive: 2025-12-31
  sacred_holdout_start: 2026-01-01

baseline_hurdle:
  description: >
    The hurdle is the realized economic performance of the static 1-contract
    deployed book replayed through `account_survival.py` with profile stop and
    firm rules intact. No proxy baseline and no portfolio.py-only shortcut.
  pre_2025_reference:
    total_pnl_dollars: 28364.33
    annualized_sharpe: 1.6029
    max_drawdown_dollars: -3534.68
    calmar: 1.0005
    max_pairwise_corr_abs: 0.0769

research_posture:
  prior_allocator_findings:
    - 2026-04-16 garch continuous sizing replay failed to beat BASE_1X economically.
    - 2026-04-16 routing-only portfolio ranking replay was identical to baseline due zero collision days.
  v1_hypothesis: >
    A gentle, lane-aware monotonic overlay using only session-guard-safe and
    ORB-completion-known features may improve allocation around an already-good
    book, even though global garch sizing and scarce-slot routing did not.
  no_rescue_claim: >
    This is not a rescue model for a broken profile. Failure means static sizing
    remains optimal for this book.

feature_safety_contract:
  rules:
    - "Every feature must explicitly pass pipeline/session_guard.py for the target lane session."
    - "Every feature must also be knowable at ORB completion or earlier."
    - "Same-session break-bar, break-delay, continuation, and post-break outcome fields are banned."
    - "rel_vol_* and orb_*_break_bar_volume are banned for E2 pre-entry sizing."
    - "overnight_* and other window features are excluded unless explicitly guard-safe for the lane."
  explicit_v1_exclusions:
    - is_nfp_day
    - is_opex_day
    - is_monday
    - is_tuesday
    - is_friday
    - day_of_week
  exclusion_rationale: >
    Repo research treats calendar flags as trade-time-known, but the current
    `session_guard.py` implementation does not explicitly whitelist them. Under
    the fail-closed v1 rule, they are excluded rather than assumed safe.

