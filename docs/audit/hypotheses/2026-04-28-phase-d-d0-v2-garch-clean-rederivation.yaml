primary_schema:
  name: "discrete_garch_pct_size_scaling_v1"
  locked_before_backtest: true
  buckets:
    low_lt_p33: 0.5
    mid_p33_to_p67: 1.0
    high_ge_p67: 1.5
  bucket_assignment_rule:
    spec: "size = 0.5 if x < P33 ; size = 1.0 if P33 <= x < P67 ; size = 1.5 if x >= P67"
    tie_handling: "ties at P33 boundary go to MID (>= P33). Ties at P67 boundary go to HIGH (>= P67). Both inequalities are inclusive on the upper-bucket side."
    rationale: >
      Without explicit tie handling, multiple rows at exactly P33 or P67
      could be assigned ambiguously across runs (sort-order dependent).
      Pinning ties to the upper bucket is deterministic and matches the
      `>=` convention used throughout the project (e.g., OVNRNG_100
      filter `min_range=100.0` is `>= 100.0`).
  bucket_direction_choice:
    direction: "high garch_forecast_vol_pct → larger size (1.5x); low → smaller (0.5x)"
    rationale: >
      Preserves the predecessor's MOMENTUM-CONTINUATION direction so the
      v2 test isolates the predictor swap, not a direction reversal.
      The predecessor hypothesis is "high vol-regime → continuation
      conviction → upsize." This v2 tests whether that mechanism survives
      when the regime indicator is pre-break (garch forecast) rather than
      contaminated post-break (rel_vol = break_bar_volume / median).
    direction_NOT_aligned_with_carver: >
      Carver Ch 9 vol-targeting prescribes the OPPOSITE direction (high
      forecast vol → smaller position to keep cash vol target constant).
      This v2 is NOT a Carver vol-targeting test. It is a falsification
      test of the regime-amplification thesis embedded in the predecessor.
      The Carver-direction test is a separate hypothesis not in scope here.
  execution_rule: "Size applied at entry, never retroactively."
  mechanism_grounding:
    - source: "Carver 2015 Ch 10 (Position Sizing framework — Position = forecast/10 × cash_vol_target / (Price × Instrument_vol × ...))"
      role: "FRAMEWORK_ONLY — grounds the principle of vol-regime-conditional position sizing. Direction in this v2 is opposite Carver's own prescription; v2 tests amplification not dampening."
    - source: "Predecessor pre-reg 2026-04-18 d0 H1 (rel_vol regime-amplification hypothesis, KILL verdict df05b861)"
      role: "PROVENANCE — defines the hypothesis being clean-tested here. v2 is the falsification version of the same mechanism with a clean proxy."

