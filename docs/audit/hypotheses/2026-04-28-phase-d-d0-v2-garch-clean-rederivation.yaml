execution_gate:
  allowed_now:
    - "write this file"
    - "commit this file (fills commit_sha)"
    - "amend (next commit) to fill commit_sha placeholder with the SHA of the writing commit"
  forbidden_now:
    - "run backtest before commit_sha is stamped"
    - "edit thresholds / buckets / kill criteria after first result"
    - "use OOS to rescue or reject the schema"
    - "promote H2 to primary"
    - "stack additional predictors (Carver Ch 8 forecast combination is NOT in scope here — that is a separate pre-reg)"
    - "reverse bucket direction (low → 1.5x, high → 0.5x as a Carver vol-targeting test) is a SEPARATE pre-reg, not a v2 follow-up. Running it after v2 fails would be K=2-disguised-as-K=1 data snooping."
    - "swap baseline to anything other than constant_1.0x_size — baseline is the K=1 anchor"

downstream_dependencies:
  d1_v2_gate:
    - "D-0 v2 H1 PASS (sharpe_uplift_pct >= 15% AND raw_p < 0.05)"
    - "K2 + K3 all PASS"
  note: >
    D-0 v2 is IS-only and does not require live-lane health (L3 C12 etc.).
    D-1 v2 (signal-only shadow on live lane with garch-based sizing)
    requires its own pre-reg if D-0 v2 passes. The 2026-05-15 hard
    deadline applies to D-0 v2 landing IF D-1 the original (rel_vol
    shadow) is going to consume the gate eval. If D-0 v2 KILLS, the
    2026-05-15 gate eval has no clean basis and the daily shadow
    accumulation should be parked rather than promoted.

