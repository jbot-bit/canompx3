    application: >
      D-0 v2 must measure both Sharpe AND win-rate effect. If WR flat
      (<3% spread) AND only payoff changes, classify as ARITHMETIC_ONLY
      per § 8.2 and reclassify as cost-screen not edge. Not a default
      kill (size-scaling can legitimately move payoff without WR by
      design), but must be reported and labeled.
  - rule: "RULE 10 pre-registration"
    application: "This file is the v2 pre-registration. Commit before run; predecessor remains canonical for v1 scope."
  - rule: "Pre-reg writer prompt § QUANTILE LOOK-AHEAD CHECK"
    application: "P33/P67 derived from IS-only population; explicitly declared in calibration.quantile_lookhead_check."
  - rule: "Pre-reg writer prompt § FORBIDDEN scratch_policy"
    application: "Top-level scratch_policy: realized-eod declared with literature justification."

