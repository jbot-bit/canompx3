hypotheses:
  - id: H1
    type: primary
    theory_citation: >
      Carver 2015 Ch 10 (vol-regime-conditional position sizing as a principle;
      `docs/institutional/literature/carver_2015_volatility_targeting_position_sizing.md`)
      + predecessor 2026-04-18 D-0 H1 as the falsifiable mechanism statement.
      v2 direction explicitly opposite to Carver vol-targeting; v2 IS a
      falsification test of regime-amplification, not a confirmation of
      Carver dampening.
    statement: >
      Applying the locked 0.5x / 1.0x / 1.5x garch_forecast_vol_pct
      size-scaling schema (low<P33 / mid / high>=P67) to the
      MNQ_COMEX_SETTLE_E2_RR1.5_CB1_OVNRNG_100 lane improves IS Sharpe by
      at least 15% versus the same lane at constant 1.0x sizing over the
      identical IS date range and trade set. P33 and P67 are the 33rd and
      67th percentiles of garch_forecast_vol_pct on the IS-only OVNRNG_100
      firing population.
    pass_metric:
      metric: "sharpe_uplift_pct"
      formula: "100 * (sharpe_sized - sharpe_baseline) / abs(sharpe_baseline)"
      threshold_gte: 15.0
      absolute_sharpe_floor:
        formula: "(sharpe_sized - sharpe_baseline)"
        threshold_gte: 0.05
        rationale: >
          The relative-uplift formula degenerates near sharpe_baseline ≈ 0
          (e.g., baseline 0.05 → sized 0.06 = +20% uplift but economically
          meaningless). v2 requires BOTH the relative gate (>=15%) AND the
          absolute Sharpe-difference gate (>=0.05). Either failing => H1 fails.
    sharpe_definition:
      formula: "mean(R) / std(R) where R is the per-trade pnl_r series"
      annualization: false
      risk_free_rate: 0.0
      rationale: "Per-trade-R Sharpe matches predecessor convention (research/phase_d_d0_backtest.py SharpeStats.from_rs at line ~78). Avoids annualization-factor drift across implementations."
    pathway_b_floor:
      raw_p_threshold: 0.05
      raw_p_method:
        method: "independent paired bootstrap on per-trade (baseline_R, sized_R) pairs"
        block_size: null
        block_size_rationale: >
          Per-trade pairs are not autocorrelated by construction (each trade
          is independent). Block size is for time-series; not applicable here.
          If a downstream calendar-day-clustering audit reveals serial
          correlation in pnl_r within consecutive trading days on this lane,
          re-run with day-block bootstrap and document in result doc — but
          the pre-registered method is the simpler independent paired
          bootstrap.
        B: 10000
        statistic: "(sharpe_sized - sharpe_baseline) on the resampled pairs"
      note: "Pathway B raw p<0.05 is the significance floor; the 15% relative + 0.05 absolute effect-size thresholds are the operative pass gates. ALL THREE gates (raw_p, relative, absolute) required for H1 PASS."
    counted_against_trial_budget: true

  - id: H2
    type: secondary_descriptive_only
    statement: >
      Hard-skip of low_lt_p33 bucket (size=0) is recorded as an ablation
      for downstream D-1 v2 informational use. H2 cannot replace H1 post-hoc.
    ablation:
      low_q1_size_override: 0.0
      mid_bucket: 1.0
      high_bucket: 1.5
    selection_rule: "descriptive_only; not primary selector; not counted against trial budget"
    counted_against_trial_budget: false

baseline:
  name: "constant_1.0x_size"
  comparison_sample: "identical IS date range and lane definition as sized variant"
  assertion: "Baseline and sized variants must operate on the exact same trade set; only size differs."
  baseline_recompute_required: true
  baseline_recompute_note: >
    Baseline Sharpe MUST be recomputed from canonical orb_outcomes JOIN
    daily_features under the realized-eod scratch policy declared above.
    Do NOT cite predecessor's baseline value — predecessor used a
    different scratch policy (pre-Stage-5 outcome_builder).

trial_budget:
  primary_selection_trials: 1
  schema_locked_before_any_metric: true
  minbtl_bound:
    formula: "2 * ln(N_trials) / E[max_N]^2"
    N_trials: 1
    within_cap: true
    cap_reference: "docs/institutional/pre_registered_criteria.md Criterion 2 (N <= 300)"
    note: "1 lane × 1 primary schema × 1 predictor = 1 primary trial. H2 descriptive-only per § hypotheses.H2."

kill_criteria:
  - id: K1
    metric: "sharpe_uplift_pct"
    threshold_lt: 10.0
    action: "ABANDON_PHASE_D_D0_V2_ON_THIS_LANE"
    rationale: "<10% uplift = clean predictor does not rescue the regime-amplification thesis on this lane. Combined with predecessor KILL, the size-scaling story is closed for MNQ COMEX_SETTLE OVNRNG_100 E2 RR1.5."
  - id: K2
    metric: "implementation_integrity"
    fail_if:
      - "P33 or P67 calibrated using any trading_day >= HOLDOUT_SACRED_FROM"
      - "bucket boundaries changed after first Sharpe calculation"
      - "size applied retrospectively (any calculation that uses realized outcome to influence size)"
      - "OOS data consulted during D-0 v2 (read or written)"
      - "feature column garch_forecast_vol_pct sourced from anywhere other than canonical daily_features"
      - "any trade row included where garch_forecast_vol_pct IS NULL"
      - "scratch policy diverges from declared 'realized-eod'"
      - "trade count differs between baseline and sized variants (only size should differ)"
    action: "HALT_AND_RE_AUDIT"
  - id: K3
    metric: "feature_temporal_integrity"
    fail_if:
      - "any included trade has feature_input_close_ts >= entry_ts (would imply post-entry feature input)"
    action: "HALT_AND_RE_AUDIT — temporal contamination defeats the entire purpose of v2"
    note: "K3 retained slim post pre_run_correction_2026_04_28: 'garch percentile threshold computed on window including OOS' folded into K2 'P33/P67 calibrated using any trading_day >= HOLDOUT_SACRED_FROM' (semantic duplicate). Only the genuinely-novel temporal-input check stays in K3."

decision_rule:
  continue_to_d1_v2_if:
    - "H1 sharpe_uplift_pct >= 15.0"
    - "H1 absolute_sharpe_floor (sharpe_sized - sharpe_baseline) >= 0.05"
    - "H1 raw_p < 0.05"
    - "K2 implementation_integrity all PASS"
    - "K3 feature_temporal_integrity all PASS"
  park_if:
    - "10.0 <= H1 sharpe_uplift_pct < 15.0 (and absolute floor met and raw_p < 0.05 and K2/K3 PASS)"
    - "H1 sharpe_uplift_pct >= 15.0 BUT raw_p >= 0.05 (relative effect present but underpowered)"
    - "H1 sharpe_uplift_pct >= 15.0 BUT absolute_sharpe_floor < 0.05 (relative gate met on tiny baseline — economically degenerate)"
  kill_if:
    - "H1 sharpe_uplift_pct < 10.0"
    - "K2 fails any item"
    - "K3 fails any item"

