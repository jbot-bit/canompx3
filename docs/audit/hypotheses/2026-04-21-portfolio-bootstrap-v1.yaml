metadata:
  name: "Portfolio-level block-bootstrap on IS"
  purpose: |
    Replaces the CPCV path killed by H3 on 2026-04-21 (see postmortem at
    docs/audit/hypotheses/2026-04-21-cpcv-infrastructure-v1-postmortem.md).
    Measured per-lane IS pnl_r lag-1 autocorrelation is ρ ∈ [−0.03, +0.03]
    (effectively zero), so plain block-bootstrap with block size 1 is
    statistically valid and a full CPCV/embargo machine is not required.
    Generates a probabilistic OOS estimate by sampling the IS distribution
    of 74-trading-day-window portfolio performance and ranking the
    observed 2026 shadow within that distribution.
  date_locked: "2026-04-21T00:00:00+10:00"
  data_horizon_years_clean: 6.65  # MNQ pre-holdout per Amendment 2.8
  holdout_date: "2026-01-01"       # immovable
  total_expected_trials: 1         # K=1 — single bootstrap analysis
  data_source_mode: "clean"
  data_source_disclosure: "Real MNQ micro 2019-05-06 → 2025-12-31 from canonical orb_outcomes; 2026 shadow from paper_trades"

