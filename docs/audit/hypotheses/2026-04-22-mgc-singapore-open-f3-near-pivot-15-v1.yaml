  role: PROVENANCE_ONLY
  sources:
    - "docs/audit/results/2026-04-15-prior-day-features-orb-mega-exploration.md"
    - "docs/audit/results/2026-04-15-mgc-level-scan.md"
  upstream_scan_k_framings:
    mega_exploration: "exploratory K_global=6252; this prereg is not that scan"
    mgc_level_scan: "exploratory MGC-only K_global=1775; this prereg is not that scan"
  note: |
    The exploratory scans justified selecting this one MGC cell. The current
    test is a single Pathway-B confirmation path with no widening.

testing_discipline:
  pathway: B_individual
  k: 1
  significance_threshold:
    raw_p: 0.05
    chordia_t_abs: 3.0
    effect_floor_abs_r: 0.10
  mandatory_downstream_gates_non_waivable:
    - "Criterion 8 OOS direction match and OOS magnitude review when OOS N is sufficient"
    - "Criterion 9 no era-like IS year with persistent sign failure beyond the allowed threshold"
  theory_citation: |
    `docs/institutional/mechanism_priors.md` states that pivot is a defended
    value area. This path tests whether long breakouts near prior-day pivot are
    the avoid state on MGC SINGAPORE_OPEN, leaving the off-signal subset as the
    only potentially tradable remainder.

hypotheses:
  - id: H01_F3_NEAR_PIVOT_15_LONG_AVOID
    type: primary
    theory_citation: |
      `docs/institutional/mechanism_priors.md` section 2 and
      `docs/institutional/literature/fitschen_2013_path_of_least_resistance.md`.
    statement: |
      On MGC SINGAPORE_OPEN O15 E2 RR1.5 long trades, rows where the ORB midpoint
      is within 0.15 ATR of prior-day pivot underperform off-signal rows on net
      ExpR. The honest role is an avoid overlay, not a standalone long signal.
    pass_metric:
      metric: "delta_IS = ExpR_on_signal - ExpR_off_signal"
      formula: "compare pnl_r means on F3_NEAR_PIVOT_15=1 vs 0 within the locked lane"
      threshold_lte:
        delta_is: -0.10
        welch_t: -3.0
      threshold_lt:
        raw_p: 0.05
      threshold_gte:
        n_on_is: 100
        years_negative_delta_is: 2
      extra_gate: "dir_match_oos = true when N_on_OOS >= 10"
    counted_against_trial_budget: true

trial_budget:
  primary_selection_trials: 1
  schema_locked_before_any_metric: true
  minbtl_bound:
    formula: "2*ln(N_trials)/(E[max_N]^2)"
    n_trials: 1
    expected_max_n: 1.2
    value: 0.0
    within_cap: true
    cap_reference: "docs/institutional/pre_registered_criteria.md Criterion 2"

baseline:
  descriptive_anchor:
    expr_lane_is_resolved: -0.0883
    expr_on_is_resolved: -0.2940
    expr_off_is_resolved: 0.1070
    source: "canonical query on 2026-04-22"

kill_criteria:
  - id: K1
    metric: "raw_p"
    threshold: ">= 0.05"
    action: KILL
  - id: K2
    metric: "abs(welch_t)"
    threshold: "< 3.0"
    action: KILL
  - id: K3
    metric: "delta_IS"
    threshold: "> -0.10"
    action: KILL
  - id: K4
    metric: "years_negative_delta_is"
    threshold: "< 2"
    action: KILL
  - id: K5
    metric: "dir_match_oos"
    threshold: "false when N_on_OOS >= 10"
    action: PARK
  - id: K6
    metric: "N_on_OOS"
    threshold: "< 30"
    action: PARK

decision_rule:
  continue_if: "H01 passes IS delta, p, t, and year-sign gates"
  park_if: "H01 passes IS gates but OOS remains too thin for a hard continuation decision"
  kill_if: "H01 fails any IS gate or shows an OOS sign flip once OOS N is usable"

