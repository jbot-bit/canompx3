feature_definitions:
  - feature_name: F3_NEAR_PIVOT_15
    column_source: "derived from daily_features.prev_day_high, prev_day_low, prev_day_close, atr_20, orb_SINGAPORE_OPEN_high, orb_SINGAPORE_OPEN_low"
    canonical_source_of_truth: "research/prior_day_features_orb_mega.py and docs/audit/results/2026-04-15-mgc-level-scan.md"
    trade_time_knowable: true
    first_complete_time: "ORB end"
    temporal_alignment_note: "RULE 6.1 safe; prior-day pivot is fixed and ORB midpoint is known at ORB end."
    lookahead_check: "PASS"

calibration:
  threshold_source:
    F3_NEAR_PIVOT_15: "fixed exact threshold from the selected exploratory cell"
  lock_policy: "No parameter search inside this study. Threshold is fixed exactly as written."

