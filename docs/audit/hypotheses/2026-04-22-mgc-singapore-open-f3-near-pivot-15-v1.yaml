  direction: long
  signal_name: F3_NEAR_PIVOT_15
  feature_predicate: "ABS((((orb_SINGAPORE_OPEN_high + orb_SINGAPORE_OPEN_low)/2.0) - ((prev_day_high + prev_day_low + prev_day_close)/3.0)) / atr_20) < 0.15"
