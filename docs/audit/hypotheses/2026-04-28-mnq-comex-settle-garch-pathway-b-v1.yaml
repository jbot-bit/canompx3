    applied: true
    detail: |
      B6 lane-correlation Phase B reported +0.773 vs deployed COMEX_SETTLE ORB_G5 — overlap concern flagged.
      RULE 7 threshold is |corr| > 0.70 → tautology / duplicate-filter flag. Phase D plan
      (docs/plans/2026-04-28-edge-extraction-phased-plan.md line 84) explicitly notes "likely portfolio
      overlap, run anyway but flag for Phase E". This pre-reg honors that decision: the K=1 test runs as
      designed, but a candidate-readiness verdict here does NOT clear Phase E portfolio admission. Phase E
      admission requires an additivity audit (residualised vs deployed COMEX_SETTLE ORB_G5 lane). This
