    - Promoting CANDIDATE_READY without all C6/C8/C9 PASS conditions
    - Writing to validated_setups, edge_families, lane_allocation, live_config
    - Any capital deployment action — that requires Phase E + capital-review skill + portfolio additivity audit (RULE 7 overlap flag)

