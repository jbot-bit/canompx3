reproducibility:
  repo_root: canompx3
  commit_sha: "TO_FILL_AFTER_COMMIT"   # stamped on first commit; pre-reg locked before runner executes
  committed_required_before_run: true
  branch: research/2026-04-28-phase-d-mnq-comex-settle-pathway-b
  base_branch: main

scope:
  instrument: MNQ                          # canonical: pipeline.asset_configs.ACTIVE_ORB_INSTRUMENTS
  session: COMEX_SETTLE                    # canonical: pipeline.dst.SESSION_CATALOG (start ~04:30 BNE during DST, ~04:30/05:30 dynamic)
  orb_minutes: 5
  rr_target: 1.0
  entry_model: E2                          # range-cross break, canonical trading_app/entry_rules.py:157-216
  confirm_bars: 1
  direction: long                          # via daily_features.orb_COMEX_SETTLE_break_dir = 'long' (segmentation, not predictor — RULE 6.3 exception)
  cell_predicate: "daily_features.garch_forecast_vol_pct > 70"   # strict greater than (matches Phase B feature definition)
  scratch_policy: include-as-zero          # canonical post-Stage-5; pnl_r=COALESCE(pnl_r, 0.0)
  cost_specs_source: pipeline.cost_model.COST_SPECS  # MNQ = $2.74 RT — pnl_r is friction-deducted

data_policy:
  is_window: "trading_day < 2026-01-01"
  oos_window: "trading_day >= 2026-01-01 AND trading_day <= MAX(orb_outcomes.trading_day)"
  holdout_rule:
    constant_source: trading_app.holdout_policy.HOLDOUT_SACRED_FROM
    locked_boundary: "2026-01-01"
  tuning_against_oos: false
  oos_re_runs_with_threshold_changes: forbidden  # post-hoc rescue is FORBIDDEN per Amendment 3.0

feature_definition:
  feature_name: garch_vol_pct_GT70
  column_source: daily_features.garch_forecast_vol_pct
  canonical_source_of_truth: pipeline/build_daily_features.py
  canonical_lines: "1468-1497 (GARCH(1,1) forecast vol from rolling prior-day daily closes; pct = rolling-252 prior-only percentile rank)"
  trade_time_knowable: true
  first_complete_time_brisbane: "prior-day close (~07:00 BNE prior trading day)"
  temporal_alignment_note: |
    garch_forecast_vol_pct is computed from prior-day daily closes only —
    rolling 252-day window [i-252:i], min 60 prior values floor. The forecast
    is fixed at the prior-day close before any ORB session of the current
    trading day. § 6.1 safe whitelist (RULE 6.1 confirmed 2026-04-28 after
    rel_vol removal). No look-ahead under any session start time.
  lookhead_check: PASS  # § 6.1 safe (garch_forecast_vol_pct, prior-day close input)

calibration:
  threshold_source: "Phase B per-candidate evidence pass (research/phase_b_candidate_evidence_v1.py 2026-04-28)"
  threshold_value: 70   # locked: garch_forecast_vol_pct > 70 (NOT a percentile-of-distribution; the 70 value is itself a rolling-percentile rank from build_daily_features.py)
  lock_policy: "Threshold pre-committed before any K=1 metric is computed; no post-hoc relaxation."
  threshold_provenance: |
    The Phase B evidence pass emitted the cell with predicate
    `garch_vol_pct_GT70` defined as `garch_forecast_vol_pct > 70` (strict).
    This pre-reg locks the same predicate for the confirmatory K=1 test.
    No threshold sweep is permitted within this hypothesis (Amendment 3.0
    condition 2: one prediction per hypothesis).

hypothesis_definition:
  primary_hypothesis_statement: |
    On MNQ COMEX_SETTLE O5 RR1.0 E2 CB1 long-direction trades, days where
    garch_forecast_vol_pct > 70 (high forecast-vol regime) exhibit higher
    per-trade R-multiple expectancy than days where garch_forecast_vol_pct
    <= 70 (the off-cell complement), driven by Carver-style vol-targeting
    follow-through during high realised-vol regimes that GARCH(1,1) on
    prior-day closes successfully forecasts.

upstream_discovery_provenance:
  role: PROVENANCE_ONLY
  source: docs/audit/results/2026-04-28-phase-b-candidate-evidence.md
  upstream_scan_k_framings:
    K_global: 13415
    K_family_volatility_estimate: 2700
  upstream_dsr_pathway_a: 0.0810
  upstream_dsr_pathway_b: 0.9998
  note: |
    Phase A/B's comprehensive scan K values are documented for traceability ONLY.
    They do NOT apply to this Pathway B K=1 test per pre_registered_criteria.md
    Amendment 3.0 and prereg-writer-prompt.md OUTPUT RULE 5. The K=1 framing
    here is justified by the theory citations under testing_discipline below.
  institutional_validity_check: |
    Independent SQL reproduction (2026-04-28) confirms Phase B's locked-schema
    numbers exact match: N_IS_on=199, ExpR_IS_on=+0.2453, delta_IS=+0.2286,
    N_OOS_on=17, delta_OOS=+0.2538 (dir-match preserved). Welch t=3.18,
    p=0.00161. Sharpe per-trade IS=0.275, annualised=1.692. Per-year
    IS_on positive in 6/6 eligible+ineligible years (2020-2025). No
    look-ahead contamination per RULE 6.1 (garch_forecast_vol_pct is
    prior-day-close input only, § 6.1 safe whitelist). Cost is friction-
    deducted via cost_model. Direction segmentation via
    orb_COMEX_SETTLE_break_dir is RULE 6.3 exception (segmentation-of-
    already-taken trade is allowed; not a predictor).

testing_discipline:
  pathway: B_individual
  k: 1
  significance_threshold:
    raw_p_two_tailed_lt: 0.05
    sharpe_ann_gt: 0.0          # positive direction gate per Amendment 3.0 condition 2b
    chordia_t_with_theory_gte: 3.0
  mandatory_downstream_gates_non_waivable:
    - C6_walk_forward_efficiency_gte_0p50_when_n_oos_powered  # see Amendment 3.2 power-floor handling
    - C8_oos_positive_when_n_oos_powered
    - C9_era_stability_no_era_lt_neg_0p05_with_n_era_gte_20
  theory_citation:
    - source: docs/institutional/literature/carver_2015_volatility_targeting_position_sizing.md
      claim: "Volatility-targeting / forecast-vol-conditioned execution: high-vol regimes carry follow-through premium when forecast-vol is elevated; instrument exposure should be conditioned on the forecast."
      role: filter-mechanism citation (the actual prediction's theory grounding)
    - source: docs/institutional/literature/chan_2013_ch7_intraday_momentum.md
      claim: "Intraday continuation premium after high-volatility regimes (ORB-style intraday momentum)."
      role: strategy-class grounding (ORB intraday momentum)
    - source: docs/institutional/literature/fitschen_2013_path_of_least_resistance.md
      claim: "Path-of-least-resistance / breakout edge on equity-index intraday horizons."
      role: ORB premise grounding
  filter_mechanism_grounding: |
    The garch_forecast_vol_pct > 70 cut is grounded in the Carver vol-
    targeting framework — forecast-vol-conditioned execution is a primary
    Carver concept (Ch 9-10 of Systematic Trading). The local extract at
    docs/institutional/literature/carver_2015_volatility_targeting_position_sizing.md
    captures the framework. Per prereg-writer-prompt.md PATHWAY B THEORY
    CITATION clause, this is a directly-cited filter-mechanism claim
    (NOT a strategy-class promotion).

    Distinct from D1 (B-MES-EUR), where the citation was strategy-class
    only because no Aronson Ch11 overnight-range extract exists yet.
    Here Carver Ch 9-10 IS the mechanism extract; it directly grounds
    forecast-vol-conditioned execution.

    GARCH(1,1) is the Carver "vol forecast" implementation — see
    pipeline/build_daily_features.py:1468-1497. The 70th-percentile cut
    is a within-class refinement (not a separately-cited threshold).
  cumulative_individual_hypothesis_count_disclosure:
    purpose: per Amendment 3.0 condition 6
    cumulative_count_for_MES: 1   # B-MES-EUR (D1) used 1 MES Pathway B individual hypothesis
    cumulative_count_for_MNQ: 1   # this is the first MNQ Pathway B individual hypothesis
    cumulative_count_for_MGC: 0
    overall: 2

trial_budget:
  primary_selection_trials: 1     # Pathway B K=1
  schema_locked_before_any_metric: true
  minbtl_bound:
    formula: "MinBTL = 2*ln(N_trials) / E[max_N]^2"
    n_trials: 1
    minbtl_value_years: 0.0       # ln(1) = 0
    available_clean_data_years: 5.24   # MNQ COMEX_SETTLE IS_on 2020-05-28 → 2025-12-31
    within_cap: true
    cap_reference: "Bailey et al 2013 — at K=1 MinBTL is trivially satisfied"

primary_metric:
  metric_name: ExpR_on_minus_ExpR_off_IS
  formula: "mean(pnl_r WHERE garch_forecast_vol_pct > 70) - mean(pnl_r WHERE garch_forecast_vol_pct <= 70)"
  pre_committed_target: positive  # the direction of the prediction
  raw_p_method: two-tailed Welch t-test on (pnl_r_on, pnl_r_off) IS
  bootstrap_p_method: |
    Block-bootstrap permutation test on shuffled signal labels (block=5,
    B=10000) — independent reproducibility check beyond Welch's parametric
    assumption. Reported alongside Welch raw_p. Not a separate trial.

secondary_descriptive_only:
  - id: SD1
    statement: "ExpR_OOS_on - ExpR_OOS_off direction match with IS sign"
    counted_against_trial_budget: false
    note: "Descriptive — actual gate is C8 with power floor, not this metric alone"
  - id: SD2
    statement: "Per-year ExpR breakdown (era stability descriptive)"
    counted_against_trial_budget: false
    note: "Feeds into C9 gate computation"
  - id: SD3
    statement: "Cohen's d for IS effect (used to compute OOS power)"
    counted_against_trial_budget: false

baseline:
  baseline_label: ExpR_off_IS_locked_schema
  computation_method: |
    SAME pipeline path as the variant — direct duckdb via the runner's
    load_cell function. This is a baseline sanity smoke-test (same code
    path), NOT a harness cross-check. Threshold for K2 sanity: |delta_baseline_repro|
    < 0.001 ExpR absolute. Independent-method cross-check is the
    in-pre-reg SQL committed below in `independent_sql_baseline`.
  expected_baseline_value_off_is: 0.0166        # from independent SQL 2026-04-28
  expected_variant_value_on_is: 0.2453          # from independent SQL 2026-04-28
  expected_delta_is: 0.2286                     # locked
  independent_sql_baseline: |
    WITH cell AS (
      SELECT o.trading_day,
             COALESCE(o.pnl_r, 0.0) AS pnl_r,
             d.garch_forecast_vol_pct,
             d.orb_COMEX_SETTLE_break_dir AS bdir
      FROM orb_outcomes o
      JOIN daily_features d
        ON o.trading_day = d.trading_day
       AND o.symbol = d.symbol
       AND o.orb_minutes = d.orb_minutes
      WHERE o.symbol='MNQ' AND o.orb_label='COMEX_SETTLE' AND o.orb_minutes=5
        AND o.rr_target=1.0 AND o.entry_model='E2' AND o.confirm_bars=1
        AND o.outcome IN ('win','loss','scratch')
        AND d.orb_COMEX_SETTLE_break_dir='long'
    )
    SELECT
      AVG(pnl_r) FILTER (WHERE trading_day < DATE '2026-01-01' AND garch_forecast_vol_pct >  70) AS expr_is_on,
      AVG(pnl_r) FILTER (WHERE trading_day < DATE '2026-01-01' AND garch_forecast_vol_pct <= 70) AS expr_is_off
    FROM cell;

kill_criteria:
  - id: KILL_RAWP
    metric: raw_p_two_tailed
    threshold: ">= 0.05"
    action: KILL
  - id: KILL_DIR
    metric: sign(ExpR_on - ExpR_off) on IS
    threshold: "negative"
    action: KILL  # direction-flip on locked-schema reproduction = KILL
  - id: KILL_T
    metric: abs(t_stat) on IS
    threshold: "< 3.0"
    action: KILL  # below Chordia with-theory floor
  - id: KILL_N
    metric: N_IS_on
    threshold: "< 100"
    action: KILL  # C7 floor
  - id: KILL_ERA
    metric: any_era_ExpR_with_N_gte_20
    threshold: "< -0.05"
    action: KILL  # C9 era-stability gate
  - id: KILL_SHARPE
    metric: sharpe_ann_IS
    threshold: "<= 0.0"
    action: KILL  # Amendment 3.0 condition 2b positive-direction gate
  - id: KILL_BASELINE_SANITY
    metric: abs(reproduced_delta_IS - expected_delta_is)
    threshold: "> 0.001"
    action: KILL  # smoke-test that the runner reproduces the locked numbers

decision_rule:
  candidate_ready_if: |
    All KILL criteria PASS (none fire) AND
    C5 DSR_PB >= 0.95 AND
    C6 walk_forward_efficiency >= 0.50 (computed if N_OOS_on >= 50, else GATE_INACTIVE_LOWPOWER) AND
    C8 oos_dir_match == True AND oos_power >= 0.5 (else GATE_INACTIVE_LOWPOWER) AND
    C9 era_stability == PASS AND
    Sharpe_ann_IS > 0
  park_pending_oos_power_if: |
    All KILL criteria PASS (none fire) AND
    C5 DSR_PB >= 0.95 AND
    C9 era_stability == PASS AND
    Sharpe_ann_IS > 0 AND
    (C6 OR C8 are GATE_INACTIVE_LOWPOWER due to N_OOS_on < 50 or computed power < 0.5)
  kill_if: any KILL criterion fires

