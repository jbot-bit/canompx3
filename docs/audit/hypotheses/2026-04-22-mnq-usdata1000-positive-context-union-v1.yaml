metadata:
  name: "mnq-usdata1000-positive-context-union-v1"
  purpose: "Exact bridge prereg for MNQ US_DATA_1000 O5 E2 RR1.0 long union of validated positive prior-day families"
  date_locked: "2026-04-22T16:58:00+10:00"
  holdout_date: "2026-01-01"
  total_expected_trials: 1
  testing_mode: "individual"

hypotheses:
  - id: 1
    name: "MNQ US_DATA_1000 long positive-context union"
    theory_citation: |
      Crabel, Toby. Day Trading with Short Term Price Patterns and Opening Range Breakout.
      Repo-local mechanism grounding: docs/institutional/mechanism_priors.md,
      RESEARCH_RULES.md mechanism-first doctrine, and the already-validated
      broader family results for PD_DISPLACE_LONG and PD_CLEAR_LONG.
    economic_basis: |
      On MNQ US_DATA_1000, the positive part of the prior-day geometry surface
      is broader than either validated family alone. The exact research claim
      is that a long breakout should be taken when the ORB midpoint is either
      in downside displacement context or outside the prior-day congestion
      regime. This is a bounded union of two already-validated positive family
      encodings, not a fresh broad scan. The long-direction restriction is
      owned by the filter itself so discovery does not widen to short breaks.
    filter:
      type: "PD_GO_LONG"
      column: "orb_mid vs validated positive prior-day geometry union"
      thresholds:
        - "(orb_mid < prev_day_low) OR (|orb_mid - prev_day_low| / atr_20 < 0.15)"
        - "OR NOT ((prev_day_low < orb_mid < prev_day_high) OR (|orb_mid - pivot| / atr_20 < 0.50))"
    scope:
      instruments: [MNQ]
      sessions: [US_DATA_1000]
      rr_targets: [1.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "Experimental row does not match the exact audited strategy surface"
      - "IS expectancy on-signal is non-positive after canonical discovery write"
      - "Validator rejects the row for lifecycle illegality, Phase 4 gates, walk-forward insufficiency, or era instability"
