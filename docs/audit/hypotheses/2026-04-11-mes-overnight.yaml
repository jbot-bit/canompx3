# Hypothesis Registry — MES Overnight Range Gate
#
# Locked:        2026-04-11T01:00:00+10:00
# Author:        Claude Code session (wave 4 lit-grounded discovery)
# Holdout mode:  A (2026-01-01 sacred)
# Data horizon:  6.65 calendar years (MES real micro 2019-05-06 to 2025-12-31)
# Testing mode:  family (Pathway A, BH FDR at K=24)
#
# AUDIT NOTE: OVNRNG_25 requires overnight_range >= 25 pts for MES.
# Passes ~25% of MES trading days — meaningful selectivity.
# Threshold calibrated to MES price scale (MES ~5000 vs MNQ ~20000).

metadata:
  name: "mes-overnight"
  purpose: |
    Test whether large overnight range (>= 25 pts) predicts stronger
    ORB breakout edge on MES. Overnight range captures institutional
    repositioning and information arrival during off-hours. Threshold
    calibrated to MES price scale (~5000 vs MNQ ~20000).
  date_locked: "2026-04-11T01:00:00+10:00"
  holdout_date: "2026-01-01"
  data_horizon_years_clean: 6.65
  data_source: "real CME Micro E-mini S&P 500 futures 2019-05-06 onwards"
  testing_mode: "family"
  bailey_compliance:
    trials: 24
    horizon_years: 6.65
    e_max_n: 1.0
    min_btl_required_years: 6.36
    headroom_pct: 4.4
    status: "PASS"
  total_expected_trials: 24

hypotheses:
  - id: 1
    name: "MES TOKYO_OPEN OVNRNG_25 RR1.0"
    theory_citation: "Barclay & Hendershott (2003) RFS overnight price discovery; Crabel (1990) opening range"
    economic_basis: |
      Large overnight range (>= 25 S&P pts) signals institutional repositioning
      during off-hours. This information arrival produces higher-quality ORB
      breakouts with stronger directional conviction at session opens.
      Threshold calibrated to MES price scale.
    filter:
      type: OVNRNG_25
      column: overnight_range
      thresholds: [25]
    scope:
      instruments: [MES]
      sessions: [TOKYO_OPEN]
      rr_targets: [1.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "BH FDR q=0.05 fails at K=24"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0"
      - "Any era with N >= 50 and ExpR < -0.05"

