# Hypothesis Registry — ORB Retest Entry Pilot V1
#
# Locked:       2026-04-20T23:55:00+10:00
# Author:       Codex session (htf-ltf routing branch)
# Holdout mode: A (2026-01-01 sacred)
# Testing mode: bounded exploratory family (Protocol B)
#
# Local doctrine grounding:
# 1. docs/plans/2026-04-20-htf-ltf-orb-routing-decision.md
#    - ORB breakout -> first retest -> continuation belongs to ORB only as a
#      bounded entry-model extension.
# 2. docs/audit/hypotheses/phase-c-e-retest-entry-model.md
#    - Existing repo stub for E_RETEST as ORB-derived entry model.
# 3. docs/institutional/literature/chan_2013_ch7_intraday_momentum.md
#    - Intraday breakout + stop cascade mechanism.
# 4. docs/institutional/literature/fitschen_2013_path_of_least_resistance.md
#    - Intraday trend-follow on equities/commodities grounds ORB class broadly.
#
# External grounding:
# - Carol Osler (support/resistance interruptions)
# - Baltussen et al. (broad futures intraday momentum)
#
# IMPORTANT:
# This is a RESEARCH-ONLY pilot. It does NOT mutate outcome_builder or
# orb_outcomes. It asks whether a bounded ORB-derived retest entry shows enough
# signal to justify future production-code work.

metadata:
  name: "orb-retest-entry-pilot-v1"
  purpose: |
    Compare a research-only ORB retest continuation entry against canonical E2
    on the same retest-eligible days. This is a routing pilot, not a promotion
    attempt: if the bounded retest shape is dead here, there is no justification
    to spend production effort on E_RETEST inside the ORB engine.
  date_locked: "2026-04-20T23:55:00+10:00"
  holdout_date: "2026-01-01"
  data_source: "gold.db canonical layers: daily_features, bars_1m, orb_outcomes"
  family_k: 54
  bailey_compliance:
    trials: 54
    status: "PASS"

scope:
  instruments: [MES, MGC, MNQ]
  sessions: [TOKYO_OPEN, EUROPE_FLOW, NYSE_OPEN, US_DATA_1000, COMEX_SETTLE, CME_PRECLOSE]
  orb_minutes: [5]
  rr_targets: [1.0, 1.5, 2.0]
  entry_models_compared: [E2, E_RETEST_PILOT]
  confirm_bars_baseline: [1]

rule_definition:
  retest_entry:
    description: |
      After the canonical ORB break, require at least one subsequent 1-minute
      close one tick beyond the ORB boundary in the breakout direction. Then
      enter on the first later bar whose range retouches the ORB boundary.
    entry_price: "ORB boundary (orb_high for longs, orb_low for shorts)"
    stop_price: "Opposite ORB boundary (same as E2 risk geometry)"
    target_price: "Fixed RR multiple of ORB-width risk"
    fill_rule: "Resting limit at ORB boundary; first qualifying touch fills"
    ambiguity_rule: "If entry bar or later bar hits stop and target on same bar, resolve as LOSS"
    scratch_rule: "If no stop/target resolution before trading-day end, outcome=scratch and pnl_r stays null"

primary_test:
  claim: |
    On retest-eligible days, ORB retest continuation entry produces higher
    per-trade pnl_r than canonical E2 on the same (instrument, session, day, RR).
  statistic: "paired delta = pnl_r(retest) - pnl_r(E2) on matched retest days"
  pass_requirements:
    - "BH FDR q=0.05 survives at K=54 on IS paired-delta p-values"
    - "n_is_pairs >= 50"
    - "delta_is > 0"
    - "If n_oos_pairs >= 20, OOS delta direction must match IS"

kill_criteria:
  - "0 primary survivors at family K=54"
  - "delta_is <= 0 on the majority of adequately-sampled cells"
  - "Signal exists only via <30 matched pairs"

artefacts:
  script_path: "research/orb_retest_entry_pilot_v1.py"
  result_doc: "docs/audit/results/2026-04-20-orb-retest-entry-pilot-v1.md"
  cell_csv: "research/output/orb_retest_entry_pilot_v1_cells.csv"
