feature_exclusions:
  banned_for_this_family:
    - "Any break-bar dependent field: rel_vol_*, orb_*_break_*, orb_*_double_break"
    - "Any full-day field: daily_high, daily_low, daily_close, day_type"
    - "Any feature blocked by pipeline.session_guard for the target session"
    - "Any feature tautological with the active base filter (same-session ORB size for ORB_G* lanes, ATR percentile for ATR_P50 lane)"

evaluation_protocol:
  baseline_question: "Within the exact filtered live lane, does the overlay-on subset outperform the overlay-off subset?"
  primary_statistics:
    - "N_IS_on, N_IS_off, avg_r_IS_on, avg_r_IS_off, delta_IS"
    - "one_tailed_welch_p_IS(on vs off)"
    - "BH-adjusted p at global K=24, q=0.10"
    - "N_OOS_on, avg_r_OOS_on, avg_r_OOS_off, delta_OOS"
    - "Sharpe_IS_on, Sharpe_OOS_on, WFE = Sharpe_OOS_on / Sharpe_IS_on"
    - "Forward 2026+ descriptive metrics only"
  survivor_criteria:
    - "BH-adjusted p < 0.10 at K=24"
    - "delta_IS > 0"
    - "N_OOS_on >= 30"
    - "avg_r_OOS_on > 0"
    - "WFE >= 0.50 when Sharpe_IS_on > 0"
  forward_policy:
    - "2026+ rows are descriptive only and cannot rescue or kill a 2025 OOS-CV miss."
    - "A negative 2026 sign flip is flagged WATCH, not used for selection."

kill_criteria:
  - "If any feature is not trade-time knowable for its target lane, the affected hypothesis is invalid."
  - "If any threshold is fit using 2025 or 2026 rows, the run is invalid."
  - "If no cell beats BH q=0.10 at K=24 with positive 2025 OOS-CV expectancy, the family is dead for promotion."
  - "If survivors are driven by extreme fire-rate artifacts or near-empty 2025 slices, treat them as dead."
