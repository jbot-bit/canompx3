    feature_name: "atr_vel_ratio"
    feature_role: "volatility_state"
    feature_type: continuous
    threshold_rules: ["IS_P75", "IS_P90"]
    trade_time_knowable: "Known before session start from prior data"
    theory_citation: "RESEARCH_RULES.md mechanism test; volatility clustering / expanding-state hypothesis."
    economic_basis: "An expanding volatility backdrop should make afternoon continuation lanes more selective and less dependent on static size gating alone."
  - id: H07_NYO_US830_VOLUME
    lane_id: "MNQ_NYSE_OPEN_E2_RR1.0_CB1_COST_LT12"
    feature_name: "orb_US_DATA_830_volume"
