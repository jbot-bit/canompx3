# =============================================================================
# VARIABLE SPACE
# =============================================================================
# This study tests DEPTH/RR conditioning and a VETO gate — NOT directional entry.
#
# VA-CONTEXT CLASSIFICATION (Yordanov Filter Case, computable from substrate):
#   Case A: ORB-window close is INSIDE [VAL, VAH]            (containment)
#   Case B: ORB-window close is ABOVE VAH                     (upper imbalance)
#   Case C: ORB-window close is BELOW VAL                     (lower imbalance)
#   Empirical (Yordanov NQ): Case A has the HIGHEST follow-through depth.
#
# Sessions: the deployed/high-volume MNQ/MES ORB sessions where AMT context is
#   meaningful and pre-session bar count supports a VA (>= 5 pre-bars; filter
#   fail-closes to NULL otherwise — those rows are excluded by the substrate
#   guard already): EUROPE_FLOW, NYSE_OPEN, TOKYO_OPEN.
#   (LONDON_METALS dropped with MGC — see metadata.mgc_deferral.)
# Entry model: E2, CB1, stop_multiplier=1.0 (canonical deployed entry).
# Aperture: 5 min ONLY (fixed to control K; 15/30 deferred to a follow-up
#   pre-reg — see hypotheses[*].scope.orb_minutes and the K_family accounting).
# RR targets: 1.0, 1.5, 2.0.
# Instruments: MNQ, MES only (MGC excluded by Bailey horizon, see mgc_deferral).

variable_space:
  instruments: [MNQ, MES]
  sessions: [EUROPE_FLOW, NYSE_OPEN, TOKYO_OPEN]
  orb_minutes: [5]   # LOCKED to 5 — both hypotheses fix [5]; N=24 K-budget and
                     # the Bailey horizon check assume aperture=5. 15/30 = future pre-reg.
  rr_targets: [1.0, 1.5, 2.0]
  entry_models: [E2]
  confirm_bars: [1]
  stop_multipliers: [1.0]
  va_context_classes: [CASE_A_INSIDE, CASE_B_ABOVE_VAH, CASE_C_BELOW_VAL]
  # The classification is a CONDITIONER, not a long/short selector. Direction is
  # set by the ORB break itself (existing entry rules); VA-context conditions
  # which RR target is expected to pay off (H1) or whether to trade (H2).
  # K_family accounting (N=24, within Bailey N_max=27 for MNQ/MES 6.65yr):
  #   H1 depth-conditioning: 2 instr × 3 sessions × 2 deep-RR cells = 12 trials.
  #   H2 Cross+Miss veto:     2 instr × 3 sessions × 2 RR (overlay) = 12 trials.
  #   Total = 24. Verified via estimate_k_budget (see min_btl_budget_check).
  #   MGC excluded (horizon N_max=3) — see metadata.mgc_deferral.

# =============================================================================
# HYPOTHESES
# =============================================================================
hypotheses:
  - id: 1
    name: "VA-context predicts follow-through DEPTH (Case A = deepest) — MNQ/MES"
    theory_citation:
      - "yordanov_2026_nq_orb_value_area_breakouts.md §3.5 (Case A inside-VA highest depth: 54.1% @ 1.5× vs Case C 10.5%)"
      - "tolusic_2026_amt_inventory_dynamics.md §4 (magnitude-direction separation theorem — magnitude is predictable, direction is not)"
      - "fitschen_2013_path_of_least_resistance.md Ch3 (ORB continuation premise)"
    economic_basis: |
      AMT predicts the VA-context conditions the MAGNITUDE of follow-through, not
      its direction. Yordanov's NQ data shows Case A (ORB closes inside the
      pre-session VA) produces the deepest follow-through. HYPOTHESIS: on MNQ/MES
      deployed sessions, ORB breaks classified Case A achieve higher ExpR at
      DEEPER RR targets (1.5, 2.0) than Case B/C breaks on the same lane. This is
      an RR-conditioning edge: take higher RR on Case A, lower RR (or skip) on
      Case C. NO long-vs-short claim is made.
    measurement: |
      For each (instrument, session, aperture, RR) cell, stratify the deployed
      E2 trades by VA-context class (A/B/C) and compare ExpR across classes.
      Edge = monotone ExpR(A) > ExpR(C) at RR 1.5 and 2.0, BH-FDR significant.
    scope:
      instruments: [MNQ, MES]
      sessions: [EUROPE_FLOW, NYSE_OPEN, TOKYO_OPEN]
      rr_targets: [1.5, 2.0]   # deep targets where Yordanov Case A/C divergence is largest
      orb_minutes: [5]          # fix aperture to control K; 15/30 deferred to a follow-up
      entry_models: [E2]
      confirm_bars: [1]
    expected_trial_count: 12   # 2 instr × 3 sessions × 2 deep-RR
    kill_criteria:
      - "BH-FDR q=0.05 fails at K_family"
      - "Chordia t < 3.79 (strict no-theory bar; theory_grant=false)"
      - "ExpR(Case A) NOT > ExpR(Case C) at RR 1.5 (refutes Yordanov depth finding on MNQ)"
      - "WFE < 0.50"
      - "2026 OOS ExpR < 0 (N_oos >= 30)"
      - "Any era N>=50 ExpR < -0.05 R"
      - "Edge only appears as a directional (long-vs-short) selector → REJECT (Tolušić §4)"

  - id: 2
    name: "'Cross + Miss' VETO gate on deployed lanes — MNQ/MES"
    theory_citation:
      - "yordanov_2026_nq_orb_value_area_breakouts.md §3.8 ('Cross + Miss' = strongest single signal: 22.7% vs 71.1% baseline, 48.4pp drop, strengthened at n=159)"
      - "tolusic_2026_amt_inventory_dynamics.md §3.2 (balance/imbalance phase transition — a break that fails to clear inventory reverts)"
    economic_basis: |
      The strongest empirical signal in Yordanov is a VETO, not an entry: a
      breakout that retreats through the Filter Mid WITHOUT extending even 0.5×
      of the filter range has a high probability of full failure (22.7% vs 71.1%
      baseline). HYPOTHESIS: applying a "Cross + Miss" don't-trade gate to
      existing deployed MNQ/MES E2 lanes IMPROVES ExpR by suppressing the
      lowest-quality breakouts. This is an overlay test (RULE 2 Pass-2 filtered)
      on deployed lanes — lowest multiple-comparison cost, directionally distinct
      from the NO-GO registry.
    measurement: |
      Overlay the Cross+Miss veto on deployed E2 lanes. Compare deployed-lane
      ExpR WITH vs WITHOUT the veto. Edge = veto-on ExpR significantly higher
      (the suppressed trades have significantly negative ExpR). The veto state
      MUST be evaluated only from bars knowable at the entry decision (RULE 6
      trade-time-knowability audit REQUIRED — the "miss" of 0.5× and the Filter
      Mid cross must both resolve at or before the E2 entry timestamp, else the
      veto is post-entry look-ahead and the cell is BANNED per RULE 6.3).
    scope:
      instruments: [MNQ, MES]
      sessions: [EUROPE_FLOW, NYSE_OPEN, TOKYO_OPEN]
      rr_targets: [1.0, 2.0]   # veto effect tested at near + deep target
      orb_minutes: [5]          # fix aperture to control K (matches H1)
      entry_models: [E2]
      confirm_bars: [1]
    expected_trial_count: 12   # 2 instr × 3 sessions × 2 RR
    kill_criteria:
      - "BH-FDR q=0.05 fails at K_family"
      - "Chordia t < 3.79 (strict no-theory bar; theory_grant=false)"
      - "Veto-on ExpR NOT > veto-off ExpR (suppressed trades not significantly negative)"
      - "WFE < 0.50"
      - "2026 OOS ExpR < 0 (N_oos >= 30)"
      - "Veto state not trade-time-knowable → BANNED (RULE 6.3 look-ahead)"
      - "Tautology T0: |corr(veto_fire, deployed_filter_fire)| > 0.70 → exclude cell"

