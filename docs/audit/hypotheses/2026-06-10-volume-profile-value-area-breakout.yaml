# Pre-Registered Hypothesis: Pre-Session Value-Area Context — Depth & Veto
# Locked: 2026-06-10 | Holdout: 2026-01-01 | Mode: A (IS < 2026-01-01)
#
# ─────────────────────────────────────────────────────────────────────────────
# REVISION NOTE (2026-06-10, Opus second-pass audit of the Sonnet v0 draft):
#   The original draft (v0, not committed) proposed VA_BREAK_OUT → DIRECTIONAL
#   long/short continuation. That framing was REJECTED on two grounds verified
#   against the actual literature extracts (not training memory):
#     1. Tolušić §4 (magnitude-direction separation theorem) and its extract's
#        ILLEGITIMATE-USE #4 EXPRESSLY FORBID direction-predictive value-area
#        signals — profile features predict MAGNITUDE/DEPTH, not direction.
#     2. Yordanov §3.5 EMPIRICALLY REVERSES the naive intuition: Case A (close
#        INSIDE the VA) has the HIGHEST follow-through depth (54.1% @ 1.5×),
#        while Case C (close below VAL) has the LOWEST (10.5%). Breaking OUT of
#        the VA is NOT the continuation signal; VA-containment is.
#   The v0 draft also cited a non-existent "tolusic §2.3". This version cites
#   only verified anchors (§3.1/§3.2/§3.3/§4 in Tolušić; §3.2/§3.5/§3.8 in
#   Yordanov). MGC grounding is explicitly disclaimed per Tolušić §6.3.
# ─────────────────────────────────────────────────────────────────────────────
#
# SUBSTRATE DEPENDENCY:
#   Requires orb_{label}_poc / _vah / _val columns populated in daily_features.
#   As of 2026-06-10 these columns are NULL in gold.db (substrate added in
#   commit 03224494, backfill deferred — must not race the live gold.db writer).
#   Run, SOLO (no concurrent DB writer):
#     python -m scripts.tools.refresh_data --instrument MNQ --rebuild-features
#   The poc/vah/val classification (Case A/B/C) is computable from these columns.
#   The Cross+Miss veto (H3) additionally needs intra-session monitoring over
#   bars_1m — that is a RUNNER-SIDE computation, NOT a new daily_features column.
#
# MECHANISM (Auction Market Theory — magnitude/depth, NEVER direction):
#   AMT holds markets cycle between balance (price accepted inside the Value
#   Area) and imbalance (acceptance outside it). The Value Area is the central
#   70% of traded volume (Tolušić §3.1: VA ≈ 70% confidence interval under a
#   Gaussian balance distribution; Steidlmayer/Dalton standard).
#
#   The CRITICAL theory constraint (Tolušić §4, magnitude-direction separation
#   theorem): value-area-derived features can predict the MAGNITUDE of the next
#   move (range expansion / follow-through depth) but CANNOT predict its
#   DIRECTION. Any directional value-area signal is theory-contradicted and is
#   listed as an ILLEGITIMATE use in the Tolušić extract.
#
#   Therefore the only theory-legitimate hypotheses are:
#     - DEPTH/RR conditioning: does the pre-session VA-context (where the ORB
#       closes relative to VAH/VAL/POC) predict how FAR a break runs, justifying
#       a higher RR target on some contexts and a lower one on others?
#     - VETO gating: does a specific VA-context predict FAILURE strongly enough
#       to skip the trade (a don't-trade gate on an already-deployed lane)?
#   Neither claims a long-vs-short directional edge from the profile.
#
#   Literature anchors (VERIFIED against docs/institutional/literature/ extracts):
#   - tolusic_2026_amt_inventory_dynamics.md §3.1 (VA = 70% CI under balance),
#     §3.2 (balance↔imbalance phase transition at |I*|=σ/α), §4 (magnitude-
#     direction separation theorem — the binding constraint), §3.3 (initiative/
#     responsive). FX paper — mechanism only, NOT portable empirical numbers.
#   - yordanov_2026_nq_orb_value_area_breakouts.md §3.2 (71.1% @ 0.5× baseline;
#     decay to 25.2% @ 2×), §3.5 (Filter Case A/B/C as the key DEPTH predictor;
#     Case A inside-VA = highest follow-through), §3.8 ("Cross + Miss" veto =
#     strongest single signal, 22.7% vs 71.1% baseline = 48.4pp drop). NQ, 159
#     days, no costs — empirical pattern source, single-instrument.
#   - howard_2026_value_area_breakouts_es.md (ES VA-breakout empirics — triangulation).
#   - fitschen_2013_path_of_least_resistance.md Ch3 (ORB continuation premise).
#
# FEATURE VALIDITY:
#   poc/vah/val are computed over bars where ts_utc < orb_start (same mask as
#   VWAP). SAFE for all sessions — no look-ahead by construction
#   (backtesting-methodology.md RULE 1.2 / RULE 6.1 safe-feature list). The
#   Case A/B/C classification compares ORB-window close vs pre-session VAH/VAL,
#   which is knowable at ORB end (before E2 entry). The Cross+Miss veto monitors
#   post-breakout bars — it is a SESSION-OUTCOME conditioner used as a don't-trade
#   gate evaluated at decision time, NOT a predictor using post-entry data; the
#   runner MUST evaluate the cross/miss state only from bars at or before the
#   entry decision (RULE 6 trade-time-knowability audit REQUIRED in the runner).
#
# KILL CRITERIA (docs/institutional/pre_registered_criteria.md — all apply):
#   Hard kills (any one → DEAD):
#   - BH-FDR q=0.05 FAILS at K_family framing (Criterion 3, Pathway A)
#   - Chordia t < 3.79 (Criterion 4 — no theory grant; strict no-theory bar)
#   - WFE < 0.50 (Criterion 6)
#   - OOS 2026 ExpR < 0 when N_oos >= 30 (Criterion 8)
#   - Any era (N >= 50) ExpR < -0.05 R (Criterion 9)
#   - A DIRECTIONAL edge claim from the profile (would violate Tolušić §4 — if
#     a cell only "works" as long-vs-short selection, it is theory-contradicted
#     and REJECTED regardless of stats)
#   Soft kills (CONDITIONAL / WATCH, not DEAD):
#   - OOS power < 0.50 when a binary OOS gate fails → DIRECTIONAL_ONLY (RULE 3.3)
#   - Fire rate < 5% or > 95% (extreme_fire — exclude cell, not study)
#   - |corr(filter_fire, deployed_filter_fire)| > 0.70 (tautology T0 — exclude cell)
#
# THEORY GRANT: NO (set 2026-06-10). The AMT magnitude/veto mechanism (Tolušić
#   §4 + Yordanov §3.5/§3.8) is structurally sound and justifies the SEARCH, but
#   this VA-context substrate was just added to the pipeline today and has ZERO
#   empirical baseline on CME micros. Per the operator's 2026-06-10 decision and
#   Amendment 3.4 (PROVISIONAL, re-audit OPEN), a brand-new filter class clears
#   the strict no-theory bar rather than self-granting the relaxed with-theory
#   floor. If the AMT edge is robust in our data it clears t >= 3.79 easily; if it
#   only clears 3.00 it is too fragile to survive forward-testing.
# → Chordia floor t >= 3.79 (strict, no-theory — Chordia et al 2018 empirical bound).

metadata:
  name: "volume-profile-value-area-depth-veto"
  date_locked: "2026-06-10"
  holdout_date: "2026-01-01"
  testing_mode: "family"
  theory_grant: false   # 2026-06-10: strict no-theory bar (t>=3.79). New VA-context
                        # substrate, zero empirical baseline; theory justifies search,
                        # not a lowered stat bar. Amendment 3.4 PROVISIONAL re-audit OPEN.
  total_expected_trials: 24
  # MinBTL HORIZON BOUND (Bailey 2013, NOT the 300 operational cap):
  #   2*ln(N)/E[max_N]^2 <= clean_years. At E[max_N]=1.0, N=24 needs ~6.35yr;
