    MES: 6.65   # N_max=27
  min_btl_budget_check: "VERIFIED 2026-06-10 via scripts/tools/estimate_k_budget.py — N=24 PASSES Bailey horizon for MNQ+MES (need 6.35yr, have 6.65yr). MGC EXCLUDED: 2.70yr → N_max=3, cannot support a value-area family; see mgc_deferral."
