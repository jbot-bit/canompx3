kill_conditions:
  - "Zero cells survive BH-FDR at K=12."
  - "Any feature shows IS coverage < 95% on the scoped universe."
  - "A survivor only appears through one session while the other two sessions are negative at N>=100."

success_action: "Advance surviving cells to Phase 4 adversarial audit."
failure_action: "Log the family to the NO-GO registry with the mechanistic distinction preserved."

outputs_required_after_run:
  - "Per-cell N_on_IS, ExpR_on_IS, WR_on_IS, t_IS, raw_p_IS, q_family"
  - "WFE, cost stress, null distributions, and descriptive 2026 OOS"
