kill_criteria:
  - id: K1
    metric: "Number of H1-H6 that pass all 6 gate clauses"
    threshold: 0
    action: "FAMILY KILL — no MES broader edge at these cells."
  - id: K2
    metric: "Baseline sanity smoke-test |Δ ExpR_on| vs pre-reg baseline"
    threshold: 0.001
    action: "SMOKE FAIL — harness discrepancy. Re-run non-authoritative."
  - id: K3
    metric: "Any cell flagged tautology/extreme_fire/arithmetic_only"
    threshold: 1
    action: "FLAG — exclude from survivor set."

decision_rule:
  continue_if: "At least 1 of H1-H6 passes all gates AND no K2 smoke fail AND cell not K3-flagged."
  park_if: "BH-FDR pass but exactly ONE secondary fail {bootstrap_p, years_positive}, N>=100."
  kill_if: "K1 OR K2 fires."

methodology_rules_applied:
  - rule: "RULE 4 multi-framing BH-FDR"
