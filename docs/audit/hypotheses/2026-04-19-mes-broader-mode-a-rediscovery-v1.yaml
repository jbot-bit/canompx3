    This pre-reg is motivated by the 2026-04-19 Mode A re-validation of MES
    showing only 2 active validated lanes. Pre-scan (THIS SESSION) identified
    the 30 (session, direction, RR, filter) combos with N>=100 + ExpR>0 +
    t>=1.5 under Mode A IS; the 6 cells here are SELECTED with explicit
    scope narrowing (CME_PRECLOSE long already-validated + US_DATA_1000 short
    new territory + size/cost filter families Fitschen Ch 3 supports). This
    IS data-peek-informed scope narrowing, acknowledged openly. Mitigation:
    K=6 is small enough that Pathway A Chordia t>=3.00 with-theory remains
    strict (BH-FDR q<0.05 at K=6 is not trivially easy); we expect 1-2 of
    the 6 to pass, specifically H1 (CME_PRECLOSE ORB_G8 long RR1.0) where
    pre-scan observed t=3.66.

