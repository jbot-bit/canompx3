      (profitable). The RR1.5 target captures the follow-through from
      macro-release momentum. WFE 0.96 is near-perfect sign stability
      between IS (2020-2023) and OOS (2024-2025).
    filter:
      type: ATR_VEL_GE105
      column: atr_vel_ratio
      thresholds: [1.05]
    scope:
