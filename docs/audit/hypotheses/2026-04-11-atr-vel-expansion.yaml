  - id: 1
    name: "MNQ TOKYO_OPEN E2 RR1.0 ATR_VEL_GE105 — Asian session vol expansion gate"
    theory_citation: "scripts/research/wave4_presession_t2t8.py (2026-04-11 T2-T8 result): MNQ TOKYO_OPEN RR1.0 in_ExpR=+0.188 out_ExpR=+0.034 WR spread +10.9pp WFE 1.42 T6 p=0.0042 T7 5/6 years (83%) dominance 48%."
    economic_basis: |
      Asian session (TOKYO_OPEN) ORB breakouts benefit from vol expansion
      regime. When today's ATR(20) exceeds the 5-day prior average by
      >= 5%, the Asian session shows higher breakout continuation rate
      (+10.9pp WR lift) and stronger expectancy (+0.188 vs unfiltered
      +0.095 baseline). The mechanism is momentum persistence: once vol
      starts expanding, the Asian session continues the trend with
      wider intraday ranges that clear friction costs. Walk-forward
      efficiency 1.42 (slightly above 1.0 — OOS stronger than IS) is
      within the acceptable range (< 1.5) per the Wave 4 audit rule.
    filter:
      type: ATR_VEL_GE105
      column: atr_vel_ratio
      thresholds: [1.05]
    scope:
      instruments: [MNQ]
      sessions: [TOKYO_OPEN]
      rr_targets: [1.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "Raw p >= 0.05 in validator discovery FDR"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0"
      - "Era stability: any era with N >= 50 and ExpR < -0.05"
      - "Annualized Sharpe < 0.70 (Bailey noise floor)"

