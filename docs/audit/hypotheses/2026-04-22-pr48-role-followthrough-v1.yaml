hypotheses:
  - id: 1
    name: "MNQ participation candidate follow-through"
    theory_citation: "docs/institutional/literature/carver_2015_volatility_targeting_position_sizing.md"
    economic_basis: |
      If participation is useful on MNQ, the lift should appear as a role-level
      daily policy delta rather than as a narrow top-bucket story. The correct
      question is whether Q4+Q5 or a continuous weight map beats the parent on
      daily policy value after freezing IS breakpoints.
    role:
      kind: "allocator"
      parent: "All canonical MNQ O5 E2 CB1 RR1.5 trades across active sessions and both directions."
      comparator: "Parent vs Q4+Q5 filter delta and parent vs continuous sizer delta, evaluated on daily policy R."
      primary_metric: "daily_policy_delta_r"
      promotion_target: "shadow_only"
    filter:
      type: "REL_VOL_STATE"
      column: "rel_vol_{session}"
      thresholds: ["q4_plus_q5", "continuous_0.5_0.75_1.0_1.25_1.5"]
    scope:
      instruments: [MNQ]
      sessions: [ALL_CANONICAL_5M]
      rr_targets: [1.5]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 2
    kill_criteria:
      - "Neither Q4+Q5 nor continuous beats parent on IS daily delta after BH at the family K."
      - "IS winner fails OOS direction match on daily delta."
      - "Continuous desired sizing shows material positive IS edge but loses most of it in executable single-account approximation."

