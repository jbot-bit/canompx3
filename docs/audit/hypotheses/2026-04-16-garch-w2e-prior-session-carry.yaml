metadata:
  name: garch-w2e-prior-session-carry
  owner: codex
  created_at: 2026-04-16
  testing_mode: family
  holdout_date: 2026-01-01
  scope_note: >
    Narrow validated-shelf cross-session conditioning test. Ask whether
    garch_high adds value to same-day, fully-resolved prior-session state on
    the LONDON_METALS -> EUROPE_FLOW handoff. No static session-order inference.

rules:
  canonical_truth_only: true
  validated_shelf_only: true
  deployment_inference_forbidden: true
  descriptive_oos_only: true
  dynamic_chronology_required: true
  prior_trade_must_be_fully_resolved: true
  raw_recompute_required: true

target_handoff:
  prior_session: LONDON_METALS
  target_session: EUROPE_FLOW

admissible_inputs:
  - garch_forecast_vol_pct
  - target_break_direction
  - prior_trade_direction
  - prior_trade_outcome
  - prior_trade_entry_ts
  - prior_trade_exit_ts
  - dynamic_target_session_start_ts

banned_inputs:
  - static_session_order_only
  - prior_sessions_broken
  - prior_sessions_long
  - prior_sessions_short
  - future_session_data
  - break_delay_min
  - overnight_range_pct

family_candidates:
  - id: w2e_h1
    name: london-metals-win-opposed-hostile-with-garch
    description: >
      If the same-day prior LONDON_METALS trade resolved as a win in the
      direction opposed to the later EUROPE_FLOW breakout, that state may be
      hostile, and garch_high may amplify that hostility into a stronger veto.
    prior_state:
      type: PRIOR_WIN_OPPOSED
    garch_state:
      type: GARCH_HIGH
      threshold_pct: 70
    expected_role: veto_pair
    scope:
      sessions: [EUROPE_FLOW]
      instruments: [MNQ, GC, MES, MGC]

  - id: w2e_h2
    name: london-metals-win-align-continuation-with-garch
    description: >
      If the same-day prior LONDON_METALS trade resolved as a win aligned with
      the later EUROPE_FLOW breakout, that state may support continuation, and
      garch_high may strengthen the take-side conditioning.
    prior_state:
      type: PRIOR_WIN_ALIGN
    garch_state:
      type: GARCH_HIGH
      threshold_pct: 70
    expected_role: take_pair
    scope:
      sessions: [EUROPE_FLOW]
      instruments: [MNQ, GC, MES, MGC]

validity_rules:
  require_same_symbol: true
  require_same_trading_day: true
  require_prior_entry_ts: true
  require_prior_exit_ts: true
  require_prior_outcome: true
  require_prior_exit_before_target_session_start: true
  require_target_garch_nonnull: true

sample_rules:
  min_total_per_validated_row: 50
  min_conjunction_per_family_state: 30
  if_no_supported_rows: not_testable_here

comparisons:
  - conjunction_vs_base
  - conjunction_vs_garch_only
  - conjunction_vs_carry_only

verdicts:
  - carry_take_pair
  - carry_veto_pair
  - garch_only
  - carry_only
  - unclear
  - not_testable_here

promotion_gates:
  - conjunction_beats_relevant_marginal
  - local_family_support_non_thin
  - dynamic_chronology_passes
  - raw_recompute_matches_report

kill_criteria:
  - static_order_used_instead_of_dynamic_timing
  - prior_trade_not_fully_resolved
  - scope_widened_due_to_thin_rows
  - descriptive_oos_used_for_promotion
  - deployment_claim_made
