metadata:
  name: "mnq-usdata1000-downside-displacement-take-v1"
  purpose: "Exact bridge prereg for MNQ US_DATA_1000 O5 E2 RR1.0 long downside-displacement family as a take overlay"
  date_locked: "2026-04-22T23:40:00+10:00"
