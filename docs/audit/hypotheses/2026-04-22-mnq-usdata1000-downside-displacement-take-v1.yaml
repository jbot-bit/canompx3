  total_expected_trials: 1
  testing_mode: "individual"

hypotheses:
  - id: 1
    name: "MNQ US_DATA_1000 long downside-displacement family"
    theory_citation: |
      Crabel, Toby. Day Trading with Short Term Price Patterns and Opening Range Breakout.
      Repo-local mechanism grounding: docs/institutional/mechanism_priors.md,
      RESEARCH_RULES.md mechanism-first doctrine, and
      docs/audit/results/2026-04-22-mnq-prior-day-family-board-v1.md.
    economic_basis: |
      On MNQ US_DATA_1000, long breakouts whose ORB midpoint forms below or
      near prior-day low represent downside displacement / failed-auction
      context rather than neutral congestion. The exact research claim is that
      this broader prior-day downside-displacement family should behave as a
      positive take overlay on the already-positive US_DATA_1000 RR1.0 long
      parent lane. The long-direction restriction is owned by the filter
      itself so discovery does not widen to short breaks.
    filter:
      type: "PD_DISPLACE_LONG"
      column: "orb_mid vs prev_day_low"
      thresholds:
        - "orb_mid < prev_day_low"
        - "|orb_mid - prev_day_low| / atr_20 < 0.15"
    scope:
      instruments: [MNQ]
      sessions: [US_DATA_1000]
      rr_targets: [1.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "Experimental row does not match the exact audited strategy surface"
      - "IS expectancy on-signal is non-positive after canonical discovery write"
      - "Validator rejects the row for lifecycle illegality, Phase 4 gates, walk-forward insufficiency, or era instability"
