metadata:
  name: "mnq_usdata1000_pdgolong_rr10_chordia_unlock_v1"
  purpose: "Bounded exact-lane Chordia unlock audit for MNQ US_DATA_1000 O5 RR1.0 PD_GO_LONG. No theory grant is claimed."
  date_locked: "2026-05-10T00:00:00+10:00"
  holdout_date: "2026-01-01"
  total_expected_trials: 1
  testing_mode: "family"
  research_question_type: "conditional_role"

execution:
  mode: "bounded_runner"
  entrypoint: "research/chordia_strict_unlock_v1.py"

authority:
  primary:
    - "RESEARCH_RULES.md"
    - ".claude/rules/backtesting-methodology.md"
    - ".claude/rules/research-truth-protocol.md"
    - "docs/institutional/pre_registered_criteria.md"
    - "docs/runtime/chordia_audit_log.yaml"
    - "docs/audit/results/2026-05-04-allocator-paused-pool-diagnosis.md"
    - "docs/audit/results/2026-05-02-prior-day-context-blocker-memo.md"
  notes:
    - "This is an unlock audit for one already-validated shelf candidate, not a fresh discovery scan."
    - "Criterion 4 strict threshold t >= 3.79 applies because no theory citation is claimed."
    - "Mode A holdout remains sacred from 2026-01-01."

scope:
  instrument: MNQ
  strategy_id: "MNQ_US_DATA_1000_E2_RR1.0_CB1_PD_GO_LONG"
  session: US_DATA_1000
  orb_minutes: 5
  entry_model: E2
  confirm_bars: 1
  rr_target: 1.0
  direction: pooled
  filter_type: PD_GO_LONG
  filter_source: "trading_app.config.ALL_FILTERS['PD_GO_LONG']"
  out_of_scope:
    - "prior-day-context sibling strategies"
    - "theory-grant upgrade for prior-day directional context"
    - "allocator, sizing, schema, or live-execution changes"
    - "writes to validated_setups or chordia_audit_log.yaml before execution evidence exists"

data_policy:
  is_window:
    description: "trading_day < HOLDOUT_SACRED_FROM"
    constant_source: "trading_app.holdout_policy.HOLDOUT_SACRED_FROM"
    locked_boundary: "2026-01-01"
  oos_window:
    description: "trading_day >= HOLDOUT_SACRED_FROM"
    policy: "read-only descriptive corroboration only; never used to tune the lane"
  tuning_against_oos: false
  canonical_layers_only: true

grounding:
  filter_grounding_status:
    verdict: "UNSUPPORTED"
    basis: >
      Prior-day directional context has existing project evidence but does not
      have a committed local literature-backed theory grant in this file.
      Strict no-theory Chordia threshold applies.

upstream_discovery_provenance:
  role: "PROVENANCE_ONLY"
  sources:
    - "docs/audit/results/2026-05-04-allocator-paused-pool-diagnosis.md"
    - "docs/audit/results/2026-05-02-prior-day-context-blocker-memo.md"
  note: >
    Prior docs motivate this audit but are not verdict evidence. Fresh
    execution against canonical layers is required.

primary_schema:
  family_cells:
    - id: "MNQ_US_DATA_1000_O5_RR1.0_PD_GO_LONG"
      strategy_id: "MNQ_US_DATA_1000_E2_RR1.0_CB1_PD_GO_LONG"
      instrument: MNQ
      session: US_DATA_1000
      orb_minutes: 5
      rr_target: 1.0
      filter: PD_GO_LONG
  k_family: 1
  k_global: 1
  k_lane: 1
  k_session: 1
  chordia_threshold_basis: "Criterion 4 no-theory strict threshold (t >= 3.79)"
  promotion_gate: "PASS_CHORDIA only; PASS_PROTOCOL_A is not available in this prereg"

hypotheses:
  - id: 1
    name: "MNQ US_DATA_1000 O5 RR1.0 PD_GO_LONG exact-lane strict unlock"
    economic_basis: >
      Bounded exact-lane replay of a pre-existing validated shelf candidate.
      The audit asks whether the configured lane clears the strict no-theory
      Chordia hurdle without a post-hoc theory grant.
    role:
      kind: "standalone"
      parent: "Exact MNQ_US_DATA_1000_E2_RR1.0_CB1_PD_GO_LONG canonical lane replay on orb_outcomes x daily_features."
      comparator: "Strict Chordia threshold and descriptive OOS sign monitor; no sibling rescue or parameter variation."
      primary_metric: "selected_trade_mean_r"
      promotion_target: "chordia_audit_unlock_only"
    filter:
      type: "PD_GO_LONG"
      column: "prior_day_context"
      thresholds:
        - "fire_vs_off"
    scope:
      instruments: [MNQ]
      sessions: [US_DATA_1000]
      rr_targets: [1.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
      orb_minutes: [5]
    expected_trial_count: 1
    kill_criteria:
      - "IS t-stat < 3.79"
      - "IS ExpR <= 0.0"
      - "N_IS_on < 100"
      - "If OOS N >= 30, OOS sign opposes IS sign"
      - "Canonical filter delegation diverges from trading_app.config"
      - "Scratch/null handling is not explicit in the measured trade stream"
    statement: >
      On the fixed MNQ US_DATA_1000 O5 E2 CB1 RR1.0 lane using the canonical
      PD_GO_LONG filter, the IS sample remains positive and strong enough to
      clear the strict no-theory Chordia severity gate when recomputed honestly
      on canonical Mode-A data.
    pass_metric:
      metric: "t_IS"
      formula: "compute_chordia_t(sharpe_IS, N_IS) on canonical IS fired trades after canonical filter delegation"
      threshold_gte:
        t_is: 3.79
        n_is_on: 100
        expr_is: 0.0
      extra_gates:
        - "dir_match_oos = true when OOS N is sufficient for a descriptive read"
        - "adversarial split table emitted"
        - "scratch-inclusive accounting required if scratch rows exist"
    counted_against_trial_budget: true

trial_budget:
  primary_selection_trials: 1
  schema_locked_before_any_metric: true

total_hypothesis_count: 1
total_expected_trials: 1
budget_check:
  max_allowed_clean: 300
  max_allowed_proxy: 2000
  status: "under budget"

decision_rule:
  continue_if: "H1 clears strict t >= 3.79 with positive IS ExpR and no harness failure"
  park_if: "H1 clears strict IS gates but OOS directional corroboration is ambiguous"
  kill_if: "H1 fails t or ExpR gates, or execution integrity fails"

outputs_required_after_run:
  - "result markdown at docs/audit/results/2026-05-10-mnq-usdata1000-pdgolong-rr10-chordia-unlock-v1.md"
  - "row-level CSV with IS/OOS split, raw/effective pnl_r, and scratch/null handling"
  - "single-cell summary table with N_IS_on, ExpR_IS, Sharpe_IS, t_IS, OOS sign check, and verdict"
  - "explicit statement that no theory grant was used"

execution_gate:
  allowed_now: true
  execution_surface: "WSL with .venv-wsl"
  forbidden_now:
    - "theory-grant upgrade without new resources-backed citation"
    - "sibling-cell rescue"
    - "auto-writing PASS rows into chordia_audit_log.yaml without execution evidence"
