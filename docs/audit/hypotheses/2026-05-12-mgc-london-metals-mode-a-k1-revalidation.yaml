data_policy:
  is_window:
    description: "trading_day < HOLDOUT_SACRED_FROM"
    constant_source: "trading_app.holdout_policy.HOLDOUT_SACRED_FROM"
    locked_boundary: "2026-01-01"
    effective_first_day: "2022-06-13"
    effective_first_day_source: "MIN(trading_day) FROM orb_outcomes WHERE symbol='MGC' AND orb_label='LONDON_METALS' AND orb_minutes=30 AND entry_model='E1' AND rr_target=1.5 AND confirm_bars=1, verified live 2026-05-12"
    effective_years: 3.6
    per_year_is_counts: {2022: 144, 2023: 256, 2024: 259, 2025: 257}
    total_is_trade_count_pre_filter: 916
  oos_window:
    description: "HOLDOUT_SACRED_FROM <= trading_day < CURRENT_DATE"
    policy: "read-only descriptive corroboration only; cannot rescue an IS-kill nor kill an IS-pass except via the explicit dir_match-with-power-floor clause in kill_criteria."
  tuning_against_oos: false
  canonical_layers_only: true
  scratch_policy: "realized-eod"
  scratch_policy_justification: >
    Per pre_registered_criteria.md Criterion 13 default after Stage 5
    outcome_builder fix landed. Excluding scratches via WHERE pnl_r IS NOT NULL
    inflated ExpR 10-45 percent on MNQ E2 CB1 survivor lanes
    (memory/feedback_scratch_pnl_null_class_bug.md). LONDON_METALS is a
    session-bounded lane; scratches at session end MTM count via
    pipeline.cost_model.pnl_points_to_r. Literature:
    docs/institutional/literature/bailey_lopezdeprado_2014_dsr_sample_selection.md.

feature_definition:
  feature_name: ORB_VOL_8K
  canonical_source_of_truth: "trading_app.config.ALL_FILTERS['ORB_VOL_8K']"
  delegation_wrapper: "research.filter_utils.filter_signal(df, 'ORB_VOL_8K', 'LONDON_METALS')"
  column_source: "ORB-window cumulative volume from canonical orb_outcomes / daily_features columns; first complete at ORB end (LONDON_METALS ORB ends 17:30 Brisbane for O30)."
  trade_time_knowable: true
  first_complete_time: "ORB end (17:30 Brisbane for LONDON_METALS O30)"
  temporal_alignment_note: >
    ORB-window volume is a § 6.1 safe feature — measured strictly within the
    ORB window (17:00-17:30 Brisbane for LONDON_METALS O30) and complete before
    E1 entry at ORB close. No § 6.2 conditional-validity feature is read; no
    overnight_*, session_*, or break-bar feature is consulted at entry time.
    E1 entry model means range-cross at ORB close, NOT break-bar — § 6.3
    break-bar-look-ahead concerns do not apply.
  lookahead_check: "Required PASS before execution. Runner must emit ORB_VOL_8K fire mask vs trading_app.config delegation parity check."

grounding:
  core_orb_premise:
    - source_file: "resources/Building_Reliable_Trading_Systems.pdf"
      extract_proxy: "docs/institutional/literature/fitschen_2013_path_of_least_resistance.md"
      use: "Grounds intraday trend-follow / breakout continuation as a strategy class. Fitschen Ch 3 is equity-index-specific; LONDON_METALS gold breakouts are a within-class extension, not a Fitschen-grounded mechanism. No theory grant inherited."
      with_theory_claim: false
    - source_file: "resources/Trading_Exchanges_Harris_2002.pdf"
      extract_proxy: "docs/institutional/literature/harris_2002_trading_exchanges_microstructure.md"
      use: "Harris Ch 4 § 4.5.2 stop-cascade liquidity-demand mechanism grounds breakout entries in general. Not LONDON_METALS-specific."
      with_theory_claim: false
  filter_grounding_status:
    verdict: NO_THEORY_GRANT
    basis: >
      No local literature extract grounds ORB-window cumulative volume as a
      causal alpha mechanism on LONDON_METALS gold. ORB_VOL_8K is a volume
      threshold; it survives here as an execution / liquidity gate, not a
      theory-grounded edge. Therefore Chordia strict no-theory threshold
      t >= 3.79 applies (Criterion 4, no-theory branch). Per chordia_audit_log.yaml
      default_has_theory=false, 0 MGC entries exist; this is the first.

