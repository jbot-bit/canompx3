hypotheses:
  - id: 1
    type: primary
    name: "MGC LONDON_METALS O30 E1 RR1.5 CB1 ORB_VOL_8K Mode-A K=1 revalidation"
    theory_citation: >
      No filter-mechanism theory citation. See testing_discipline.theory_citation.
      Confirmatory revalidation of a MODE_B-contaminated discovery, Chordia
      strict no-theory threshold t >= 3.79 binding.
    economic_basis: >
      Question is honest: does this stored "validated" lane still clear strict
      Chordia severity under canonical Mode-A IS with the canonical filter
      delegation and scratch-realized-eod accounting? The 12-lane cohort was
      promoted under a pre-Phase-0 brute-force regime (discovery_k=19195 on a
      2.70-yr horizon, ~600x Bailey violation). If the single best family head
      cannot clear strict t>=3.79 under Mode-A re-measurement, the cohort has
      no claim to institutional validation and Stage 2 must not run.
    role:
      kind: standalone
      parent: "Mode-A canonical replay of MGC_LONDON_METALS_E1_RR1.5_CB1_ORB_VOL_8K_O30 on orb_outcomes JOIN daily_features."
      comparator: "Selected trades vs absolute Chordia floor t>=3.79 and ExpR>0; descriptive OOS sign monitor with power-tier; no sibling rescue, no parameter variation."
      primary_metric: "selected_trade_mean_r_IS"
      promotion_target: "stage_2_eligibility_only"
    filter:
      type: "ORB_VOL_8K"
      column: "ORB-window cumulative volume from orb_outcomes / daily_features"
      thresholds:
        - "fire_vs_off (canonical delegation only)"
    scope:
      instruments: [MGC]
      sessions: [LONDON_METALS]
      rr_targets: [1.5]
      entry_models: [E1]
      confirm_bars: [1]
      stop_multipliers: [1.0]
      stop_multiplier_note: "1.0 only — explicitly excludes _S075 stop-multiplier variants that exist among the 4 remaining family heads. Strategy_id has no _S{n} suffix per make_strategy_id convention (suffix only emitted when stop_multiplier != 1.0)."
      orb_minutes: [30]
    expected_trial_count: 1
    statement: >
      Under canonical Mode-A IS (trading_day < 2026-01-01) on
      orb_outcomes JOIN daily_features with research.filter_utils.filter_signal
      ('ORB_VOL_8K', 'LONDON_METALS') as the fire mask and realized-eod scratch
      accounting, the selected-trade sample produces t_IS >= 3.79, ExpR_IS > 0,
      N_IS_on >= 100, and years_positive_IS >= 3 of 4 IS years
      (MGC IS window 2022-06-13 to 2025-12-31, denominator=4 verified live).
    pass_metric:
      metric: t_IS
      formula: "compute_chordia_t(sharpe_IS, N_IS) on canonical Mode-A IS fired trades after canonical filter delegation and realized-eod scratch accounting"
      threshold_gte:
        t_is: 3.79
        n_is_on: 100
        expr_is: 0.0
        years_positive_is: 3
      threshold_lt: {}
      extra_gates:
        - "dir_match_oos = true when oos_ttest_power tier is CAN_REFUTE (power >= 0.80)"
        - "dir_match_oos advisory only when tier is DIRECTIONAL_ONLY (power in [0.50, 0.80))"
        - "OOS sign mismatch with power tier STATISTICALLY_USELESS (power < 0.50) does NOT kill"
        - "adversarial split table emitted (per-year ExpR, t, N, sign)"
        - "scratch-inclusive accounting required; runner emits scratch_count and realized-eod pnl_r"
        - "filter delegation parity check vs trading_app.config.ALL_FILTERS['ORB_VOL_8K'] required"
    counted_against_trial_budget: true

trial_budget:
  primary_selection_trials: 1
  n_trials: 1
  schema_locked_before_any_metric: true
  minbtl_bound:
    formula: "MinBTL = 2 * ln(N_trials) / E[max_N]^2 (Bailey et al 2013 Theorem 1)"
    n_trials: 1
    minbtl_years_required: 0.00
    clean_years_available: 2.70
    clean_years_source: "scripts/tools/minbtl_retro_report.CLEAN_YEARS_BY_INSTRUMENT['MGC'] (doctrine constant; conservative vs the 3.6yr effective IS row span)"
    n_max_at_horizon: 3
    operational_cap: 300
    within_cap: true
    verdict: PASS
    cap_reference: "estimate_k_budget(instrument=MGC, n_trials=1, e_max=1.0, proxy_extended=false) -> PASS, 2026-05-12"

total_hypothesis_count: 1
total_expected_trials: 1
budget_check:
  max_allowed_clean: 300
  max_allowed_proxy: 2000
  status: "under budget"

kill_criteria:
  - id: K1
    metric: t_IS
    threshold: "t_IS < 3.79"
    action: KILL_COHORT
    note: "Chordia strict no-theory severity floor. Failure parks all 12 MGC LONDON_METALS lanes."
  - id: K2
    metric: ExpR_IS
    threshold: "ExpR_IS <= 0"
    action: KILL_COHORT
    note: "Positive-mean floor. Negative selected-trade mean is not edge."
  - id: K3
    metric: N_IS_on
    threshold: "N_IS_on < 100"
    action: KILL_COHORT
    note: "Criterion 7 deployable-sample power floor. Cohort cannot be validated on <100 IS trades."
  - id: K4
    metric: years_positive_IS
    threshold: "years_positive_IS < 3 (absolute count, N>=10 per year, denominator=4 — MGC IS window is 2022-06-13 to 2025-12-31, verified live against orb_outcomes 2026-05-12)"
    action: KILL_COHORT
    note: "Criterion 9 era stability. Denominator is 4 (not 7) because MGC Databento coverage begins mid-2022; this is the same horizon the Bailey K-budget gate consumed (clean_years=2.70). Requiring 3 of 4 positive years is the strict-Bailey analog of the standard 4-of-7 rule on longer-horizon instruments."
  - id: K5
    metric: WFE_modeA
    threshold: "WFE_modeA < 0.50"
    action: KILL_COHORT
    note: "Criterion 6. Stored WFE is MODE_B-contaminated and disregarded; this is a fresh Mode-A WFE computation."
  - id: K6
    metric: dir_match_oos
    threshold: "dir_match_oos = false AND oos_ttest_power tier = CAN_REFUTE (power >= 0.80)"
    action: KILL_COHORT
    note: "OOS power-floor-gated dir_match. Underpowered OOS sign mismatch does NOT trigger this kill."
  - id: K7
    metric: filter_delegation_parity
    threshold: "fire-mask divergence from trading_app.config.ALL_FILTERS['ORB_VOL_8K'] > 0 rows"
    action: ABORT_AND_FIX
    note: "Canonical filter delegation must match. Abort, fix, rerun (does not count as new trial)."
  - id: K8
    metric: scratch_accounting
    threshold: "runner uses WHERE pnl_r IS NOT NULL or any scratch-drop equivalent"
    action: ABORT_AND_FIX
    note: "Criterion 13 scratch_policy=realized-eod is binding. Abort, fix, rerun."

decision_rule:
  continue_if: "All of K1-K6 cleared with K7-K8 PASS — cohort earns Stage-2 family-scan eligibility (max 2 additional lanes, strict Bailey K_max=3)."
  park_if: "K1-K5 cleared but K6 fires with power tier DIRECTIONAL_ONLY — Stage-1 verdict UNVERIFIED; cohort parks; revisit when OOS power tier reaches CAN_REFUTE."
  kill_if: "Any of K1-K5 fires, OR K6 fires with power tier CAN_REFUTE — all 12 MGC LONDON_METALS lanes park as not_revalidated_strict_chordia."

methodology_rules_applied:
  - rule: "RULE 1 feature temporal alignment"
    application: "ORB_VOL_8K reads ORB-window volume only; § 6.1 safe. No § 6.2 conditional-validity feature used. E1 entry (range-cross at ORB close) avoids § 6.3 break-bar-look-ahead class entirely."
  - rule: "RULE 2 filter application timing"
    application: "Filter fires at ORB end (17:30 Brisbane for LONDON_METALS O30) before E1 entry. Trades skipped on filter=off; not retro-filtered."
  - rule: "RULE 3 IS/OOS discipline"
    application: "IS = trading_day < 2026-01-01; OOS read-only descriptive with power-tier gate. No OOS tuning."
  - rule: "RULE 3.3 OOS power floor"
    application: "K6 dir_match kill gated by research.oos_power.oos_ttest_power tier; underpowered OOS does not kill."
  - rule: "RULE 4 multiple testing"
    application: "K_family = K_global = K_lane = K_session = 1 for this prereg (Pathway B K=1). Upstream discovery K=19195 is recorded under upstream_discovery_provenance.role=PROVENANCE_ONLY and is NOT the K of this test. Per Amendment 3.0, Pathway-B individual does not apply multi-framing K to itself."
  - rule: "RULE 4.2 MinBTL budget"
    application: "estimate_k_budget PASS: 0.00yr required, 2.70yr available, n_max_at_horizon=3, operational cap 300. Verdict PASS recorded 2026-05-12."
  - rule: "RULE 6 trade-time knowability"
    application: "ORB_VOL_8K first-complete-time = ORB end (17:30 Brisbane). E1 entry fires AFTER ORB close. Trade-time-knowable = true. Lookahead_check required PASS before execution."
  - rule: "RULE 9 canonical data source"
    application: "Reads orb_outcomes JOIN daily_features only. No derived-layer (validated_setups stored numbers used only for candidate identification, NOT evidence)."
  - rule: "research-truth-protocol canonical filter delegation"
    application: "research.filter_utils.filter_signal mandatory; no inline filter re-encoding. K7 parity check enforces."
  - rule: "Criterion 13 scratch policy"
    application: "realized-eod required; WHERE pnl_r IS NOT NULL forbidden. K8 enforces."
  - rule: "Amendment 2.1 DSR scale"
    application: "DSR Z-score from trading_app/strategy_discovery.py recorded for cross-check only; not a kill criterion. CDF scale fix is filed tech debt."
  - rule: "Mode-B grandfathered baseline rule"
    application: "validated_setups stored expectancy_r=0.5212 NOT used as baseline. Mode-A IS recomputed from canonical orb_outcomes; candidate selected by stored ExpR ranking among family heads only."

