    - "Criterion 5 DSR (Z-score scale per Amendment 2.1) cross-check only — not a kill criterion at this stage; advisory."
  theory_citation: >
    No filter-mechanism theory citation available for ORB_VOL_8K on
    LONDON_METALS. Strategy-class grounding from Fitschen 2013 Ch 3 (intraday
    trend-follow on equity indices, not commodities) and Harris 2002 Ch 4
