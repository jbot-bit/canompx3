relationship_to_predecessors: |
  D4 framed garch>70 as a NEW LANE candidate at RR1.0 -> failed RULE 7 additivity (subset of deployed
  lane) and Amendment 3.2 MinTRL (5.5y to N=131 OOS-on at gate-only accrual rate).
  D5 framed garch>70 as a CONDITIONAL HALF-SIZE on RR1.5 deployed lane (off-cohort sized 0.5x)
  -> KILL on paired-p (t=-1.45, p=0.148) and C9 (2019 era ExpR_D5=-0.108 < -0.05 floor).
  D6 is a DIFFERENT ROLE: pure sizing-OVERLAY observation on the deployed RR1.5 lane.
  Not a new lane (no validated_setups insert). Not a conditional half-size (no off-cohort
  modification). The role is "binary regime gate that modulates risk allocation INSIDE
  the existing lane's already-validated trade set." See `docs/runtime/decision-ledger.md`
  entry `pr48-mgc-shadow-overlay-design` for the precedent overlay-contract pattern.

relationship_to_parked_r3_continuous_sizing:
  context_note: |
    docs/institutional/mechanism_priors.md § 7 line 145 PARKED the R3 continuous-sizing
    role 2026-04-27. Stage-1 sizing-substrate diagnostic (K=48, 6 deployed lanes x 8
    features; pre-reg docs/audit/hypotheses/2026-04-27-sizing-substrate-prereg.yaml,
    result docs/audit/results/2026-04-27-sizing-substrate-diagnostic.md) returned
    SUBSTRATE_WEAK across all 18 deployed-filter substrate cells (ORB_G5 / ATR_P50 /
    COST_LT12 across raw / vol_norm / rank_252d). Reopen of the continuous R3 role
    requires "AFML Ch.19 sigmoid bet-sizer recipe (NOT in resources/) AND fresh
    per-lane mechanism citation AND new pre-reg."
  why_d6_does_not_collide_with_the_parked_status: |
    D6 is NOT a continuous-sizing substrate test. The parked R3 hypothesis was: "do
    deployed binary filters (ORB_G5, ATR_P50, COST_LT12) carry a CONTINUOUS predictive
    gradient on the same column they already select on?" Answer 2026-04-27: no.

    D6 is a different and orthogonal hypothesis: "does a SEPARATE binary regime
    predicate (garch>70) stratify per-trade R on top of the deployed binary filter
    (ORB_G5)?" The 2026-04-27 diagnostic did NOT test this. It tested CONTINUOUS
    feature gradients on the same feature class as the deployed filter.

    Mechanism distinction:
      - R3 continuous sizing (parked): expects monotonic per-trade R lift with
        feature percentile of the SAME feature class as the deployed filter; tests
        by IS-only quantile bin regression. FAILED.
      - D6 binary regime overlay (this pre-reg): expects two-mean separation under
        a single literature-grounded threshold on a DIFFERENT feature class
        (garch_forecast_vol_pct, not orb_size); tests via Welch t on lift between
        gate-on / gate-off subsets. UNRESOLVED until this pre-reg's harness runs.

    These are different role classes per mechanism_priors.md § R1-R8: R3 is the
    POSITION-SIZE modifier role at continuous granularity on the same-class feature;
    the D6 hypothesis is structurally R1-class (binary FILTER role with a regime
    gate from a separate feature class).
  reopen_conditions_check_defensive: |
    Per § 7 line 145, R3 reopen requires three things. Documenting compliance even
    though D6 is NOT the R3 hypothesis, to be defensive:
    (1) AFML Ch.19 sigmoid bet-sizer recipe -- NOT in resources/. D6 does NOT
        invoke a sigmoid bet-sizer; D6 is binary, not continuous. Condition 1
        N/A under D6 framing.
    (2) Fresh per-lane mechanism citation. D6 cites Carver Ch 9-10 vol-targeting
        + Chan Ch 7 p.155-157 stop-cascade verbatim -- both pre-existing in
        docs/institutional/literature/. SATISFIED.
    (3) New pre-reg. This file. SATISFIED.

