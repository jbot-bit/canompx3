    Partition: gate_on = (garch_forecast_vol_pct > 70) else gate_off

amendment_3_2_min_trl_classification:
  computed_at: pre_reg_write_time   # 2026-04-29
  inputs:
    sd_per_trade_R: 1.171           # IS gate-on cohort sd (per query 2026-04-29)
    expected_effect_R: 0.1947       # IS lift = ExpR_on - ExpR_off (per query 2026-04-29)
    z_alpha: 1.96
    z_beta: 0.84
  required_N_oos_on_unfloored: 284  # ceil((1.171 / 0.1947 * (1.96+0.84))^2)
  required_N_oos_on_floored: 284    # max(284, 50) = 284 — Amendment 3.1 floor non-binding
  expected_oos_on_per_year_basis_a_is_rate:
    formula: N_IS_on / years_IS = 370 / 6.65
    value: 55.6
  expected_oos_on_per_year_basis_b_observed_oos_rate:
    formula: N_OOS_on_observed / oos_years_so_far = 37 / 0.309
    value: 119.6
    note: |
      Observed OOS gate-on rate is much higher than IS-rate basis would predict —
      this is genuine cohort-level acceleration, not measurement artifact. Both
      bases are reported per Amendment 3.2 transparency requirement.
  min_trl_years_basis_a: 5.10       # 284 / 55.6 — IS-rate basis
  min_trl_years_basis_b: 2.37       # 284 / 119.6 — observed-OOS-rate basis
  classification: NOT_OOS_CONFIRMABLE_UNDER_AMENDMENT_3_2
  classification_path_chosen: CONDITIONAL_DEPLOY
  classification_justification: |
    Both basis-A (5.10y) and basis-B (2.37y) exceed the 2.0y EXTENDED_PARK ceiling.
    Per Amendment 3.2, NOT_OOS_CONFIRMABLE cells must choose between
    CONDITIONAL_DEPLOY or KEEP_PARKED_INDEFINITELY at write time, with no post-hoc
    relabeling permitted.

    CONDITIONAL_DEPLOY chosen on the following cited evidence:
      1. Carver Ch 9-10 + Chan Ch 7 grounds the sizing-overlay role (theory_citation
         summary above) — this is not a fresh hypothesis, it is a documented
         vol-targeting framework reduction.
      2. IS lift |t|=2.76 (p=0.0059) — at-the-line for Chordia with-theory threshold
         (3.00) but well above raw p<0.05 — see "decision_rule.is_t_under_3_handling"
         below for honest treatment.
      3. IS gate-on vs zero |t|=4.07 — strong absolute edge on the gate-on cohort.
      4. C9 era stability: 5/6 IS years gate-on positive at N>=10; zero years
         fail the (N>=50, ExpR<-0.05) gate. 2023 N=10 ExpR=-0.31 is the soft spot
         but excluded from C9 strict eval per Amendment 3.1 wording (N<50 not
         counted as fail).
      5. OOS already accruing: N_OOS_on=37 (close to 50 floor), OOS lift=+0.6934R
         (>>0.40 * IS lift), dir_match=true, OOS lift |t|=2.61, p=0.011.
      6. Shiryaev-Roberts monitor (Criterion 12) is wired and live for the deployed
         lane — `trading_app/sr_monitor.py` will detect drift within ARL ~60
         trading days, so live-shadow has a structural circuit-breaker.

    KEEP_PARKED_INDEFINITELY rejected because:
      - The cell already has dir-matched OOS evidence (37 fills, +0.69R lift).
        Locking it parked indefinitely would be a Bailey 2013 p.7 kind of false
        comfort — pretending evidence is missing when it is in fact accumulating.

