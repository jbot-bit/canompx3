testing_discipline:
  pathway: B_individual
  k: 1
  significance_threshold:
    raw_p: "< 0.05 two-sided"
    effect_size_chordia: "|t| >= 3.00 with theory citation per Chordia et al 2018"
    note: |
      Theory citation present (Carver Ch 9-10 vol-targeting + Chan Ch 7 stop-cascade
      mechanism — see hypothesis H1 theory_citation block). Therefore Chordia t>=3.00
      with-theory threshold applies, NOT the t>=3.79 without-theory threshold.
  mandatory_downstream_gates_non_waivable:
    - C6_WFE                      # Walk-forward efficiency >= 0.50 on the LIFT
    - C8_OOS                      # 2026 OOS positive on the LIFT (not the lane), with Amendment 3.2 power-floor
    - C9_ERA_STABILITY            # No era ExpR_on < -0.05 with N>=50; gate-on years with N<10 excluded from positive count denominator
  theory_citation_summary: |
    Carver Ch 9-10 (verbatim docs/institutional/literature/carver_2015_volatility_targeting_position_sizing.md):
    daily volatility forecast is the basis for position-sizing. High-vol regimes correlate
    with stronger directional follow-through on intraday breakouts (Chan Ch 7 stop-cascade
    mechanism, verbatim docs/institutional/literature/chan_2013_ch7_intraday_momentum.md
    p.155-157). The mechanism predicts that breakouts under garch>70 conditions exhibit
    higher mean-R conditional on the lane already firing — a sizing-overlay role
    (mechanism_priors.md § R3 sizing modulator), not a new-lane role.

