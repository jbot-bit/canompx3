  computed_from: canonical_orb_outcomes_JOIN_daily_features
  is_window_baseline_n: 1577
  is_window_baseline_expr: 0.0941
  partition_by: garch_forecast_vol_pct > 70
  partition_baselines:
    gate_on:  {n: 370,  expr: 0.2477, sd: 1.171}
    gate_off: {n: 1019, expr: 0.0530, sd: 1.132}
  baseline_recompute_method: |
    Strict Mode A IS via canonical orb_outcomes JOIN daily_features (research-truth-protocol
    § Validated Universe Rule + § Mode B grandfathered warning). Verified live 2026-04-29
    against gold.db (DB max trading_day=2026-04-26).
  harness_cross_check_target: |
    Independent SQL via direct duckdb query (NOT via research.filter_utils) reproduces
    gate_on N=370, ExpR=+0.2477 within 1e-4. Genuine cross-method check, not a smoke test.

trial_budget:
  primary_selection_trials: 1
  schema_locked_before_any_metric: true
  k_global: 1
  k_family: 1
  k_lane: 1
  minbtl_bound:
    formula: "MinBTL = 2 * ln(N_trials) / E[max_N]^2 = 2 * ln(1) / 1.0^2 = 0"
    n_trials: 1
    e_max_n: 1.0
    within_cap: true
    cap_reference: pre_registered_criteria.md Criterion 2 (N <= 28 strict Bailey E=1.0 on 6.65y MNQ; here N=1)

kill_criteria:
  - id: KILL_IS_T
    metric: IS_t_lift
    threshold: "|t| < 2.5 on harness recomputation"
    action: |
      DEAD. Mark cell as `GARCH_70_OVERLAY_DEAD` in decision-ledger.
      Future re-open requires a NEW theory citation that materially changes
      expected_effect_R per Amendment 3.2 stop conditions.
    rationale: |
      |t| < 2.5 on a hypothesis with this much IS support and this much theory
      grounding would indicate the partition is unstable — even a fakeout-fragility
      finding. No room for post-hoc rescue.
  - id: KILL_C9_HARD
    metric: C9 era stability
    threshold: "any IS year with N>=50 has ExpR_on < -0.05"
    action: DEAD. Era-dependent edge per Amendment 3.1.
  - id: KILL_POS_MEAN_FLOOR
    metric: positive_mean_floor
    threshold: "ExpR(gate_off) <= 0 AND ExpR(gate_on) <= 0"
    action: DEAD. Lift would come from making things less bad, not better.
  - id: KILL_DIR_MISMATCH_OOS
    metric: OOS_lift sign
    threshold: "OOS_lift < 0 AND |OOS_t| > 2.0"
    action: |
      Suspended. The harness flags the cell for SR-monitor-driven re-eval. If
      Shiryaev-Roberts already alarms within 60 days, formal KILL.
  - id: KILL_SR_ALARM
    metric: Shiryaev-Roberts monitor on deployed lane (already wired)
    threshold: SR alarm fires within 60 trading days post pre-reg lock
    action: |
      DEAD. Per Amendment 3.2 stop conditions, CONDITIONAL_DEPLOY classification
      reverts to KEEP_PARKED_INDEFINITELY when SR alarms.

decision_rule:
  continue_if: |
    Harness recomputes |IS_t| >= 3.00 (Chordia with-theory) AND IS_lift >= 0.10
    AND positive_mean_floor PASS AND C6_WFE >= 0.50 AND C9 PASS (per metric_5)
    AND no KILL fires.
    → Update D6 verdict in decision-ledger to CANDIDATE_READY_FOR_PHASE_2_OVERLAY_DESIGN.
    → Phase 2 pre-reg can be authored to define the live size-multiplier action.
    → Phase 1 carrier (shadow-only observation) goes live.
  park_if: |
    Harness recomputes |IS_t| in [2.5, 3.00) but other gates PASS.
    → CONDITIONAL_DEPLOY status retained but Phase 2 pre-reg gated until
      |IS_t| can be elevated by additional clean theory grounding (e.g., a
      Fitschen Ch 3 cross-class addition or a Ronen et al microstructure
      grounding) — never by re-running the same data.
  kill_if: |
    Any KILL_* criterion fires.
  is_t_under_3_handling: |
    The pre-reg-time observed |t|=2.76 is BELOW the 3.00 threshold but ABOVE the
    p<0.05 raw-p Pathway B floor. Per Amendment 3.0 condition 1, raw p<0.05 is
    sufficient for individual-pathway statistical significance; Chordia t>=3.00
    with-theory is an effect-size benchmark, not the primary gate. The two-tier
    interpretation:
      - If recomputed |t| >= 3.00: full PASS, decision_rule.continue_if applies.
      - If recomputed |t| in [2.5, 3.00) and all other gates PASS:
        decision_rule.park_if applies — status retained as CONDITIONAL_DEPLOY but
        Phase 2 size-multiplier pre-reg gated until additional grounding lifts t.
      - If recomputed |t| < 2.5: KILL_IS_T fires.
    No post-hoc threshold relaxation permitted.

methodology_rules_applied:
  rule_1_feature_temporal_alignment:
    application: "garch_forecast_vol_pct is § 6.1 SAFE; first complete at prior trading day close. No § 6.2 gate needed."
  rule_2_filter_application_timing:
    application: "ORB_G5 base filter is canonical (orb_size>=5 at ORB end, pre-entry). Gate (garch>70) is also pre-entry. Both timing-clean."
  rule_3_is_oos_discipline:
    application: "Strict Mode A: IS = trading_day<2026-01-01; OOS = >=2026-01-01; HOLDOUT_SACRED_FROM constant from trading_app.holdout_policy."
  rule_4_multiple_testing:
    application: "K=1, Pathway B individual. Multi-framing K (K_global/K_family/K_lane) does NOT apply per Amendment 3.0 framing for individual-pathway K=1 confirmatory tests."
  rule_5_comprehensive_scope:
    application: "Scope deliberately narrow — single deployed lane, single predictor. Not a discovery scan; a confirmatory K=1 test on a hypothesis surfaced from the additivity-triage pre-flight."
  rule_6_trade_time_knowability:
    application: "garch_forecast_vol_pct is § 6.1 SAFE per backtesting-methodology.md. break_dir is NOT used (RULE 6.3 banned as predictor on E2; both-sides cohort avoids the issue entirely)."
  rule_7_tautology:
    application: |
      RULE 7 was the original D4 disqualifier as a NEW LANE candidate (corr 0.81 with
      deployed lane on the IS window). For D6 the role is OVERLAY ON the deployed lane,
      not a parallel lane. RULE 7 does not apply to overlay-role tests because there is
      no second position being added — same-day fills are not duplicated.
  rule_8_fire_rate_arithmetic:
    application: |
      Gate fires on 370/1389 = 26.6% of IS lane fills. Outside § 8.1 extreme range (5%-95%).
      |WR_spread| diagnostic: not yet computed at pre-reg write time; harness will emit.
  rule_9_data_source:
    application: "Canonical orb_outcomes JOIN daily_features only. No validated_setups, no edge_families, no live_config."
  rule_10_pre_registration:
    application: "This is the pre-reg. Locked before any harness execution."
  rule_11_audit_trail:
    application: "Result MD will land at docs/audit/results/2026-XX-XX-mnq-comex-settle-garch-d6-sizing-overlay-pathway-b-v1-result.md after harness runs. Decision-ledger slug will be `d6-mnq-comex-settle-garch-overlay-{verdict}`."
  rule_12_red_flags:
    application: |
      None of the |t|>7 / Δ_IS>0.6 / uniform-feature-class red flags trigger here.
      Pre-reg-time observed |t|=2.76, IS lift=0.1947R — well within Carver/Chan
      mechanism prior magnitudes for daily-vol-targeted intraday breakouts.
  rule_13_pressure_test:
    application: |
      Pressure test of the harness: inject `outcome` (look-ahead) as a sham predictor;
      the harness must REJECT it via T0 tautology check (corr with pnl_r ~ 1.0). If the
      harness silently accepts, the test fails. Required to land before harness runs.
  rule_14_pooled_finding:
    application: "N/A — single cell, single lane, single side. No pooled framing."

