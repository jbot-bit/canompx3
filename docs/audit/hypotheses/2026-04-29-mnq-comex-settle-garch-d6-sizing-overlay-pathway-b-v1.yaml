shiryaev_roberts_alarm_operationalization:
  monitor_file_path: trading_app/sr_monitor.py     # verified live 2026-04-29
  underlying_core: trading_app/live/sr_monitor.py ShiryaevRobertsMonitor + calibrate_sr_threshold
  arl_calibration: TARGET_ARL_DAYS = 60     # verified 2026-04-29 at trading_app/sr_monitor.py:40
  alarm_action: trading_app.lane_ctl.pause_strategy_id     # canonical pause; verified at trading_app/sr_monitor.py:209
  alarm_target_strategy_id: MNQ_COMEX_SETTLE_E2_RR1.5_CB1_ORB_G5     # the deployed lane this overlay observes
  what_the_alarm_means_for_d6: |
    The deployed MNQ_COMEX_SETTLE_E2_RR1.5_CB1_ORB_G5 lane is monitored TODAY by
    sr_monitor.py for distributional drift vs its 50-trade pre-change baseline
    (Pepelyshev-Polunchenko 2015 / Criterion 12). If the SR statistic exceeds the
    calibrated threshold (TARGET_ARL=60 trading days) at any point in the 60
    trading days following pre-reg lock, KILL_SR_ALARM fires. This terminates
    Phase 1 observation and reverts the cell classification from CONDITIONAL_DEPLOY
    to KEEP_PARKED_INDEFINITELY per Amendment 3.2 stop conditions.
  alarm_independence_from_overlay: |
    The SR monitor is wired to the deployed lane's overall fills, NOT to the
    overlay's gate-on subset. This is correct: an alarm fired by the overall
    lane drifting is sufficient evidence to kill the overlay theory, because
    the overlay's edge is conditional on the lane being statistically intact.
    A separate per-overlay SR monitor is OUT OF SCOPE for D6 and would be a
    Phase 2 design item.
  if_sr_alarm_fires_during_phase_1: |
    Action sequence (deterministic, locked at write time):
      1. pause_strategy_id is invoked by sr_monitor.py (existing wiring)
      2. D6 verdict in decision-ledger updates to GARCH_70_OVERLAY_DEAD_VIA_SR
      3. Amendment 3.2 path reverts: CONDITIONAL_DEPLOY -> KEEP_PARKED_INDEFINITELY
      4. Phase 2 (if not yet authored) is permanently barred for this cell
      5. Reopen requires NEW theory citation that materially changes
         expected_effect_R per Amendment 3.2 stop conditions.

