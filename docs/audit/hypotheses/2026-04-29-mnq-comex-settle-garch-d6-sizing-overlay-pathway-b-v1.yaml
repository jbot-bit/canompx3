hypotheses:
  - id: H1
    type: primary
    counted_against_trial_budget: true
    statement: |
      On the deployed lane MNQ_COMEX_SETTLE_E2_RR1.5_CB1_ORB_G5 over IS
      (trading_day < 2026-01-01), partitioning by garch_forecast_vol_pct > 70:
      mean per-trade R on the gate-on subset is materially higher than on the
      gate-off subset, by a margin that survives the binding gates listed
      under pass_metric.
    theory_citation:
      - source: docs/institutional/literature/carver_2015_volatility_targeting_position_sizing.md
        passage: "Ch 9 — annualised cash volatility target driven by daily volatility forecast"
        relevance: |
          Daily GARCH forecast → intraday vol-target sizing is the canonical
          Carver framework. The garch>70 regime is the upper tail of forecast
          where vol-targeted sizing would normally REDUCE size (defensive).
          Empirical observation here is that on this specific lane the
          breakout-momentum mechanism INCREASES per-trade R conditional on
          the regime — a non-trivial finding that requires the explicit
          forecast-combination framework Carver Ch 10 documents to interpret
          coherently as a sizing-overlay role.
      - source: docs/institutional/literature/chan_2013_ch7_intraday_momentum.md
        passage: "p.155-157 stop-cascade mechanism on intraday breakouts in volatile regimes"
        relevance: |
          High-vol regimes increase stop-density above and below ORB levels;
          breakouts that fire under high-vol regimes encounter denser stop-loss
          cascades, which the intraday momentum literature predicts will drive
          larger absolute moves. The mechanism is documented for 5-30min
          breakouts, which matches the 5m ORB / E2 / RR1.5 lane's holding-period
          horizon (Carver Ch 12 p.192 horizon-stop match).
    pass_metric:
      metric_1:
        name: IS_t_lift
        formula: "Welch t on (gate_on_pnl_r - gate_off_pnl_r) over IS cohort"
        threshold: "|t| >= 3.00 (Chordia with-theory)"
        observed_at_pre_reg_time: 2.76
        gate_handling_at_observed_value: |
          Observed pre-reg-time |t|=2.76 is BELOW the 3.00 threshold.
          NOT a pre-reg violation — the harness will recompute t at lock-time;
          the 2.76 figure was a planning estimate. If recomputed |t| >= 3.00,
          H1 metric_1 PASS. If recomputed |t| < 3.00, H1 metric_1 FAIL — see
          decision_rule.is_t_under_3_handling.
      metric_2:
        name: IS_lift_R
        formula: "ExpR(gate_on) - ExpR(gate_off) over IS cohort"
        threshold_gte: 0.10
        observed_at_pre_reg_time: 0.1947
      metric_3:
        name: positive_mean_floor
        formula: "ExpR(gate_on) > 0 AND ExpR(gate_off) > 0"
        threshold: both subsets positive (no negative-mean off-cohort can drive a spurious positive lift)
        observed_at_pre_reg_time: "gate_on=+0.2477, gate_off=+0.0530 — both positive"
      metric_4:
        name: c6_wfe
        formula: "WFE(IS-trained on lift, OOS-evaluated on lift) >= 0.50"
        threshold_gte: 0.50
        non_waivable: true   # Amendment 3.0 condition 4
      metric_5:
        name: c9_era_stability
        formula: |
          For each IS year y where gate-on N(y) >= 50, ExpR_on(y) >= -0.05.
          Years with gate-on N(y) < 50 EXCLUDED from C9 strict eval (Amendment 3.1 wording).
          Additionally: count of IS years with ExpR_on > 0 AND N(y) >= 10 must be >= 4.
        threshold:
          - "no year fails (N>=50, ExpR<-0.05)"
          - "positive years (N>=10): >= 4"
        observed_at_pre_reg_time:
          fails_n_ge_50: []   # zero
          positive_years_n_ge_10: [2020, 2021, 2022, 2024, 2025]   # 5 years
        non_waivable: true
      metric_6:
        name: c8_oos_with_amendment_3_2
        formula: |
          OOS_lift = ExpR_on(OOS) - ExpR_off(OOS); dir_match = (sign(IS_lift) == sign(OOS_lift));
          C8 PASS if N_OOS_on >= 50 AND dir_match AND OOS_lift >= 0.40 * IS_lift.
          C8 GATE_INACTIVE_LOWPOWER if N_OOS_on < 50 (Amendment 3.1).
          Under Amendment 3.2 NOT_OOS_CONFIRMABLE classification, harness reports
          C8 status but the cell has already been classified CONDITIONAL_DEPLOY
          at pre-reg write time, NOT PARK_PENDING_OOS_POWER.
        observed_at_pre_reg_time:
          n_oos_on: 37
          oos_lift_R: 0.6934
          dir_match: true
          oos_lift_ge_0_4_is_lift: true
          c8_status: GATE_INACTIVE_LOWPOWER (N=37 < 50)
        non_waivable: true   # gate inactivity is reported, not waived

