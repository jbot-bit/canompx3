version: 1
status: LOCKED
date: 2026-04-22
slug: mnq-atr-p50-cross-session-generalization-v1
title: "MNQ ATR_P50 cross-session generalization audit at fixed O15/O30 / RR1.5 geometry"
owner: codex

parent_chain:
  - "docs/audit/results/2026-04-21-orb-g5-deployed-lane-arithmetic-check.md — ATR_P50 identified as the only deployed non-size filter class needing separate truth-state"
  - "docs/audit/results/2026-04-21-l2-atr-p50-stability.md — merged audit says ATR_P50 is an instrument-wide vol-regime gate and recommends cross-session replication"
  - "docs/audit/results/2026-04-21-correction-aperture-audit-rerun.md — corrected L2 framing is O15, not the deprecated O5 aperture bug"
  - "docs/plans/2026-04-22-atr-p50-cross-session-lock.md — scope and anti-tunnel rationale"

purpose: |
  Determine whether canonical ATR_P50 is a real cross-session MNQ filter class
  on the aperture surface it already occupies in the repo (`O15`, `O30`), or
  merely a lane-local SINGAPORE_OPEN artefact.

  This is not a threshold search and not a deployment study. It is a class-level
  replication audit. The feature, threshold, instrument, aperture set, entry
  model, RR, and role are all frozen before any run.

deployment_not_done_here: |
  A positive result here does not authorize deployment changes. It only justifies
  a later lane-local follow-up. A negative result kills the broad cross-session
  ATR_P50 class claim at this frozen geometry.

authority:
  primary:
    - "RESEARCH_RULES.md"
    - "docs/STRATEGY_BLUEPRINT.md"
    - "docs/institutional/mechanism_priors.md"
    - "docs/institutional/pre_registered_criteria.md"
    - "docs/audit/results/2026-04-21-orb-g5-deployed-lane-arithmetic-check.md"
    - "docs/audit/results/2026-04-21-l2-atr-p50-stability.md"
    - "docs/audit/results/2026-04-21-correction-aperture-audit-rerun.md"
  notes:
    - "Mode A holdout remains sacred from 2026-01-01."
    - "This is a fixed univariate canonical-filter audit, not a multi-feature discovery scan."
    - "No threshold, session, RR, or role widening is allowed inside this prereg."
    - "Aperture scope is frozen to O15 and O30 only because both already exist in the repo ATR_P50 surface."

reproducibility:
  repo_root: "C:/Users/joshd/canompx3"
  commit_sha: "TO_FILL_AFTER_COMMIT"
  committed_required_before_run: true

testing_mode: family
pathway: A_fixed_family

scope:
  instrument: MNQ
  sessions_in_scope:
    - BRISBANE_1025
    - CME_PRECLOSE
    - CME_REOPEN
    - COMEX_SETTLE
    - EUROPE_FLOW
    - LONDON_METALS
    - NYSE_CLOSE
    - NYSE_OPEN
    - SINGAPORE_OPEN
    - TOKYO_OPEN
    - US_DATA_1000
    - US_DATA_830
  sessions_source: "canonical DISTINCT on orb_outcomes where symbol='MNQ' AND orb_minutes IN (15,30) AND entry_model='E2' AND rr_target=1.5 AND confirm_bars=1 AND pnl_r IS NOT NULL AND trading_day < DATE '2026-01-01'"
  apertures_in_scope:
    - 15
    - 30
  session_count_per_aperture: 12
  family_count_total: 24
  geometry:
    entry_model: E2
    confirm_bars: 1
    rr_target: 1.5
  role: R1_binary_overlay
  filter_type: ATR_P50
  filter_definition: "trading_app.config.OwnATRPercentileFilter(min_pct=50.0)"
  baseline: "unfiltered per-session lane at the same frozen geometry"
  out_of_scope:
    - "ATR_P30 / ATR_P70 / other ATR thresholds"
    - "O5 and any other apertures outside O15/O30"
    - "RR 1.0 / 2.0"
    - "R3 size modifiers or R8 allocator uses"
    - "cross-instrument tests"
    - "any ML or pooled meta-modeling"

