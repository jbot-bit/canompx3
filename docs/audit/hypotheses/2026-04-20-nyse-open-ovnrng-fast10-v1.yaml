    is_window_end_exclusive: 2026-01-01
    oos_window_start_inclusive: 2026-01-01
    oos_window_end_inclusive: 2026-04-19
  H1:
    claim: |
      Conditioning MNQ NYSE_OPEN 5m E2 RR1.0 CB1 breakout trades on
      (overnight_range ≥ 50 points) AND (break delay ≤ 10 min) produces
      positive expectancy in-sample AND maintains positive expectancy with
      direction match in the 2026 Mode-A OOS window.
    theory_citation: |
      Fitschen 2013 Ch 3 grounds intraday trend-follow breakouts for stock
      index futures during US sessions. Elevated prior-session range is a
      volatility-regime filter (higher vol → stronger continuation). Fast
      break (≤10 min post ORB close) is a conviction signal — early breaks
      have higher directional carry-through. NYSE_OPEN is the highest-
      liquidity US session, reducing friction drag.
    mechanism_class: "volatility-regime AND conviction-speed gate"

