    fail_action: NA
  C5_dsr:
    rule: "Deflated Sharpe Ratio (Bailey-LdP 2014) > 0.95 — applied with K_upstream=772 to deflate"
    numeric_threshold: 0.95
    fail_action: DOWNGRADE_TO_CONDITIONAL
  C6_wfe:
    rule: "WFE = OOS_Sharpe_annualized / IS_Sharpe_annualized ≥ 0.50"
    numeric_threshold: 0.50
    fail_action: KILL
  C7_deployable_N:
    rule: "OOS trade count ≥ 30 for directional-only, ≥ 100 for confirmatory — current OOS n=64 → DIRECTIONAL-ONLY verdict at best, not confirmatory"
