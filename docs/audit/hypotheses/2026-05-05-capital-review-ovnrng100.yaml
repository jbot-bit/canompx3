        the corrected canonical inputs and the four concerns.

primary_schema:
  family_cells:
    - id: "MNQ_COMEX_SETTLE_O5_RR1.5_OVNRNG_100"
      strategy_id: "MNQ_COMEX_SETTLE_E2_RR1.5_CB1_OVNRNG_100"
      instrument: MNQ
      session: COMEX_SETTLE
      orb_minutes: 5
      rr_target: 1.5
      filter: OVNRNG_100
  k_family: 1
  k_global: 1
  k_lane: 1
  k_session: 1
  multiple_testing_basis: "K=1 capital-class diligence; no new search-family expansion."
  promotion_gate: "none — this audit does not promote, does not modify validated_setups, does not change allocator state. Verdict is documentary."

hypotheses:
  - id: 1
    name: "F1 — OVNRNG_100 fire-rate scale stability"
    economic_basis: >
      Carver 2015 (capital allocation under uncertainty) and the
      feedback_absolute_threshold_scale_audit.md class-of-bug doctrine: an absolute-points
      threshold filter is structurally suspect when underlying price scale drifts; what the
      filter selected at promotion-time is not what it selects at deployment-time. If fire
      rate has drifted from low (<25%) at promotion to high (>=75%) at deployment, the
      filter is vestigial — admitting nearly the unfiltered universe rather than a
      strategically-selected subset.
    primary_metric: "fire_rate_by_year"
    method: >
      Per-year fire rate of df.overnight_range >= 100 on the MNQ COMEX_SETTLE E2 RR1.5
      CB1 O5 universe via direct SQL on orb_outcomes JOIN daily_features (triple-key
      join per .claude/rules/daily-features-joins.md).
    kill_criterion: >
      VESTIGIAL if fire_rate_2026 >= 75% AND fire_rate_2019_or_2023 <= 25%
      (>= 3x scale-drift across the IS/OOS horizon).
    theory_citation: "docs/institutional/literature/bailey_et_al_2013_pseudo_mathematics.md (overfitting context); feedback_absolute_threshold_scale_audit.md (raw-points threshold drift class)"

  - id: 2
    name: "F2 — PR #228 RECONCILED-after-FAIL is a pre-reg specification bug, not a no-rescue violation"
    economic_basis: >
      Chan 2013 Ch 1 p.4 unified-program doctrine: when canonical machinery is delegated,
      reproducing the canonical reference exactly is the expected outcome. PR #228 runner
      reproduced the strict-unlock CSV's IS_ExpR (+0.2171) exactly, but the pre-reg
      criterion 4 was specified against validated_setups.expectancy_r=+0.2151 which is
      computed under a different (scratch-EXCLUSIVE) policy. The +0.0020 delta is a known
      accounting class difference, not a runner defect.
    primary_metric: "delta_runner_minus_strict_unlock_csv"
    method: >
      Read PR #228 result doc § "IS_ExpR caveat" verbatim. Verify the strict-unlock
      CSV's IS row matches the runner's IS_ExpR exactly. Verify the
      validated_setups.expectancy_r value's scratch policy via the documented caveat in
      docs/audit/results/2026-05-02-mnq-comex-ovnrng100-rr15-chordia-unlock-v1.md.
    kill_criterion: >
      NO_RESCUE_VIOLATION if delta_runner_minus_strict_unlock_csv > 0.001 R
      (would indicate canonical machinery drift, not pre-reg spec bug).
      Otherwise: NOT_A_VIOLATION (pre-reg spec correction documented in result doc per
      no-post-hoc-rescue rule; pre-reg yaml left as-locked).
    theory_citation: "docs/institutional/literature/chan_2013_ch1_backtesting_lookahead.md p.4"

  - id: 3
    name: "F3 — DSR/MinBTL deployment math under canonical OOS"
    economic_basis: >
      Bailey-LdP 2014 Equation 2 (DSR > 0.95 confidence threshold) + Bailey 2013 Theorem 1
      (MinBTL bound). Lane carries n_trials_at_discovery=35,616 with dsr_score=0.175 — both
      well outside locked Criterion 5 (DSR > 0.95) and Criterion 2 (N <= 28 at strict
      E[max_N]=1.0 over 6.65 years). Capital review must DECIDE whether the original
      deployment decision (April 2026) survives when the canonical OOS_ExpR drops from
      LEGACY +0.2029 to canonical +0.1658.
    primary_metric: "minimum_BTL_violation_factor"
    method: >
      Compute MinBTL factor = n_trials_at_discovery / N_max_at_strict_E1_6_65yr.
      Read dsr_score from validated_setups directly. Compute OOS power per RULE 3.3 via
      research.oos_power.oos_ttest_power.
    kill_criterion: >
      DEPLOYMENT_MATH_BROKEN if MinBTL_factor > 100 AND
      power_to_detect_IS_effect_at_N_OOS_66 < 0.50.
      Both are BINDING sub-criteria per Criterion 2 (Bailey 2013 Theorem 1) and
      RULE 3.3 (Harvey-Liu 2015) respectively. DSR < 0.50 is reported as a
      CROSS-CHECK only — Amendment 2.1 in pre_registered_criteria.md explicitly
      demoted Criterion 5 (DSR) from binding kill gate to cross-check until N_eff
      is formally solved in-repo. The lane's DSR=0.175 is corroborating informational
      evidence, not a binding kill arm.
      (At MinBTL factor 1,272 and OOS power 0.07 two-group / 0.32 one-sample, this
      lane meets BOTH binding triggers independently. The DSR cross-check at 0.175
      corroborates but is not load-bearing.)
    theory_citation: >
      docs/institutional/literature/bailey_et_al_2013_pseudo_mathematics.md p.8 Theorem 1;
      docs/institutional/literature/bailey_lopez_de_prado_2014_deflated_sharpe.md p.8 Eq 2;
      docs/institutional/pre_registered_criteria.md Criterion 2 + Criterion 5.

  - id: 4
    name: "F4 — Live trailing performance N=153 directionality"
    economic_basis: >
      Harvey-Liu 2015 OOS power floor + Carver 2015 capital allocation under uncertainty:
      live trailing performance is independent post-deployment evidence and is the only
      positive signal not contaminated by IS/OOS construction biases. RULE 3.3 power floor
      applies: at d_IS=0.186 and N_live=153, power = 63% (DIRECTIONAL_ONLY tier).
      Trend within the trailing window is informative — a monotonic-decay pattern
      (Q2 2025 +0.57R -> Q1 2026 +0.08R) shifts the directional reading.
    primary_metric: "trailing_quarterly_expr_trend"
    method: >
      Per-quarter ExpR breakdown for the lane's last 18 months of trades via direct SQL
      on orb_outcomes JOIN daily_features (triple-key join). Compute live N=153 power
      per RULE 3.3 to detect IS-effect d=0.186.
    kill_criterion: >
      LIVE_DECAY if quarterly ExpR shows monotonic decay across the most recent 4 complete
      quarters AND Q1 2026 ExpR < 0.5 * trailing_12mo_mean.
      (Lane shows Q2 2025 +0.57 -> Q3 2025 +0.29 -> Q4 2025 +0.10 -> Q1 2026 +0.08; ratio
      0.08 / 0.24 = 0.33 < 0.5; meets trigger.)
    theory_citation: >
      docs/institutional/literature/harvey_liu_2015_backtesting.md p.17;
      docs/institutional/literature/carver_2015_ch11_portfolios.md;
      .claude/rules/backtesting-methodology.md RULE 3.3.

verdict_taxonomy:
  description: >
    The verdict is one of four locked options. Each must be traced to specific F1-F4
    triggers. No "investigate" verbs. No "monitor for X months" verbs. The verdict is
    documentary; allocator action requires a separate stage.
  options:
    - id: "REMAIN_DEPLOY"
      trigger: >
        F1 NOT VESTIGIAL AND F3 DSR >= 0.50 AND F4 NOT LIVE_DECAY.
        (Requires the lane to clear absolute-threshold stability, deployment math at
        relaxed DSR threshold, AND positive live trend.)
    - id: "DOWNSIZE"
      trigger: >
        F1 VESTIGIAL OR F3 DEPLOYMENT_MATH_BROKEN, AND F4 NOT outright LIVE_DECAY,
        AND live trailing N >= 100 with positive ExpR.
        (Carver 2015 Ch 9-10 "capital allocation under uncertainty" — when DSR
        diligence is open and OOS is statistically useless but live signal is
        directionally positive, reduce capital exposure rather than zero it.)
    - id: "UNDEPLOY"
      trigger: >
        F1 VESTIGIAL AND F3 DEPLOYMENT_MATH_BROKEN AND F4 LIVE_DECAY.
        (All three concerns triggered — the deployment math at promotion was broken,
        the filter is vestigial under current scale, AND live performance is decaying.)
    - id: "UNVERIFIED"
      trigger: >
        Insufficient data to evaluate any of F1/F3/F4. Reserved if canonical-layer
        queries fail or DB freshness is insufficient.

forbidden_actions:
  - "Threshold modification on OVNRNG_100 (would be data-snooping per feedback_bias_discipline.md)."
  - "Updating validated_setups.oos_exp_r=+0.2029 to canonical +0.1658 (requires strategy_validator path with its own pre-reg)."
  - "Any allocator state change (lane stays as currently allocated until next rebalance evaluates the verdict)."
  - "Re-deriving DSR for the lane (Bailey-LdP standalone audit; out of scope per PR #228 result doc)."
  - "Changing the verdict taxonomy options (locked here; revision requires amendment commit)."
