metadata:
  theory_grant: false  # Capital-diligence audit of deployed lane; not a Chordia discovery candidate.
  name: "capital_review_ovnrng100_v1"
  purpose: >
    Capital-class diligence on the deployed lane MNQ_COMEX_SETTLE_E2_RR1.5_CB1_OVNRNG_100,
    addressing the four concerns the evidence-auditor flagged on PR #228 OOS reconciliation
    and the placeholder doc merged in PR #234. Produces a verdict (REMAIN_DEPLOY | DOWNSIZE
    | UNDEPLOY | UNVERIFIED) traced to numeric criteria. Does NOT update validated_setups,
    lane_allocation.json, or any allocator state.
  date_locked: "2026-05-05T13:00:00+10:00"
  holdout_date: "2026-01-01"
  total_expected_trials: 4
  testing_mode: "individual"
  pathway: "B"
  research_question_type: "capital_diligence"
  scratch_policy:
    policy: "include-as-zero"
    justification: >
      Live execution path forces flat at session end (TopStep + AMP futures EOD). Backtest
      must book the same $0 outcome to satisfy Chan 2013 Ch 1 unified-program doctrine.
      Matches the strict-unlock CSV's IS row exactly (canonical machinery via
      research.chordia_strict_unlock_v1._evaluate_split). Sample-selection bias from drop
      policy quantified at 10-45% ExpR inflation per docs/institutional/literature/bailey_lopezdeprado_2014_dsr_sample_selection.md.

execution:
  mode: "documentary"
  entrypoint: "no runner — analysis is documented in result doc with verbatim canonical-layer query output"
  default_args: []

authority:
  primary:
    - "RESEARCH_RULES.md"
    - ".claude/rules/backtesting-methodology.md"
    - ".claude/rules/research-truth-protocol.md"
    - ".claude/rules/integrity-guardian.md"
    - ".claude/rules/institutional-rigor.md"
    - "docs/institutional/pre_registered_criteria.md"
    - "docs/runtime/stages/capital-review-ovnrng100.md"
    - "docs/audit/results/2026-05-05-oos-reconcile-ovnrng100.md"
    - "docs/audit/results/2026-05-02-mnq-comex-ovnrng100-rr15-chordia-unlock-v1.md"
    - "docs/audit/results/2026-05-01-target-b-6lane-vestigialness-fresh-audit.md"
  notes:
    - "K=1 capital-class diligence on already-deployed lane. Not new discovery."
    - "Mode A holdout (2026-01-01) sacred; OOS values descriptive not confirmatory under power floor."
    - "All four findings inherited verbatim from placeholder doc PR #234."
    - "Verdict choices are LOCKED to four options. No 'investigate further' or 'monitor for X months' verb forms."

scope:
  instrument: MNQ
  strategy_id: "MNQ_COMEX_SETTLE_E2_RR1.5_CB1_OVNRNG_100"
  session: COMEX_SETTLE
  orb_minutes: 5
  entry_model: E2
  confirm_bars: 1
  rr_target: 1.5
  direction: pooled
  filter_type: OVNRNG_100
  filter_source: "trading_app.config.ALL_FILTERS['OVNRNG_100']"
  filter_definition: "overnight_range >= 100 (absolute MNQ points threshold)"
  out_of_scope:
    - "RR1.0 sibling lane diligence"
    - "Other 4 paused MES_CME_PRECLOSE / MES_COMEX_SETTLE / MES_SINGAPORE_OPEN / MES_US_DATA_830 lanes"
    - "New filter discovery to replace OVNRNG_100"
    - "DSR re-derivation methodology audit (Bailey-LdP standalone)"
    - "Threshold modification on OVNRNG_100 (would be data-snooping)"
    - "Any writes to validated_setups, experimental_strategies, chordia_audit_log.yaml, lane_allocation.json"

data_policy:
  is_window:
    description: "WF_START_OVERRIDE['MNQ'] <= trading_day < HOLDOUT_SACRED_FROM"
    constant_source_lower: "trading_app.config.WF_START_OVERRIDE['MNQ']"
    constant_source_upper: "trading_app.holdout_policy.HOLDOUT_SACRED_FROM"
    locked_lower: "2020-01-01"
    locked_upper: "2026-01-01"
  oos_window:
    description: "trading_day >= HOLDOUT_SACRED_FROM (2026-01-01) up to current trading_day"
    policy: "descriptive recompute against canonical orb_outcomes; binary OOS gate forbidden under RULE 3.3 power floor"
  trailing_window:
    description: "rolling 12-month window per docs/runtime/lane_allocation.json trailing_window_months"
    policy: "directional evidence only at observed power; not refutational"
  tuning_against_oos: false
  canonical_layers_only: true

feature_definition:
  feature_name: OVNRNG_100
  canonical_source_of_truth: "trading_app.config.ALL_FILTERS['OVNRNG_100']"
  raw_definition: "df.overnight_range >= 100 (absolute points threshold, MNQ scale)"
  trade_time_knowable: true
  first_complete_time: "overnight window 09:00-17:00 Brisbane closes before COMEX_SETTLE 04:30 next-day Brisbane"
  temporal_alignment_note: >
    Per .claude/rules/backtesting-methodology.md RULE 1.2 the overnight_* features are valid
    for ORB sessions starting at 17:00 Brisbane or later. COMEX_SETTLE starts 04:30 Brisbane
    next day, well after the overnight window closes. No look-ahead by the validity-domain
    gate.
  lookahead_check: "PASS by validity-domain gate."
  scale_stability_concern: >
    OVNRNG_100 is an absolute-points threshold. Per feedback_absolute_threshold_scale_audit.md,
    raw-points thresholds drift with price. Fire rate stability is a load-bearing measurement
    for whether the filter has structural meaning vs vestigial scale-artifact.

grounding:
  literature_anchors:
    - source_file: "resources/Codependence_Detection.pdf"
      extract: "docs/institutional/literature/bailey_et_al_2013_pseudo_mathematics.md"
      page_or_section: "p.8 Theorem 1, p.7 Equation 4"
      use: >
        MinBTL bound: with 6.65 years of clean MNQ data, strict E[max_N]=1.0 implies N <= 28.
        Lane carries n_trials_at_discovery=35,616 — exceeds bound by ~1,272x. The lane was
        promoted under the pre-Phase-0 brute-force discovery regime documented in MEMORY.md.
    - source_file: "resources/deflated-sharpe.pdf"
      extract: "docs/institutional/literature/bailey_lopez_de_prado_2014_deflated_sharpe.md"
      page_or_section: "p.8 Equation 2, p.3 Conclusions"
      use: >
        DSR threshold: > 0.95 to clear the 95% confidence bar. Lane reports dsr_score=0.1746951317604647
        in validated_setups (well below 0.95). PER AMENDMENT 2.1 of
        docs/institutional/pre_registered_criteria.md (lines 334-348), Criterion 5 (DSR)
        is downgraded from binding gate to CROSS-CHECK until N_eff is formally solved
        in-repo. DSR is therefore corroborating informational evidence, not a binding
        kill arm. F3 trigger fires on MinBTL factor (BINDING) + OOS power (BINDING)
        independently of the DSR cross-check.
    - source_file: "resources/backtesting_dukepeople_liu.pdf"
      extract: "docs/institutional/literature/harvey_liu_2015_backtesting.md"
      page_or_section: "p.17"
      use: >
        OOS power-floor doctrine: "OOS test's success can be due to luck for both the in-sample
        selection and the out-of-sample testing." Grounds RULE 3.3 — N_OOS=66 with t=+1.150,
        p=0.250 produces power 32% (one-sample) or 7% (two-group filter on/off). Tier:
        STATISTICALLY_USELESS. Cannot refute IS edge; cannot confirm it.
    - source_file: "resources/Algorithmic_Trading_Chan.pdf"
      extract: "docs/institutional/literature/chan_2013_ch1_backtesting_lookahead.md"
      page_or_section: "p.4"
      use: >
        Canonical-machinery delegation: PR #228 reproduced strict-unlock OOS exactly via
        canonical helpers. Same machinery means no divergence. Grounds the no-rescue
        verdict on F2 (the FAIL-vs-RECONCILED reframe is a pre-reg specification bug,
        not a finding of canonical-source drift).
    - source_file: "resources/Carver_Systematic_Trading.pdf"
      extract: "docs/institutional/literature/carver_2015_volatility_targeting_position_sizing.md"
      page_or_section: "Ch 9 p.143-147 (Kelly-linked vol target + half-Kelly mandate); Ch 10 p.153+ (position sizing framework)"
      use: >
        Capital allocation under uncertainty: when DSR diligence is open and OOS is
        statistically useless, the DOWNSIZE option is the canonical Carver answer
        (reduce capital exposure proportional to remaining-uncertainty, do not bet full
        size on a lane the system cannot refute or confirm).
  use_for_threshold_modification: false
  use_for_audit_rigor_only: true

upstream_discovery_provenance:
  role: "PROVENANCE_ONLY"
  sources:
    - "validated_setups row promoted_at=2026-04-11 promotion_provenance=LEGACY"
    - "docs/audit/results/2026-05-02-mnq-comex-ovnrng100-rr15-chordia-unlock-v1.md (Chordia strict-unlock 2026-05-02 PASS_CHORDIA)"
    - "docs/audit/results/2026-05-05-oos-reconcile-ovnrng100.md (OOS recompute, PR #228)"
  note: >
    Lane status timeline:
    (1) 2026-04-11 promoted to validated_setups with LEGACY provenance (no validation_run_id),
        n_trials_at_discovery=35,616, dsr_score=0.175.
    (2) 2026-05-02 strict-unlock Chordia audit PASS_CHORDIA (IS t=4.256, p=3.3e-5).
