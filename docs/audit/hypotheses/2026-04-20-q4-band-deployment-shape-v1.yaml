deployment_not_done_here: |
  This pre-reg IS a deployment-shape contract but DOES NOT self-execute.
  It defines:
    - eligibility (which MNQ lanes the rule applies to)
    - trigger (when to upsize)
    - sizing (how much)
    - gates (what OOS evidence upgrades or kills the rule)
    - caveats (what's explicitly forbidden)
  Capital action — editing docs/runtime/lane_allocation.json or
  trading_app/prop_profiles.py or any live execution pathway — requires
  user-issued explicit command that cites this pre-reg's lock SHA.
  No automated process may act on this document.

