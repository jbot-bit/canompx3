status: PRE_REGISTERED_DRAFT
date: 2026-04-28
slug: mes-europe-flow-ovn-range-pathway-b-v1
title: "Phase D D1 — MES EUROPE_FLOW O15 RR1.0 long + ovn_range_pct > 80 — Pathway B K=1 confirmation"
owner: claude-code (canompx3)
