testing_mode: individual
pathway: B_individual

authority:
  primary:
    - docs/institutional/pre_registered_criteria.md      # 12 criteria + Amendments 3.0/3.1/3.2
    - .claude/rules/backtesting-methodology.md           # 16 rules
    - .claude/rules/research-truth-protocol.md           # canonical-layer discipline
    - .claude/rules/pooled-finding-rule.md               # RULE 14 — N/A for single-cell test
