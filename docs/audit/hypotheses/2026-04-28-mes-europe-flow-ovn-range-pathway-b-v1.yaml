    - Pathway B per Amendment 3.0 (testing_mode=individual, K=1, theory_citation required)
    - C6/C8/C9 mandatory non-waivable per Amendment 3.0 condition 4
    - C8 power-floor (Amendment 3.2 / feedback_oos_power_floor.md) — N_OOS<50 → C8_UNVERIFIED, not C8_FAIL
    - Scratch policy locked include-as-zero (canonical Stage 5 outcome_builder fix; commit 68ee35f8)

reproducibility:
  repo_root: canompx3
  commit_sha: TO_FILL_AFTER_COMMIT
  committed_required_before_run: true
  branch: research/2026-04-28-phase-d-mes-europe-flow-pathway-b
  base_branch: research/mnq-unfiltered-high-rr-family

scope:
  instrument: MES                          # canonical: pipeline.asset_configs.ACTIVE_ORB_INSTRUMENTS
  session: EUROPE_FLOW                     # canonical: pipeline.dst.SESSION_CATALOG (start 18:00 BNE)
  orb_minutes: 15
  rr_target: 1.0
  entry_model: E2                          # range-cross break, canonical trading_app/entry_rules.py:157-216
  confirm_bars: 1
  direction: long                          # via daily_features.orb_EUROPE_FLOW_break_dir = 'long' (segmentation, not predictor — RULE 6.3 exception)
  cell_predicate: "daily_features.overnight_range_pct > 80"   # strict greater than (matches discovery scan)
  scratch_policy: include-as-zero          # canonical post-Stage-5; pnl_r=COALESCE(pnl_r, 0.0)
  cost_specs_source: pipeline.cost_model.COST_SPECS  # MES = $3.74 RT — pnl_r is friction-deducted

data_policy:
  is_window: "trading_day < 2026-01-01"
  oos_window: "trading_day >= 2026-01-01 AND trading_day <= MAX(orb_outcomes.trading_day)"
  holdout_rule:
    constant_source: trading_app.holdout_policy.HOLDOUT_SACRED_FROM
    locked_boundary: "2026-01-01"
  tuning_against_oos: false
  oos_re_runs_with_threshold_changes: forbidden  # post-hoc rescue is FORBIDDEN per Amendment 3.0

feature_definition:
  feature_name: ovn_range_pct_GT80
  column_source: daily_features.overnight_range_pct
  canonical_source_of_truth: pipeline/build_daily_features.py
  trade_time_knowable: true
  first_complete_time_brisbane: "17:00"   # overnight window 09:00-17:00 BNE
  temporal_alignment_note: |
    EUROPE_FLOW ORB starts 18:00 BNE, well after the 17:00 BNE first-complete
    time of the overnight_range_pct feature (RULE 1.2 Valid Domain table:
    overnight_* features valid for ORB sessions starting >= 17:00). No
    look-ahead. Confirmed in build_daily_features.py:445-454 warning + RULE 1.2.
  lookhead_check: PASS  # § 6.1 safe (overnight_* on EUROPE_FLOW @ 18:00 BNE)

calibration:
  threshold_source: "discovery scan (research/comprehensive_deployed_lane_scan.py post-E2-LA-fix)"
  threshold_value: 80   # locked: overnight_range_pct > 80 (NOT a percentile — absolute %)
  lock_policy: "Threshold pre-committed before any K=1 metric is computed; no post-hoc relaxation."
  threshold_provenance: |
    The discovery scan emitted the cell with predicate `ovn_range_pct_GT80`
    defined as `overnight_range_pct > 80` (strict). This pre-reg locks the
    same predicate for the confirmatory K=1 test. No threshold sweep is
    permitted within this hypothesis (Amendment 3.0 condition 2: one
    prediction per hypothesis).

hypothesis_definition:
  primary_hypothesis_statement: |
    On MES EUROPE_FLOW O15 RR1.0 E2 CB1 long-direction trades, days where
    overnight_range_pct > 80 (high-overnight-participation regime) exhibit
    higher per-trade R-multiple expectancy than days where overnight_range_pct
    <= 80 (the off-cell complement), driven by intraday continuation
    momentum after a high-volatility European cash open.

upstream_discovery_provenance:
  role: PROVENANCE_ONLY
  source: docs/audit/results/2026-04-28-phase-b-candidate-evidence.md
  upstream_scan_k_framings:
    K_global: 13415
    K_family_overnight_estimate: 1850
  upstream_dsr_pathway_a: 0.0003
  upstream_dsr_pathway_b: 0.9845
  note: |
    Phase A/B's comprehensive scan K values are documented for traceability ONLY.
    They do NOT apply to this Pathway B K=1 test per pre_registered_criteria.md
    Amendment 3.0 and prereg-writer-prompt.md OUTPUT RULE 5. The K=1 framing
    here is justified by the theory citations under testing_discipline below.
  institutional_validity_check: |
    Independent SQL reproduction (2026-04-28) confirms Phase B's locked-schema
    numbers within ±0.0015 ExpR (delta_IS=0.2459 exact match; 8-trade N
    difference traces to `> 80` strict cutoff vs `>= 80`). No look-ahead
    contamination per RULE 1.2 valid-domain (EUROPE_FLOW @ 18:00 BNE >=
    17:00 BNE first-complete). Cost is friction-deducted via cost_model.
    Direction segmentation via orb_EUROPE_FLOW_break_dir is post-entry per
    RULE 6.3 exception (segmentation-of-already-taken-trade is allowed).

testing_discipline:
  pathway: B_individual
  k: 1
  significance_threshold:
    raw_p_two_tailed_lt: 0.05
    sharpe_ann_gt: 0.0          # positive direction gate per Amendment 3.0 condition 2b
    chordia_t_with_theory_gte: 3.0
  mandatory_downstream_gates_non_waivable:
    - C6_walk_forward_efficiency_gte_0p50_when_n_oos_powered  # see Amendment 3.2 power-floor handling
    - C8_oos_positive_when_n_oos_powered
    - C9_era_stability_no_era_lt_neg_0p05_with_n_era_gte_20
  theory_citation:
    - source: docs/institutional/literature/chan_2013_ch7_intraday_momentum.md
      claim: "Intraday continuation premium after high-overnight-participation regimes."
      role: strategy-class grounding (ORB-style intraday momentum)
    - source: docs/institutional/literature/fitschen_2013_path_of_least_resistance.md
      claim: "Path-of-least-resistance / breakout edge on equity-index intraday horizons."
      role: ORB premise grounding
  filter_mechanism_grounding: |
    The overnight_range_pct > 80 cut is treated as a within-class refinement
    of the Fitschen-grounded ORB strategy class, NOT as a separately-cited
    filter-mechanism claim. Per prereg-writer-prompt.md PATHWAY A/B THEORY
    CITATION clause: "explicit within-class refinement is acceptable; do
    NOT promote the strategy-class citation to cover the specific filter."
    Rationale: an Aronson Ch11 (overnight range as volatility proxy)
    extract does not yet exist under docs/institutional/literature/, so
    citing it would violate institutional-rigor.md § 7 (no training-memory
    citations). If/when the Aronson Ch11 extract lands, this pre-reg can
    be amended in a corrigendum to upgrade the citation.
  cumulative_individual_hypothesis_count_disclosure:
    purpose: per Amendment 3.0 condition 6
    cumulative_count_for_MES: 1   # this is the first MES Pathway B individual hypothesis
    cumulative_count_for_MNQ: 0
    cumulative_count_for_MGC: 0
    overall: 1

trial_budget:
  primary_selection_trials: 1     # Pathway B K=1
  schema_locked_before_any_metric: true
  minbtl_bound:
    formula: "MinBTL = 2*ln(N_trials) / E[max_N]^2"
    n_trials: 1
    minbtl_value_years: 0.0       # ln(1) = 0
    available_clean_data_years: 6.93   # MES IS 2019-01-01 → 2025-12-31
    within_cap: true
    cap_reference: "Bailey et al 2013 — at K=1 MinBTL is trivially satisfied"

primary_metric:
  metric_name: ExpR_on_minus_ExpR_off_IS
  formula: "mean(pnl_r WHERE overnight_range_pct > 80) - mean(pnl_r WHERE overnight_range_pct <= 80)"
  pre_committed_target: positive  # the direction of the prediction
  raw_p_method: two-tailed Welch t-test on (pnl_r_on, pnl_r_off) IS
  bootstrap_p_method: |
    Block-bootstrap permutation test on shuffled signal labels (block=5,
    B=10000) — independent reproducibility check beyond Welch's parametric
    assumption. Reported alongside Welch raw_p. Not a separate trial.

secondary_descriptive_only:
  - id: SD1
    statement: "ExpR_OOS_on - ExpR_OOS_off direction match with IS sign"
    counted_against_trial_budget: false
    note: "Descriptive — actual gate is C8 with power floor, not this metric alone"
  - id: SD2
    statement: "Per-year ExpR breakdown (era stability descriptive)"
    counted_against_trial_budget: false
    note: "Feeds into C9 gate computation"
  - id: SD3
    statement: "Cohen's d for IS effect (used to compute OOS power)"
    counted_against_trial_budget: false

baseline:
  baseline_label: ExpR_off_IS_locked_schema
  computation_method: |
    SAME pipeline path as the variant — direct duckdb via the runner's
    load_cell function. This is a baseline sanity smoke-test (same code
    path), NOT a harness cross-check. Threshold for K2 sanity: |delta_baseline_repro|
    < 0.001 ExpR absolute. Independent-method cross-check is the
    in-pre-reg SQL committed below in `independent_sql_baseline`.
  expected_baseline_value_off_is: -0.1038       # from independent SQL 2026-04-28
  expected_variant_value_on_is: 0.1421          # from independent SQL 2026-04-28
  expected_delta_is: 0.2459                     # locked
  independent_sql_baseline: |
    WITH cell AS (
      SELECT o.trading_day,
             COALESCE(o.pnl_r, 0.0) AS pnl_r,
             d.overnight_range_pct,
             d.orb_EUROPE_FLOW_break_dir AS bdir
      FROM orb_outcomes o
      JOIN daily_features d
        ON o.trading_day = d.trading_day
       AND o.symbol = d.symbol
       AND o.orb_minutes = d.orb_minutes
      WHERE o.symbol='MES' AND o.orb_label='EUROPE_FLOW' AND o.orb_minutes=15
        AND o.rr_target=1.0 AND o.entry_model='E2' AND o.confirm_bars=1
        AND o.outcome IN ('win','loss','scratch')
        AND d.orb_EUROPE_FLOW_break_dir='long'
    )
    SELECT
      AVG(pnl_r) FILTER (WHERE trading_day < DATE '2026-01-01' AND overnight_range_pct >  80) AS expr_is_on,
      AVG(pnl_r) FILTER (WHERE trading_day < DATE '2026-01-01' AND overnight_range_pct <= 80) AS expr_is_off
    FROM cell;

kill_criteria:
  - id: KILL_RAWP
    metric: raw_p_two_tailed
    threshold: ">= 0.05"
    action: KILL
  - id: KILL_DIR
    metric: sign(ExpR_on - ExpR_off) on IS
    threshold: "negative"
    action: KILL  # direction-flip on locked-schema reproduction = KILL
  - id: KILL_T
    metric: abs(t_stat) on IS
    threshold: "< 3.0"
    action: KILL  # below Chordia with-theory floor
  - id: KILL_N
    metric: N_IS_on
    threshold: "< 100"
    action: KILL  # C7 floor
  - id: KILL_ERA
    metric: any_era_ExpR_with_N_gte_20
    threshold: "< -0.05"
    action: KILL  # C9 era-stability gate
  - id: KILL_SHARPE
    metric: sharpe_ann_IS
    threshold: "<= 0.0"
    action: KILL  # Amendment 3.0 condition 2b positive-direction gate
  - id: KILL_BASELINE_SANITY
    metric: abs(reproduced_delta_IS - expected_delta_is)
    threshold: "> 0.001"
    action: KILL  # smoke-test that the runner reproduces the locked numbers

decision_rule:
  candidate_ready_if: |
    All KILL criteria PASS (none fire) AND
    C5 DSR_PB >= 0.95 AND
    C6 walk_forward_efficiency >= 0.50 (computed if N_OOS_on >= 50, else GATE_INACTIVE_LOWPOWER) AND
    C8 oos_dir_match == True AND oos_power >= 0.5 (else GATE_INACTIVE_LOWPOWER) AND
    C9 era_stability == PASS AND
    Sharpe_ann_IS > 0
  park_pending_oos_power_if: |
    All KILL criteria PASS (none fire) AND
    C5 DSR_PB >= 0.95 AND
    C9 era_stability == PASS AND
    Sharpe_ann_IS > 0 AND
    (C6 OR C8 are GATE_INACTIVE_LOWPOWER due to N_OOS_on < 50 or computed power < 0.5)
  kill_if: any KILL criterion fires

methodology_rules_applied:
  rule_1_feature_temporal_alignment:
    applied: true
    detail: "EUROPE_FLOW @ 18:00 BNE >= 17:00 BNE overnight_* first-complete time. Pass."
  rule_2_filter_application_timing:
    applied: true
    detail: "Filter (overnight_range_pct > 80) computed at session start, before ORB break."
  rule_3_is_oos_discipline:
    applied: true
    detail: "Mode A holdout 2026-01-01 sacred; tuning_against_oos: false."
  rule_4_multiple_testing:
    applied_to_upstream_only: true
    detail: |
      Multi-framing K (Rule 4) applies to the upstream comprehensive scan
      (K_global=13415, K_family_overnight=1850), NOT to this Pathway B K=1
      pre-reg. Per prereg-writer-prompt.md OUTPUT RULE 5, upstream K values
      are recorded under upstream_discovery_provenance.role=PROVENANCE_ONLY
      and do NOT apply to the current test's K.
  rule_5_comprehensive_scope:
    applied_to_upstream_only: true
    detail: "Upstream scan enumerates all 12×3×3×3 lane-spec combos. This pre-reg tests one cell."
  rule_6_trade_time_knowability:
    applied: true
    detail: "feature_definition.lookhead_check=PASS (§ 6.1 safe). break_dir used as segmentation, not predictor (§ 6.3 exception)."
  rule_7_tautology:
    applied: true
    detail: "B6 lane-correlation Phase B reported +0.362 vs EUROPE_FLOW ORB_G5 — additive, no tautology."
  rule_8_fire_rate:
    applied: true
    detail: "Fire rate ~22% (194/888 IS). Within 5%-95% band."
  rule_9_data_source:
    applied: true
    detail: "Canonical layers only: orb_outcomes JOIN daily_features. No validated_setups read."
  rule_10_pre_registration:
    applied: true
    detail: "This file IS the pre-registration. Committed before run."
  rule_11_audit_trail:
    applied: true
    detail: "research/<runner>.py committed alongside; result MD under docs/audit/results/."
  rule_12_red_flags:
    applied: true
    self_review:
      - "|t| > 7? Phase B reported strict |t| 3.47 — not red-flag."
      - "Δ_IS > 0.6? Δ = 0.246 — not red-flag."
      - "Same feature class everywhere? Single hypothesis — N/A."
      - "Window-derived early-ORB? EUROPE_FLOW @ 18:00 BNE — clean."
  rule_13_pressure_test:
    applied: true
    detail: |
      The runner injects an audit probe: assert that swapping
      `overnight_range_pct > 80` for a known-banned predictor like `pnl_r > 0`
      produces a perfect-corr T0 tautology flag. If absent, runner fails.
  rule_14_pooled_finding:
    applied: false
    not_applicable_reason: "K=1 single-cell test. RULE 14 governs pooled-universe claims; this is per-cell."
  rule_15_validated_universe:
    applied_to_run: true
    detail: "Test scopes via concrete (instrument, session, orb_minutes, rr, entry_model, confirm_bars, direction) — not full unfiltered orb_outcomes."
  rule_16_e2_lookhead_contamination:
    applied: true
    detail: |
      orb_EUROPE_FLOW_break_dir is used ONLY for direction segmentation of
      already-taken E2 trades, per RULE 6.3 exception (segmentation-of-trade
      is allowed; predicting-which-trade-to-take is forbidden). All
      banned E2 break-bar predictors (rel_vol, break_delay, break_bar_continues,
      bb_volume_ratio) are explicitly EXCLUDED from this hypothesis.

outputs_required_after_run:
  - reproduced_n_is_on, reproduced_n_is_off, reproduced_n_oos_on, reproduced_n_oos_off
  - reproduced_expr_is_on, reproduced_expr_is_off, reproduced_delta_is
  - reproduced_expr_oos_on, reproduced_expr_oos_off, reproduced_delta_oos
  - welch_t_is, welch_p_is_two_tailed
  - bootstrap_p_is (block=5, B=10000)
  - sharpe_ann_is, sharpe_per_trade_is
  - skewness_is, kurtosis_is_excess
  - dsr_pathway_a_value, dsr_pathway_b_value
  - cohens_d_is_effect
  - oos_power_for_d_at_n_oos_on
  - per_year_breakdown (year, n, expr) for both is_on and oos_on
  - era_stability_verdict (C9_PASS / C9_FAIL)
  - dir_match_oos_with_power_status (DIR_MATCH / DIR_FLIP / GATE_INACTIVE_LOWPOWER)
  - kill_criterion_results (each KILL_* line PASS/FAIL with computed value)
  - decision_rule_verdict (CANDIDATE_READY / PARK_PENDING_OOS_POWER / KILL)
  - audit_pressure_test_passed (rule 13)

execution_gate:
  allowed_now:
    - Read-only reproduction of IS/OOS metrics on canonical layers
    - Computation of all gates listed in outputs_required_after_run
    - Writing the result MD with the locked decision_rule verdict
  forbidden_now:
    - Re-running with different threshold values (post-hoc rescue)
    - Promoting CANDIDATE_READY without all C6/C8/C9 PASS conditions
    - Writing to validated_setups, edge_families, lane_allocation, live_config
    - Any capital deployment action — that requires Phase E + capital-review skill

not_done_by_this_pre_reg:
  - No live deployment
  - No update to lane_allocation.json or any prop_profiles allocation
  - No change to deployed lane filters
  - No CPCV (deferred to Phase D follow-up if N_OOS power floor remains active in Q3-2026)
  - No paper-trade simulation (not Phase D scope)
  - No write to experimental_strategies (Pathway B individual record gets stamped post-run via separate flow)
