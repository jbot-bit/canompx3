# ---------------------------------------------------------------------------
# Failure / promotion policy
# ---------------------------------------------------------------------------
on_KILL: |
  Lane vol-targeting overlay rejected. Lane stays at binary sizing in
  allocator. Memory entry written: vol-targeting NO-GO for this lane
  unless mechanism changes.
on_DEFER: |
  Insufficient evidence (paired-t between 0 and 1.96). Continue OOS
  accrual; revisit after 2026 OOS doubles in N.
on_PASS: |
  Lane unlocks Stage 2 sizing wiring. Stage spec required at
  docs/runtime/stages/<slug>.md before any execution_engine.py edit.
  D6 Phase 1 spec is the canonical precedent.

