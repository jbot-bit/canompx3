notes: |
  Carver Stage-2 sizing is the DIRECT trade-quality multiplier in v2 plan
  framing. It does NOT add new entries; it amplifies size on existing
  high-Sharpe entries during their high-Sharpe regimes. Net: same N,
  different R per trade, mathematically larger ExpR with strictly bounded
  drawdown floor (per Table 23 prop-firm cap). This is the most direct
  HQ-trade leverage in the session — IF lanes survive Chordia.
