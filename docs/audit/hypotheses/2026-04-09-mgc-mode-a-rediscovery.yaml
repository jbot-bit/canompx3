# ---------------------------------------------------------------------------
# Hypothesis 1 — Crabel opening range G5 at LONDON_METALS
# ---------------------------------------------------------------------------
#
# Theoretical basis (verbatim-referenceable, external literature only):
#   Crabel, Toby (1990). "Day Trading with Short Term Price Patterns and
#   Opening Range Breakout." Traders Press, Greenville SC. Chapter 3,
#   "Opening Range Breakout." The commitment hypothesis: the opening
#   range represents institutional positioning commitment; breakouts
#   continue because committed capital defends direction.
#
#   Lucey, B. M., & Zhao, S. (2008). "Is gold a hedge or haven? A
#   finance meta." International Review of Financial Analysis. London
#   is THE global gold pricing center. The London Gold Fix (now LBMA
#   Gold Price) is set during London trading hours and serves as the
#   benchmark for global physical gold transactions.
#
#   Baur, D. G., & Lucey, B. M. (2010). "Is Gold a Hedge or a Safe
#   Haven? An Analysis of Stocks, Bonds and Gold." Financial Review
#   45(2), 217-229. Documents gold's unique pricing dynamics driven
#   by London-centered physical demand meeting futures markets.
#
# Economic mechanism for MGC at LONDON_METALS:
#   London is the world's primary gold pricing venue. The LONDON_METALS
#   session captures the London metals market open when physical gold
#   demand (central banks, jewelry, ETF custodians, bullion banks) meets
#   CME futures pricing. The opening range at this session reflects the
#   directional consensus of the single most important gold price
#   discovery window globally. Under Crabel's commitment hypothesis,
#   breakouts of this range have above-chance continuation probability.
#
# Why G5 not G4: MGC has $10/point value with 0.10pt tick ($1/tick).
#   Typical MGC ORB ranges at LONDON_METALS are smaller in absolute
#   points than MNQ. G5 is the "meaningful commitment" threshold per
#   TRADING_RULES which states "G5: MGC solid edge (creates positivity
#   from negative baseline)." G4 on MGC risks capturing noise.

hypotheses:
  - id: 1
    name: "Crabel opening range G5 at LONDON_METALS"
    theory_citation: "Crabel (1990) Day Trading with Short Term Price Patterns and Opening Range Breakout, ch. 3; Lucey & Zhao (2008); Baur & Lucey (2010)"
    economic_basis: |
      Opening range ≥ G5 threshold on MGC at LONDON_METALS filters for
      sessions where London gold market open produced meaningful committed
      two-way price discovery. London is the global gold pricing center
      (Lucey & Zhao 2008; Baur & Lucey 2010): the LBMA Gold Price is set
      during London hours and physical gold demand from central banks,
      jewelry, and ETF custodians concentrates here. Under Crabel's
      commitment hypothesis, breakouts of the London-session opening range
      continue with above-chance probability because the committed
      physical-meets-futures flow defends direction. RR=2.0 is Crabel's
      canonical continuation target. E2 (stop-market at range boundary +
      slippage) is the industry-standard honest entry per TRADING_RULES.md.
      G5 is selected per TRADING_RULES as MGC's "meaningful commitment"
      threshold — creating positivity from a negative baseline.
    filter:
      type: ORB_G5
      column: orb_size_points
    scope:
      instruments: [MGC]
      sessions: [LONDON_METALS]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "BH FDR q=0.05 fails on the pre-registered 5-hypothesis family (Criterion 3, Harvey-Liu 2015)"
      - "Chordia t-statistic < 3.00 (Criterion 4 with theory, Amendment 2.2)"
      - "Walk-forward efficiency < 0.50 (Criterion 6, LdP 2020)"
      - "2026-01-01 → current OOS ExpR < 0 OR < 0.40 × IS ExpR (Criterion 8, Amendment 2.7)"
      - "Any era with N ≥ 50 and ExpR < -0.05 (Criterion 9)"
      - "IS Sharpe < 0.96 annualized — within Bailey noise floor at N=5 on 3.55yr"

  # -------------------------------------------------------------------------
  # Hypothesis 2 — Crabel opening range G6 at COMEX_SETTLE
  # -------------------------------------------------------------------------
  #
  # Theoretical basis:
  #   Crabel (1990) ch. 3, commitment hypothesis (as above).
  #
  #   O'Hara, Maureen (1995). "Market Microstructure Theory." Blackwell,
  #   Cambridge MA. Settlement sessions concentrate order flow from
  #   hedgers and producers who must transact at or near settlement
  #   prices, creating directional imbalance that breakout entry captures.
  #
  # Economic mechanism for MGC at COMEX_SETTLE:
  #   COMEX (CME Group) is the primary US gold futures exchange. The
  #   COMEX settlement window concentrates institutional gold flow:
  #   gold producers hedging forward production, central bank reserve
  #   managers, ETF authorized participants creating/redeeming shares,
  #   and commodity trading advisors rebalancing. Under O'Hara's
  #   microstructure framework, this mandatory flow concentration at
  #   settlement prices creates directional imbalance. A breakout of
  #   the opening range at this session captures the institutional
  #   consensus direction.
  #
  # Why G6: COMEX_SETTLE sees concentrated institutional flow with
  #   mandatory participants (hedgers, producers). G6 is a higher
  #   threshold because the institutional flow can generate larger
  #   initial ranges — a G5 range may be routine at settlement, while
  #   G6 filters for sessions with genuine directional imbalance.

  - id: 2
    name: "Crabel opening range G6 at COMEX_SETTLE"
    theory_citation: "Crabel (1990) ch. 3; O'Hara (1995) Market Microstructure Theory"
    economic_basis: |
      Opening range ≥ G6 threshold on MGC at COMEX_SETTLE filters for
      settlement sessions where institutional gold flow produced strong
      directional imbalance. COMEX is the primary US gold futures exchange.
      Under O'Hara's (1995) microstructure framework, settlement sessions
      concentrate mandatory flow from gold producers hedging forward
      production, central bank reserve managers, ETF authorized
      participants, and commodity trading advisors. This mandatory flow
      creates directional imbalance that a breakout entry captures. G6
      selects for sessions where the imbalance exceeds routine settlement
      activity — genuine directional consensus from institutional
      participants. RR=2.0 per the dominant intraday breakout practitioner convention.
    filter:
      type: ORB_G6
      column: orb_size_points
    scope:
      instruments: [MGC]
      sessions: [COMEX_SETTLE]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "BH FDR q=0.05 fails on the pre-registered 5-hypothesis family"
      - "Chordia t-statistic < 3.00"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0 OR < 0.40 × IS ExpR"
      - "Any era with N ≥ 50 and ExpR < -0.05"
      - "IS Sharpe < 0.96 annualized — within Bailey noise floor at N=5 on 3.55yr"

  # -------------------------------------------------------------------------
  # Hypothesis 3 — Macro-announcement opening range G5 at US_DATA_830
  # -------------------------------------------------------------------------
  #
  # Theoretical basis:
  #   Andersen, T. G., Bollerslev, T., Diebold, F. X., & Vega, C. (2003).
  #   "Micro Effects of Macro Announcements: Real-Time Price Discovery in
  #   Foreign Exchange." American Economic Review 93(1), 38-62. Scheduled
  #   08:30 ET US macro releases produce measurable price discovery in
  #   liquid futures markets in the first 5-30 minutes post-release.
  #
  #   Baur, D. G., & Lucey, B. M. (2010). "Is Gold a Hedge or a Safe
  #   Haven? An Analysis of Stocks, Bonds and Gold." Financial Review
  #   45(2), 217-229. Gold responds to inflation expectations and real
  #   rate movements embedded in macro releases via the USD/real-rate
  #   transmission channel.
  #
  # Economic mechanism for MGC at US_DATA_830:
  #   Gold is a macro-sensitive asset. US macro data releases (NFP, CPI,
  #   PPI, FOMC) directly impact gold prices via the USD/real-rate
  #   channel: higher-than-expected inflation → lower real rates → gold
  #   up (and vice versa). Per Andersen-Bollerslev-Diebold-Vega (2003),
  #   the 08:30 ET release window concentrates multi-day macro news into
  #   seconds. The 5-minute opening range captures the initial
  #   directional consensus on the inflation/real-rate implication.
  #   Breakouts continue because the market has not yet fully
  #   discounted the release per Ederington-Lee's gradual incorporation.
  #   Gold's macro sensitivity (Baur-Lucey 2010) makes it MORE responsive
  #   to these releases than equity indices, which respond to both macro
  #   and idiosyncratic corporate earnings flow.

  - id: 3
    name: "Macro-announcement ORB G5 at US_DATA_830"
    theory_citation: "Andersen, Bollerslev, Diebold, Vega (2003) AER; Baur & Lucey (2010) Financial Review"
    economic_basis: |
      Opening range ≥ G5 threshold on MGC at US_DATA_830 filters for
      08:30 ET macro release windows that produced meaningful first-5-
      minute gold price discovery. Gold is a macro-sensitive asset:
      per Baur & Lucey (2010), gold responds directly to inflation
      expectations and real rate movements via the USD/real-rate channel
      (higher-than-expected inflation → lower real rates → gold up).
      Per Andersen-Bollerslev-Diebold-Vega (2003), the 08:30 ET release
      concentrates multi-day macro news into seconds. A G5 opening range
      indicates the release contained meaningful information content for
      gold specifically. Breakouts continue as the market completes
      gradual information incorporation. Gold's macro sensitivity makes
      this session theoretically STRONGER for gold than for equity
      indices. RR=2.0 per the dominant intraday breakout practitioner convention.
    filter:
      type: ORB_G5
      column: orb_size_points
    scope:
      instruments: [MGC]
      sessions: [US_DATA_830]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "BH FDR q=0.05 fails on the pre-registered 5-hypothesis family"
      - "Chordia t-statistic < 3.00"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0 OR < 0.40 × IS ExpR"
      - "Any era with N ≥ 50 and ExpR < -0.05"
      - "IS Sharpe < 0.96 annualized — within Bailey noise floor at N=5 on 3.55yr"

  # -------------------------------------------------------------------------
  # Hypothesis 4 — Volatility regime ATR_P70 at NYSE_OPEN
  # -------------------------------------------------------------------------
  #
  # Theoretical basis:
  #   Engle, R. F. (1982). "Autoregressive Conditional Heteroscedasticity
  #   with Estimates of the Variance of United Kingdom Inflation."
  #   Econometrica 50(4), 987-1007. Volatility is persistent: a
  #   high-volatility day is likely followed by high-volatility days.
  #
  #   Bessembinder, H., & Seguin, P. J. (1993). "Price volatility,
  #   trading volume, and market depth: Evidence from futures markets."
  #   Journal of Financial and Quantitative Analysis 28(1), 21-39.
  #   High-volatility futures sessions exhibit stronger directional
  #   continuation because market depth is reduced and large participants
  #   cannot unwind positions quickly enough to mean-revert.
  #
  # Economic mechanism for MGC ATR_P70 at NYSE_OPEN:
  #   Gold trades actively during US equity hours. NYSE_OPEN captures
  #   the peak US-session gold volume when equity/gold cross-asset
  #   flows are highest (equity desks hedging with gold, risk-parity
  #   rebalancing, macro-overlay adjustments). On high-ATR gold days
  #   (upper 30th percentile per ARCH/GARCH persistence), reduced
  #   market depth per Bessembinder-Seguin means breakouts continue
  #   rather than mean-revert. This tests whether the volatility-regime
  #   gate amplifies the per-trade ExpR at MGC's highest-volume
  #   US session.

  - id: 4
    name: "Volatility regime ATR_P70 at NYSE_OPEN"
    theory_citation: "Engle (1982) ARCH; Bessembinder & Seguin (1993) JFQA"
    economic_basis: |
      Own 20-day ATR in the upper 30% (ATR_P70) selects for high-
      volatility-regime MGC days per ARCH/GARCH persistence. NYSE_OPEN
      captures peak US-session gold volume when equity/gold cross-asset
      flows are highest: equity desks hedging with gold, risk-parity
      rebalancing, macro-overlay adjustments. Per Bessembinder & Seguin
      (1993), breakouts on high-volatility days exhibit stronger
      continuation because reduced depth prevents efficient mean-
      reversion by large orders. This tests the compound hypothesis
      that ARCH/GARCH volatility persistence + Bessembinder-Seguin
      depth effect produces stronger breakout continuation on gold
      during the US session's highest cross-asset flow window.
    filter:
      type: ATR_P70
      column: atr_20_percentile
    scope:
      instruments: [MGC]
      sessions: [NYSE_OPEN]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "BH FDR q=0.05 fails on the pre-registered 5-hypothesis family"
      - "Chordia t-statistic < 3.00"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0 OR < 0.40 × IS ExpR"
      - "Any era with N ≥ 50 and ExpR < -0.05"
      - "IS Sharpe < 0.96 annualized — within Bailey noise floor at N=5 on 3.55yr"

  # -------------------------------------------------------------------------
  # Hypothesis 5 — Crabel opening range G5 at NYSE_OPEN
  #
  # NOTE: Former hypotheses 5 (G6 LONDON_METALS) and 6 (G5 COMEX_SETTLE)
  # were DROPPED during the 2026-04-09 high-effort audit to reduce N from
  # 7 to 5, required by the calendar-year MinBTL correction (3.55yr < 3.89yr
  # at N=7). Both were threshold variants of H1 and H2 respectively — same
  # mechanism, different G-threshold. Dropping maximizes distinct theoretical
  # predictions per trial. See docs/plans/2026-04-09-hypothesis-audit-plan.md.
  # -------------------------------------------------------------------------
  #
  # Theoretical basis:
  #   Crabel (1990) ch. 3, commitment hypothesis (as above).
  #
  #   Capie, F., Mills, T. C., & Wood, G. (2005). "Gold as a hedge
  #   against the dollar." Journal of International Financial Markets,
  #   Institutions and Money 15(4), 343-352. Documented that gold moves
  #   inversely with USD during US trading hours, driven by cross-asset
  #   rebalancing between equities/bonds and gold.
  #
  # Economic mechanism for MGC at NYSE_OPEN:
  #   NYSE_OPEN captures the peak US-session gold volume when equity/gold
  #   cross-asset flows are highest. Unlike H4 (which gates on ATR_P70),
  #   this tests the raw Crabel commitment effect WITHOUT a volatility
  #   regime filter. The question: does NYSE_OPEN gold ORB breakout work
  #   unconditionally (filtered only by range size G5), or does it require
  #   the volatility regime gate (H4) to be profitable? This is the
  #   critical test that distinguishes "gold always has NYSE_OPEN edge"
  #   from "gold has NYSE_OPEN edge only in high-vol regimes."

  - id: 5
    name: "Crabel opening range G5 at NYSE_OPEN"
    theory_citation: "Crabel (1990) ch. 3; Capie, Mills, Wood (2005) JIMFIM"
    economic_basis: |
      Opening range >= G5 threshold on MGC at NYSE_OPEN tests the Crabel
      commitment hypothesis at the peak US cross-asset flow window WITHOUT
      a volatility regime gate. Per Capie-Mills-Wood (2005), gold moves
      inversely with USD during US hours driven by equity/bond/gold
      rebalancing. NYSE_OPEN concentrates this cross-asset flow. G5
      filters for meaningful commitment without requiring elevated ATR.
      This distinguishes "gold has unconditional NYSE_OPEN ORB edge" from
      "gold needs high-vol conditions" (tested by H4). If H7 passes but
      H4 does not, the Crabel effect at NYSE_OPEN is robust across vol
      regimes. If H4 passes but H7 does not, the effect depends on the
      Bessembinder-Seguin depth mechanism. RR=2.0 per Crabel canonical.
    filter:
      type: ORB_G5
      column: orb_size_points
    scope:
      instruments: [MGC]
      sessions: [NYSE_OPEN]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "BH FDR q=0.05 fails on the pre-registered 5-hypothesis family"
      - "Chordia t-statistic < 3.00"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0 OR < 0.40 × IS ExpR"
      - "Any era with N ≥ 50 and ExpR < -0.05"
      - "IS Sharpe < 0.96 annualized — within Bailey noise floor at N=5 on 3.55yr"

# ---------------------------------------------------------------------------
# Budget sanity check
# ---------------------------------------------------------------------------
#
# Trial count: 5 hypotheses × 1 trial each = 5 trials total.
#
# Per-hypothesis trial count:
#   1 filter_type × 1 session × 1 entry_model (E2)
#   × 1 rr_target (2.0) × 1 confirm_bar (1) × 1 stop_multiplier (1.0)
#   = 1 trial per bundle
#
# MinBTL bound (Bailey et al 2013 Theorem 1):
#   MinBTL = 2·Ln[N] / E[max_N]²
#   With N=5 and E[max_N]=1.0 (Bailey default, most conservative):
#     MinBTL = 2·Ln[5] / 1.0² = 2 · 1.6094 = 3.2189 years
#   Data horizon: 3.55 calendar years (MGC 2022-06-13 to 2025-12-31,
#     1,298 calendar days ÷ 365.25). Year metric = calendar years,
#     matching pipeline Sharpe annualization convention.
#   3.2189 < 3.55 → PASS at strict E=1.0 with 10.4% headroom.
#
#   N=6 would require MinBTL = 2·Ln[6] / 1.0² = 3.5835yr > 3.55yr → FAIL.
#   N=5 is the maximum at strict Bailey E=1.0 on 3.55 calendar years.
#
#   Noise floor Sharpe: E_min = √(2·Ln[5] / 3.55) = √(3.2189/3.55)
#     = √0.9068 = 0.952 annualized.
#   Candidates with IS Sharpe < 0.96 (rounded up for conservatism) are
#   within the Bailey noise floor at N=5 and should not be promoted.
#
# Locked criterion 2 bound: N ≤ 300 (clean) per pre_registered_criteria v2.8.
# 5 / 300 = 1.7% of the locked ceiling. The binding constraint is Bailey,
# not the operational ceiling.
#
# Chordia t-threshold (Amendment 2.2): every hypothesis has a
# theory_citation field, so has_theory=True → Chordia gate applies the
# t ≥ 3.00 threshold (with-theory band), not the t ≥ 3.79 no-theory band.
#
# No proxy data used. data_source_mode is NOT declared (defaults to clean).
#
# Amendment 2.9 two-tier note: if any of these 5 hypotheses PASS Tier 1
# discovery, Tier 2 validation against GC parent-symbol data (price-only
# features, 2010-2023 coverage) is available as a SEPARATE post-discovery
# step per Amendment 2.9. Tier 2 is NOT pre-registered in this file and
# does NOT count toward N.

total_hypothesis_count: 5
total_expected_trials: 5

budget_check:
  mode: "clean"
  max_allowed_clean: 300
  max_allowed_proxy: 2000
  locked_criterion_2_headroom_pct: 98.3
