testing_discipline:
  K_family: 12
  BH_FDR_alpha: 0.05
  MinBTL_check: "2·ln(12) / 9 = 0.55 yrs; IS window >=6 yrs per instrument. Trivially satisfied."
  per_cell_heterogeneity_gate: "every per-cell result must include per-lane breakdown and <=25% cell-flip rate"
  mandatory_downstream_gates_non_waivable:
    - "C6 (WFE >= 0.50) at per-cell level"
    - "C8 (fresh OOS N >= 50 per role_floor)"
    - "C9 (era stability per role)"
  integrity_gates:
    - "No same-OOS peek across cells — each cell gets its own fresh-OOS accrual window"
    - "Role-selection decision made at 12-cell matrix level, not per-cell"
    - "NOTHING default is pre-committed if all active roles fail — never backfill with sub-threshold role"

reporting:
  required_outputs:
    - "12-cell scorecard: instrument × role × {gate_status, native_metric, deploy_gate_status}"
    - "Cross-instrument consistency check: if same role passes on 2+ instruments, same form?"
    - "Portfolio-impact summary: given role-selection outcome, what changes in 6-lane allocator structure?"

