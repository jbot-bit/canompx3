# ============================================================
# DRAFT — META-FRAMEWORK. DOES NOT EXECUTE DIRECTLY.
# This is a ROLE-SELECTION framework, not a single-test pre-reg.
# It organizes the rel_vol work across 3 instruments × 4 roles
# into a 12-cell matrix. Existing and future per-cell pre-regs
# slot into this framework as implementations.
#
# Lock condition: this meta-framework must be user-reviewed before
# any per-cell sub-pre-reg is authored beyond what already exists.
# Individual per-cell pre-regs may continue their own lifecycles.
# ============================================================

motivation: |
  The rel_vol lineage has been running as a series of form-selection
  experiments (linear sizer → filter Q5-only → filter Q4+Q5 → biphasic
  exhaustion). Each form was treated as THE question, retrospectively
  challenged when the data didn't cooperate. The real question
  underneath is role-selection:

    "For each instrument (MNQ, MES, MGC), what is the correct
     deployment ROLE of the rel_vol_session signal: FILTER, SIZER,
     ALLOCATOR, or NOTHING?"

  Form-selection is subordinate: once role is chosen, form-within-role
  is a narrower pre-reg. This meta-framework establishes the scoring
  metric and decision rules per role so role-comparison is principled
  rather than ad-hoc.

grounded_in_local_extracts:
  - path: "docs/institutional/mechanism_priors.md"
    use: "R1 FILTER before R3 POSITION-SIZE hierarchy when signal is
          tail/binary (as MGC Q5-only suggested). R2 REGIME ALLOCATOR
          when signal is volatility-regime conditional."
  - path: "docs/institutional/pre_registered_criteria.md"
    use: "Every role's pre-reg inherits C1-C12 criteria; role-specific
          metrics are additions, not substitutions."
  - path: "docs/institutional/literature/bailey_et_al_2013_pseudo_mathematics.md"
    use: "MinBTL budget applies at the K = (instruments × roles)
          level. 3 × 4 = 12, well under 300."
  - path: "docs/institutional/literature/carver_2015_volatility_targeting_position_sizing.md"
    use: "Forecast-scaled sizing is R3 SIZER canonical form. Carver
          explicitly frames continuous scaling as inferior to binary
          filter when effect is tail-concentrated."
  - path: "docs/institutional/literature/harvey_liu_2015_backtesting.md"
    use: "Pre-registered role decision avoids the garden-of-forking-
          paths; report all 12 cells, not the winning 1."

axes:
  instruments: ["MNQ", "MES", "MGC"]
  roles:
    - role_id: "FILTER"
      description: "Binary gate — trade iff condition met, skip otherwise. Includes Q5-only, Q4+Q5, skip-Q5, Q4-only, and any binary predicate form."
      native_metric_primary: "conditional ExpR on fired trades"
      native_metric_secondary: "fired-trade Sharpe"
      sample_size_floor: "N_fired >= 100 IS, N_fired >= 50 fresh OOS"
    - role_id: "SIZER"
      description: "Continuous scaling — multiplier per trade, capital-neutral. Includes quintile-linear (PR #59 form), curvature (PR #59 re-audit H3), and any continuous-multiplier form."
      native_metric_primary: "paired-t(weighted - uniform) on same trades"
      native_metric_secondary: "weighted Sharpe - uniform Sharpe"
      sample_size_floor: "N_pairs >= 300 IS, N_pairs >= 100 fresh OOS"
    - role_id: "ALLOCATOR"
      description: "Portfolio-level capital weight per (instrument, session) lane, binned by regime variable. Includes vol-regime session routers (the PR #62 / #63 ovnrng style)."
      native_metric_primary: "ΔSR_ann(router vs uniform) on rolling 4-fold CV (LdP 2020)"
      native_metric_secondary: "per-fold win rate + map-stability across folds"
      sample_size_floor: ">=3 rolling folds of >=150 trades each"
    - role_id: "NOTHING"
      description: "Null case: signal does not deploy. Used when no role passes its gate. Must be the pre-committed default."
      native_metric_primary: "N/A (default)"
  cell_count: 12  # 3 × 4

hypothesis:
  H_per_cell: |
    For each of the 12 cells, the cell's role passes OR fails at its
    native metric per the gates below. Role-selection per instrument
    is the role with highest net institutional score (see Scoring
    below). If no role passes any gate, the instrument defaults to
    NOTHING.

  H_cross_cell: |
    Each role that passes on multiple instruments is tested for
    cross-instrument homogeneity. If agreement >= 2 of 3 instruments
    on the SAME form of the SAME role, that form is universal.
    Heterogeneous findings (only 1 of 3) are instrument-specific.

scoring:
  filter_role_score:
    pass_condition: "conditional ExpR > unfiltered ExpR AND Welch t(fired, non-fired) >= +2.0 AND fire_rate in [5%, 40%] AND N_fired >= 100 IS"
    deploy_gate: "fresh OOS conditional ExpR > 0 AND N_fresh >= 50 AND era stability (no year N>=30 with ExpR < -0.05 on fired)"

  sizer_role_score:
    pass_condition: "paired-t(weighted - uniform) >= +2.0 AND weighted Sharpe >= 0 AND per-lane cell-flip <= 25%"
    deploy_gate: "fresh OOS paired-t >= +1.5 AND N_fresh >= 100 AND institutional stack (C5 DSR post-N_eff, C6 WFE, C9 era) clears"

  allocator_role_score:
    pass_condition: "rolling 4-fold CV: >=3 wins AND mean ΔSR_ann >= +0.30 AND map-stability <= 2 unique sessions per bin"
    deploy_gate: "LdP 2020 CPCV fold SR on fresh regime >= +0.50 AND no catastrophic (ΔSR <= -1.0) fold"

  nothing_default:
    pass_condition: "always passes (null case)"
    deploy_gate: "N/A"

  institutional_overlay:
    notes: |
      Every role's deploy gate is ADDITIONAL TO the standing
      non-waivable criteria in pre_registered_criteria.md:
      C1 (mechanism), C2 (sample power), C3 (BH-FDR at role K),
      C6 (WFE), C9 (era stability), C11 (account-death MC).
      DSR (C5) is cross-check pending N_eff resolution (Amendment 2.1).

decision_rule_per_instrument:
  - "If exactly 1 role passes: that role is the deployment candidate."
  - "If 2+ roles pass: choose the role with higher net EV after
     per-trade cost model + capital constraint (MinBTL-compliant)."
  - "If 0 roles pass: instrument defaults to NOTHING. Document as
     dead for rel_vol. Do not combine sub-threshold roles."

non_action_constraints:
  - "Does NOT lock any per-cell pre-reg. Per-cell locks happen in sub-pre-regs."
  - "Does NOT execute any role on canonical data yet."
  - "Does NOT modify validated_setups / edge_families / lane_allocation / live_config."
  - "2026-01-01..2026-04-21 OOS is CONTAMINATED (sizer peek + filter Q4/Q5 peek from PR #59 re-audit)."
  - "Fresh OOS window starts 2026-04-22 for all role re-evaluations; pre-2026-04-22 OOS is informational only."

