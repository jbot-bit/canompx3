  amendment_strengthens_not_loosens: true  # (A-series amendments)

# ----------------------------------------------------------------------
# Stage 3 execution contract (binding for scripts/research/ml_v3_pooled_discovery.py)
# ----------------------------------------------------------------------
stage_3_execution_contract:
  order:
    - step: 1
      action: "Parse this hypothesis file; verify its committed SHA matches the file on disk"
    - step: 2
      action: "Run pre-training gates G1-G7 in order; abort on ANY failure with explicit error"
    - step: 3
      action: "Capture data_hash (G5), holdout_end (G4), run_started_at_utc, git_commit_sha"
    - step: 4
      action: "Load pooled training data via build_eligibility_report for each (strategy_id, trading_day, orb_minutes) combination across 29 active MNQ+MES strategies"
    - step: 5
      action: "Compute the 6 features via trading_app.ml.features.transform_to_features + new orb_SESSION_volume_norm transform"
    - step: 6
      action: "Assert no LOOKAHEAD_BLACKLIST column is populated on the feature matrix (defence-in-depth)"
    - step: 7
      action: "Apply gate G2 (drop negative-baseline strategies from training) and log dropped list"
    - step: 8
      action: "Stratify by RR target into 3 training pools (RR=1.0, 1.5, 2.0); log per-pool row counts and baseline stats"
    - step: 9
      action: "Run required pre-training diagnostics D4 (session-identity probe) and D7 (correlation matrix); if D4 AUC > 0.80, ABORT as DEAD before training any trial"
    - step: 10
      action: "Train trial 1 (v3_rr10): CPCV-45, Youden-J-calibrated threshold, 5K Phipson-Smyth bootstrap vs Null A, report all stats"
    - step: 11
      action: "Train trial 2 (v3_rr15): same procedure"
    - step: 12
      action: "Train trial 3 (v3_rr20): same procedure"
    - step: 13
      action: "Apply BH FDR at q=0.05 across the 3-trial family (Amendment A1)"
    - step: 14
      action: "For BH-FDR survivors: walk-forward validation per A12 schema (5 folds, 4yr/6mo)"
    - step: 15
      action: "For walk-forward survivors: compute DSR (Bailey-LdP 2014 Eq 2), era stability, Chordia t"
    - step: 16
      action: "For all trials (survivors and kills): compute D1-D6 diagnostics — no early termination"
    - step: 17
      action: "Load the SACRED 2026 holdout using the locked holdout_end (G4). This is the ONLY query against the holdout window in the entire run"
    - step: 18
      action: "For each trial: apply its Youden-J threshold to holdout predictions, compute pooled ML-gated ExpR + net dollar PnL + per-strategy ExpR table"
    - step: 19
      action: "Apply kill criteria C1-C9 in order; record which trigger for each trial; determine winning trial (if any)"
    - step: 20
      action: "For winning trial (if any): run D6 sensitivity (active + retired pool); if lift disappears, override to DEAD"
    - step: 21
      action: "Write postmortem via atomic tempfile + rename (A20) containing: run metadata, hypothesis_file_sha, data_hash, holdout_end, dropped strategies (G2), D1-D7 tables, trial stats, kill-criteria triggers, winning trial (or DEAD), and a narrative section describing what we learned"
    - step: 22
      action: "Print one-line summary with exit code: 0 = winner found, 1 = DEAD, 2 = protocol violation / abort"

  protocol_violations:
    - "Any step out of order"
    - "Any query against the holdout window before step 17"
    - "Any modification to kill criteria after step 16 (post-hoc relaxation)"
    - "Any skipped required diagnostic"
    - "Any non-atomic postmortem write"
    - "Any Stage 3 re-run with a different data_hash (means data changed)"
