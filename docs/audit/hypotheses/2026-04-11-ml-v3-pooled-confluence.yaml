# ----------------------------------------------------------------------

total_hypothesis_count: 1
total_expected_trials: 3

budget_check:
  max_allowed_clean: 300
  max_allowed_proxy: 2000
  strict_bailey_e1_bound: 28
  target_trials: 3
  status: "conservatively under budget at 3/28 strict Bailey bound"

