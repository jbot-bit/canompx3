# Hypothesis Registry — 2026-04-11 ml-v3-pooled-confluence
#
# Locked (v1):              2026-04-11T00:00:00+10:00  commit 414c76da
# Amended (v2):             2026-04-11 (this commit)   PRE-EXECUTION
# Author:                   Claude Code (institutional ML V3 sprint)
# Data horizon:             6.65yr clean MNQ/MES real-micro (Phase 3c rebuild)
# Holdout:                  2026-01-01 (Mode A sacred boundary)
# Parent plan:              docs/audit/ml_v3/2026-04-11-stage-0-verification.md
# Prior code stage:         0a99d07c (fail-closed ML gate, Stage 1)
#
# ================================================================
# AMENDMENT v2 — Pre-execution adversarial self-audit revision
# ================================================================
#
# This amendment closes 22 gaps found in adversarial self-audit of
# the v1 hypothesis (commit 414c76da). CRITICALLY: no Stage 3 code
# has run against v1. No validated_setups, no experimental_strategies,
# and no downstream artefact has been SHA-stamped to 414c76da. The
# amendment is therefore a pre-registration REVISION, not a post-hoc
# relaxation. Per pre_registered_criteria.md § Revision policy, this
# is allowed when (a) the revision strengthens criteria, not loosens
# them, and (b) no results have been observed.
#
# The v1 file is preserved in git history at 414c76da. The amendment
# log below documents every change and its motivation.
#
# ----------------------------------------------------------------
# Amendments
# ----------------------------------------------------------------
# - A1  HIGH  testing_mode flipped from "individual" to "family" to
#             resolve internal contradiction. K=3 pre-registered
#             per-RR pooled models, BH FDR at q=0.05 across the
#             3-trial family.
#
# - A2  HIGH  Trial grid restructured from asymmetric K=8 to
#             RR-stratified K=3. V2 ML audit (Mar 4 2026) found
#             that pooling across RR targets led to the model
#             learning "low RR = higher WR" as the dominant
#             feature (56-69 pct of importance), producing
#             tautological predictions. Stratifying the pool
#             into 3 per-RR models makes each pool internally
#             RR-homogeneous and eliminates the tautology by
#             construction.
#
# - A3  HIGH  Probability threshold removed from the trial grid.
#             Thresholds are decision-calibration artifacts, not
#             model hyperparameters, and sweeping them on holdout
#             would be multiple-testing contamination. Each model
#             trains its own threshold via Youden J maximisation
#             on CPCV validation folds (no holdout peek). The
#             trained threshold is applied ONCE to the holdout.
#
# - A4  HIGH  New pre-training gate G2: drop any strategy with
#             train-window ExpR <= 0 from the meta-label training
#             set. Meta-labeling requires a positive primary per
#             de Prado Ch 3.6. The aggregate pool is positive at
#             51.82 pct WR, but individual strategies may not be;
#             including negative-baseline strategies in training
#             would reintroduce the V2 threshold artifact. Dropped
#             strategies remain in the holdout evaluation universe
#             for honest comparison.
#
# - A5  HIGH  New kill criterion (C9, per-strategy local-loss):
#             for EVERY strategy in the pool (not just pooled
#             average), the ML-gated holdout ExpR must be >= 0.
#             Without this, pooled ML could look positive while
#             destroying value on specific strategies (which is
#             a trading-destructive failure mode that pooled
#             statistics hide).
#
# - A6  HIGH  Kill criterion C7 (beat-baseline) formalised.
#             Previously under-specified as "loses to" — now
#             specified as paired bootstrap of per-trade
#             (ML_R - baseline_R) with 5K resamples; require
#             the lower 95 pct CI bound of the lift to be > 0.
#
# - A7  HIGH  New kill criterion C8 (dollar net): compute
#             dollar-level net PnL using COST_SPECS from
#             pipeline.cost_model. ML V3 must have higher net
#             dollar PnL than baseline on the pooled holdout.
#             ExpR alone ignores the impact of reduced trade
#             counts on cost structure and account survival.
#
# - A8  HIGH  New pre-training diagnostic D4 (session-identity
#             probe): train a toy RF on the 6 features to predict
#             orb_label (session identity) from the features
#             alone. If AUC > 0.60, flag for careful interpretation
#             in the postmortem. If AUC > 0.80, the features
#             trivially identify session and the pooled model
#             becomes a session-ranker rather than a trade-quality
#             predictor — DEAD.
#
# - A9  MED   Feature correlation matrix (D7) required pre-training
#             to document redundancy. Does not trigger kill, but
#             informs interpretation.
#
# - A10 MED   Unit test required for new feature
#             orb_SESSION_volume_norm BEFORE training run starts.
#             Gap 11: if the feature is bugged, the whole
#             experiment is invalid with no diagnostic.
#
# - A11 MED   Feature importance (MDA) reporting required for
#             all three trials (not just survivors). Required
#             per LdP 2020 Section 1.3 as a legitimate ML use.
#
# - A12 MED   Walk-forward schema explicitly locked: 5 folds,
#             4-year train window, 6-month test window, rolling
#             forward in 6-month steps. All 5 windows strictly
#             pre-holdout.
#
# - A13 MED   Null hypothesis specification refined into two
#             separate tests required for kill-criterion pass:
#               Null A: shuffled-label null (does the model
#                       detect any signal at all?)
#               Null B: all-take baseline (does the model beat
#                       the no-ML comparator?)
#             Both must pass; passing only A is insufficient
#             because a model can detect weak signal without
#             providing net value.
#
# - A14 MED   Mid-run-abort policy flipped: Stage 3 runs ALL 3
#             trials to completion regardless of interim failures,
#             then applies kill criteria at the end. Recording
#             all stats is a research protocol requirement;
#             early abort is a data-snooping risk.
#
# - A15 MED   Brier score + reliability diagram required for
#             calibration assessment. AUC alone measures
#             discrimination but not calibration; a well-
#             discriminating but miscalibrated model can have
#             bad P(win) numbers that mislead the execution
#             engine.
#
# - A16 MED   Sensitivity analysis (D6) on active + 6 retired
#             MNQ strategies as a robustness check. If ML V3
#             passes on active-only but fails on active+retired,
#             the model is learning survivor-specific noise and
#             should be treated as DEAD.
#
# - A17 LOW   Global seed hygiene: np.random.seed(42),
#             random.seed(42), plus RF and CPCV random_state=42.
#
# - A18 LOW   Holdout end date locked at Stage 3 run start via
#             max(trading_day) query; stamped on postmortem.
#
# - A19 LOW   Data versioning: hash pooled orb_outcomes subset
#             (trading_day, symbol, orb_minutes, outcome) at
#             run start, stamp on postmortem as data_hash.
#             Any Stage 3 re-run must produce the same hash.
#
# - A20 LOW   Atomic postmortem writes: tempfile + rename on
#             success. No partial postmortems.
#
# - A21 LOW   Unit of pool explicitly defined as: one row per
#             (strategy_id, trading_day, orb_minutes) eligible
#             setup reconstructed via build_eligibility_report.
#             No trade can appear twice.
#
# - A22 LOW   Pooled ExpR math explicitly defined as equal-
#             weighted mean of R across pooled rows (each row
#             weighted equally regardless of parent strategy).
#             Other weighting schemes considered (trade-count,
#             inverse-variance) but equal-weighted matches how
#             the trading bot actually realises PnL.
#
# None of these amendments loosens a criterion. All either add
# new constraints, formalise vague language, or plug gaps the
# adversarial self-audit found. This is a strengthening
# amendment, not a relaxation.
# ================================================================

metadata:
  name: "ml-v3-pooled-confluence"
  version: 2
  version_rationale: "v1 pre-execution adversarial self-audit revision; closes 22 gaps before any Stage 3 code runs"
  purpose: "Test whether RR-stratified pooled meta-label models over 29 validated MNQ+MES strategies, using 6 theory-grounded pre-break features (5 V2 core + orb_SESSION_volume_norm), produce positive per-RR pooled holdout lift on the Mode A 2026 sacred holdout compared to the no-gate baseline."
  date_locked: "2026-04-11T00:00:00+10:00"
  date_amended: "2026-04-11"
  data_horizon_years_clean: 6.65
  data_horizon_years_proxy: 0.0
  holdout_date: "2026-01-01"
  total_expected_trials: 3
  testing_mode: "family"            # (A1) family with K=3 BH FDR, NOT individual
  data_source_mode: "clean"

# ----------------------------------------------------------------------
# Hypothesis — RR-stratified pooled meta-label
# ----------------------------------------------------------------------

hypotheses:
  - id: 1
    name: "RR-stratified pooled meta-label improves per-RR holdout lift for MNQ+MES"
    theory_citation: |
      - Lopez de Prado 2020 "ML for Asset Managers" §1.2 Theory Matters
        (theory-first strategy development, cited verbatim in
        docs/institutional/literature/lopez_de_prado_2020_ml_for_
        asset_managers.md pp 2-4)
      - Lopez de Prado 2020 §1.4.2 (CPCV for short finite-data,
        pp 8-9, verbatim extracted)
      - de Prado 2018 AFML Ch 3.6 (meta-labeling requires positive
        primary model — the motivating constraint for gate G2)
      - Bailey et al 2013 "Pseudo-Mathematics" Theorem 1 (MinBTL
        bound, verbatim in docs/institutional/literature/
        bailey_et_al_2013_pseudo_mathematics.md)
      - Bailey-Lopez de Prado 2014 DSR Eq 2 (Criterion 5)
      - Harvey-Liu 2015 / Chordia et al 2018 (Criterion 3/4 dual
        pathway)
      - Internal: V2 ML audit Mar 4 2026 — rr_target dominated
        56-69 pct of feature importance, proving the V2 per-
        instrument pool mixed RR targets to the model's detriment.
        Stratifying by RR is the direct fix.
      - Internal: confluence_program_results.md (Mar 2026) — 48
        BH FDR survivors + 25/25 WF deployable for session-volume
        and rel_vol feature families proved session-volume contains
        real edge; orb_SESSION_volume_norm is the pre-break-safe
        variant of that signal.

    economic_basis: |
      The 29 active validated MNQ+MES strategies (Stage 0 verified)
      have positive pooled baseline (WR 51.82 pct, ExpR 0.108R over
      29,488 trades). Meta-labeling per de Prado AFML Ch 3 requires
      a positive primary model — the aggregate pool satisfies this,
      but individual constituent strategies may not. Gate G2 drops
      any strategy with train-window ExpR <= 0 from the META-LABEL
      TRAINING SET (not from holdout evaluation — kept there for
      honest comparison).

      The V2 ML audit (documented in trading_app/ml/config.py:107-110)
      found that when a single pooled model sees mixed RR targets,
      rr_target becomes the dominant feature (56-69 pct importance)
      and the model learns the tautology "low RR => higher WR"
      instead of regime/flow signals. Stratifying into 3 per-RR
      pools removes rr_target as a useful feature by construction
      (every trade in a pool has the same RR).

      The new feature orb_SESSION_volume_norm is session-specific
      ORB-window volume normalised by its 20-day median for that
      session (computed at ORB close, pre-break safe per
      SESSION_FEATURE_SUFFIXES line 77 documentation). The
      confluence program established this feature family has real
      univariate edge; V3 tests whether pooling + 5 V2 core +
      volume_norm produces net lift over the no-ML baseline.

      The ML V3 model is a SKIP-FILTER at entry time: for each
      eligible setup, predict P(win); if P(win) < trained threshold,
      skip the trade; else take it. The goal is to improve pooled
      net dollar PnL on the 2026 sacred holdout, not just ExpR,
      because fewer trades after skip-filtering changes the cost
      structure and account-level dynamics.

    filter:
      type: ML_POOLED_META_LABEL_RR_STRATIFIED
      column: "N/A (model training, not column filter)"
      features:
        - orb_size_norm
        - atr_20_pct
        - gap_open_points_norm
        - orb_pre_velocity_norm
        - prior_sessions_broken
        - orb_SESSION_volume_norm  # NEW in V3 — 85-88 pct coverage verified in Stage 0
      hyperparameters:
        model_type: "RandomForestClassifier"
        n_estimators: 200
        max_depth: 6
        min_samples_leaf: 100
        max_features: "sqrt"
        class_weight: "balanced"
        random_state: 42
      threshold_calibration:
        method: "youden_j_on_cpcv_validation_folds"
        forbidden: "any threshold decision made with visibility of holdout data"
      cpcv:
        n_groups: 10
        k_test: 2  # C(10,2) = 45 splits
        purge_days: 1
        embargo_days: 1
        random_state: 42
      bootstrap:
        method: "phipson_smyth"
        permutations: 5000
        nulls_required: ["shuffled_labels", "all_take_baseline"]
      walk_forward:
        n_folds: 5
        train_window_years: 4
        test_window_months: 6
        step_months: 6
        all_windows_pre_holdout: true  # LOCKED — no holdout peeking

    scope:
      instruments: [MNQ, MES]
      primary_model_count: 29  # 27 MNQ + 2 MES active per Stage 0
      rr_stratification:
        # Three separate pooled models, one per RR target. Gate G2
        # may drop strategies from each stratum if train-window
        # ExpR <= 0. Actual per-stratum counts determined at
        # Stage 3 run time via gate G2.
        - rr_target: 1.0
          model_id: "v3_rr10"
        - rr_target: 1.5
          model_id: "v3_rr15"
        - rr_target: 2.0
          model_id: "v3_rr20"
      sessions:
        - CME_PRECLOSE
        - COMEX_SETTLE
        - EUROPE_FLOW
        - NYSE_OPEN
        - TOKYO_OPEN
        - US_DATA_1000
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
      training_window:
        start: "2019-05-06"
        end: "2025-12-31"
        real_micro_only: true
      holdout_window:
        start: "2026-01-01"
        end: "LOCKED_AT_RUN_START"  # (A18) captured via max(trading_day) at Stage 3 init
        touched: false

    expected_trial_count: 3
    # Trial enumeration (K=3):
    #   trial 1: v3_rr10 — RF defaults, train-calibrated threshold
    #   trial 2: v3_rr15 — RF defaults, train-calibrated threshold
    #   trial 3: v3_rr20 — RF defaults, train-calibrated threshold
    # BH FDR at q=0.05 across the 3-trial family.
    # No post-hoc expansion. Feature-set variants or hyperparameter
    # variants are NOT part of this hypothesis; they would be a
    # separate future hypothesis file.

    # --------------------------------------------------------------
    # Kill criteria — LOCKED, no post-hoc relaxation (9 criteria)
    # --------------------------------------------------------------
    kill_criteria:
      - "C1 BH FDR q=0.05 kills all 3 trials on pooled CPCV test (Criterion 3 Pathway A)"
      - "C2 Best survivor has WFE < 0.50 on 5-fold walk-forward (Criterion 6)"
      - "C3 Best survivor has DSR < 0.95 per Bailey-LdP 2014 Eq 2 full formula (Criterion 5)"
      - "C4 Pooled holdout lift paired bootstrap: lower 95 pct CI bound of (ML_R - baseline_R) per trade is <= 0 for best survivor (Criterion 8 refined)"
      - "C5 Any era bin (2019-22, 2023, 2024-25) with >= 50 pooled trades shows pooled ML-gated ExpR < -0.05 (Criterion 9)"
      - "C6 Best survivor has Chordia t < 3.00 theory-supported threshold on pooled holdout (Criterion 4 Pathway A theory-grounded)"
      - "C7 Best survivor fails beat-baseline probe: paired bootstrap of (ML_R - atr20_pct_ge_50_filter_R) per trade lower 95 pct CI <= 0"
      - "C8 Dollar-level net PnL: sum(ML-gated_dollar_PnL) after COST_SPECS costs on pooled holdout < sum(baseline_dollar_PnL) after costs. Institutional rule: ML must make us more money, not just look better per-trade."
      - "C9 Per-strategy local-loss: ANY single strategy in the pool has ML-gated holdout ExpR < 0. This catches the case where pooled ML looks good but destroys value for specific strategies. (Amendment A5 — the single most important addition over v1)"

    # --------------------------------------------------------------
    # Pre-training gates — MUST pass before trials run
    # --------------------------------------------------------------
    pre_training_gates:
      - "G1 Drift check passes: python pipeline/check_drift.py reports 0 failures"
      - "G2 Per-strategy positive primary: drop from meta-label training set any strategy with train-window ExpR <= 0. Keep in holdout evaluation for comparison. Record dropped strategies in postmortem. (Amendment A4 — closes de Prado Ch 3.6 per-strategy baseline trap)"
      - "G3 Universe re-verification: verify the 29 active validated_setups from Stage 0 still match by (strategy_id, status, sample_size, win_rate); abort and re-verify if ANY drift detected"
      - "G4 Holdout end date lock: SELECT MAX(trading_day) FROM orb_outcomes — stamp on postmortem, use for ALL holdout queries in this run"
      - "G5 Data version hash: SHA256 over (trading_day, symbol, orb_minutes, outcome) for all pooled rows — stamp on postmortem"
      - "G6 Feature unit tests: run pytest tests/test_trading_app/test_ml/test_features.py --ml-v3 — must all pass before training"
      - "G7 Global seed set: np.random.seed(42), random.seed(42) at script entry"

    # --------------------------------------------------------------
    # Required diagnostics (MUST be computed, DO NOT trigger kills
    # unless explicitly noted, but must appear in postmortem)
    # --------------------------------------------------------------
    required_diagnostics:
      - "D1 Per-strategy holdout ExpR table: under ML gate and under baseline, side-by-side. Used by C9 kill. (Amendment A5)"
      - "D2 Dollar-level net PnL table: gross PnL, net PnL after cost_model, trade count, per-trade cost, account-level Sharpe for both ML-gated and baseline. Used by C8 kill. (Amendment A7)"
      - "D3 Feature importance via MDA (Mean-Decrease Accuracy) for each of the 3 trials. Required per LdP 2020 Section 1.3. (Amendment A11)"
      - "D4 Session-identity probe: toy RF trained on the 6 features to predict orb_label. Report AUC. If > 0.80 -> DEAD (equivalent to kill). If > 0.60 -> flag for interpretation. (Amendment A8)"
      - "D5 Brier score + reliability diagram for each trial. Measures calibration, not just discrimination. (Amendment A15)"
      - "D6 Sensitivity analysis: re-run the winning trial on active + 6 retired MNQ strategies. If winning lift disappears, the model is learning survivor-specific noise — treat as DEAD. (Amendment A16)"
      - "D7 Feature correlation matrix (pearson + spearman) for the 6 features on the training set. (Amendment A9)"

    # --------------------------------------------------------------
    # Null hypothesis specification (Amendment A13)
    # --------------------------------------------------------------
    null_hypotheses:
      null_a_shuffled_labels:
        description: "Shuffle the (feature, label) pairs in the training set, retrain with the same RF + CPCV pipeline. Compute the distribution of AUC under shuffled labels. If real AUC > 99th percentile of shuffled AUC, Null A rejected."
        purpose: "Detects whether any signal exists in the features. If we can't beat shuffled labels, there is no signal."
      null_b_all_take_baseline:
        description: "Baseline model: take every eligible setup (no ML gate). Compute pooled holdout ExpR and net dollar PnL. ML must beat this baseline per C4, C7, C8."
        purpose: "Detects whether the ML gate provides net value over the no-gate alternative. A model can have real but weak signal that does not improve net PnL after costs."

