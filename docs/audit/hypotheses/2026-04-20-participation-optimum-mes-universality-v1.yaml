  entry_model: E2
  confirm_bars: 1
  rr_target: 1.5
  filter_applied: "NONE"
  out_of_scope:
    - "MGC (different asset class — separate mechanism claim)"
    - "Apertures other than 5m (mechanism established as 5m-specific on MNQ)"
