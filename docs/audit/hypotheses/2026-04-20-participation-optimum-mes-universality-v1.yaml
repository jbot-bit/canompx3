reproducibility:
  repo_root: "C:/Users/joshd/canompx3"
  commit_sha: "TO_FILL_AFTER_COMMIT"
  committed_required_before_run: true

testing_mode: individual
pathway: B_theory_driven

scope:
  instrument: MES
  sessions_in_scope:
    - CME_PRECLOSE
    - CME_REOPEN
    - COMEX_SETTLE
    - EUROPE_FLOW
    - LONDON_METALS
    - NYSE_CLOSE
    - NYSE_OPEN
    - SINGAPORE_OPEN
    - TOKYO_OPEN
