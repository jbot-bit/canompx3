    expected_trial_count: 1
    kill_criterion: "BH FDR adjusted p >= 0.05 at K=10, OR WFE < 0.50, OR 2026 OOS ExpR < 0"

  - id: 10
    name: MNQ US_DATA_830 early macro reaction G5 RR1.0
    theory_citation: >
      Ederington & Lee (1993) JF: early macro releases (08:30 ET) create
      directional moves, especially employment + GDP. Marginal for MNQ
      because NQ is less macro-sensitive than ES. G5 minimum. RR1.0.
    scope:
      instruments: [MNQ]
      sessions: [US_DATA_830]
      rr_targets: [1.0]
      entry_models: [E2]
