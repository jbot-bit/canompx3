deployment_not_done_here: |
  This pre-reg does NOT authorize any capital action. It is a mechanism-shape
  confirmation/falsification layer that sits between the merged H04 parent
  prereg (family selection) and the merged H04 shadow prereg (operational
  deployment contract). A positive verdict here unblocks continued shadow-phase
  accrual under the sibling prereg; it does NOT bypass sibling gate_1 N>=30.
  A negative verdict here is sufficient to kill H04 regardless of shadow
  accumulation state.

