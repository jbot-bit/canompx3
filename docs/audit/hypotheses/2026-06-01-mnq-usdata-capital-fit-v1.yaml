    - docs/audit/results/2026-06-01-mnq-usdata-capital-fit-v1-sizing.csv

hypotheses:
  - id: H1
    role:
      kind: allocator
      parent: MNQ_NYSE_OPEN_O15_E2_RR2_COST_LT10_PLUS_US_DATA_1000_O15_E2
      comparator: MNQ_NYSE_OPEN_O15_E2_RR2_COST_LT10_PLUS_US_DATA_1000_O15_E2_RR2_COST_LT10
      primary_metric: profile_safe_annual_dollars
      promotion_target: NONE_RESEARCH_ONLY
      profile_id: topstep_50k_mnq_auto
    parent_population:
      symbol: MNQ
      anchor_leg: MNQ_NYSE_OPEN_O15_E2_RR2_COST_LT10
      variable_leg_session: US_DATA_1000
      variable_leg_orb_minutes: 15
      variable_leg_entry_model: E2
      variable_leg_confirm_bars: 1
      variable_leg_rr: [1.0, 1.5, 2.0]
      variable_leg_filters: [NO_FILTER, COST_LT08, COST_LT10, COST_LT12, COST_LT15]
    expected_trial_count: 15
    primary_metric: profile_safe_annual_dollars
    selection_rule: >
      Rank books by the best contract size that satisfies scaling feasibility,
      historical drawdown budget, profile daily-loss belt, and 90-day bootstrap
      operational survival on pre-2026 data. 2026 is descriptive monitoring only.
    verdict_policy:
      continue: forbidden_from_this_stage
      narrow: profile-safe accounting improves deployability design but inherited research DSR remains uncleared
      kill: no contract size passes account constraints

controls:
  frozen_monitoring_window: "2026-01-01+"
  no_2026_tuning: true
  no_live_deployment: true
  max_contracts_per_leg_tested: 10
  monte_carlo:
    horizon_days: 90
    n_paths: 10000
    seed: 20260601
