# Hypothesis Registry — MES Direct Friction Gate
#
# Locked:        2026-04-11T01:00:00+10:00
# Author:        Claude Code session (wave 4 lit-grounded discovery)
# Holdout mode:  A (2026-01-01 sacred)
# Data horizon:  6.65 calendar years (MES real micro 2019-05-06 to 2025-12-31)
# Testing mode:  family (Pathway A, BH FDR at K=24)
#
# AUDIT NOTE: COST_LT08 on MES = ~G7 equivalent (friction < 8% of risk).
# Passes 31% CME_PRECLOSE, 67% NYSE_OPEN — meaningful selectivity.
# MES has higher friction-to-range ratio than MNQ, making cost gating
# more impactful as a discriminator.

metadata:
  name: "mes-cost-gate"
  purpose: |
    Test whether direct cost-ratio gating (friction/risk < 8%) improves
    MES ORB breakout edge. MES has higher relative friction ($2.42 RT,
    $1.25/pt) than MNQ, making cost-ratio filtering more economically
    meaningful. COST_LT08 adapts to MES-specific friction economics.
  date_locked: "2026-04-11T01:00:00+10:00"
  holdout_date: "2026-01-01"
  data_horizon_years_clean: 6.65
  data_source: "real CME Micro E-mini S&P 500 futures 2019-05-06 onwards"
  testing_mode: "family"
  bailey_compliance:
    trials: 24
    horizon_years: 6.65
    e_max_n: 1.0
    min_btl_required_years: 6.36
    headroom_pct: 4.4
    status: "PASS"
  total_expected_trials: 24

hypotheses:
  - id: 1
    name: "MES TOKYO_OPEN COST_LT08 RR1.0"
    theory_citation: "Chan (2009) Quantitative Trading ch.1-2; project 16yr friction audit (Apr 2026)"
    economic_basis: |
      Transaction cost as fraction of risk is the primary edge discriminator.
      Direct cost-ratio filtering adapts to MES-specific economics rather
      than using absolute point thresholds (G-filters). MES has higher
      relative friction than MNQ, making this gate more impactful.
    filter:
      type: COST_LT08
      column: cost_ratio_pct
      thresholds: [8]
    scope:
      instruments: [MES]
      sessions: [TOKYO_OPEN]
      rr_targets: [1.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "BH FDR q=0.05 fails at K=24"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0"
      - "Any era with N >= 50 and ExpR < -0.05"

