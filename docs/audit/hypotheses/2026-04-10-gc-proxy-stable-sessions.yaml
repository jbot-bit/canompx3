    theory_citation: "Crabel (1990) ch. 3; Andersen, Bollerslev, Diebold, Labys (2003) Econometrica"
    economic_basis: |
      Vol persistence + continuation. High prior-day range selects for
      active markets where 2x continuation is more likely. Regime-robust
      across all gold price levels.
    filter:
      type: PDR_R080
      column: prev_day_range
    scope:
