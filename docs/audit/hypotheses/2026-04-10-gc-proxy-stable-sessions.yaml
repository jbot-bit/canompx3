# GC Proxy — Stable Sessions (NYSE_OPEN + US_DATA_1000)
# Pathway B individual hypothesis testing (Amendment 3.0 + 3.1)
#
# Locked:        2026-04-10T18:00:00+10:00
# Holdout mode:  A (2026-01-01 sacred)
# Data source:   GC parent futures 2010-2026 (proxy for MGC)
# Data horizon:  15.5 calendar years (2010-06-07 to 2025-12-31)
# Testing mode:  individual (each hypothesis has economic theory)
#
# Session selection: NYSE_OPEN and US_DATA_1000 are the only two
# sessions with POSITIVE unfiltered E2 baseline across ALL 4 eras
# (2010-2014, 2015-2019, 2020-2022, 2023-2025) on 16yr GC data.
#
# Bailey: N=8, MinBTL = 2*ln(8)/1.0^2 = 4.16yr << 15.5yr. PASS.

metadata:
  name: "gc-proxy-stable-sessions"
  purpose: |
    Test gold ORB edge at the two most stable sessions using GC proxy
    data. Filters: unfiltered baseline (maximum N) and PDR_R080
    (vol persistence, regime-robust percentile filter).
  date_locked: "2026-04-10T18:00:00+10:00"
  holdout_date: "2026-01-01"
  data_horizon_years_clean: 15.5
  data_source: "GC parent gold futures 2010-06-07 onwards (proxy for MGC)"
  data_source_mode: "proxy"
  data_source_disclosure: "GC full-size gold (100oz, $100/pt) used as price proxy for MGC (10oz, $10/pt). Amendment 3.1 approved 2026-04-10. Price correlation r=0.99999 across 1.25M paired bars. Volume differs. Cost model uses MGC specs."
  testing_mode: "individual"
  bailey_compliance:
    trials: 8
    horizon_years: 15.5
    e_max_n: 1.0
    min_btl_required_years: 4.16
    headroom_pct: 273
    status: "PASS"
  total_expected_trials: 8

hypotheses:
  - id: 1
    name: "GC NYSE_OPEN unfiltered RR1.0 — Crabel commitment baseline"
    theory_citation: "Crabel (1990) ch. 3"
    economic_basis: |
      NYSE cash open concentrates institutional order flow into gold futures.
      Unfiltered baseline test: does the breakout edge exist AT ALL over 16
      years? Maximum N for tightest confidence interval.
    filter:
      type: NO_FILTER
      column: null
    scope:
      instruments: [GC]
      sessions: [NYSE_OPEN]
      rr_targets: [1.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "Raw p >= 0.05 (Pathway B)"
      - "Negative annualized Sharpe"
      - "Walk-forward efficiency < 0.50"
      - "Any era with N >= 50 and ExpR < -0.05"

  - id: 2
    name: "GC NYSE_OPEN unfiltered RR2.0 — Crabel continuation"
    theory_citation: "Crabel (1990) ch. 3"
    economic_basis: |
      At RR2.0, testing whether NYSE open gold breakouts produce sustained
      continuation (2x the ORB range). 16yr average ExpR +0.108 at RR2.0
      vs +0.087 at RR1.0 suggests continuation may be stronger.
    filter:
      type: NO_FILTER
      column: null
    scope:
      instruments: [GC]
      sessions: [NYSE_OPEN]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "Raw p >= 0.05 (Pathway B)"
      - "Negative annualized Sharpe"
      - "Walk-forward efficiency < 0.50"
      - "Any era with N >= 50 and ExpR < -0.05"

  - id: 3
    name: "GC NYSE_OPEN PDR_R080 RR1.0 — Crabel + vol persistence"
    theory_citation: "Crabel (1990) ch. 3; Andersen, Bollerslev, Diebold, Labys (2003) Econometrica"
    economic_basis: |
      Vol persistence (ABDL 2003): days following high-range days have
      elevated continuation potential. PDR_R080 selects the top 20% of
      prior-day ranges — a regime-robust percentile filter that works
      at any gold price level. Combined with Crabel NYSE commitment.
    filter:
      type: PDR_R080
      column: prev_day_range
    scope:
      instruments: [GC]
      sessions: [NYSE_OPEN]
      rr_targets: [1.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "Raw p >= 0.05 (Pathway B)"
      - "Negative annualized Sharpe"
      - "Walk-forward efficiency < 0.50"
      - "Any era with N >= 50 and ExpR < -0.05"

  - id: 4
