  promotion_gate: "Stage-1 PASS verdict — opens Stage-2 family scan eligibility ONLY. Does not authorize allocator, deployment, profile-whitelist mutation, or chordia_audit_log mutation."

testing_discipline:
  pathway: B_individual
  k: 1
  significance_threshold:
    raw_p_branch: "raw IS p < 0.05 is necessary but not sufficient"
    severity_branch: "Chordia strict t_IS >= 3.79 (no-theory, Criterion 4)"
    effect_size: "ExpR_IS > 0 (positive-mean floor) AND N_IS_on >= 100 (deployable-sample floor, Criterion 7)"
  mandatory_downstream_gates_non_waivable:
    - "Criterion 6 WFE_modeA >= 0.50 — recomputed under Mode-A IS only (stored WFE is potentially MODE_B-contaminated and disregarded)."
    - "Criterion 8 OOS dir_match conditional on power-tier per research.oos_power.oos_ttest_power; underpowered OOS cannot kill."
    - "Criterion 9 era stability — years_positive_IS >= 5 with N>=10 per year (denominator = 7 IS years 2019-2025; MNQ Databento coverage starts 2019-05-06, verified live 2026-05-12). Per-year IS counts: 2019=146, 2020=214, 2021=222, 2022=225, 2023=205, 2024=214, 2025=212."
    - "Criterion 5 DSR (Z-score scale per Amendment 2.1) cross-check only — not a kill criterion at this stage; advisory."

hypotheses:
  - id: 1
    type: primary
    name: "MNQ NYSE_CLOSE O5 E2 RR1.0 CB1 ORB_G8 Mode-A K=1 revalidation"
    economic_basis: >
      Question is honest: does this stored "validated" lane still clear strict
      Chordia severity under canonical Mode-A IS with the canonical filter
      delegation and scratch-realized-eod accounting? The 10-lane MNQ
      NYSE_CLOSE cohort sits behind a single ACTIVE-profile whitelist gate;
      if the highest-defensibility family head cannot clear strict
      t >= 3.79 under Mode-A re-measurement, the cohort has no claim to
      institutional validation and Stage 2 must not run. Pathway B K=1 is
      the doctrine-correct framing for a confirmatory revalidation question
      type per pre_registered_criteria.md Amendment 3.0.
    role:
      kind: standalone
      parent: "Mode-A canonical replay of MNQ_NYSE_CLOSE_E2_RR1.0_CB1_ORB_G8 on orb_outcomes JOIN daily_features."
      comparator: "Selected trades vs absolute Chordia floor t>=3.79 and ExpR>0; descriptive OOS sign monitor with power-tier; no sibling rescue, no parameter variation."
      primary_metric: "selected_trade_mean_r_IS"
      promotion_target: "stage_2_eligibility_only"
    filter:
      type: "ORB_G8"
      column: "ORB-window size in points from orb_outcomes / daily_features"
      thresholds:
        - "fire_vs_off (canonical delegation only)"
    scope:
      instruments: [MNQ]
      sessions: [NYSE_CLOSE]
      rr_targets: [1.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
      stop_multiplier_note: "1.0 only — strategy_id has no _S{n} suffix per make_strategy_id convention (suffix only emitted when stop_multiplier != 1.0)."
      orb_minutes: [5]
    expected_trial_count: 1
    statement: >
      Under canonical Mode-A IS (trading_day < 2026-01-01) on
      orb_outcomes JOIN daily_features with research.filter_utils.filter_signal
      ('ORB_G8', 'NYSE_CLOSE') as the fire mask and realized-eod scratch
      accounting, the selected-trade sample produces t_IS >= 3.79, ExpR_IS > 0,
      N_IS_on >= 100, and years_positive_IS >= 5 of 7 IS years
      (MNQ IS window 2019-05-06 to 2025-12-31, denominator=7 verified live).
    pass_metric:
      metric: t_IS
      formula: "compute_chordia_t(sharpe_IS, N_IS) on canonical Mode-A IS fired trades after canonical filter delegation and realized-eod scratch accounting"
      threshold_gte:
        t_is: 3.79
        n_is_on: 100
        expr_is: 0.0
        years_positive_is: 5
      threshold_lt: {}
      extra_gates:
        - "dir_match_oos = true when oos_ttest_power tier is CAN_REFUTE (power >= 0.80)"
        - "dir_match_oos advisory only when tier is DIRECTIONAL_ONLY (power in [0.50, 0.80))"
        - "OOS sign mismatch with power tier STATISTICALLY_USELESS (power < 0.50) does NOT kill"
        - "adversarial split table emitted (per-year ExpR, t, N, sign)"
        - "scratch-inclusive accounting required; runner emits scratch_count and realized-eod pnl_r"
        - "filter delegation parity check vs trading_app.config.ALL_FILTERS['ORB_G8'] required"
    counted_against_trial_budget: true

trial_budget:
  primary_selection_trials: 1
  n_trials: 1
  schema_locked_before_any_metric: true
  minbtl_bound:
    formula: "MinBTL = 2 * ln(N_trials) / E[max_N]^2 (Bailey et al 2013 Theorem 1)"
    n_trials: 1
    minbtl_years_required: 0.00
    clean_years_available: 6.65
    clean_years_source: "scripts/tools/minbtl_retro_report.CLEAN_YEARS_BY_INSTRUMENT['MNQ'] (doctrine constant)"
    n_max_at_horizon: 27
    operational_cap: 300
    within_cap: true
    verdict: PASS
    cap_reference: "estimate_k_budget(instrument=MNQ, n_trials=1, e_max=1.0, proxy_extended=false) -> PASS, 2026-05-12 (n_max_at_horizon=27, 6.65yr headroom)"

total_hypothesis_count: 1
total_expected_trials: 1
budget_check:
  max_allowed_clean: 300
  max_allowed_proxy: 2000
  status: "under budget"

kill_criteria:
  - id: K1
    metric: t_IS
    threshold: "t_IS < 3.79"
    action: KILL_COHORT
    note: "Chordia strict no-theory severity floor. Failure parks all 10 MNQ NYSE_CLOSE lanes (cohort-park rule)."
  - id: K2
    metric: ExpR_IS
    threshold: "ExpR_IS <= 0"
    action: KILL_COHORT
    note: "Positive-mean floor. Negative selected-trade mean is not edge."
  - id: K3
    metric: N_IS_on
    threshold: "N_IS_on < 100"
    action: KILL_COHORT
    note: "Criterion 7 deployable-sample power floor. Cohort cannot be validated on <100 IS trades."
  - id: K4
    metric: years_positive_IS
    threshold: "years_positive_IS < 5 (absolute count, N>=10 per year, denominator=7 — MNQ IS window is 2019-05-06 to 2025-12-31, verified live against orb_outcomes 2026-05-12)"
    action: KILL_COHORT
    note: "Criterion 9 era stability. Denominator is 7 (2019-2025 inclusive; 2019 is a partial year starting 2019-05-06 with N=146>=10). 5-of-7 is the standard era-stability rule on full-horizon MNQ instruments."
  - id: K5
    metric: WFE_modeA
    threshold: "WFE_modeA < 0.50"
    action: KILL_COHORT
    note: "Criterion 6. Stored WFE is potentially MODE_B-contaminated and disregarded; this is a fresh Mode-A WFE computation."
  - id: K6
    metric: dir_match_oos
    threshold: "dir_match_oos = false AND oos_ttest_power tier = CAN_REFUTE (power >= 0.80)"
    action: KILL_COHORT
    note: "OOS power-floor-gated dir_match. Underpowered OOS sign mismatch does NOT trigger this kill."
  - id: K7
    metric: filter_delegation_parity
    threshold: "fire-mask divergence from trading_app.config.ALL_FILTERS['ORB_G8'] > 0 rows"
    action: ABORT_AND_FIX
    note: "Canonical filter delegation must match. Abort, fix, rerun (does not count as new trial)."
  - id: K8
    metric: scratch_accounting
    threshold: "runner uses WHERE pnl_r IS NOT NULL or any scratch-drop equivalent"
    action: ABORT_AND_FIX
    note: "Criterion 13 scratch_policy=realized-eod is binding. Abort, fix, rerun."

decision_rule:
  continue_if: "All of K1-K6 cleared with K7-K8 PASS — cohort earns Stage-2 family-scan eligibility under a separate prereg + K-budget recheck."
  park_if: "K1-K5 cleared but K6 fires with power tier DIRECTIONAL_ONLY — Stage-1 verdict UNVERIFIED; cohort parks; revisit when OOS power tier reaches CAN_REFUTE."
  kill_if: "Any of K1-K5 fires, OR K6 fires with power tier CAN_REFUTE — all 10 MNQ NYSE_CLOSE lanes park as not_revalidated_strict_chordia."

methodology_rules_applied:
  - rule: "RULE 1 feature temporal alignment"
    application: "ORB_G8 reads ORB-window size only; § 6.1 safe. No § 6.2 conditional-validity feature used. E2 entry (stop-market on first bar AFTER ORB close) — ORB_G8 fires at ORB end BEFORE break bar; § 6.3 break-bar-look-ahead class does not apply (ORB_G8 is not a break-bar feature)."
  - rule: "RULE 2 filter application timing"
    application: "Filter fires at ORB end (07:05 Brisbane for NYSE_CLOSE O5) before E2 break detection. Trades skipped on filter=off; not retro-filtered."
  - rule: "RULE 3 IS/OOS discipline"
    application: "IS = trading_day < 2026-01-01; OOS read-only descriptive with power-tier gate. No OOS tuning."
  - rule: "RULE 3.3 OOS power floor"
    application: "K6 dir_match kill gated by research.oos_power.oos_ttest_power tier; underpowered OOS does not kill."
  - rule: "RULE 4 multiple testing"
    application: "K_family = K_global = K_lane = K_session = 1 for this prereg (Pathway B K=1). Per Amendment 3.0, Pathway-B individual does not apply multi-framing K to itself."
  - rule: "RULE 4.2 MinBTL budget"
    application: "estimate_k_budget PASS: 0.00yr required, 6.65yr available, n_max_at_horizon=27, operational cap 300. Verdict PASS recorded 2026-05-12."
  - rule: "RULE 6 trade-time knowability"
    application: "ORB_G8 first-complete-time = ORB end (07:05 Brisbane). E2 break detection fires AFTER ORB close. Trade-time-knowable = true. Lookahead_check required PASS before execution."
  - rule: "RULE 9 canonical data source"
    application: "Reads orb_outcomes JOIN daily_features only. No derived-layer (validated_setups stored numbers used only for candidate identification, NOT evidence)."
  - rule: "research-truth-protocol canonical filter delegation"
    application: "research.filter_utils.filter_signal mandatory; no inline filter re-encoding. K7 parity check enforces."
  - rule: "Criterion 13 scratch policy"
    application: "realized-eod required; WHERE pnl_r IS NOT NULL forbidden. K8 enforces."
  - rule: "Amendment 2.1 DSR scale"
    application: "DSR Z-score from trading_app/strategy_discovery.py recorded for cross-check only; not a kill criterion."
  - rule: "Mode-B grandfathered baseline rule"
    application: "validated_setups stored expectancy_r=0.0974 NOT used as baseline. Mode-A IS recomputed from canonical orb_outcomes; candidate selected by stored c8_oos_status + p_value ranking among family heads only."
  - rule: "Chordia theory_citation field-presence trap"
    application: "theory_citation field OMITTED entirely from this prereg (no top-level, no per-hypothesis). Per memory/feedback_chordia_theory_citation_field_presence_trap.md, presence of any truthy value silently flips loader has_theory=True and downgrades the strict no-theory threshold from 3.79 to 3.00. Strict no-theory hurdle (t>=3.79) is the intended behaviour."

outputs_required_after_run:
  - "result markdown at docs/audit/results/2026-05-13-mnq-nyse-close-mode-a-k1-revalidation.md"
  - "row-level CSV with IS/OOS split, raw + realized-eod pnl_r, scratch flag, filter fire status, trading_day, entry_ts"
  - "single-cell summary table: N_IS_on, N_IS_scratch, ExpR_IS, Sharpe_IS, t_IS, years_positive_IS, WFE_modeA, DSR_Z, OOS N, OOS ExpR, dir_match, oos_power, oos_power_tier, verdict"
  - "filter-delegation parity check report (rows divergent vs ALL_FILTERS['ORB_G8'])"
  - "per-year adversarial split table (year, N, ExpR, t, sign)"
  - "explicit statement that no theory grant was applied and strict t>=3.79 governed"
  - "pooled-finding front-matter on result MD per .claude/rules/pooled-finding-rule.md (direction: pooled): pooled_finding: true, per_cell_breakdown_path pointing at directional breakdown table in same MD, flip_rate_pct (long/short row signs), heterogeneity_ack: true if flip_rate_pct >= 25%"
  - "evidence-auditor sign-off (per .claude/rules/adversarial-audit-gate.md) before any downstream Stage-2 work"
  - "explicit cohort-fate articulation: result MD verdict block must state whether the 10-lane cohort proceeds to Stage 2 or parks"

execution_gate:
  allowed_now: false
  allowed_after: "user confirmation (authorization to run the Mode-A scan) AND commit_sha stamped"
  execution_surface: "WSL with .venv-wsl or canonical Windows .venv per repo policy"
  forbidden_now:
    - "running the Mode-A scan before user authorization"
    - "writing to validated_setups, edge_families, lane_allocation.json, or chordia_audit_log.yaml"
    - "Stage-2 family-scan prereg authorship before Stage-1 result MD and adversarial-audit sign-off"
    - "Stage-3 profile-whitelist mutation in trading_app/prop_profiles.py"
    - "theory-grant upgrade without /resources-backed citation specific to ORB_G8 on NYSE_CLOSE"
    - "threshold rescue if a kill criterion fires"

