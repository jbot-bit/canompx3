scope:
  instrument: MNQ
  strategy_id: "MNQ_NYSE_CLOSE_E2_RR1.0_CB1_ORB_G8"
  session: NYSE_CLOSE
  orb_minutes: 5
  entry_model: E2
  confirm_bars: 1
  rr_target: 1.0
  direction: pooled
  filter_type: ORB_G8
  filter_source: "trading_app.config.ALL_FILTERS['ORB_G8']"
  baseline: "no comparative baseline — Pathway B K=1 tests selected-trade mean_r against absolute Chordia floor, not a delta."
  candidate_selection_basis: >
    Of 10 active MNQ NYSE_CLOSE family heads in validated_setups, this is the
    highest-defensibility candidate by the same selection logic used in the
    2026-05-12 MGC LONDON_METALS Stage 1 prereg: (i) c8_oos_status = PASSED
    (excludes the 2 NO_OOS_DATA heads which would fail an OOS power-floor
    inspection on arrival); (ii) lowest p_value among PASSED heads
    (p=0.005364, fdr_p=0.009303); (iii) largest IS sample (677 stored trades);
    (iv) most recent activity (last_trade_day = 2026-05-07); (v) non-degenerate
    filter (ORB_G8 — bucketed ORB size, registered in
    trading_app/config.py ALL_FILTERS); (vi) aperture O5 (5m) — encoded in the
    family_hash. The competing PASSED heads (COST_LT15 p=0.009 /
    X_MES_ATR70 p=0.013 with NO_OOS) are not Stage 2 candidates by this
    prereg; a Stage 2 prereg would re-rank. Stored per-strategy stats
    (expectancy_r=0.0974, sharpe_ratio=0.107, win_rate=0.5938) are used ONLY
    to pick the candidate, NOT as evidence — Mode-A recompute is the evidence.
  out_of_scope:
    - "The other 9 MNQ NYSE_CLOSE family heads (deferred to Stage 2 conditional on Stage 1 PASS, separate prereg + separate K-budget recheck)."
    - "Adjacent filters (other ORB_G buckets, RR variants, confirm_bars variants, stop-multiplier variants)."
    - "Theory-grant attempt for ORB_G8 on NYSE_CLOSE."
    - "Allocator, sizing, deployment, profile-whitelist mutation, or chordia_audit_log writes (all Stage 3, separate authorized session)."
    - "Chordia audit on MGC LONDON_METALS surviving lanes (cohort-park rule from 2026-05-12 Stage 1 KILL stands; see docs/audit/results/2026-05-12-mgc-london-metals-mode-a-k1-revalidation.md)."

data_policy:
  is_window:
    description: "trading_day < HOLDOUT_SACRED_FROM"
    constant_source: "trading_app.holdout_policy.HOLDOUT_SACRED_FROM"
    locked_boundary: "2026-01-01"
    effective_first_day: "2019-05-06"
    effective_first_day_source: "MIN(trading_day) FROM orb_outcomes WHERE symbol='MNQ' AND orb_label='NYSE_CLOSE' AND orb_minutes=5 AND entry_model='E2' AND rr_target=1.0 AND confirm_bars=1, verified live 2026-05-12"
    effective_years: 6.65
    per_year_is_counts: {2019: 146, 2020: 214, 2021: 222, 2022: 225, 2023: 205, 2024: 214, 2025: 212}
    total_is_trade_count_pre_filter: 1438
  oos_window:
    description: "HOLDOUT_SACRED_FROM <= trading_day < CURRENT_DATE"
    policy: "read-only descriptive corroboration only; cannot rescue an IS-kill nor kill an IS-pass except via the explicit dir_match-with-power-floor clause in kill_criteria."
  tuning_against_oos: false
  canonical_layers_only: true
  scratch_policy: "realized-eod"
  scratch_policy_justification: >
    Per pre_registered_criteria.md Criterion 13 default after Stage 5
    outcome_builder fix landed. Excluding scratches via WHERE pnl_r IS NOT NULL
    inflated ExpR 10-45 percent on MNQ E2 CB1 survivor lanes
    (memory/feedback_scratch_pnl_null_class_bug.md). NYSE_CLOSE is a
    session-bounded lane; scratches at session end MTM count via
    pipeline.cost_model.pnl_points_to_r. Literature:
    docs/institutional/literature/bailey_lopezdeprado_2014_dsr_sample_selection.md.

feature_definition:
  feature_name: ORB_G8
  canonical_source_of_truth: "trading_app.config.ALL_FILTERS['ORB_G8']"
  delegation_wrapper: "research.filter_utils.filter_signal(df, 'ORB_G8', 'NYSE_CLOSE')"
  column_source: "ORB-window size (high - low in points) from canonical orb_outcomes / daily_features columns; first complete at ORB end (NYSE_CLOSE O5 ORB ends 07:05 Brisbane)."
  trade_time_knowable: true
  first_complete_time: "ORB end (07:05 Brisbane for NYSE_CLOSE O5)"
  temporal_alignment_note: >
    ORB-window size is a § 6.1 safe feature — measured strictly within the
    ORB window (07:00-07:05 Brisbane for NYSE_CLOSE O5) and complete before
    E2 break detection on the bar AFTER ORB close. ORB_G8 is a bucketed
    ORB-size threshold; bucket assignment uses orb_size_pts only. No § 6.2
    conditional-validity feature is read; no overnight_*, session_*, or
    break-bar feature is consulted at entry time. E2 entry model is a
    stop-market on range-cross of the first bar after ORB close; ORB_G8
    fires at ORB end, BEFORE the break bar. § 6.3 E2 break-bar look-ahead
    concerns do not apply (ORB_G8 is not a break-bar feature).
  lookahead_check: "Required PASS before execution. Runner must emit ORB_G8 fire mask vs trading_app.config delegation parity check."

grounding:
  core_orb_premise:
    - source_file: "resources/Building_Reliable_Trading_Systems.pdf"
      extract_proxy: "docs/institutional/literature/fitschen_2013_path_of_least_resistance.md"
      use: "Grounds intraday trend-follow / breakout continuation as a strategy class. Fitschen Ch 3 is equity-index-specific; NYSE_CLOSE on MNQ (Nasdaq E-mini micro) is a Fitschen-class instrument-session pairing. The breakout CLASS is grounded; the ORB_G8 bucketed-size filter is NOT a Fitschen-cited mechanism. No theory grant for the filter itself."
      with_theory_claim: false
    - source_file: "resources/Trading_Exchanges_Harris_2002.pdf"
      extract_proxy: "docs/institutional/literature/harris_2002_trading_exchanges_microstructure.md"
      use: "Harris Ch 4 § 4.5.2 stop-cascade liquidity-demand mechanism grounds breakout entries in general. Not ORB_G8-specific."
      with_theory_claim: false
  filter_grounding_status:
    verdict: NO_THEORY_GRANT
    basis: >
      No local literature extract grounds ORB_G8 (bucketed ORB size) as a
      causal alpha mechanism on NYSE_CLOSE. ORB_G8 is a size-bucket gate; it
      survives here as a liquidity / execution gate, not a theory-grounded
      edge. Therefore Chordia strict no-theory threshold t >= 3.79 applies
      (Criterion 4, no-theory branch). Per chordia_audit_log.yaml
      default_has_theory=false.

