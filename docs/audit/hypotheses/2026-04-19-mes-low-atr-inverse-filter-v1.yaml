version: 1
status: LOCKED
date: 2026-04-19
slug: mes-low-atr-inverse-filter-v1
title: "MES low-ATR (~ATR_P70) inverse-filter Pathway A family — 5 sessions × 2 directions × RR=1.5 (K=20)"
owner: claude
parent_spec: "docs/audit/hypotheses/2026-04-19-mes-comprehensive-mode-a-feature-v1.yaml"
parent_result: "docs/audit/results/2026-04-19-mes-comprehensive-mode-a-feature-v1-scan.md"

testing_mode: family
pathway: A_family

authority:
  primary:
    - ".claude/rules/backtesting-methodology.md"
    - ".claude/rules/research-truth-protocol.md"
    - "docs/institutional/pre_registered_criteria.md"
    - "docs/prompts/prereg-writer-prompt.md"
  notes:
    - "Pathway A — Chordia t >= 3.00 with-theory. Theory: Fitschen Ch 3 p.41 commodity/equity-index intraday trend-follow PLUS a MES-specific regime observation from commit 76475a34 that top-30% ATR days produce NEGATIVE ExpR on both long and short MES across 5 sessions × 10 cells. The inverse hypothesis is that the PROFITABLE regime for MES intraday breakouts is the bottom-70% ATR subset. This is a within-class volatility refinement per Fitschen."
    - "Canonical filter delegation: ~filter_signal(df, 'ATR_P70', orb_label) — logical NOT on the canonical ATR_P70 mask. No new filter registered in ALL_FILTERS; if this validates, production-side ATR_LT70 filter registration becomes a separate pre-reg."
    - "Mode A: trading_day < trading_app.holdout_policy.HOLDOUT_SACRED_FROM (2026-01-01)."
    - "Scope symmetric to K=40 parent (same 5 sessions × 2 directions × RR=1.5) to eliminate session re-selection hazard. ATR_P70 is the ONLY filter tested — this is the direct inverse of the K=40 10/10 negative pattern."

observational_source:
  doc: "docs/audit/results/2026-04-19-correction-cycle-multi-angle-synthesis.md § Angle 1"
  claim: |
    All 10 MES ATR_P70 cells in the K=40 scan (commit 76475a34) show
    NEGATIVE Mode A IS ExpR across 5 sessions × 2 directions:
      TOKYO_OPEN     L -0.025  S -0.061
      SINGAPORE_OPEN L -0.051  S -0.132
      EUROPE_FLOW    L -0.107  S -0.190
      LONDON_METALS  L -0.081  S -0.069
      COMEX_SETTLE   L -0.035  S -0.110
  role: "POST-HOC OBSERVATION — not a validated finding. Generated this pre-reg to TEST it formally."

reproducibility:
  repo_root: "C:/Users/joshd/canompx3"
  commit_sha: "b9f38e33"
  committed_required_before_run: true

scope:
  instruments:
    - id: MES
      source: "pipeline.asset_configs.ACTIVE_ORB_INSTRUMENTS"
  sessions:
    - TOKYO_OPEN
    - SINGAPORE_OPEN
    - EUROPE_FLOW
    - LONDON_METALS
    - COMEX_SETTLE
  session_rationale: |
    Same 5 MES sessions as parent K=40 scope. Lock preserves
    session-symmetry with parent; eliminates session re-selection bias.
  orb_minutes: 5
  entry_model: E2
  confirm_bars: 1
  directions:
    - long
    - short
  rr_target: 1.5
  filter_class: "~ATR_P70"
  filter_delegation: "mask = ~np.asarray(filter_signal(df, 'ATR_P70', orb_label)).astype(bool)"
  filter_canonical_reference: "trading_app.config.ALL_FILTERS['ATR_P70'] — OwnATRPercentileFilter min_pct=70.0"
  no_new_registered_filter: "This pre-reg does NOT add a new filter to ALL_FILTERS. Scan uses logical inversion of the canonical mask in research code. Production registration of ATR_LT70 would require a separate pre-reg."

data_policy:
  is_window:
    description: "trading_day < HOLDOUT_SACRED_FROM"
    constant_source: "trading_app.holdout_policy.HOLDOUT_SACRED_FROM"
    locked_boundary: "2026-01-01"
    effective_coverage: "MES native ~6.7 years (2019-08 through 2025-12)"
  oos_window:
    description: "trading_day >= HOLDOUT_SACRED_FROM (descriptive only; never used to select or tune)"
    policy: "Mode A sacred."
  tuning_against_oos: false

feature_definition:
  feature_name: "~ATR_P70"
  canonical_source_of_truth: "trading_app.config.ALL_FILTERS['ATR_P70']"
  delegation_wrapper: "~filter_signal(df, 'ATR_P70', orb_label)"
  trade_time_knowable: true
  first_complete_time: "ATR_P70 uses atr_20 computed from prior 20 trading days' closes; known at prior-close, before session start."
  lookahead_check: "PASS — atr_20 is trade-time-knowable per RULE 6.1 safe list."
  rule_category: "§ 6.1 safe (always trade-time-knowable)"

primary_schema:
  k_family: 20
  k_global: 20
  k_lane: 20
  k_session: 4      # 2 directions per session
  k_instrument: 20
  primary_promotion_gate: "K_family BH-FDR q < 0.05"
  family_cells_structured_as: |
    5 sessions × 2 directions × RR=1.5 × (~ATR_P70) = 20 cells.
    Cell IDs: "H{idx:02d}_{session_abbr}_LOWATR_{dir_abbr}_RR15".

upstream_discovery_provenance:
  role: "PROVENANCE_ONLY"
  note: |
    Post-hoc observation from parent K=40 scan (commit 76475a34). Parent
    pre-reg scope: 5 sessions × 4 filters × 2 directions × RR=1.5 = 40.
    One of the 4 filters was ATR_P70; all 10 ATR_P70 cells (5 sessions
    × 2 directions) were negative ExpR. This pre-reg tests the inverse
    mask (~ATR_P70) as a Pathway A family.
    Baselines computed by harness at run time — no pre-commit selection.

hypotheses_schema:
  id_format: "H{idx:02d}_{session_abbr}_LOWATR_{dir_abbr}_RR15"
  session_abbr:
    TOKYO_OPEN: "TOK"
    SINGAPORE_OPEN: "SGP"
    EUROPE_FLOW: "EUR"
    LONDON_METALS: "LDM"
    COMEX_SETTLE: "CMX"
  dir_abbr:
    long: "L"
    short: "S"
  theory_citation_for_all_cells:
    source: "docs/institutional/literature/fitschen_2013_path_of_least_resistance.md"
    extract: "Table 3.9 (p.41) commodity/equity-index intraday trend-follow. Low-ATR inverse screen is a within-class vol refinement — the regime where intraday breakouts are most likely to follow through rather than whipsaw."
  per_cell_gate:
    - "bh_pass_family (q_family < 0.05)"
    - "abs(t_IS) >= 3.00"
    - "N_IS_on >= 100"
    - "years_positive_IS >= 4 (absolute, over 7 years 2019-2025; N<10 years excluded from positive count)"
    - "bootstrap_p < 0.10 (moving-block centered-H0, block=5, B=10000)"
    - "ExpR_on_IS > 0"

trial_budget:
  primary_selection_trials: 20
  schema_locked_before_any_metric: true
  minbtl_bound:
    formula: "MinBTL = 2 * ln(N_trials) / E[max_N]^2 per Bailey et al 2013"
    N_trials: 20
    expected_max_N: 1200   # ~70% of 1721 max session N
    minbtl_value: "2 * ln(20) / 1200^2 ~ 4.2e-6 — well within data horizon"
    within_cap: true

kill_criteria:
  - id: K1
    metric: "Number of H01-H20 that pass all 6 gate clauses"
    threshold: 0
    action: "PERMANENT KILL — inverse ATR_P70 hypothesis refuted. The 10/10 negative ATR_P70 pattern was a descriptive artifact (e.g., driven by very rare extreme days) not a deployable inverse edge."
  - id: K2
    metric: "Baseline sanity smoke-test: harness sum_fire_on + sum_fire_off == total valid rows, per cell"
    threshold: 1
    action: "SMOKE FAIL — harness fire mask corrupted."
  - id: K3
    metric: "Any cell flagged tautology (|T0|>0.70), extreme_fire (<5% or >95%), or arithmetic_only"
    threshold: 1
    action: "FLAG — exclude flagged cells from survivor set per RULE 8. Note: (~ATR_P70) fire rate is EXPECTED ~70% by construction; the extreme_fire threshold is loosened to >95% only for this family (LOOSENING DOCUMENTED HERE)."
  - id: K4
    metric: "If ExpR_on - ExpR_off sign matches unfiltered baseline sign AND |WR_spread|<0.02, this is ARITHMETIC_ONLY"
    threshold: 1
    action: "Cells passing K1+K2+K3 but flagged here are cost-screen class, NOT edge class — deploy as a SKIP gate not a size-up gate."

decision_rule:
  continue_if: "At least 1 of H01-H20 passes all 6 gate clauses AND no K2/K4 fail AND not K3-flagged."
  park_if: "At least 1 cell passes BH-FDR family but fails EXACTLY ONE of {bootstrap_p, years_positive} with N_IS_on >= 100."
  kill_if: "K1 fires OR K2 smoke fail."

methodology_rules_applied:
  - rule: "backtesting-methodology.md RULE 1 — look-ahead"
    application: "~ATR_P70 uses atr_20 at prior close; trade-time-knowable."
  - rule: "backtesting-methodology.md RULE 3 — IS/OOS discipline"
    application: "Strict Mode A IS."
  - rule: "backtesting-methodology.md RULE 4 — multi-framing BH-FDR"
    application: "K_family = K_global = 20."
  - rule: "research-truth-protocol.md § Canonical filter delegation"
    application: "filter_signal delegation with logical inversion in research code. No inline re-implementation."
  - rule: "prereg-writer-prompt.md § Pathway A filter-mechanism specificity"
    application: "Inverse volatility screen. Fitschen grounds the parent class; ~ATR_P70 is the within-class low-vol refinement."

fire_rate_expectation: |
  ~ATR_P70 fires on bottom-70% ATR days by construction, so cell fire rate
  is EXPECTED ~70% (not ~30%). Extreme_fire threshold (>95%) still fires
  on pure-low-vol lanes but the normal 70% fire rate is not flagged.

outputs_required_after_run:
  - "Per-cell N_on_IS, ExpR_on_IS, WR_on_IS, std_on_IS, t_IS, raw_p_IS."
  - "Per-cell bootstrap_p (moving-block, block=5, B=10000, seed=42)."
  - "Per-cell T0 tautology corr against orb_size, atr_20, overnight_range."
  - "Per-cell fire_rate, extreme_fire flag, arithmetic_only flag."
  - "BH-FDR q_family per cell."
  - "Per-year breakdown 2019-2025."
  - "OOS descriptive stats — NOT used to select."
  - "Kill/Park/Continue verdict per cell."
  - "Result doc: docs/audit/results/2026-04-19-mes-low-atr-inverse-filter-v1-scan.md"
  - "Uses research/result_doc_header.py::build_header() for canonical provenance."

execution_gate:
  allowed_now:
    - "Stamp commit_sha, transition to LOCKED in follow-up commit."
    - "Run the scan AFTER commit_sha stamped."
  forbidden_now:
    - "Running before commit_sha stamped."
    - "Modifying any gate threshold or kill criterion after first run."
    - "Widening the family to new sessions, filters, or directions post-run."
    - "Claiming 'edge' from ExpR>0 alone without t>=3 AND bootstrap p<0.10."

blast_radius:
  upstream_docs_referenced:
    - "Parent K=40 pre-reg + result (2026-04-19-mes-comprehensive-mode-a-feature-v1.*)"
    - "Multi-angle synthesis (2026-04-19-correction-cycle-multi-angle-synthesis.md) § Angle 1"
  downstream_docs_created:
    - "docs/audit/results/2026-04-19-mes-low-atr-inverse-filter-v1-scan.md (on run)"
  production_code_touched: "NONE."
  db_writes: "NONE. Read-only scan."
  gold_db_read_only: true
  new_canonical_filter_registration: "NONE at pre-reg time. If any cell validates, a production-side ATR_LT70 filter in ALL_FILTERS would require a separate pre-reg + production commit + companion tests."

not_done_by_this_pre_reg:
  - "Does NOT test RR=1.0 or 2.0 (bounded to 1.5 for symmetry with parent K=40)."
  - "Does NOT test the bottom-30% (~ATR_P30) variant — separate pre-reg if pursued (expected higher fire rate, weaker signal)."
  - "Does NOT test the bottom-50% (~ATR_P50) variant."
  - "Does NOT test other instruments (MNQ, MGC) — the observation is MES-specific."
  - "Does NOT test composite filters (e.g., ~ATR_P70 AND ORB_G5)."
  - "Does NOT register ATR_LT70 in ALL_FILTERS (research-only inversion)."
  - "Does NOT write to validated_setups or experimental_strategies."
