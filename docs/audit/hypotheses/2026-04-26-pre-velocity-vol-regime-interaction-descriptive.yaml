# ---------------------------------------------------------------------------
# Pass / kill criteria
# ---------------------------------------------------------------------------

pass_criteria:
  cell_level:
    - "Welch t > 3.0 (with mechanism prior cited per Chordia 2018)"
    - "BH-FDR survivor at q=0.05, K_global"
    - "Mechanism-predicted sign (interaction > 0)"
    - "All 4 sub-cells meet N >= 30 power floor"
    - "Not flagged ARITHMETIC_ONLY"
  family_level:
    - "If at least one cell per family (MNQ/MES/MGC) survives, the descriptive
       is COVERAGE_POSITIVE and surviving cells become Pathway-A candidates"

kill_criteria:
  - "0 BH-FDR survivors at K_global → close cluster as null; add NO-GO entry to
    STRATEGY_BLUEPRINT.md for 'pre-velocity × atr_vel_regime interaction'"
  - "All survivors show interaction < 0 (mechanism-inverted) → flag for
    investigation; do NOT promote (sign mismatch with prior)"
  - "Top-|t| cell shows |Δ_WR| < 3% AND |interaction| > 0.10R → ARITHMETIC_ONLY,
    cost-class only, no edge claim"

out_of_scope:
  - "OOS validation (deferred to a follow-up Pathway-A prereg if any survivor)"
  - "Magnitude-quintile framing (separate hypothesis)"
  - "Pass-2 filtered framing (separate hypothesis)"
  - "Stable-regime cells (the middle bucket; not informative for high-vs-low)"

