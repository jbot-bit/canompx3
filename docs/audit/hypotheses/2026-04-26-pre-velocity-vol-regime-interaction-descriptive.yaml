metadata:
  name: "pre_velocity_vol_regime_interaction_descriptive"
  purpose: |
    Test whether pre-velocity-alignment edge (binary, aligned vs opposed) is
    significantly STRONGER in high-volatility regimes than low-volatility
    regimes, across the same 12 × 3 × 3 cross-section as PR #119 descriptive.
    If interaction effect survives BH-FDR at q=0.05 with the mechanism-predicted
    sign, surviving cells become Pathway-A candidates with locked mechanism
    grounding. If 0 survive, close the cluster as a null and add NO-GO entry.
  date_locked: "2026-04-26T18:30:00+10:00"
  commit_sha: "c8129a47"
  holdout_date: "2026-01-01"
  testing_mode: "descriptive_diagnostic"  # RULE 10 carve-out
  research_question_type: "interaction_effect"
  total_expected_trials: 89  # same K as PR #119 — same scope, no cherry-picking
  k_global: 89
  k_family_per_instrument: { MNQ: 33, MES: 31, MGC: 25 }

# ---------------------------------------------------------------------------
# Mechanism prior — locked BEFORE any data is examined
# ---------------------------------------------------------------------------

mechanism_prior:
  citation: "docs/institutional/literature/chan_2013_ch7_intraday_momentum.md p.155-156"
  verbatim_extract: |
    "There is an additional cause of momentum that is mainly applicable to the
    short time frame: the triggering of stops. Such triggers often lead to the
    so-called breakout strategies."
    "[A]t the shortest possible time scale, the imbalance of the bid and ask
    sizes, the changes in order flow, or the aforementioned nonuniform
    distribution of stop orders can all induce momentum in prices."
  prediction: |
    Under Chan's stop-cascade mechanism, pre-ORB directional momentum reflects
    accumulated order-flow imbalance. The strength of cascade response depends
    on how much stop-density has clustered. In Expanding (high-vol) regimes,
    larger price ranges and elevated dealer hedging increase stop-density per
    price unit. Therefore the alignment edge (Δ_ExpR_aligned - Δ_ExpR_opposed)
    should be GREATER in Expanding than in Contracting regime within the same
    instrument-session-aperture cell.
  predicted_sign: "interaction > 0"
  one_sided_justification: |
    Chan's mechanism predicts sign. Two-sided test would dilute power. Per
    pre_registered_criteria.md, one-sided is allowed when mechanism prior
    predicts direction; significance threshold remains q=0.05 BH-FDR.
  fallback_if_unsupported: |
    If a survivor cell shows interaction < 0 (alignment edge LARGER in
    Contracting), report as MECHANISM_INVERTED — does NOT count toward the
    pre-registered prediction; flagged for follow-up investigation only.

# ---------------------------------------------------------------------------
# Cell-selection rule (LOCKED before run)
# ---------------------------------------------------------------------------

cell_selection_rule:
  description: |
    Use the SAME 12 × 3 × 3 = 108 cross-section as PR #119 descriptive.
    Power floor per RULE 3.2: each of the 4 sub-cells (Expanding-aligned,
    Expanding-opposed, Contracting-aligned, Contracting-opposed) needs
    N >= 30. 'Stable' regime trades are excluded from the interaction test
    (they're the middle bucket, not informative for the high-vs-low
    interaction). A cell is 'adequately powered for interaction' if all 4
    sub-cells meet the floor.
  no_cherry_picking_clause: |
    Cells are NOT selected based on the PR #119 descriptive's |t| values.
    Every cell that meets the power floor enters the BH-FDR pool.
  expected_powered_cells: "<=89, likely fewer due to thinner Expanding+Contracting subsets"

# ---------------------------------------------------------------------------
# Test stat (LOCKED)
# ---------------------------------------------------------------------------

test_stat:
  primary: |
    For each cell (instrument, session, aperture), compute:
      delta_E = mean(R_aligned | regime=Expanding) - mean(R_opposed | regime=Expanding)
      delta_C = mean(R_aligned | regime=Contracting) - mean(R_opposed | regime=Contracting)
      interaction = delta_E - delta_C
    Test: H0: interaction = 0 vs H1: interaction > 0 (one-sided per mechanism).
    Use Welch's t-test on the per-trade R distributions of the 4 sub-cells,
    with appropriate variance for the difference-in-differences.
  secondary_diagnostics:
    - "delta_E and delta_C separately (so we can see WHICH regime drives the result)"
    - "Win-rate spread per regime (RULE 8.2 ARITHMETIC_ONLY guard)"
    - "Sub-cell N counts (transparency for power-floor verification)"
  fdr:
    framing: "BH-FDR at q=0.05, K_global=89 (or fewer if power-floor reduces pool)"
    family: "K_family per instrument also reported (MNQ/MES/MGC), per RULE 4"

