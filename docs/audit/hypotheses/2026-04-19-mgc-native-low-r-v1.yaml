version: 1
name: mgc_native_low_r_v1
date: 2026-04-19
status: locked

metadata:
  intent: >
    Test whether the apparent 5-minute MGC target-shape issue becomes a real,
    statistically defensible native opportunity under conservative lower-R
    exits, without reopening GC proxy discovery or pretending the prior
    diagnostics already proved a tradeable path.
  testing_mode: individual
  total_expected_trials: 16
  minbtl_mode: clean_micro
  holdout_boundary: 2026-01-01
  overlap_start: 2022-06-13
  source_truth:
    canonical:
      - gold.db::orb_outcomes
      - gold.db::daily_features
      - pipeline.cost_model
    orientation_only:
      - docs/audit/results/2026-04-19-mgc-payoff-compression-audit.md
      - docs/audit/results/2026-04-19-gc-mgc-translation-audit.md
  locked_surface:
    symbol: MGC
    orb_minutes: 5
    entry_model: E2
    confirm_bars: 1
    sessions:
      - EUROPE_FLOW
      - NYSE_OPEN
      - US_DATA_1000
    family_set:
      broad:
        - EUROPE_FLOW_BROAD_RR1
        - NYSE_OPEN_BROAD_RR1
        - US_DATA_1000_BROAD_RR1
      warm:
        - EUROPE_FLOW_OVNRNG_50_RR1
        - NYSE_OPEN_OVNRNG_50_RR1
        - US_DATA_1000_ATR_P70_RR1
        - US_DATA_1000_ORB_G5_RR1
        - US_DATA_1000_OVNRNG_10_RR1
    target_variants:
      - 0.5R
      - 0.75R

hypotheses:
  - id: H1
    claim: >
      At least one native MGC lower-R family survives honest global BH across
      the full 16-trial matrix on pre-2026 data.
    falsifier: >
      No family survives BH with positive pre-2026 expectancy and adequate N.

  - id: H2
    claim: >
      If survivors exist, they are more likely at 0.5R than at 0.75R, implying
      a true target-shape constraint rather than a generic "just lower the RR a
      bit" story.
    falsifier: >
      0.75R performs as well as or better than 0.5R across the matrix.

  - id: H3
    claim: >
      If survivors exist, they are not confined only to the translated warm
      families, confirming that the unresolved issue is broader native MGC
      target shape rather than just proxy-rescue.
    falsifier: >
      Only translated warm rows survive and broad native rows all fail.

rules:
  - No 2026 holdout selection or rescue.
  - No new sessions, filters, or instruments inside this pass.
  - No broad GC proxy rediscovery.
  - No deployment recommendation from this pass alone.
  - Conservative lower-target logic must fail closed on ambiguous bars.
  - Global BH is across the full 16-trial matrix, not per-session or per-target.
  - Survivors require N >= 50 and avg_is > 0 in addition to BH.

deliverables:
  - research/research_mgc_native_low_r_v1.py
  - docs/audit/results/2026-04-19-mgc-native-low-r-v1.md
  - tests/test_research/test_mgc_native_low_r_v1.py
  - HANDOFF.md update

kill_criteria:
  - >
    If no families survive global BH, stop treating lower-R handling as a live
    rescue path and leave the result as diagnostic only.
  - >
    If only tiny filtered rows survive with weak 2026 diagnostics, do not widen
    the claim into a broader MGC opportunity.
