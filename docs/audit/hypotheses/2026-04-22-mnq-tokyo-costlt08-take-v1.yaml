hypotheses:
  - id: 1
    name: "MNQ TOKYO_OPEN RR1.5 low-cost ratio take"
    theory_citation: |
      Crabel, Toby. Day Trading with Short Term Price Patterns and Opening Range Breakout.
      Repo-local mechanism grounding: RESEARCH_RULES.md, TRADING_RULES.md,
      and the 2026-04-22 MNQ mechanism-class read-only board on canonical
      `orb_outcomes × daily_features`.
    economic_basis: |
      On MNQ TOKYO_OPEN RR1.5, the tighter cost-ratio gate (`COST_LT08`)
      isolates breakouts whose ORB width is structurally favorable relative to
      target distance and trading friction. This is not a new feature class:
      it is the strongest unsolved exact row inside the already-live
      cost-ratio mechanism family. The research question is whether the tighter
      threshold survives as a promotable take overlay on the exact parent lane,
      rather than relying on the looser already-active `COST_LT12` row.
    filter:
      type: "COST_LT08"
      column: "cost ratio"
      thresholds:
        - "estimated friction / ORB risk <= 0.08"
    scope:
      instruments: [MNQ]
      sessions: [TOKYO_OPEN]
      rr_targets: [1.5]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "Experimental row does not match the exact audited strategy surface"
      - "IS expectancy on-signal is non-positive after canonical discovery write"
      - "Validator rejects the row for lifecycle illegality, Phase 4 gates, walk-forward insufficiency, or era instability"
