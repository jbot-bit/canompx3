    application: "Applied to every reported t-stat (per-cell + descriptive pooled). Structural argument grounded in Harris 2002 Ch 4 § 4.5.2. Petersen 2009 / Thompson 2011 labelled TRAINING_MEMORY_ONLY (not in local literature; methodology survives as implementation choice not theory claim)."

holm_over_bh_rationale: >
  Plan uses Holm-Bonferroni FWER instead of BH 1995 / Harvey-Liu 2015 FDR baseline.
  Rationale: any false discovery in a 4-cell family that would inform capital-allocation
  decision is a capital-protection failure mode. FWER (Holm) controls probability of
  ANY false discovery; FDR (BH) controls expected RATE. At K=4 these differ by factor
  ~4x in stringency. Choosing stricter framing is a deliberate capital-protection bias
  toward Type II over Type I. Documented explicitly so a reviewer cannot legitimately
  demand BH instead. Satisfies feedback_holm_over_bh_requires_explicit_rationale.md.

