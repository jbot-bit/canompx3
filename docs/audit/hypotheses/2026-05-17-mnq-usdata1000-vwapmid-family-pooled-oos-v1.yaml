  k_family: 4
  k_global: 4
  k_lane: 4
  k_session: 4
  k_effective_informational: 7  # 3 prior Pathway-B PASSes on overlapping data + 4 new declared (Lopez de Prado false-strategy Eq.1; L4 doctrine candidate per plan § 9; check_hypothesis_minbtl_compliance reads total_expected_trials=4 which PASSES).

  chordia_threshold_basis: "TWO INDEPENDENT gates per cell: (gate A) Chordia 2018 no-theory strict t-hurdle t_clustered >= 3.79 (absolute, K-independent); (gate B) Holm-Bonferroni FWER on p_clustered at alpha=0.05 across K=4 (relative, K-dependent). Both gates must pass. Neither subsumes the other."  # ASCII >= mandatory; Unicode would silently pass check_chordia_result_threshold_matches_prereg regex at pipeline/check_drift.py:3388-3391 without validating.

  holm_bonferroni_thresholds:
    method: "Holm-Bonferroni FWER at alpha=0.05 across K=4"
    ranking_rule: "rank cells by p_clustered ascending before assigning alpha'_i (B2 runner MUST follow this direction; descending rank would pass wrong cells)"
    thresholds:
      alpha_prime_1: 0.0125  # alpha / (K - 1 + 1) = 0.05 / 4
      alpha_prime_2: 0.0167  # alpha / (K - 2 + 1) = 0.05 / 3
      alpha_prime_3: 0.025   # alpha / (K - 3 + 1) = 0.05 / 2
      alpha_prime_4: 0.05    # alpha / (K - 4 + 1) = 0.05 / 1
    applied_to: "p_clustered (NOT p_naive). See clustered_se_guard below."

  clustered_se_guard:
    estimator: "statsmodels.regression.linear_model.OLS with cov_type='cluster', cluster=trading_day"
    rationale: >
      Multiple trades within the same trading_day share intraday volatility regime, gap
      context, news flow, session-spillover. Pooled cell collapses across apertures x RRs
      so a single trading_day can contribute up to 4 cell-trades. Naive i.i.d. SE
      understates variance / overstates t-stat. Structural argument grounded in
      Harris 2002 Ch 4 § 4.5.2 (resources/Harris_Trading_Exchanges_Market_Microstructure.ocr.pdf
      + extract docs/institutional/literature/harris_2002_trading_exchanges_microstructure.md).
      Petersen 2009 / Thompson 2011 statistical canon labelled TRAINING_MEMORY_ONLY
      (not in local literature); methodology survives because variance-estimator choice
      is implementation not theory.
    required_reporting:
      - "For every cell and the pooled cell: N_trades, N_unique_trading_days, cluster_size_mean, cluster_size_max"
      - "t_naive (i.i.d.) and t_clustered side-by-side"
      - "If t_clustered < t_naive by >= 0.5 then result MD frontmatter MUST set clustering_inflation_warning: true"
      - "Holm thresholds applied against p_clustered only"
    kill_clauses:
      naive_flip_kill: "If a cell would PASS at t_naive >= 3.79 but FAIL at t_clustered < 3.79, the cell FAILS. No mid-run methodology flip."
      cluster_skew_kill_threshold: 30  # operator-chosen; no external literature anchor; see plan § 5.8a L5 doctrine candidate
      cluster_skew_kill_rule: "If N_unique_trading_days < 30 for any cell, that cell's clustered-SE estimator is unreliable (effective cluster count below conventional rule-of-thumb reliability; Bailey 2013 IID assumption violated at cluster level). Cell verdict = UNVERIFIED regardless of t_clustered value."

  verdict_test: "Holm-Bonferroni per-cell at alpha=0.05; per-cell raw-p computed with clustered SE — sole verdict-driving test."

  pooled_t_role: "DESCRIPTIVE_ONLY"  # Pooled t reported next to per-cell breakdown for transparency, but cannot override a Holm fail and cannot rescue a Holm pass.

  pooled_t_role_assert: "DESCRIPTIVE_ONLY"  # BLOCKING-B v4 compensating control. Machine-readable sentinel. Stage B2 runner contract MUST assert at startup: `assert hypothesis['primary_schema']['pooled_t_role_assert'] == 'DESCRIPTIVE_ONLY'`, fail-closed on mismatch. Result MD frontmatter MUST echo verbatim under key pooled_t_role. Until L2 drift check (check_pooled_finding_annotations extended to require pooled_t_role in {VERDICT_DRIVING, DESCRIPTIVE_ONLY}) lands, the sentinel + runner-startup assert + frontmatter echo is the SOLE protection against author-drift between B1 (this pre-reg) and B2 (Stage B2 runner). Honestly labelled compensating-control-protected, NOT enforced.

  promotion_gate: >
    PASS_FAMILY_HOLM if ALL 4 cells clear their Holm-adjusted per-cell p_clustered AND
    every cell's t_clustered >= 3.79 (no-theory Chordia hurdle) AND ALL 4 cells satisfy
    N_unique_trading_days >= 30. FAIL_FAMILY otherwise. K=4 is all-or-nothing — there is
    NO PASS_PARTIAL_HOLM verdict (v4 decision 2026-05-17: 3-of-4 PASS routes to
    FAIL_FAMILY, and per-cell deployment of any passing cell requires a fresh
    single-cell pre-reg from scratch, NOT a partial-pass shortcut).
    flip_rate_pct is NOT a Stage B1 verdict input — H2 is descriptive-only per
    pooled-finding-rule.md (heterogeneity_ack is a result-MD frontmatter discipline,
    NOT a verdict gate). flip_rate_pct >= 25 constrains downstream Stage B3
    deployment shape (per-cell only, no family-block deployment), it does not change
    the Stage B1 PASS/FAIL verdict.

hypotheses:
  # NOTE: theory_citation is INTENTIONALLY OMITTED on every hypothesis per
  # memory/feedback_chordia_theory_citation_field_presence_trap.md.
  - id: 1
    name: "Per-cell Holm-Bonferroni under clustered SE (verdict-driving)"
    economic_basis: >
      On the locked 4-cell MNQ US_DATA_1000 VWAP_MID_ALIGNED family, each cell's
      clustered-SE t-stat clears its Holm-Bonferroni-adjusted threshold at alpha=0.05
      across K=4 with no theory grant, AND each cell satisfies N_unique_trading_days >= 30.
      This is the SOLE verdict-driving hypothesis. Holm ranking rule per
      primary_schema.holm_bonferroni_thresholds.ranking_rule (ascending p_clustered).
    role:
      kind: "family_pooled_aggregation"
      parent: "K=4 family of (O15, O30) x (RR1.0, RR1.5) cells on MNQ US_DATA_1000 VWAP_MID_ALIGNED."
      comparator: "Per-cell clustered-SE t-stat vs Holm-Bonferroni alpha'_i sequence."
      primary_metric: "t_clustered per cell + holm_adjusted_p_clustered per cell"
      promotion_target: "family_holm_unlock_only"
    filter:
      type: "VWAP_MID_ALIGNED"
      column: "orb_US_DATA_1000_vwap, orb_US_DATA_1000_break_dir"
      thresholds:
        - "fire_vs_off (per-cell canonical delegation)"
    scope:
      instruments: [MNQ]
      sessions: [US_DATA_1000]
      rr_targets: [1.0, 1.5]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
      orb_minutes: [15, 30]
    expected_trial_count: 4
    kill_criteria:
      - "Any cell's p_clustered > its Holm-adjusted alpha'_i (per ranking rule) — this is the FWER kill"
      - "Any cell's t_clustered < 3.79 — this is the no-theory Chordia hurdle kill (separate from Holm; both must pass independently)"
      - "Any cell's N_unique_trading_days < 30 (cluster-skew kill -> cell UNVERIFIED -> family FAIL)"
      - "Naive-flip kill: any cell PASS at t_naive >= 3.79 but FAIL at t_clustered < 3.79 (Chordia hurdle), OR cell PASS at p_naive <= alpha'_i but FAIL at p_clustered > alpha'_i (Holm gate)"
      - "Canonical filter delegation diverges from trading_app.config"
      - "Scratch/null handling not explicit in measured trade stream"
      - "Section 1 reconciliation divergence > 0.50 t-units on any prior-PASS cell (audit-execution-integrity failure)"
      # OOS is NOT a kill axis at audit-time per RULE 3.3 power-tier mandate.
    statement: >
      Each of the 4 cells in the MNQ US_DATA_1000 VWAP_MID_ALIGNED family
      INDEPENDENTLY clears TWO separate gates under clustered SE at trading_day level
      on canonical Mode-A IS data: (gate A) per-cell t_clustered >= 3.79 — the
      Chordia 2018 no-theory strict t-hurdle, and (gate B) per-cell
      holm_adjusted_p_clustered <= alpha'_i — the Holm-Bonferroni FWER p-correction
      at K=4, alpha=0.05. Both gates are necessary; neither subsumes the other (t >=
      3.79 is a fixed absolute t-threshold from Chordia, Holm is a relative p-rank
      adjustment that varies with K). Every cell must also satisfy N_unique_trading_days
      >= 30 (clustered-SE reliability floor) and ExpR_IS > 0 (sign sanity).
    pass_metric:
      metric: "t_clustered and holm_adjusted_p_clustered per cell (TWO INDEPENDENT gates; both must pass)"
      formula: "OLS with cov_type='cluster', cluster=trading_day, on canonical IS fired trades after canonical filter delegation. t_clustered = coef/se_clustered; p_clustered = two-sided p from cluster-robust t. holm_adjusted_p_clustered assigned per primary_schema.holm_bonferroni_thresholds.ranking_rule."
      threshold_gte:
        # Gate A — Chordia 2018 no-theory strict t-hurdle (absolute t-threshold):
        all_cells_t_clustered_chordia_strict: 3.79
        # Gate B — Holm-Bonferroni FWER (relative p-rank correction at K=4, alpha=0.05):
        all_cells_holm_adjusted_p_clustered_pass: true
        # Cluster-reliability + sign-sanity floors:
        all_cells_n_unique_trading_days: 30
        all_cells_expr_is_positive: true
      extra_gates:
        - "OOS dir_match reported descriptively only; NOT a refutation axis at audit-time (RULE 3.3 power-tier mandate; pooled measured power expected STATISTICALLY_USELESS pre-run; computed at run-time)."
        - "Adversarial split table emitted: per-cell long-only vs short-only vs pooled, per-cell year-by-year"
        - "Scratch-inclusive accounting required (realized-eod)"
    counted_against_trial_budget: true

  - id: 2
    name: "Heterogeneity descriptive (flip-rate; frontmatter + Stage B3 shape input)"
    economic_basis: >
      Per .claude/rules/pooled-finding-rule.md (RULE 14, committed aa3399b3 2026-04-20
      after retroactive heterogeneity audit found 3 historical pooled audits passed
      BH-global at K_global while >=25% of underlying cells flipped sign), pooled
      framings hide opposite-sign per-cell behaviour. flip_rate_pct >= 25 triggers
      heterogeneity_ack frontmatter requirement (matching
      pipeline/check_drift.py:7666 check_pooled_finding_annotations strict >=
      inequality) AND constrains downstream Stage B3 deployment shape to per-cell
      only (no family-block deployment). It does NOT change the Stage B1 verdict —
      pooled-finding-rule.md scope is result-MD discipline + deployment shape, not
      audit verdict math. At K=4, 25% threshold equals <=1 cell sign-flip before ack
      required. Operator-chosen threshold pinned to 3-incident project precedent; no
      external-literature anchor.
    role:
      kind: "heterogeneity_descriptive"
      parent: "Reports alongside H1; constrains downstream Stage B3 deployment shape."
      primary_metric: "flip_rate_pct"
      promotion_target: "frontmatter_annotation_and_stage_b3_shape_input"
    expected_trial_count: 0  # descriptive; NOT counted against trial budget.
    counted_against_trial_budget: false
    statement: >
      OOS sign-flip rate across the 4 cells (flip_rate_pct) is reported in result-MD
      frontmatter regardless of value; heterogeneity_ack: true required if
      flip_rate_pct >= 25. H2 does NOT pass/fail. The Stage B1 audit verdict is
      decided solely by H1 (and H3 as robustness check). H2's downstream consequence
      is Stage B3 deployment shape per decision_rule.deployment_shape_constraint.
    pass_metric:
      metric: "reporting_only"
      reported_field: "flip_rate_pct"
      reporting: "Always reported; heterogeneity_ack: true required if flip_rate_pct >= 25 (frontmatter discipline). H2 is descriptive — no Stage B1 pass/fail; Stage B1 verdict drives only via H1. Stage B3 deployment shape is constrained per decision_rule.deployment_shape_constraint."

  - id: 3
    name: "Unaudited-cell isolation (O30 RR1.5)"
    economic_basis: >
      The sole un-audited cell (O30 RR1.5; Sharpe 0.094, haircut -1.908) is the family
      weak link by every prior metric. Including it pre-reg-honestly avoids cherry-picking
      the three strong cells. Need to verify it does not single-handedly drive the family
      verdict.
    role:
      kind: "robustness_check"
      parent: "Sub-analysis of H1."
      primary_metric: "K=3 Holm verdict on prior-PASS cells alone vs K=4 verdict"
      promotion_target: "robustness_annotation_only"
    expected_trial_count: 0  # robustness check on H1; NOT counted against trial budget.
    counted_against_trial_budget: false
    statement: >
      O30 RR1.5 cell does not single-handedly drive the family — defined operationally as:
      K=3 Holm run restricted to the 3 prior-PASS cells produces the same per-cell PASS/FAIL
      verdict at the K=3-adjusted thresholds as the K=4 run, AND all 3 cells retain
      positive ExpR_IS. Both conditions required.

