decision_rule:
  continue_if: >
    H1 clears (every cell satisfies: holm_adjusted_p_clustered <= alpha'_i AND
    t_clustered >= 3.79 AND N_unique_trading_days >= 30 AND ExpR_IS > 0) AND
    H3 isolation check holds -> PASS_FAMILY_HOLM -> downstream Stage B3 deployment
    pre-reg authorized. Stage B3 deployment shape is then constrained by H2
    flip_rate_pct (see deployment_shape_constraint below), but the PASS_FAMILY_HOLM
    verdict itself does not depend on H2.
  kill_if: >
    H1 fails (any cell fails Holm-adjusted p_clustered, OR any cell t_clustered < 3.79,
    OR cluster-skew kill triggers UNVERIFIED on any cell, OR naive-flip kill triggers)
    OR canonical delegation diverges OR scratch handling unexplicit OR execution
    integrity fails OR Section 1 reconciliation divergence > 0.50 t-units on any
    prior-PASS cell.
  deployment_shape_constraint: >
    Stage B3 (separate downstream pre-reg) MUST honour H2 flip_rate_pct as a
    deployment-shape input per pooled-finding-rule.md "queuing a trading decision on
    a pooled p-value... actively misleads" above 25%. Specifically: if H1 = PASS and
    flip_rate_pct >= 25, Stage B3 may only deploy per-cell (one allocator slot per
    Holm-passing cell), NEVER as a family-block. If flip_rate_pct < 25, Stage B3 may
    consider family-block deployment subject to its own correlation-gate + Harvey-Liu
    haircut decisions. This constraint binds Stage B3, not Stage B1's verdict.
  # H2 flip_rate_pct is a result-MD frontmatter ack + Stage B3 deployment-shape
  #   input, NOT a Stage B1 verdict gate.
  # Pooled t is NEVER an input to continue/kill (descriptive_only; sentinel-protected).
  # OOS is NOT a kill axis at audit-time per RULE 3.3 power-tier mandate.
  # PASS_PARTIAL_HOLM does NOT exist as a verdict (v4 decision: K=4 all-or-nothing).
  # PARK_FAMILY_HETEROGENEOUS does NOT exist as a Stage B1 verdict (v5 fix
  #   2026-05-17: H2 cannot move Stage B1 verdict per pooled-finding-rule.md scope —
  #   the rule governs result-MD discipline + deployment shape, not audit verdicts).

