hypotheses:
  - id: 1
    name: "MGC LONDON_METALS G5 RR2.0 — London gold pricing"
    theory_citation: "O'Hara (1995) Market Microstructure Theory; LBMA Gold Price"
    economic_basis: |
      The London gold price fix is the global reference for physical gold
      transactions. LONDON_METALS session captures the period when London
      physical market participants set the benchmark price. A meaningful ORB
      (G5) broken during this session reflects institutional physical-market
      positioning that should produce 2x continuation.
    filter:
      type: ORB_G5
      column: orb_size_points
    scope:
      instruments: [MGC]
      sessions: [LONDON_METALS]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "Raw p >= 0.05 (Pathway B)"
      - "Negative annualized Sharpe (direction gate)"
      - "Walk-forward efficiency < 0.50 (non-waivable)"
      - "2026 OOS ExpR < 0 (non-waivable)"
      - "Any era with N >= 50 and ExpR < -0.05 (non-waivable)"

  - id: 2
    name: "MGC LONDON_METALS PDR_R080 RR2.0 — prior day vol persistence"
    theory_citation: "Andersen, Bollerslev, Diebold, Labys (2003) Econometrica"
    economic_basis: |
      Gold volatility is persistent (ABDL 2003). PDR_R080 selects days where
      the prior day's range was >= 80th percentile, predicting continued
      elevated activity at LONDON_METALS. Higher prior-day range = more
      information to incorporate = stronger continuation through 2x.
    filter:
      type: PDR_R080
      column: prev_day_range
    scope:
      instruments: [MGC]
      sessions: [LONDON_METALS]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "Raw p >= 0.05 (Pathway B)"
      - "Negative annualized Sharpe"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0"
      - "Any era with N >= 50 and ExpR < -0.05"

  - id: 3
    name: "MGC CME_REOPEN GAP_R005 RR2.0 — overnight gap info"
    theory_citation: "Branch & Ma (2012) JFM; overnight gap literature"
    economic_basis: |
      Overnight gaps in gold reflect information accumulated during the
      Asian/European physical market sessions while CME is closed. GAP_R005
      selects days with gaps >= 0.5% of prior close. The gap signals
      directional information that should drive 2x continuation at CME
      reopen as electronic traders react to the new price level.
    filter:
      type: GAP_R005
      column: gap_pct
    scope:
      instruments: [MGC]
      sessions: [CME_REOPEN]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "Raw p >= 0.05 (Pathway B)"
      - "Negative annualized Sharpe"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0"
      - "Any era with N >= 50 and ExpR < -0.05"

  - id: 4
    name: "MGC CME_REOPEN G5 RR2.0 — reopen momentum"
    theory_citation: "Crabel (1990) ch. 3"
    economic_basis: |
      CME reopen captures the transition from overnight electronic to full
      US session. A meaningful ORB (G5) at reopen reflects accumulated
      positioning from overnight markets. Crabel commitment predicts 2x
      follow-through as US participants join the direction set by
      Asian/European flow.
    filter:
      type: ORB_G5
      column: orb_size_points
    scope:
      instruments: [MGC]
      sessions: [CME_REOPEN]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "Raw p >= 0.05 (Pathway B)"
      - "Negative annualized Sharpe"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0"
      - "Any era with N >= 50 and ExpR < -0.05"

  - id: 5
    name: "MGC LONDON_METALS G5 RR1.0 — London gold min continuation"
    theory_citation: "O'Hara (1995) Market Microstructure Theory; LBMA Gold Price"
    economic_basis: |
      At RR=1.0, the prediction is minimal: physical-market pricing flow
      at LONDON_METALS drives at least 1x ORB continuation. This is the
      strongest baseline prediction for gold — if physical flow cannot
      push price even 1x the opening range, the signal is noise.
    filter:
      type: ORB_G5
      column: orb_size_points
    scope:
      instruments: [MGC]
      sessions: [LONDON_METALS]
      rr_targets: [1.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "Raw p >= 0.05 (Pathway B)"
      - "Negative annualized Sharpe"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0"
      - "Any era with N >= 50 and ExpR < -0.05"

