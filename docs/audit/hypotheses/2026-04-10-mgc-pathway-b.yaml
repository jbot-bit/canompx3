metadata:
  name: "mgc-pathway-b"
  purpose: |
    Individual hypothesis testing for MGC under Pathway B (Amendment 3.0).
    5 hypotheses tested at raw p < 0.05. Downstream gates (WFE >= 0.50,
    2026 OOS positive, era stability) non-waivable. Short data horizon
    (3.81yr) means marginal detection power — honest expectation is 0-2
