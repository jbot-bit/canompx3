# Per-gate methodology (uniform across all 11 gates).
per_gate_methodology:
  1_intended_rule: one-sentence statement + cite source file:line.
  2_source_trace: pin implementation to file:line via grep/Read.
  3_canonical_recompute: |
    Re-run the predicate against canonical tables (orb_outcomes triple-join
    daily_features on (trading_day, symbol, orb_minutes) per
    daily-features-joins.md). Apply canonical filter via
    research.filter_utils.filter_signal — NEVER re-encode filter logic.
  4_count_before_after: |
    Report n_excluded_by_gate, n_recomputed_excluded, delta. Delta != 0 is
    the false-exclusion signal.
  5_sample_excluded_rows: |
    Stratified random sample (NOT head-N) with random_seed=20260516 fixed
    in this pre-reg. Strata = (instrument × entry_model × filter_family).
    N=10 per stratum or full population, whichever smaller.
  6_identify_pass_if_fixed: |
    For each excluded row, simulate "if gate predicate were corrected, would
    this row enter AUDIT_GAP_ONLY or READY?" Report count.
  7_classify: |
    POLICY_EXCLUSION (gate matches stated intent, NOT a bug)
    | IMPLEMENTATION_BUG (gate diverges from stated intent)
    | CANONICAL_DRIFT (gate uses derived layer that drifted)

