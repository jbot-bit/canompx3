# Null hypothesis declared BEFORE the audit runs.
null_hypothesis: |
  H0 = The May 12 Chordia funnel (research/chordia_queue_recompute.py) applies
  its stated exclusion rules correctly. For each gate audited, the count of
  rows excluded by the gate equals the count of rows that would be excluded by
  a canonical recompute of the same predicate. Zero false exclusions.

