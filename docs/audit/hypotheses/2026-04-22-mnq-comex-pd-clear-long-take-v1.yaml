hypotheses:
  - id: 1
    name: "MNQ COMEX_SETTLE long clear-of-congestion family"
    theory_citation: |
      Crabel, Toby. Day Trading with Short Term Price Patterns and Opening Range Breakout.
      Repo-local mechanism grounding: RESEARCH_RULES.md, docs/institutional/mechanism_priors.md,
      and docs/audit/results/2026-04-22-mnq-geometry-transfer-board-v1.md.
    economic_basis: |
      On MNQ COMEX_SETTLE, long breakouts whose ORB midpoint is outside the
      prior-day congestion regime should outperform the residual state. The
      transfer-board evidence shows that this lane wants the bounded
      non-congestion state (`PD_CLEAR_LONG`) rather than the broader union
      (`PD_GO_LONG`), because downside displacement is not positive here.
      The long-direction restriction is owned by the filter itself so
      discovery does not widen to short breaks.
    filter:
      type: "PD_CLEAR_LONG"
      column: "orb_mid vs prior-day congestion regime"
      thresholds:
        - "NOT (prev_day_low < orb_mid < prev_day_high)"
        - "NOT (|orb_mid - pivot| / atr_20 < 0.50)"
    scope:
      instruments: [MNQ]
      sessions: [COMEX_SETTLE]
      rr_targets: [1.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "Experimental row does not match the exact audited strategy surface"
      - "IS expectancy on-signal is non-positive after canonical discovery write"
      - "Validator rejects the row for lifecycle illegality, Phase 4 gates, walk-forward insufficiency, or era instability"
