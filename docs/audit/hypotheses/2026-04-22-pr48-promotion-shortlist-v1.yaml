hypotheses:
  - id: 1
    name: "MES q45 executable candidate remains a promotion-worthy continuation arm"
    theory_citation: "docs/institutional/literature/carver_2015_ch11_portfolios.md"
    economic_basis: |
      MES parent performance is weak, so the question is whether the executable
      Q4+Q5 filter is strong enough on daily dollar policy deltas and drawdown
      to justify continued promotion work.
    role:
      kind: "filter"
      parent: "All canonical MES O5 E2 CB1 RR1.5 trades across active sessions and both directions."
      comparator: "Executable MES q45 filter versus MES parent on daily dollar policy deltas."
      primary_metric: "daily_policy_delta_dollars"
      promotion_target: "continue"
    filter:
      type: "REL_VOL_STATE"
      column: "rel_vol_{session}"
      thresholds: ["q4_plus_q5_executable"]
    scope:
      instruments: [MES]
      sessions: [ALL_CANONICAL_5M]
      rr_targets: [1.5]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "IS daily dollar delta versus parent is non-positive."
      - "OOS daily dollar delta sign flips negative."
      - "Drawdown reduction disappears after executable translation."

