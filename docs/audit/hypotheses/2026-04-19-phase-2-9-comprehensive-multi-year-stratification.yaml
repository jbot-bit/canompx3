testing_mode: family
pathway: A_family

deployment_not_done_here: |
  This audit does NOT promote any lane. It tests a methodology-level hypothesis
  about the Phase 2.8 v1 result: whether the "no recurring regime, 34/38
  VOL_NEUTRAL" framing survives (a) comprehensive year coverage, (b) per-cell
  significance testing, (c) symmetric DRAG/BOOST labelling, (d) session-level
  cross-section. Retirement verdicts for the 2 SGP PURE_DRAG lanes stand.

authority:
  primary:
    - ".claude/rules/backtesting-methodology.md"
    - ".claude/rules/research-truth-protocol.md"
    - "docs/institutional/pre_registered_criteria.md"
    - "docs/prompts/prereg-writer-prompt.md"
  notes:
    - "Pathway A — Chordia t >= 3.00 with-theory (session-directional regime hypothesis grounded in Phase 2.8 addendum § 2.3 cross-section observation)."
    - "Mode A strict: trading_day < HOLDOUT_SACRED_FROM (2026-01-01). All 7 stratified years are IS."
    - "Canonical filter delegation via research.filter_utils.filter_signal + research.mode_a_revalidation_active_setups.compute_mode_a."
    - "K_global = 266 cells pre-committed. No post-hoc expansion."

empirical_grounding:
  source: "docs/audit/results/2026-04-19-phase-2-8-reframe-addendum.md § 2.3"
  observation: |
    Phase 2.8 v1 CSV shows directional asymmetry in delta2024 by session that
    the v1 PATTERN classification (bare 0.03 threshold, DRAG-only label) smothered:
      Session         n_lanes  mean_delta2024
      CME_PRECLOSE      3       +0.032   (2024 drag)
      EUROPE_FLOW       10      +0.017   (2024 drag)
      COMEX_SETTLE      8       -0.003   (flat)
      US_DATA_1000      5       -0.018   (2024 tailwind)
      NYSE_OPEN         6       -0.010   (2024 tailwind)
      TOKYO_OPEN        4       -0.015   (2024 tailwind)
      SINGAPORE_OPEN    2       -0.029   (2024 tailwind)
    This suggests 2024 was a session-directional regime (Asia/US-morning
    trended, Europe-flow / CME-close ranged), not a universal high-vol event.
  role: "PROVENANCE_ONLY — this observation motivates the need for a proper multi-year × session-level test. The hypothesis below is the testable claim, not the observation itself."
  data_snooping_guard: |
    The new test enumerates all 38 active lanes × 7 years = 266 cells with
    pre-committed test geometry. No lane or year was selected based on its
    delta value. Session-level aggregation is a pre-committed first-class
    output, not a post-hoc discovery cut.

