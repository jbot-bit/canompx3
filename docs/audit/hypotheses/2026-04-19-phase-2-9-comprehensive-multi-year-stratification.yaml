  db_path_override: "DUCKDB_PATH=C:/Users/joshd/canompx3/gold.db (worktree has no local gold.db; Check 37 expected)"

hypotheses:
  - id: H1
    claim: "At least one session has at least 2 of 7 years with per-cell subset-t magnitude passing Chordia t >= 3.00 (with-theory) in the same direction, AND those years survive BH-FDR at K_session (K=n_lanes_in_session × 7)."
    direction: two_sided
    null: "Session-year ExpR deltas are drawn from a null distribution with no structural session-level regime pattern — observed delta magnitudes are consistent with bare-threshold noise."
    theory_citation: |
      Harvey-Liu 2015 § BHY haircut (verified in docs/institutional/literature/
      harvey_liu_2015_backtesting.md) — when a hypothesis family has structure
      (here: same session across years), per-family BH is the correct K, not
      K_global. Chordia 2018 t >= 3.00 with-theory applies because the theory
      (session-type × regime asymmetry) is pre-registered, not discovered
      during the scan.
    kill: "If H1 fails — 0 sessions have 2+ significant-same-direction years at K_session BH — revert to Phase 2.8 v1 framing and close this thread."

  - id: H2
    claim: "At least one year of 2019-2025 has at least 3 lanes with per-cell subset-t magnitude passing Chordia t >= 3.00 in the SAME direction, surviving BH-FDR at K_year=38."
    direction: two_sided
    null: "Year-level deltas are lane-independent; no structural year-regime alignment."
    theory_citation: |
      Same Harvey-Liu 2015 family-K argument. Structural year-regime has macro
      interpretation (Fed cycle, election year, vol regime) supported by
      Chan 2008 p120 regime-switching discussion; theory pre-registered.
    kill: "If H2 fails — 0 years have 3+ same-direction BH-survivors at K_year — revert to Phase 2.8 v1 framing."

  - id: H3
    claim: "At least one Phase 2.5 Tier-1 or Phase 2.7 GOLD candidate lane has a year for which ex-that-year subset-t drops below 1.96 while full-sample subset-t is >= 3.00. Framed as a 'fragility disclosure' on the GOLD pool."
    direction: one_sided
    null: "GOLD candidates' full-sample subset-t is evenly distributed across years — no single year is load-bearing."
    theory_citation: |
      Bailey-LdP 2014 § DSR (docs/institutional/literature/bailey_lopez_de_prado_2014_deflated_sharpe.md)
      — a strategy's Sharpe/t-stat can be artificially inflated by an
      unusually-good recent year. This hypothesis formalizes that check at
      the lane level.
    kill: "If H3 fails — no GOLD lane has year-fragility — GOLD pool confidence unchanged. Finding is a disclosure, not a de-promotion."

scope:
  lanes:
    source: "research.mode_a_revalidation_active_setups.load_active_setups()"
    count_expected: 38
    note: "Same active set as Phase 2.5 (subset-t sweep) and Phase 2.8 v1. Includes the 2 SGP PURE_DRAG lanes and the 14 Phase 2.5 Tier-4 retirement candidates — they are ALREADY in the active set; not additional."
  years:
    list: [2019, 2020, 2021, 2022, 2023, 2024, 2025]
    count: 7
    window: "All years pre-2026-01-01 Mode A IS. 2025 is partial (through 2025-12-31 if data exists; otherwise through the last pre-holdout trading day)."
  k_framings:
    - name: K_global
      value: 266
      note: "38 × 7."
    - name: K_session
      value: "variable per session × 7 years"
      note: "e.g. EUROPE_FLOW K_session = 10 × 7 = 70."
    - name: K_year
      value: 38
      note: "per year across lanes."
    - name: K_lane
      value: 7
      note: "per lane across years; used for the fragility disclosure."

upstream_discovery_provenance:
  origin: "Phase 2.8 v1 result doc + reframe addendum"
  role: PROVENANCE_ONLY
  note: "Phase 2.8 v1's bare-threshold classifications are not input features to this scan. The 38 lane identifiers ARE shared (same active-setups query) but that is a canonical-source inheritance, not a provenance hint."

testing_discipline:
  per_cell:
    subset_t: "full_n-sample subset-t (one-sample vs zero), matching Chordia's promotion threshold usage."
    p_value: "two-sided normal tail of subset-t. No permutation per cell (266 cells × permutation = expensive; bootstrap at session level only)."
  bh_fdr:
    q: 0.10
    framings_reported: ["K_global=266", "K_session (variable)", "K_year=38"]
    note: "Promotion candidate survives at K_session OR K_year per Harvey-Liu 2015 family-K doctrine. K_global is reported as headline context only."
  mandatory_downstream_gates_non_waivable:
    - "dir_match across years (sign(delta) consistent across BH survivors in same session)."
    - "fire_rate: no cell with n_year < 30 may survive to promotion."
    - "arithmetic_only flag: if |wr_spread| < 3% AND |delta| > 0.10 within a year, flag."
  minbtl_budget:
    formula: "MinBTL = 2 · ln(K) / E[max_N]^2"
    K: 266
    e_max_n_target: 600  # approximate mean full_n across 38 active lanes
    budget_pass_check: "Script must compute and print pass/fail at run time."

symmetric_labelling:
  drag: "year_expr - ex_year_expr < -0.03 AND per-cell BH survivor"
  boost: "year_expr - ex_year_expr > +0.03 AND per-cell BH survivor"
  v1_asymmetry_fix: "Phase 2.8 v1 flagged DRAG only with a bare threshold. v2 flags both BOOST and DRAG only when BH-FDR supports the label."

outputs:
  - path: "research/output/phase_2_9_main.csv"
    schema: "strategy_id, instrument, session, orb_minutes, rr_target, filter_type, year, n_year, year_expr, ex_year_expr, delta, subset_t, p, bh_global_rank, bh_session_rank, bh_year_rank, pattern_v2"
    expected_rows: 266
  - path: "research/output/phase_2_9_session_year_heat.csv"
    schema: "session, year, n_lanes, weighted_mean_expr, weighted_delta, survivor_count_at_K_session"
    expected_rows: "7 sessions × 7 years = 49"
  - path: "research/output/phase_2_9_gold_fragility.csv"
    schema: "strategy_id, full_subset_t, worst_ex_year, worst_ex_year_subset_t, fragility_flag"
    expected_rows: "~9 Phase 2.5 Tier-1 + Phase 2.7 GOLD candidates"
  - path: "docs/audit/results/2026-04-19-phase-2-9-comprehensive-multi-year.md"
    type: "result doc"

kill_criteria:
  - numeric: "H1 survivors at K_session BH < 1 session-year-direction cell."
    action: "Revert to Phase 2.8 v1 framing. Close Phase 2.9 thread."
  - numeric: "H2 survivors at K_year BH < 3 same-direction cells in any single year."
    action: "H2 refuted. Year-regime claim closed."
  - numeric: "H3 survivors = 0 (no GOLD lane has ex-year subset-t drop below 1.96)."
    action: "H3 refuted. GOLD pool confidence unchanged. Note in result doc as clean-signal confirmation."

