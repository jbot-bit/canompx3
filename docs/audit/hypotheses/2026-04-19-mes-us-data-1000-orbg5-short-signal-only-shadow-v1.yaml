motivation: |
  Phase 7 (commit 03a1fb74) KILLED H4 and H5:
    H4 MES US_DATA_1000 ORB_G5 short RR1.5:
      N=573 ExpR_on=+0.119 t=2.477 boot_p=0.0101 years_positive=7/7 OOS dir_match=Y
    H5 MES US_DATA_1000 ORB_G5 short RR2.0:
      N=559 ExpR_on=+0.147 t=2.549 boot_p=0.0088 years_positive=7/7 OOS dir_match=Y
  Both cells clear:
    - BH-FDR family q < 0.05
    - bootstrap p < 0.10 (moving-block centered-H0)
    - 7 consecutive positive years (2019-2025)
    - N_IS_on >= 100
    - OOS direction matches IS (dir_match=Y)
    - No tautology / extreme-fire / arithmetic-only flag
  They fail ONLY on Chordia t >= 3.00 (2.48, 2.55). Fire rate 70% means the
  signal captures most US_DATA_1000 short-breakout days — small per-trade
  edge (0.12-0.15 R) but broadly consistent. Per
  backtesting-methodology.md RULE 3.1 dir_match is preserved; per
  pre_registered_criteria.md locked criteria C8 passed on Pathway B count
  but not on strict Chordia.
  Honest treatment: shadow-record, not kill. Forward OOS will accumulate
  additional N; re-test at strict Chordia when power reaches bar.

