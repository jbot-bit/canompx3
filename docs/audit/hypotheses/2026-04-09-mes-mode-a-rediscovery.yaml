  # -------------------------------------------------------------------------
  # Hypothesis family 4 — Overnight information range at NYSE_OPEN
  # -------------------------------------------------------------------------
  #
  # Theoretical basis:
  #   Ito, T., Engle, R. F., & Lin, W.-L. (1992). "Where Does the Meteor
  #   Shower Come From? The Role of Stochastic Policy Coordination."
  #   Journal of International Economics 32(3-4), 221-240. Established
  #   that non-US-session information ("meteor shower" contribution)
  #   persists in volatility into subsequent sessions — overnight
  #   information carries directional implications into the next day.
  #
  #   Barclay, M. J., Litzenberger, R. H., & Warner, J. B. (1990).
  #   "Private Information, Trading Volume, and Stock-Return Variances."
  #   Review of Financial Studies 3(2), 233-253. Documented that
  #   private-information-driven price movement during a trading period
  #   predicts continued movement in the next period.
  #
  # Economic mechanism for MES OVNRNG at NYSE_OPEN:
  #   The overnight range (high minus low during the non-US trading
  #   hours preceding the NYSE cash open) measures how much information
  #   accumulated in S&P 500 futures prices while US equity markets were
  #   closed. A LARGE overnight range indicates high-information
  #   conditions under Ito-Engle-Lin's meteor shower framework; under
  #   Barclay-Litzenberger-Warner's information-variance relationship,
  #   this informs the subsequent NYSE_OPEN breakout direction.
  #
  # MES-specific OVNRNG threshold disclosure (honest calibration):
  #   OVNRNG_50 on MES = 50 S&P 500 points = ~0.9-1.0% of price. This
  #   is a LARGE overnight event — typical S&P 500 overnight range is
  #   20-40 points. OVNRNG_50 selects for the most volatile overnights.
  #   OVNRNG_100 on MES = 100 S&P 500 points = ~1.8-2.0% of price.
  #   This is an EXTREME overnight event — COVID-level, major
  #   geopolitical shock, flash crash. Very rare by construction.
  #   These filter_type strings are pipeline-defined (cannot be changed
  #   to e.g. OVNRNG_20), so the hypothesis tests EXTREME overnight
  #   information rather than moderate overnight information.
  #   The hypothesis remains valid under Ito-Engle-Lin: extreme
  #   overnight info should produce the STRONGEST followthrough if the
  #   theory holds — these are the highest-conviction meteor shower
  #   events.

  - id: 13
    name: "High overnight range OVNRNG_50 at NYSE_OPEN"
    theory_citation: "Ito, Engle, Lin (1992) JIE; Barclay, Litzenberger, Warner (1990) RFS"
    economic_basis: |
      Overnight range ≥ 50 MES points filters for non-US trading hours
      that produced substantial information-driven price movement in
      S&P 500 futures. Under Ito-Engle-Lin meteor shower persistence
      and Barclay-Litzenberger-Warner information-variance linkage, the
      subsequent NYSE_OPEN breakout is more likely to continue the
      overnight direction. Note: this is a high-threshold filter on MES
      — 50 S&P points (~0.9-1.0% of price) selects for the most
      volatile overnights only (typical overnight range is 20-40 points).
    filter:
      type: OVNRNG_50
      column: overnight_range_points
    scope:
      instruments: [MES]
      sessions: [NYSE_OPEN]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "BH FDR q=0.05 fails on the pre-registered 16-hypothesis family"
      - "Chordia t-statistic < 3.00"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0 OR < 0.40 × IS ExpR"
      - "Any era with N ≥ 50 and ExpR < -0.05"
      - "IS Sharpe < 0.91 annualized"

  - id: 14
    name: "High overnight range OVNRNG_100 at NYSE_OPEN"
    theory_citation: "Ito, Engle, Lin (1992); Barclay, Litzenberger, Warner (1990)"
    economic_basis: |
      Overnight range ≥ 100 MES points. Tighter information-accumulation
      threshold. Tests the monotonic prediction that stronger meteor
      shower conditions yield stronger NYSE_OPEN follow-through. Note:
      this is an extreme-event filter — 100 S&P points (~1.8-2.0% of
      price) corresponds to COVID-level or major geopolitical shock
      overnights and may not reach N>=100 deployable sample.
    filter:
      type: OVNRNG_100
      column: overnight_range_points
    scope:
