  # -------------------------------------------------------------------------
  # Hypothesis family 3 — Cross-border information flow at EUROPE_FLOW
  # -------------------------------------------------------------------------
  #
  # Theoretical basis:
  #   French, K. R., & Roll, R. (1986). "Stock return variances: The
  #   arrival of information and the reaction of traders." Journal of
  #   Financial Economics 17(1), 5-26. Established that return variance
  #   during trading hours is dominated by information arrival rather
  #   than noise from trading itself, and that information can arrive
  #   from outside a given market (e.g., foreign session) and be
  #   incorporated when the receiving market becomes active.
  #
  #   Hamao, Y., Masulis, R. W., & Ng, V. (1990). "Correlations in
  #   Price Changes and Volatility across International Stock Markets."
  #   Review of Financial Studies 3(2), 281-307. Documented return and
  #   volatility spillovers across major global stock markets
  #   (Tokyo → London → New York).
  #
  # Economic mechanism for MES at EUROPE_FLOW:
  #   European institutional participants trade US equity index futures
  #   throughout their trading day. S&P 500 futures receive the largest
  #   share of this cross-border equity flow because the S&P 500 IS
  #   the global benchmark equity index. Information accumulated during
  #   the European session (overnight London FTSE, DAX, CAC moves;
  #   European central bank news; European macro releases) is
  #   incorporated into US futures prices at the moment European markets
  #   become active. The EUROPE_FLOW session captures this cross-border
  #   information transfer. The 5-minute opening range at this session
  #   is the first tranche of European-to-US price discovery per
  #   French-Roll information-arrival framework and Hamao-Masulis-Ng
  #   spillover.

  - id: 9
    name: "Cross-border information ORB G4 at EUROPE_FLOW"
    theory_citation: "French & Roll (1986) JFE; Hamao, Masulis, Ng (1990) RFS"
    economic_basis: |
      ORB G4 at EUROPE_FLOW filters for sessions where the European
      information-translation produced ≥4 points of first-5-minute S&P
      500 futures discovery. Under French-Roll and Hamao-Masulis-Ng,
      the subsequent session should continue the direction because the
      European-origin information is gradually incorporated into US
      futures prices. MES receives the largest share of cross-border
      equity flow as the benchmark US index.
    filter:
      type: ORB_G4
      column: orb_size_points
    scope:
      instruments: [MES]
      sessions: [EUROPE_FLOW]
      rr_targets: [2.0]
