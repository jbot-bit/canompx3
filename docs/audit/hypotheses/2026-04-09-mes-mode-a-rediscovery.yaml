  # -------------------------------------------------------------------------
  # Hypothesis family 5 — Volatility-regime gate at high-flow sessions
  # -------------------------------------------------------------------------
  #
  # Theoretical basis:
  #   Engle, R. F. (1982). "Autoregressive Conditional Heteroscedasticity
  #   with Estimates of the Variance of United Kingdom Inflation."
  #   Econometrica 50(4), 987-1007. The original ARCH paper. Established
  #   that volatility is persistent: a high-volatility day is likely
  #   followed by high-volatility days.
  #
  #   Bollerslev, T. (1986). "Generalized Autoregressive Conditional
  #   Heteroskedasticity." Journal of Econometrics 31(3), 307-327. GARCH.
  #   Generalized Engle's ARCH with longer-range persistence; the
  #   econometric workhorse for volatility clustering.
  #
  #   Bessembinder, H., & Seguin, P. J. (1993). "Price volatility,
  #   trading volume, and market depth: Evidence from futures markets."
  #   Journal of Financial and Quantitative Analysis 28(1), 21-39.
  #   Documented that high-volatility futures sessions exhibit stronger
  #   directional continuation because market depth is reduced and large
  #   participants cannot unwind positions quickly enough to mean-revert.
  #
  # Economic mechanism for MES at ATR_P70 × NYSE_OPEN/US_DATA_830:
  #   Own 20-day ATR in the upper 30% (ATR_P70) selects for
  #   high-volatility-regime days per ARCH/GARCH persistence. On these
  #   days, Bessembinder-Seguin's depth effect predicts stronger
  #   breakout continuation because the reduced depth means large
  #   orders cannot mean-revert efficiently. Gating the two highest-flow
  #   sessions (NYSE_OPEN and US_DATA_830) by the own-volatility regime
  #   tests whether the combined commitment + information effect
  #   amplifies in high-vol conditions. S&P 500 futures are the deepest
  #   equity index market — the depth reduction required for the
  #   Bessembinder-Seguin effect to manifest requires genuinely elevated
  #   volatility, which ATR_P70 selects for.

  - id: 15
    name: "Volatility regime ATR_P70 at NYSE_OPEN"
    theory_citation: "Engle (1982) ARCH; Bollerslev (1986) GARCH; Bessembinder & Seguin (1993) JFQA"
    economic_basis: |
      Own 20-day ATR in the upper 30% selects for high-volatility-regime
      MES days per ARCH/GARCH persistence. Per Bessembinder-Seguin 1993,
      breakouts on these days exhibit stronger continuation because
      reduced depth prevents efficient mean-reversion by large orders.
      Combined with the Crabel commitment effect at NYSE_OPEN, the
      high-vol gate should amplify the per-trade ExpR. S&P 500 futures
      are the deepest equity market — ATR_P70 selects for the genuinely
      elevated conditions where depth reduction becomes material.
    filter:
      type: ATR_P70
      column: atr_20_percentile
    scope:
      instruments: [MES]
      sessions: [NYSE_OPEN]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "BH FDR q=0.05 fails on the pre-registered 16-hypothesis family"
      - "Chordia t-statistic < 3.00"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0 OR < 0.40 × IS ExpR"
      - "Any era with N ≥ 50 and ExpR < -0.05"
      - "IS Sharpe < 0.91 annualized"

  - id: 16
    name: "Volatility regime ATR_P70 at US_DATA_830"
    theory_citation: "Engle (1982); Bollerslev (1986); Bessembinder & Seguin (1993)"
    economic_basis: |
      Same high-vol-regime thesis applied to US_DATA_830. Tests the
      compound hypothesis that ARCH/GARCH volatility persistence +
      Bessembinder-Seguin depth effect + Andersen-Bollerslev-Diebold-
      Vega real-time discovery produce stronger post-release breakout
      continuation when background volatility is elevated.
    filter:
      type: ATR_P70
