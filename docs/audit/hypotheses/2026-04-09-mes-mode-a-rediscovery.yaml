# ---------------------------------------------------------------------------
# Hypothesis family 1 — Crabel opening range breakout at NYSE_OPEN
# ---------------------------------------------------------------------------
#
# Theoretical basis (verbatim-referenceable, external literature only):
#   Crabel, Toby (1990). "Day Trading with Short Term Price Patterns and
#   Opening Range Breakout." Traders Press, Greenville SC. Chapter 3,
#   "Opening Range Breakout." The book establishes the first-N-minute
#   opening range as a microstructural commitment device: during the
#   opening range, overnight order imbalances are absorbed and the
#   session's initial directional consensus is revealed. Breakouts of
#   this range are more likely to continue than mean-revert because
#   large participants have committed capital before the breakout and
#   will defend their direction. Crabel's canonical RR target for
#   momentum continuation is 2.0.
#
# Economic mechanism for MES at NYSE_OPEN:
#   S&P 500 futures are THE benchmark US equity index — the instrument
#   Crabel's opening-range thesis was originally written about (equity
#   index futures). NYSE_OPEN (09:30 ET) concentrates the single largest
#   block of institutional equity flow in global markets. Retail and
#   professional equity desks transact against overnight futures
#   positioning during the first minutes of cash-equity trading. The
#   5-minute opening range at this session captures the bulk of this
#   flow imbalance. Under Crabel's commitment hypothesis, LARGER opening
#   ranges indicate stronger overnight positioning that, when broken,
#   has higher follow-through probability because the committed flow
#   supplies continuation. MES receives the LARGEST share of US equity
#   index institutional flow as the benchmark S&P 500 micro contract,
#   making the Crabel thesis arguably STRONGER here than on any other
#   CME micro equity future.
#
# Why G4, G5, G6, G8 as separate bundles and not smaller thresholds:
#   Crabel's thesis requires the range to represent *meaningful*
#   commitment, not microstructure noise. On MES at NYSE_OPEN, typical
#   range is 2-8 points; each point = $5 so G4 = $20 of range
#   commitment per contract. G2/G3 on MES is comparable to bid-ask
#   spread × a few ticks and is dominated by noise. G4/G5/G6/G8 bracket
#   the plausible "meaningful commitment" zone. Each is pre-committed as
#   its own bundle because the loader stores filter_type as an exact
#   match string — we cannot declare a "range" at the bundle level.

hypotheses:
  - id: 1
    name: "Crabel opening range G4 at NYSE_OPEN"
    theory_citation: "Crabel (1990) Day Trading with Short Term Price Patterns and Opening Range Breakout, ch. 3"
    economic_basis: |
      Opening range ≥ 4 points on MES at NYSE_OPEN filters for sessions
      where overnight-to-cash positioning produced at least 4 points ($20
      per contract) of committed two-way commitment in the first 5
      minutes. Under Crabel's commitment hypothesis, breakouts of this
      range continue with above-chance probability because institutional
      participants anchored the range. S&P 500 futures are the original
      equity benchmark Crabel studied — the thesis is strongest here.
      RR=2.0 is Crabel's canonical continuation target. E2 (stop-market
      at the range boundary + slippage) is the industry-standard honest
      entry per TRADING_RULES.md with no backtest biases.
    filter:
      type: ORB_G4
      column: orb_size_points
    scope:
      instruments: [MES]
      sessions: [NYSE_OPEN]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "BH FDR q=0.05 fails on the pre-registered 16-hypothesis family (Criterion 3, Harvey-Liu 2015)"
      - "Chordia t-statistic < 3.00 (Criterion 4 with theory, Amendment 2.2)"
      - "Walk-forward efficiency < 0.50 (Criterion 6, LdP 2020)"
      - "2026-01-01 → current OOS ExpR < 0 OR < 0.40 × IS ExpR (Criterion 8, Amendment 2.7)"
      - "Any era with N ≥ 50 and ExpR < -0.05 (Criterion 9)"
      - "IS Sharpe < 0.91 annualized — within Bailey noise floor at N=16"

  - id: 2
    name: "Crabel opening range G5 at NYSE_OPEN"
    theory_citation: "Crabel (1990) ch. 3"
    economic_basis: |
      Same Crabel commitment hypothesis as #1 with a tighter G5 threshold.
      Under the monotonic prediction (stronger commitment → stronger
      continuation), G5 should out-perform G4 on per-trade ExpR if the
      theory holds and trial count permits detection.
    filter:
      type: ORB_G5
      column: orb_size_points
    scope:
      instruments: [MES]
      sessions: [NYSE_OPEN]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "BH FDR q=0.05 fails on the pre-registered 16-hypothesis family"
      - "Chordia t-statistic < 3.00"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0 OR < 0.40 × IS ExpR"
      - "Any era with N ≥ 50 and ExpR < -0.05"
      - "IS Sharpe < 0.91 annualized — within Bailey noise floor"

  - id: 3
    name: "Crabel opening range G6 at NYSE_OPEN"
    theory_citation: "Crabel (1990) ch. 3"
    economic_basis: |
      G6 threshold — upper-mid range of Crabel-plausible MES NYSE_OPEN
      ranges. At this threshold sample reduces but per-event
