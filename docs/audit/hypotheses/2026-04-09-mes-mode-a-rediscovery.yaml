      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0 OR < 0.40 × IS ExpR"
      - "Any era with N ≥ 50 and ExpR < -0.05"
      - "IS Sharpe < 0.91 annualized"

# ---------------------------------------------------------------------------
# Budget sanity check
# ---------------------------------------------------------------------------
#
# Trial count: 16 hypotheses × 1 trial each = 16 trials total.
#
# Per-hypothesis trial count:
#   1 filter_type × 1 session × 1 entry_model (E2)
#   × 1 rr_target (2.0) × 1 confirm_bar (1) × 1 stop_multiplier (1.0)
#   = 1 trial per bundle
#
# MinBTL bound (Bailey et al 2013 Theorem 1):
#   MinBTL = 2·Ln[N] / E[max_N]²
#   With N=16 and E[max_N]=1.0 (Bailey default, most conservative):
#     MinBTL = 2·Ln[16] / 1.0² = 2 · 2.7726 = 5.5452 years
#   Data horizon: 6.65 years (MES 2019-05-06 → 2025-12-31, 1951 days)
#   5.5452 < 6.65 → strict Bailey E=1.0 PASS with 19.9% headroom.
#
#   Noise floor Sharpe: E_min = √(2·Ln[16] / 6.65) = 0.913 annualized.
#   Candidates with IS Sharpe < 0.913 are within the Bailey noise floor
#   at N=16 and should not be promoted regardless of BH FDR outcome.
#
# Locked criterion 2 bound: N ≤ 300 (clean) per pre_registered_criteria v2.8.
# 16 / 300 = 5.3% of the locked ceiling.
#
# Chordia t-threshold (Amendment 2.2): every hypothesis has a
# theory_citation field, so has_theory=True → Chordia gate applies the
# t ≥ 3.00 threshold (with-theory band), not the t ≥ 3.79 no-theory band.
#
# No proxy data used. data_source_mode is NOT declared (defaults to clean).
# The loader's enforce_minbtl_bound will read this as clean mode and apply
# the 300-trial cap; 16 is far under.

total_hypothesis_count: 16
total_expected_trials: 16

budget_check:
  mode: "clean"
  max_allowed_clean: 300
  max_allowed_proxy: 2000
  locked_criterion_2_headroom_pct: 94.7
  strict_bailey_e_1_0_max_n: 28
  strict_bailey_e_1_0_headroom_pct: 42.9
  min_btl_required_years: 5.5452
  data_horizon_years_available: 6.65
  status: "strict Bailey E=1.0 PASS with 19.9% horizon headroom"
  sharpe_noise_floor: 0.913

