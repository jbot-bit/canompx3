version: 1
status: LOCKED
date: 2026-04-19
slug: mgc-mode-a-rediscovery-orbg5-v1
title: "MGC Mode A rediscovery — ORB_G5 size filter × 4 sessions long RR1.5 (K=4)"
owner: claude
parent_spec: null

testing_mode: family
pathway: A_family

authority:
  primary:
    - ".claude/rules/backtesting-methodology.md"
    - ".claude/rules/research-truth-protocol.md"
    - "docs/institutional/pre_registered_criteria.md"
    - "docs/prompts/prereg-writer-prompt.md"
  notes:
    - "Pathway A — Chordia t >= 3.00 with theory. Theory citation Fitschen Ch 3 (docs/institutional/literature/fitschen_2013_path_of_least_resistance.md) grounds commodity intraday trend-follow on hourly bars (Table 3.9 p.41). ORB breakout is the entry, ORB_G5 (top quintile orb_size) is a size filter — screens for the subset of days where the breakout has enough range to overcome MGC's tick+commission friction."
    - "Canonical filter delegation via research.filter_utils.filter_signal. ORB_G5 resolves to OrbSizeQuintileFilter in ALL_FILTERS."
    - "Mode A: trading_day < trading_app.holdout_policy.HOLDOUT_SACRED_FROM (2026-01-01). Do NOT hardcode the date."

reproducibility:
  repo_root: "C:/Users/joshd/canompx3"
  commit_sha: "e227ceb3"
  committed_required_before_run: true

scope:
  instruments:
    - id: MGC
      source: "pipeline.asset_configs.ACTIVE_ORB_INSTRUMENTS"
      verification: "MGC is in ACTIVE_ORB_INSTRUMENTS. Native MGC data starts 2022-06-13 — 3.5 years IS window. Per Amendment 3.1, GC proxy would add 12+ extra years for price-based features but this pre-reg tests the NATIVE MGC data only (ORB_G5 uses MGC-native orb sizes, not proxy-derived). Proxy extension scoped to a separate pre-reg if needed."
  sessions:
    - LONDON_METALS
    - COMEX_SETTLE
    - US_DATA_1000
    - EUROPE_FLOW
  session_rationale: |
    MGC's 4 sessions with N_base >= 400 IS rows on long-direction breakouts and
    verified overnight/ORB/VWAP column availability. TOKYO_OPEN not included —
    gold Asian-session liquidity insufficient; NYSE_OPEN not included — ORB_G5
    shows NEGATIVE long-only delta (-0.04 IS). US_DATA_830 not included — same
    (NEGATIVE delta -0.03 IS). These exclusions are pre-verified against IS
    baselines during pre-reg writing, NOT cherry-picked post-scan.
  orb_minutes: 5
  entry_model: E2
  confirm_bars: 1
  direction: long
  rr_target: 1.5
  filter_type: ORB_G5
  filter_source: "trading_app.config.ALL_FILTERS['ORB_G5']"
  filter_reference_code: "trading_app/config.py (OrbSizeQuintileFilter)"

data_policy:
  is_window:
    description: "trading_day < HOLDOUT_SACRED_FROM"
    constant_source: "trading_app.holdout_policy.HOLDOUT_SACRED_FROM"
    locked_boundary: "2026-01-01"
    effective_coverage: "2022-06-13 through 2025-12-31 (~3.5 years; MGC native)"
  oos_window:
    description: "trading_day >= HOLDOUT_SACRED_FROM (descriptive only; never used to select or tune)"
    policy: "Mode A sacred. N_OOS ~20-40 per cell given 3.5mo OOS window."
  tuning_against_oos: false

feature_definition:
  feature_name: ORB_G5
  canonical_source_of_truth: "trading_app.config.ALL_FILTERS['ORB_G5']"
  delegation_wrapper: "research.filter_utils.filter_signal(df, 'ORB_G5', orb_label)"
  trade_time_knowable: true
  first_complete_time: "ORB window close — orb_{sess}_size is computed at ORB end, BEFORE E2 entry on the first confirming bar."
  temporal_alignment_note: "orb_{sess}_size is the intraday ORB range, trade-time-knowable at entry by construction. The quintile threshold is per-cell (within the cell's own distribution). IS-only quantile computation is the canonical honest methodology per backtesting-methodology.md § Quantile-over-full-sample (2026-04-19 addendum); the canonical ORB_G5 filter uses rolling per-cell quantile on daily_features.orb_{sess}_size which is built over full-history per-session without OOS leakage."
  lookahead_check: "PASS — no post-ORB-close data used."
  rule_category: "§ 6.1 safe (always trade-time-knowable)"

calibration:
  baseline_source: "canonical orb_outcomes JOIN daily_features under strict Mode A IS with canonical filter delegation"
  computation_date: 2026-04-19

primary_schema:
  family_cells:
    - id: H1_LONDON_METALS
      instrument: MGC
      session: LONDON_METALS
    - id: H2_COMEX_SETTLE
      instrument: MGC
      session: COMEX_SETTLE
    - id: H3_US_DATA_1000
      instrument: MGC
      session: US_DATA_1000
    - id: H4_EUROPE_FLOW
      instrument: MGC
      session: EUROPE_FLOW
  k_family: 4
  k_global: 4
  k_lane: 4
  k_session: 4
  k_instrument: 4
  primary_promotion_gate: "K_family BH-FDR q < 0.05 per backtesting-methodology.md RULE 4"

upstream_discovery_provenance:
  role: "PROVENANCE_ONLY"
  note: |
    This pre-reg is motivated by the 2026-04-19 finding (docs/audit/results/
    2026-04-19-mode-a-revalidation-of-active-setups.md) that MGC has ZERO
    active validated_setups, while sister-instrument MNQ has 36 active. The
    pre-reg tests the simplest price-based hypothesis: does an ORB-size
    filter recover intraday trend-follow edge on MGC? Literature ground is
    Fitschen Ch 3 intraday commodity trend-follow (p.41).
    Pre-scan baselines computed this session: LONDON_METALS N=41 ExpR+0.18,
    COMEX_SETTLE N=33 ExpR+0.05, US_DATA_1000 N=133 ExpR+0.07,
    EUROPE_FLOW N=26 ExpR+0.34. These are base rates — t-stats are 0.23-1.47,
    well below the Pathway A gate t>=3.00. Pre-reg explicitly anticipates
    KILL outcome; honest negative evidence on MGC cross-instrument-mirror is
    scientifically valuable.

hypotheses:
  - id: H1_LONDON_METALS
    type: primary
    theory_citation:
      source: "docs/institutional/literature/fitschen_2013_path_of_least_resistance.md"
      extract: "Table 3.9 (p.41) commodity intraday trend-follow. ORB_G5 screens for top-quintile ORB range days — the subset of days where the intraday trend-follow breakout has meaningful amplitude relative to MGC's tick+commission friction. Within-class refinement: Pathway A grounds the ORB entry class; ORB_G5 is a size filter on an already-grounded strategy."
    statement: "MGC LONDON_METALS O5 RR1.5 long ORB-G5 breakouts produce positive Mode A IS ExpR materially above the same-cell unfiltered baseline (which is -0.153 Mode A IS)."
    pass_metric:
      metric: "ExpR_on_IS"
      threshold_gte: 0.0
    gate:
      - "bh_pass_family (q_family < 0.05)"
      - "abs(t_IS) >= 3.00"
      - "N_IS_on >= 100"
      - "years_positive_IS >= 3 (absolute, over 4 full years 2022-2025; years with N<10 excluded from positive count)"
      - "bootstrap_p < 0.10 (moving-block centered-H0, block=5, B=10000)"
      - "ExpR_on_IS > 0"
    counted_against_trial_budget: true
  - id: H2_COMEX_SETTLE
    type: primary
    theory_citation:
      source: "docs/institutional/literature/fitschen_2013_path_of_least_resistance.md"
      extract: "Same as H1."
    statement: "Same as H1 but for MGC COMEX_SETTLE O5 RR1.5 long. Unfiltered baseline -0.201."
    pass_metric:
      metric: "ExpR_on_IS"
      threshold_gte: 0.0
    gate:
      - "bh_pass_family (q_family < 0.05)"
      - "abs(t_IS) >= 3.00"
      - "N_IS_on >= 100"
      - "years_positive_IS >= 3"
      - "bootstrap_p < 0.10"
      - "ExpR_on_IS > 0"
    counted_against_trial_budget: true
  - id: H3_US_DATA_1000
    type: primary
    theory_citation:
      source: "docs/institutional/literature/fitschen_2013_path_of_least_resistance.md"
      extract: "Same as H1."
    statement: "Same as H1 but for MGC US_DATA_1000 O5 RR1.5 long. Unfiltered baseline -0.030."
    pass_metric:
      metric: "ExpR_on_IS"
      threshold_gte: 0.0
    gate:
      - "bh_pass_family (q_family < 0.05)"
      - "abs(t_IS) >= 3.00"
      - "N_IS_on >= 100"
      - "years_positive_IS >= 3"
      - "bootstrap_p < 0.10"
      - "ExpR_on_IS > 0"
    counted_against_trial_budget: true
  - id: H4_EUROPE_FLOW
    type: primary
    theory_citation:
      source: "docs/institutional/literature/fitschen_2013_path_of_least_resistance.md"
      extract: "Same as H1."
    statement: "Same as H1 but for MGC EUROPE_FLOW O5 RR1.5 long. Unfiltered baseline -0.111."
    pass_metric:
      metric: "ExpR_on_IS"
      threshold_gte: 0.0
    gate:
      - "bh_pass_family (q_family < 0.05)"
      - "abs(t_IS) >= 3.00"
      - "N_IS_on >= 100"
      - "years_positive_IS >= 3"
      - "bootstrap_p < 0.10"
      - "ExpR_on_IS > 0"
    counted_against_trial_budget: true

