    MGC_EUROPE_FLOW_O5_RR1.5_long_ORB_G5_on: {N: 26, ExpR_on: 0.3377, Delta_IS: 0.4488, approx_t: 1.47}
  computation_date: 2026-04-19

trial_budget:
  primary_selection_trials: 4
  schema_locked_before_any_metric: true
  minbtl_bound:
    formula: "MinBTL = 2 * ln(N_trials) / E[max_N]^2 per Bailey et al 2013"
    N_trials: 4
    within_cap: true
    cap_reference: ".claude/rules/backtesting-methodology.md § RULE 4.2"

kill_criteria:
  - id: K1
    metric: "Number of H1-H4 that pass all 6 gate clauses"
    threshold: 0
    action: "PERMANENT KILL — MGC ORB_G5 + RR1.5 long does not yield a Pathway A Chordia-validated edge on any of the 4 pre-registered sessions. MGC stays research-only; no deployment. Do NOT re-run with different thresholds."
  - id: K2
    metric: "Baseline sanity smoke-test: absolute ExpR difference between pre-reg baseline block and run-time computation"
    threshold: 0.001
    action: "SMOKE FAIL — harness-implementation discrepancy. Run is non-authoritative. (Same-path comparison — not a genuine implementation-drift check; see prereg-writer-prompt.md § Baseline cross-check.)"
  - id: K3
    metric: "Any cell flagged tautology (|T0|>0.70), extreme_fire (<5% or >95%), or arithmetic_only (|WR_spread|<3% AND |Delta_IS|>0.10)"
    threshold: 1
    action: "FLAG — exclude flagged cells from survivor set per backtesting-methodology.md § RULE 8. Report non-flagged cells only."

decision_rule:
  continue_if: "At least 1 of H1-H4 passes all 6 gate clauses AND no K2 smoke fail AND cell not K3-flagged."
  park_if: "At least 1 cell passes BH-FDR family but fails EXACTLY ONE of {bootstrap_p, years_positive} with N_IS_on >= 100. Park means: signal-only shadow pre-reg under Mode A forward OOS."
  kill_if: "K1 fires (0 of 4 cells clear all gates) OR K2 smoke fail."

methodology_rules_applied:
  - rule: "backtesting-methodology.md RULE 1 — look-ahead"
    application: "ORB_G5 uses intraday orb_size at ORB close; trade-time-knowable. The within-cell quintile threshold will be computed IS-only (per RULE 1 § Quantile-over-full-sample addendum) and applied to all rows; scan script must enforce this, NOT use full-sample quantile."
  - rule: "backtesting-methodology.md RULE 3 — IS/OOS discipline"
    application: "Strict Mode A IS. OOS descriptively reported only."
  - rule: "backtesting-methodology.md RULE 4 — multi-framing BH-FDR"
    application: "K_family = K_global = 4. Primary promotion q_family < 0.05."
  - rule: "backtesting-methodology.md RULE 6 — trade-time-knowability"
    application: "ORB_G5 is § 6.1 safe."
  - rule: "backtesting-methodology.md RULE 7 — T0 tautology"
    application: "T0 computed as Pearson corr(ORB_G5 fire, orb_size) ~ 1.0 by construction (ORB_G5 IS an orb_size function). Expected tautology with orb_size itself is trivially permitted; T0 check is against OTHER existing filters (e.g. OVNRNG_100, ATR_P50) to detect cross-filter collinearity."
  - rule: "backtesting-methodology.md RULE 8.1 — extreme fire"
    application: "ORB_G5 fires ~20% (top quintile) by construction — within [5%, 95%]."
  - rule: "research-truth-protocol.md § Canonical filter delegation"
    application: "Filter applied via research.filter_utils.filter_signal. No inline re-implementation."
  - rule: "prereg-writer-prompt.md § Pathway A filter-mechanism specificity"
    application: "Within-class-refinement framing explicit: Fitschen Ch 3 grounds the ORB intraday-trend-follow class; ORB_G5 is a size-filter refinement on an already-grounded strategy."

outputs_required_after_run:
  - "Per-cell N_on_IS, ExpR_on_IS, WR_on_IS, std_on_IS, t_IS, raw_p_IS."
  - "Per-cell bootstrap_p (moving-block, block=5, B=10000, seed=42)."
  - "Per-cell T0 tautology corr against orb_size, atr_20, overnight_range."
  - "Per-cell fire_rate, extreme_fire flag, arithmetic_only flag."
  - "BH-FDR q_family per cell."
  - "Per-year breakdown 2022-2025 for years_positive check."
  - "OOS descriptive stats — NOT used to select."
  - "Kill/Park/Continue verdict per cell."
  - "Result doc: docs/audit/results/2026-04-19-mgc-mode-a-rediscovery-orbg5-v1-scan.md"

execution_gate:
  allowed_now:
    - "Stamp commit_sha and transition status to LOCKED in a follow-up commit."
    - "Run the scan AFTER commit_sha stamped and pushed."
  forbidden_now:
    - "Running the scan before commit_sha is stamped."
    - "Modifying any gate threshold or kill criterion after first run."
    - "Widening the family to additional sessions or filters post-run."

not_done_by_this_pre_reg:
  - "Does NOT test MGC with GC proxy data extension (16yr). Would be a separate pre-reg for price-based features only, with proxy-native transfer audit required."
  - "Does NOT test other filter classes on MGC (COST_LT, VWAP, ATR_P50). Each class is a separate pre-reg if pursued."
  - "Does NOT test MGC at RR=1.0 or 2.0 (narrowed to RR1.5 to bound K at 4)."
  - "Does NOT test short-direction (MGC ORB_G5 short unfiltered baseline is similar — separate pre-reg if pursued)."
  - "Does NOT write to validated_setups or experimental_strategies."
