  mode_a_is_canonical:
    MGC_LONDON_METALS_O5_RR1.5_long_unfiltered: {N: 469, ExpR: -0.1528}
    MGC_COMEX_SETTLE_O5_RR1.5_long_unfiltered: {N: 431, ExpR: -0.2012}
    MGC_US_DATA_1000_O5_RR1.5_long_unfiltered: {N: 439, ExpR: -0.0298}
    MGC_EUROPE_FLOW_O5_RR1.5_long_unfiltered: {N: 493, ExpR: -0.1111}
    MGC_LONDON_METALS_O5_RR1.5_long_ORB_G5_on: {N: 41, ExpR_on: 0.1793, Delta_IS: 0.3321, approx_t: 0.98}
    MGC_COMEX_SETTLE_O5_RR1.5_long_ORB_G5_on: {N: 33, ExpR_on: 0.0470, Delta_IS: 0.2482, approx_t: 0.23}
