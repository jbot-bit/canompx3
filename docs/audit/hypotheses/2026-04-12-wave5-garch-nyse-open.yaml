hypotheses:
  - id: 1
    name: "MNQ NYSE_OPEN E2 RR1.5 GARCH_VOL_PCT_LT20 — low-vol-regime breakout gate"
    theory_citation: "scripts/research/wave4_presession_t2t8.py (2026-04-11 T2-T8 result): MNQ NYSE_OPEN RR1.5 LOW garch_forecast_vol in_ExpR=+0.240 WFE=1.00 T6 p=0.042. Strongest survivor across 20 shortlist combos; 50 other configs KILLED at T3/T4/T6/T7."
    economic_basis: |
      Low GARCH forecast vol at NYSE_OPEN identifies mornings where the
      1-step-ahead conditional vol is in the bottom 20% of the rolling 252-
      day distribution. In ORB breakout terms, these are quiet-regime
      openings where the 09:30 NY cash open has cleaner directional
      follow-through — the noise floor from macro release chop is lower, so
      a confirmed break has higher signal-to-noise. The RR1.5 target rides
      the US cash-session order flow momentum without extending into
      midday mean-reversion.

      Mechanism is distinct from existing ORB-size / COST_LT / OVNRNG filters
      because it conditions on FORWARD vol expectation (GARCH output), not
      realized pre-session range or friction ratio. G9 correlation audit
      from Wave 4 confirmed OVNRNG / took_pdh / atr_vel_ratio are mutually
      independent (Jaccard 0.19-0.40) — garch_forecast_vol was not in that
      audit but is mechanically distinct (daily-close returns vs overnight
      range, ATR, or takeout).

      WFE 1.00 (IS ExpR spread == OOS ExpR spread) is the strongest WFE
      among the 3 Phase B survivors — stronger than ATR_VEL MNQ TOKYO_OPEN
      (WFE 1.42) and ATR_VEL MES US_DATA_1000 (WFE 0.96). Perfect sign
      stability across 2020-2023 IS and 2024-2025 OOS indicates the
      mechanism is not a regime accident.
    filter:
      type: GARCH_VOL_PCT_LT20
      column: garch_forecast_vol_pct
      thresholds: [20]
    scope:
      instruments: [MNQ]
      sessions: [NYSE_OPEN]
      rr_targets: [1.5]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "Raw p >= 0.05 in validator discovery FDR"
      - "Walk-forward efficiency < 0.50 or > 2.00"
      - "2026 OOS ExpR < 0"
      - "Era stability: any era with N >= 50 and ExpR < -0.05"
      - "Annualized Sharpe < 0.70 (Bailey noise floor per docs/institutional/literature/bailey_et_al_2013_pseudo_mathematics.md)"
      - "Less than 100 deployable trades (Harvey-Liu 2015 Exhibit 4 floor)"

