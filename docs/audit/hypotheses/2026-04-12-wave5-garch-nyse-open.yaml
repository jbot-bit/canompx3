# Hypothesis Registry — Wave 5 G5: GARCH Forecast Vol Low-Regime Gate
#
# Locked:       2026-04-12T00:00:00+10:00
# Author:       Claude Code session (Wave 5 G5 deployment, post ATR_VEL audit)
# Holdout mode: A (2026-01-01 sacred)
# Data horizon: MNQ 6.65yr post Phase 3c clean real-micro
# Testing mode: individual (Pathway B, Amendment 3.0)
#
# Theory citation (LOCAL sources, NOT training memory):
# 1. scripts/research/wave4_presession_t2t8.py — Phase B T2-T8 adversarial battery
#    completed 2026-04-11. 20 shortlist combos tested across garch_forecast_vol,
#    atr_vel_ratio, overnight_took_pdh, took_pdh_before_1000. Only 3 survived
#    T3 WFE AND T4 sensitivity AND T6 p<0.05 AND T7 year stability.
#    MNQ × NYSE_OPEN × RR1.5 × garch_forecast_vol LOW was the strongest survivor:
#      - in_ExpR = +0.240
#      - WFE     = 1.00 (perfect sign stability 2020-2023 IS vs 2024-2025 OOS)
#      - T6 p    = 0.042 (5000-perm null bootstrap)
#      - T7      = year stability passed
# 2. pipeline/build_daily_features.py lines 1205-1217 — garch_forecast_vol
#    computation proven no-lookahead: GARCH(1,1) fit on daily closes from
#    rows[0..i-1], forecast for row i. Prior-only.
# 3. pipeline/build_daily_features.py (2026-04-12 addition) — garch_forecast_vol_pct
#    rolling percentile extracted via _prior_rank_pct helper. 9 unit tests prove
#    no-lookahead discipline (tests/test_pipeline/test_build_daily_features.py
#    TestPriorRankPct). 252-day lookback with min_prior=60.
# 4. docs/institutional/literature/bailey_et_al_2013_pseudo_mathematics.md —
#    MinBTL bound. Single-trial hypothesis file: MinBTL ≈ 0 years required,
#    6.65 years available, headroom is essentially infinite.
# 5. docs/institutional/pre_registered_criteria.md — 12 locked criteria that
#    the validator enforces post-discovery. This file commits to them ex-ante.
#
# Mechanism: Low GARCH forecast vol regime at NYSE_OPEN. Quiet-regime mornings
# produce cleaner ORB breakouts — the noise floor is lower, so the signal-to-
# noise of a break at 23:30 UTC (09:30 NY) is higher. The RR1.5 target captures
# continuation into US cash-session order flow without overshooting into
# midday chop. LOW-vol is counter-intuitive for a breakout edge but the
# research sign is robust: in_ExpR +0.240 with WFE 1.00 means the OOS ExpR
# spread exactly matched IS — not a pattern you see in an overfit model.
#
# The filter is deployed as a ROLLING PERCENTILE (garch_forecast_vol_pct <= 20)
# rather than an absolute threshold because the garch_forecast_vol distribution
# varies across instruments (MNQ Q20 ≈ 0.159 vs MES Q20 ≈ 0.111) and across
# time (regime drift). Rolling percentile matches the research's qcut(5)
# discipline — which was itself an in-sample-adaptive filter — while adding
# forward-time adaptivity the research did not have.

