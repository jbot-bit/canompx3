    discovery.
  promotion_gate: >
    NONE — this audit does NOT promote, does NOT modify validated_setups,
    does NOT change allocator state, does NOT modify sr_review_registry.
    Verdict is documentary; informs the next stage (sr_review_registry
    watch outcome update + user approval gate).

hypotheses:
  - id: 1
    name: "F1 (per lane) — SR peak-vs-current decomposition (Step 1)"
    economic_basis: >
      Pepelyshev-Polunchenko 2015 score-based Shiryaev-Roberts recursion:
      sr_stat is monotonic in change-point evidence; once it crosses
      threshold, it is the PEAK value. Live mechanism health is reflected
      in current_sr_stat + trades_since_alarm + recent_10_mean_r (all added
      to sr_state.json 2026-05-11 per feedback_sr_monitor_peak_vs_current_misread.md).
      The peak-vs-current misread class-bug is the canonical reason a
      ALARM lane can still be mechanism-healthy.
    primary_metric: "current_sr_stat / sr_stat_peak ratio + recent_10_mean_r sign"
    method: >
      Read sr_state.json per-lane payload. Cross-check against
      trading_app/sr_monitor.py output schema (orchestrator) and
      trading_app/sr_review_registry.py (watch outcome schema). Report
      whether the watch outcome (if any) was based on peak or current.
      DO NOT re-derive the SR algorithm.
    kill_criterion: >
      Per lane: PEAK_DECAYED if current_sr_stat / sr_stat_peak < 0.10
      AND recent_10_mean_r > 0 (alarm trigger no longer reflects current
      health). Otherwise: ALARM_STILL_LIVE.
    theory_citation: "docs/institutional/literature/pepelyshev_polunchenko_2015_changepoint.md"

  - id: 2
    name: "F2 (per lane) — Rolling-60-trade decomposition (Step 2)"
    economic_basis: >
      The SR statistic compresses three independent components: mean shift,
      variance shift, sample-size effect. Decomposing each on a per-lane
      rolling-60-trade window (ExpR, stdev(pnl_r), fire-rate, win-rate,
      cadence) shows whether the alarm is 'mean dropped' vs 'variance
      compressed' vs 'fire-rate collapsed'. Each maps to a different Harris
      mechanism falsification path. Carver Ch 9 vol-targeting framework
      provides the structural-break detection prior.
    primary_metric: "rolling_window_decomposition (5 components x N windows)"
    method: >
      research/sr_alarm_decomposition_2026_05_12.py reads orb_outcomes JOIN
      daily_features (triple-key join per .claude/rules/daily-features-joins.md)
      filtered by canonical strategy_id parsed via
      trading_app.eligibility.builder.parse_strategy_id (NEVER regex per
      feedback_aperture_overlay_canonical_parser.md). Reuses
      pipeline.paths.GOLD_DB_PATH and research.oos_power.oos_ttest_power
      for any window-vs-window comparison. Pressure-test per RULE 13:
      inject a known look-ahead column and confirm the script flags it.
      Plot 2022 -> 2026-04 time series; flag SR ALARM trigger window vs
      current window.
    kill_criterion: >
      Per lane + per component:
      VARIANCE_COMPRESSION if stdev(pnl_r)_recent < 0.6 * stdev(pnl_r)_full_history
        AND mean(pnl_r)_recent within 1.0 * pooled_std of expected_r.
      MEAN_DECAY if mean(pnl_r)_recent < 0 AND mean(pnl_r)_full_history > 0.10R.
      FIRE_RATE_COLLAPSE if fire_rate_recent < 0.5 * fire_rate_full_history.
      UNVERIFIED_INSUFFICIENT_POWER if rolling-60 window has N<30 OR OOS
        power<50% per RULE 3.3.
    theory_citation: >
      docs/institutional/literature/pepelyshev_polunchenko_2015_changepoint.md;
      docs/institutional/literature/carver_2015_volatility_targeting_position_sizing.md;
      .claude/rules/backtesting-methodology.md RULE 3.3 + RULE 13.

  - id: 3
    name: "F3 (per lane) — Harris falsification-trigger check (Step 3)"
    economic_basis: >
      Each deployed lane has explicit Harris 2002 falsification triggers in
      mechanism_priors.md sec 2.5 (added 2026-05-12 from full-text OCR
      extract). Tests whether the underlying mechanism's load-bearing
      conditions still hold in live data.
    primary_metric: "per-trigger fire status (FIRED / NOT_FIRED / UNTESTABLE_WITH_CURRENT_DATA)"
    method: >
      Per lane, test the 3 triggers cited in mechanism_priors.md sec 2.5:
      L1 NYSE_OPEN: (a) NYSE / Nasdaq cash-equity hours change since deployment
        (calendar check via pipeline.dst.SESSION_CATALOG vs vendor calendar);
        (b) ORB-side book depth at 09:30 ET = mid-session average (UNTESTABLE
        with current schema — declare gap honestly, do NOT fabricate);
        (c) live annual_r / backtested annual_r ratio vs Harris Ch 22 sec 22.6
        17.8x commodity-pool deflation reference.
      L2 COMEX_SETTLE: (a) CME settlement-window methodology change (vendor
        calendar check); (b) OVNRNG_100 fire-rate by year, flag if drift >2 sigma
        outside calibration band; (c) per-(year, direction) sign-flip rate
        per pooled-finding-rule.md (>=25% = heterogeneity-artifact).
      L3 US_DATA_1000: (a) BLS / BEA / Fed 08:30 ET release schedule change
        (calendar check); (b) 10:00 ET multi-release coincidence (calendar
        overlap check); (c) VWAP_MID_ALIGNED fire-rate by year, flag if
        drift toward 95% (no longer selective).
      For each trigger: report status with SQL evidence. Honest UNTESTABLE
      declaration is the correct output for missing-schema cases.
    kill_criterion: >
      Per lane: MECHANISM_FALSIFIED if any of triggers (a), (b), or (c)
      returns FIRED. Otherwise: MECHANISM_NOT_FALSIFIED.
      UNTESTABLE results do NOT count as FIRED; they are explicit gaps
      logged for future schema work.
    theory_citation: >
      docs/institutional/literature/harris_2002_trading_exchanges_microstructure.md
      Ch 4 sec 4.5.2 + Ch 14 sec 14.2 + Ch 21 sec 21.2 + Ch 22 sec 22.6;
      docs/institutional/mechanism_priors.md sec 2.5;
      .claude/rules/pooled-finding-rule.md.

  - id: 4
    name: "F4 (per lane) — Bailey deflated-Sharpe revisit (Step 4)"
    economic_basis: >
      Bailey-LdP 2014 Equation 2 deflated Sharpe ratio: selection bias
      decays as live trades accumulate; recomputing DSR on the full ledger
      as of today vs the deployment-time DSR locked in validated_setups
      isolates the sample-selection-catching-up signal. Per Amendment 2.1
      of pre_registered_criteria.md, DSR is CROSS-CHECK informational
      (not a binding kill arm) until N_eff is formally solved in-repo.
    primary_metric: "live_dsr - deployment_dsr"
    method: >
      DELEGATE to research/audit_ovnrng50_canonical_dsr.py::compute_dsr()
      (NEVER re-implement per institutional-rigor sec 4). For each lane:
      recompute DSR on the full trade ledger as of today (Mode A IS + OOS
      combined per Bailey 2014 sample definition). Compare to the
      deployment-time DSR locked in validated_setups.
    kill_criterion: >
      Per lane: DSR_DECAYED if live_dsr < deployment_dsr - 0.20
        OR live_dsr < 0.50 (Amendment 2.1 relaxed CROSS-CHECK floor).
      Otherwise: DSR_STABLE. CROSS-CHECK only — does not solo-kill.
    theory_citation: >
      docs/institutional/literature/bailey_lopez_de_prado_2014_deflated_sharpe.md
      p.8 Eq 2; docs/institutional/pre_registered_criteria.md Amendment 2.1.

  - id: 5
    name: "F5 (cross-lane) — Common-factor / three-way coincidence audit (Step 5 cross-lane summary)"
    economic_basis: >
      Three-way ALARM coincidence on independent mechanisms is unlikely
      under the null. Either the SR threshold calibration is mis-set
      (Pepelyshev-Polunchenko ARL too tight for the realized noise), or
      a common factor (regime, cost-model spike, infrastructure shift)
      hits all three. Per pooled-finding-rule.md a cross-lane claim
      MUST carry per_cell_breakdown_path + flip_rate_pct front-matter.
    primary_metric: "3-way ALARM probability under null + common-factor decomposition"
    method: >
      Cross-lane summary file (docs/audit/results/2026-05-12-sr-alarm-3lane-summary.md)
      MUST carry pooled_finding: true front-matter pointing at the 3
      individual lane MDs as per_cell_breakdown_path (synthetic-cohort
      flip_rate_pct = share of lanes whose F1-F4 verdicts disagree with
      the headline 3-way claim). Tests:
        (1) Regime check via daily_features.atr_vel_regime distribution
            in the alarm windows vs full history.
        (2) Cost-model spike check via pipeline.cost_model.COST_SPECS
            (any change to MNQ total_friction since 2026-04 per
            feedback_doctrine_drift_cost_specs_2026_05_01.md).
        (3) SR threshold calibration check: trading_app/live/sr_monitor.py
            ARL parameters, audit consistency vs Pepelyshev-Polunchenko 2015
            recommended values for the realized noise.
    kill_criterion: >
      COMMON_FACTOR_IDENTIFIED if any of (regime / cost / threshold) test
        returns FIRED across >=2 of 3 lanes.
      INDEPENDENT_THREE_WAY if all 3 lanes' alarms decompose to lane-specific
        mechanism components per F1-F4.
      UNVERIFIED_INSUFFICIENT_POWER if cross-lane data insufficient.
    theory_citation: >
      docs/institutional/literature/pepelyshev_polunchenko_2015_changepoint.md
      (ARL recalibration); .claude/rules/pooled-finding-rule.md (per-cell breakdown).

verdict_taxonomy:
  description: >
    Per-lane verdict is one of four locked options. Each must be traced to
    F1-F4 sub-criteria. Cross-lane verdict is one of three options. NO
    'investigate further' or 'monitor for X months' verbs. The verdict is
    documentary; allocator action is a separate stage.
  per_lane_options:
    - id: "MECHANISM_HOLDS_VARIANCE_COMPRESSION"
      trigger: >
        F1 PEAK_DECAYED AND F2 VARIANCE_COMPRESSION AND F3 MECHANISM_NOT_FALSIFIED.
        (Variance dropped but mean / fire-rate intact AND no Harris trigger
        FIRED. Harris mechanism still valid; SR ALARM is statistical noise on
        a compressed signal.)
        Recommended action (informs separate stage): hold; raise SR threshold
        per Pepelyshev-Polunchenko 2015 ARL recalibration.
    - id: "MECHANISM_HOLDS_BUT_DEFLATED"
      trigger: >
        F3 MECHANISM_NOT_FALSIFIED AND F4 DSR_DECAYED AND F2 NOT FIRE_RATE_COLLAPSE.
        (No Harris falsification trigger but DSR has crossed below relaxed
        Amendment 2.1 floor.) Recommended action: hold but downsize per
        Carver Ch 9 vol-targeting framework.
    - id: "MECHANISM_FALSIFIED"
      trigger: >
        F3 MECHANISM_FALSIFIED (any Harris trigger FIRED).
        (Underlying mechanism's load-bearing condition shifted.) Recommended
        action: pause via sr_review_registry; recommend full revalidation.
    - id: "UNVERIFIED_INSUFFICIENT_POWER"
      trigger: >
        F2 UNVERIFIED_INSUFFICIENT_POWER OR per-lane rolling-60 N<30 OR
        OOS power<50% per RULE 3.3 across all sub-tests.
        (Cannot distinguish signal from noise.) Recommended action: hold
        and re-check at N>=50.
  cross_lane_options:
    - id: "COMMON_FACTOR_IDENTIFIED"
      trigger: "F5 returns FIRED on regime / cost / threshold across >=2 of 3 lanes."
    - id: "INDEPENDENT_THREE_WAY"
      trigger: "All 3 lanes' alarms decompose to lane-specific mechanism components per F1-F4."
    - id: "UNVERIFIED_INSUFFICIENT_POWER"
      trigger: "Cross-lane data insufficient OR per-lane verdicts conflict in a way F5 cannot resolve."
  internal_consistency_check:
    description: >
      Cross-lane verdict + per-lane verdicts must be internally consistent.
      If F5 = COMMON_FACTOR_IDENTIFIED (e.g., SR threshold miscalibration),
      no individual lane MAY carry verdict MECHANISM_FALSIFIED. Inconsistency
      requires re-examining F3 trigger evaluations before locking the summary.

forbidden_actions:
  - "Threshold modification on any deployed filter (data-snooping per feedback_bias_discipline.md)."
  - "Parameter retune on any deployed lane (would be data-snooping)."
  - "Modifying mechanism_priors.md sec 2.5 (priors are not refined by this diagnostic)."
  - "Modifying pre_registered_criteria.md (gate-pass is the only path to amendments)."
  - "Re-implementing parse_strategy_id, oos_power math, or DSR (delegate to canonical sources per institutional-rigor sec 4)."
  - "Any writes to validated_setups, experimental_strategies, lane_allocation.json, sr_review_registry, sr_state.json, paper_trades, or any state file."
  - "Editing trading_app/, pipeline/, or scripts/ production code."
  - "Changing the verdict taxonomy options (locked here; revision requires amendment commit)."
  - "Citing training-memory thresholds or stats (volatile data rule — query live)."
  - "Pausing / replacing / resizing any deployed lane (separate stage gated by verdict + sr_review_registry update + user approval)."

