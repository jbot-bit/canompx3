    - id: "L3_US_DATA_1000_RR1.5_VWAP_MID_ALIGNED"
      strategy_id: "MNQ_US_DATA_1000_E2_RR1.5_CB1_VWAP_MID_ALIGNED_O15"
      instrument: MNQ
      session: US_DATA_1000
      orb_minutes: 15
      rr_target: 1.5
      filter: VWAP_MID_ALIGNED
      n_sub_tests: 5
  k_family: 15
