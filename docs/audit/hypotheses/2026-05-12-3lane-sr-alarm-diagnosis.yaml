  family_cells:
    - id: "L1_NYSE_OPEN_RR1.5_COST_LT12"
      strategy_id: "MNQ_NYSE_OPEN_E2_RR1.5_CB1_COST_LT12"
      instrument: MNQ
      session: NYSE_OPEN
      orb_minutes: 5
      rr_target: 1.5
      filter: COST_LT12
      n_sub_tests: 5
    - id: "L2_COMEX_SETTLE_RR1.5_OVNRNG_100"
      strategy_id: "MNQ_COMEX_SETTLE_E2_RR1.5_CB1_OVNRNG_100"
      instrument: MNQ
      session: COMEX_SETTLE
      orb_minutes: 5
      rr_target: 1.5
      filter: OVNRNG_100
