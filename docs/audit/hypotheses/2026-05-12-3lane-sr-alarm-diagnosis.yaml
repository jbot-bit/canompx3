  role: "PROVENANCE_ONLY"
  sources:
    - "validated_setups (3 lanes deployed via topstep_50k_mnq_auto profile)"
    - "data/state/sr_state.json (snapshot 2026-05-11T22:26:39Z; git_head 398693ea)"
