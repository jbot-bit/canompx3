metadata:
  theory_grant: false  # SR alarm diagnostic audit; not a Chordia discovery candidate.
  name: "3lane_sr_alarm_diagnosis_2026_05_12"
  purpose: >
    Documentary diagnosis of why all 3 deployed MNQ lanes are simultaneously on
    SR ALARM (sr_state.json 2026-05-11). Tests, per lane, whether the alarm is
    consistent with (a) Harris 2002 mechanism still valid but variance compressing,
    (b) a Harris-cited falsification trigger having fired, or (c) Bailey-style
    sample-selection / deflated-Sharpe artifact catching up post-deployment.
    The output is one MD report per lane plus a cross-lane summary verdict file.
    NO writes to validated_setups, experimental_strategies, lane_allocation.json,
    sr_review_registry, or any deployed-state file. Allocator action (pause /
    replace / hold) is a separate stage gated by these verdicts plus user approval.
  date_locked: "2026-05-12T18:00:00+10:00"
  holdout_date: "2026-01-01"
  total_expected_trials: 15
  testing_mode: "family"
  pathway: "A"
  research_question_type: "capital_diligence"
  scratch_policy:
    policy: "include-as-zero"
    justification: >
      Live execution path forces flat at session end (TopStep XFA + AMP futures
      EOD). All canonical-layer queries must book the same $0 outcome to satisfy
      Chan 2013 Ch 1 unified-program doctrine. Per
      docs/institutional/literature/bailey_lopezdeprado_2014_dsr_sample_selection.md
      sample-selection bias from a `WHERE pnl_r IS NOT NULL` drop policy inflates
      ExpR by 10-45%. Captured in feedback_scratch_pnl_null_class_bug.md class
      doctrine. Step 2 rolling-window decomposition MUST annotate scratch policy.

execution:
  mode: "documentary"
  entrypoint: "no runner — analysis is documented in result MDs with verbatim canonical-layer query output. Step 2 is the only sub-test that requires a script; the script is created in a follow-up commit (see verification.post_step_2 below)."
  default_args: []

authority:
  primary:
    - "RESEARCH_RULES.md"
    - ".claude/rules/backtesting-methodology.md"
    - ".claude/rules/research-truth-protocol.md"
    - ".claude/rules/integrity-guardian.md"
    - ".claude/rules/institutional-rigor.md"
    - ".claude/rules/pooled-finding-rule.md"
    - "docs/institutional/pre_registered_criteria.md"
    - "docs/institutional/mechanism_priors.md"
    - "docs/institutional/literature/harris_2002_trading_exchanges_microstructure.md"
    - "docs/institutional/literature/bailey_et_al_2013_pseudo_mathematics.md"
    - "docs/institutional/literature/bailey_lopez_de_prado_2014_deflated_sharpe.md"
    - "docs/institutional/literature/harvey_liu_2015_backtesting.md"
    - "docs/institutional/literature/pepelyshev_polunchenko_2015_changepoint.md"
    - "docs/institutional/literature/carver_2015_volatility_targeting_position_sizing.md"
    - "docs/institutional/literature/chan_2013_ch1_backtesting_lookahead.md"
  notes:
    - "K=15 capital-class diligence on already-deployed lanes (3 lanes x 5 steps). Not new discovery."
    - "MinBTL bound: 2*ln(15) = 5.42yr <= MNQ 6.65yr clean horizon. PASS at E[max_N]=1.0."
    - "Mode A holdout (2026-01-01) sacred; OOS values descriptive not confirmatory under power floor (RULE 3.3)."
    - "Per-lane verdicts traced to F1-F5 sub-criteria below. Verdict options LOCKED."
    - "Lane ID for NYSE_OPEN locked to canonical sr_state.json value MNQ_NYSE_OPEN_E2_RR1.5_CB1_COST_LT12 (RR1.5, NOT RR1.0 as plan-text named). Source-of-truth chain per CLAUDE.md."

