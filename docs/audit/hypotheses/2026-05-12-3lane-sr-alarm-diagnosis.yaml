  k_session: 5
  multiple_testing_basis: >
    K=15 capital-class diligence (3 lanes x 5 sub-tests). MinBTL loose-form
    horizon: 2*ln(15) = 5.42yr at E[max_N]=1.0; MNQ has 6.65yr clean. PASS.
    Per-lane K_lane=5 below the per-cell BH-FDR floor; Step 2 sub-tests
