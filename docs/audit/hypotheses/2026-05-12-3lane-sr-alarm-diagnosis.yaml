data_policy:
  is_window:
    description: "WF_START_OVERRIDE['MNQ'] <= trading_day < HOLDOUT_SACRED_FROM"
    constant_source_lower: "trading_app.config.WF_START_OVERRIDE['MNQ']"
    constant_source_upper: "trading_app.holdout_policy.HOLDOUT_SACRED_FROM"
    locked_lower: "2020-01-01"
    locked_upper: "2026-01-01"
  oos_window:
    description: "trading_day >= HOLDOUT_SACRED_FROM (2026-01-01) up to current trading_day"
    policy: "descriptive recompute against canonical orb_outcomes JOIN daily_features (triple-key join per .claude/rules/daily-features-joins.md). Binary OOS gate forbidden under RULE 3.3 power floor."
  trailing_window:
    description: "Per-lane rolling 60-trade window across full IS+OOS history."
    policy: "Directional / decomposition evidence only at observed power; not refutational. Step 2 reports power tier per research/oos_power.py for each window comparison."
  tuning_against_oos: false
  canonical_layers_only: true
  canonical_db_path: "pipeline.paths.GOLD_DB_PATH"
  triple_join_required: true

grounding:
  literature_anchors:
    - source_file: "resources/Harris-Trading-and-Exchanges-Market-Microstructure-for-Practitioners-2002.pdf"
      extract: "docs/institutional/literature/harris_2002_trading_exchanges_microstructure.md"
      page_or_section: "Ch 4 sec 4.5.2 (stop-cascade), Ch 14 sec 14.2 (adverse-selection spread component), Ch 21 sec 21.2 (effective-spread treatment), Ch 22 sec 22.6 (sample-selection / 17.8x commodity-pool deflation reference)"
      use: >
        Per-lane mechanism citations (mechanism_priors.md sec 2.5). Step 3
        falsification triggers test each lane against its specific cited
        chapter / section. The 17.8x deflation reference (Ch 22 sec 22.6)
        anchors NYSE_OPEN trigger (c) — live annual_r vs backtested annual_r
        ratio is the canonical out-of-sample deflation check.
    - source_file: "resources/Codependence_Detection.pdf"
      extract: "docs/institutional/literature/bailey_et_al_2013_pseudo_mathematics.md"
      page_or_section: "p.8 Theorem 1, p.7 Equation 4 (loose form)"
      use: >
        K-budget bound for this audit: K=15 -> 2*ln(15)=5.42yr required at
        E[max_N]=1.0; MNQ 6.65yr clean horizon clears it. PASS verified by
        scripts/tools/estimate_k_budget.py at pre-reg lock time.
    - source_file: "resources/deflated-sharpe.pdf"
      extract: "docs/institutional/literature/bailey_lopez_de_prado_2014_deflated_sharpe.md"
      page_or_section: "p.8 Equation 2, p.3 Conclusions"
      use: >
        Step 4 DSR revisit: recompute DSR on the full per-lane trade ledger as
        of today (not the deployment-time DSR locked in validated_setups).
        Decay vs deployment-time DSR is the Bailey-style sample-selection
        catching up signal. Per Amendment 2.1 of pre_registered_criteria.md
        DSR is CROSS-CHECK informational, not a binding kill arm. DELEGATE
        to research/audit_ovnrng50_canonical_dsr.py compute_dsr() (NEVER
        re-implement per institutional-rigor sec 4).
    - source_file: "resources/backtesting_dukepeople_liu.pdf"
      extract: "docs/institutional/literature/harvey_liu_2015_backtesting.md"
      page_or_section: "p.17"
      use: >
        OOS power-floor doctrine grounds RULE 3.3. Step 2 rolling-window
        N=60 leaves only 2-3 windows in OOS per lane. Many sub-tests will
        produce STATISTICALLY_USELESS or DIRECTIONAL_ONLY tier per
        research/oos_power.py — verdict MUST default to UNVERIFIED in
        those cases, never DEAD. Honest declaration of underpowered tier
        is the correct output, not a workaround.
    - source_file: "resources/changepoint_polunchenko_pepelyshev_2015.pdf"
      extract: "docs/institutional/literature/pepelyshev_polunchenko_2015_changepoint.md"
      page_or_section: "Score-based Shiryaev-Roberts recursion + ARL recalibration"
      use: >
        Canonical authority for the SR statistic. trading_app/live/sr_monitor.py
        delegates to it. NEVER re-derive in this diagnostic. Step 1 reads peak
        sr_stat AND current_sr_stat AND trades_since_alarm AND recent_10_mean_r
        from sr_state.json (added 2026-05-11 per
        feedback_sr_monitor_peak_vs_current_misread.md). Verdict
        MECHANISM_HOLDS_VARIANCE_COMPRESSION explicitly recommends ARL
        threshold recalibration per this paper (NOT a kill).
    - source_file: "resources/Carver_Systematic_Trading.pdf"
      extract: "docs/institutional/literature/carver_2015_volatility_targeting_position_sizing.md"
      page_or_section: "Ch 9 p.143-147 (Kelly-linked vol target + half-Kelly mandate); Ch 10 p.153+ (position sizing framework)"
      use: >
        Capital allocation under uncertainty: when DSR diligence is open and
        OOS is statistically useless but live signal is directionally positive,
        DOWNSIZE per Carver (reduce capital exposure proportional to remaining
        uncertainty, do not zero exposure). Anchors verdict
        MECHANISM_HOLDS_BUT_DEFLATED.
    - source_file: "resources/Algorithmic_Trading_Chan.pdf"
      extract: "docs/institutional/literature/chan_2013_ch1_backtesting_lookahead.md"
      page_or_section: "p.4 unified-program doctrine"
      use: >
        Canonical-machinery delegation: Step 2 decomposition MUST reuse
        pipeline.paths.GOLD_DB_PATH, trading_app.eligibility.builder.parse_strategy_id
        (per feedback_aperture_overlay_canonical_parser.md), and
        research/oos_power.py. No re-implementation. Step 4 MUST delegate to
        research/audit_ovnrng50_canonical_dsr.py.
  use_for_threshold_modification: false
  use_for_audit_rigor_only: true

