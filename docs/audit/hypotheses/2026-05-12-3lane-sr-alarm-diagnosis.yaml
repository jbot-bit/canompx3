    - "docs/audit/results/2026-05-02-mnq-comex-ovnrng100-rr15-chordia-unlock-v1.md (Chordia strict-unlock 2026-05-02 PASS_CHORDIA, OVNRNG_100 only)"
  note: >
    All 3 lanes ALARM simultaneously per sr_state.json 2026-05-11. SR review
    registry has 2 of 3 flagged 'watch' since 2026-05-11; the third (NYSE_OPEN
