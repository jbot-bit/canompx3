    origin/research/mnq-pr51-dsr-audit @ 9cc88b78, DSR does not bind an
    OLS-slope question; the OLS-appropriate Phase 0 complement is K=3
    Pathway-B sign+power (pre-committed gate: sign(β₁_OOS) == sign(β₁_IS)
