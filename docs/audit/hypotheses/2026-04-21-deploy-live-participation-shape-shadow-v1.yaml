# -----------------------------------------------------------------------------
# Locked kill criteria (authoritative copy of G9 cert — keep in sync)
# -----------------------------------------------------------------------------
kill_criteria:
  sharpe_alarm:
    threshold: "rolling-20-trade Sharpe < 0 for 10 consecutive trades per instrument"
    lookback_trades: 20
    action: "HALT shadow for breaching instrument; emit alert; user review required before resume."
    rationale: "Under H1 (monotonic-up, t > 7), rolling-20-Sharpe < 0 for 10 consecutive is > 3-sigma. Ruin-detection, not precision."

  n_fires_floor:
    min_before_kill_verdict_per_instrument: 50
    min_before_confirm_verdict_per_instrument: 200
    verdict_if_below_floor: "UNVERIFIED (NOT DEAD)"
    rationale: "feedback_oos_power_floor.md — 80% power vs IS effect size requires larger N on a single-signal test. Chan Ch 1 p.7 walk-forward discipline."

  shiryaev_roberts_alarm:
    score_function: "per Pepelyshev-Polunchenko 2015 Eq. 17-18; f0 = null rel_vol=median, f1 = alt rel_vol=Q5 IS-calibrated"
    control_limit_arl0: 1000
    alarm_action: "Emit SR alarm to trading_app/live/sr_monitor.py state; log alarm timestamp + trigger index; user review required."
    rationale: "Eq. 11 target ARL_0 ≈ 3-6 month false-alarm lead time under H_0."

  shadow_observation_window:
    min_weeks: 2
    lock: "wall-clock lock from Stage 6 go-live timestamp; no early promotion to real capital regardless of shadow performance"
    rationale: "Chan 2013 Ch 1 p.7 walk-forward discipline + Aronson forward-test discipline."

  heterogeneity_veto:
    rule: "Per-instrument sign-flip veto (post-b081b61c amendment). For each instrument in {MNQ, MES, MGC}: if beta1_shadow sign flips vs IS beta1 > 0 after N_fires >= 50 on that instrument, halt that instrument's shadow observation. Cross-instrument heterogeneity is ALSO tracked: if ≥ 1 of 3 flips while the others hold, demote the universality claim to conditional and document the flipping cell."
    action: "Halt the flipping instrument's shadow observation; emit alarm; demote per-instrument classification accordingly in a post-shadow review."
    rationale: "feedback_per_lane_breakdown_required.md + feedback_pooled_not_lane_specific.md. Per-instrument veto applied symmetrically across the 3-instrument observation population restored by the post-b081b61c amendment."

  real_capital_flip_block:
    blocked_until_all_true:
      - "docs/plans/2026-02-08-phase6-live-trading-design.md § 6e monitoring & alerting delivered"
      - "A SEPARATE capital pre-reg exists for the specific (instrument, deployment form) cell being flipped. This observation-only pre-reg does NOT authorise a capital path for any instrument. Valid forms: (a) IS-trained sizer-overlay pre-reg on rel_vol per mechanism_priors.md §4 R3 (applies to MES, MGC, and potentially MNQ once IS-rule verified); (b) per-instrument-K=1 MNQ DSR pre-reg on unfiltered baseline (applies to MNQ only; family-wise K=3 on this YAML was FAIL_2_OF_3)."
    rationale: |
      Two independent hard prerequisites.

      G7 destruction-shuffle + RNG-null RETIRED on 2026-04-21 after F3
      remediation run passed all 3 instruments at empirical p < 0.005.

      Post-b081b61c resolution: this YAML is an OBSERVATION_ONLY pre-reg.
      It does not specify a deployment form and therefore cannot by
      itself authorise capital flip on any instrument. The form-specific
      G3 FAIL_2_OF_3 (unfiltered baseline on MES+MGC) remains binding
      against any future pre-reg that picks the unfiltered baseline
      form on those instruments, but does not block alternative forms
      (sizer-overlay, filter-overlay) that need their own pre-reg.

      The OOS replication @ 9cc88b78 is evidence that the shape signal
      survives OOS on MES+MGC; that is a necessary-not-sufficient
      precondition for a sizer-overlay capital pre-reg, not authority
      to skip one.

