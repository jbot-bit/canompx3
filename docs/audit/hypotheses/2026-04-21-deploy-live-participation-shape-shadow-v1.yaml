    9cc88b78 K=3 Pathway-B OOS replication on 2026 window:

      | Inst | N_OOS | β₁_OOS  | t_OOS  | p      | Verdict                     |
      |------|-------|---------|--------|--------|------------------------------|
      | MNQ  | 771   | +0.1443 | +0.964 | 0.168  | OOS_WEAK_BUT_RIGHT_SIGN     |
      | MES  | 702   | +0.3654 | +2.492 | 0.007  | OOS_CONFIRMED               |
      | MGC  | 601   | +0.4228 | +2.519 | 0.006  | OOS_CONFIRMED               |

    This pre-reg's pathway_rationale is observing the SHAPE SIGNAL
    forward-OOS. The shape signal is universal (G7 PASS all three
    instruments). Narrowing shadow scope to MNQ-only tested a specific
    DEPLOYMENT FORM (unfiltered baseline), not the shape signal. Two
    different questions were conflated.

    Resolution: restore shadow to all 3 instruments under a new
    deployment_form = OBSERVATION_ONLY. No sizing action, no capital
    path is authorised by this pre-reg. The unfiltered-baseline cost-dead
    finding (G3 F7 result on MES+MGC) remains a form-specific factual
    record but does NOT gate the observation-only shadow. Any capital
    path on any instrument requires either (a) an IS-trained sizer-overlay
    pre-reg + backtest (mechanism_priors.md §4 R3 — separate pre-reg),
    or (b) a per-instrument-K=1 MNQ DSR pre-reg on unfiltered baseline
    (separate pre-reg).

    Evidence layer (empirical) and deployment-posture layer are
    explicitly kept separate per CLAUDE.md institutional rigor and per
    the memo b081b61c decision invariant.

  ---

  Original history (kept for audit):

  Flipped from SKELETON_NOT_LOCKED to LOCKED_SHADOW_ONLY at 2026-04-21 after
