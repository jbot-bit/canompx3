# -----------------------------------------------------------------------------
# Locked kill criteria (authoritative copy of G9 cert — keep in sync)
# -----------------------------------------------------------------------------
kill_criteria:
  sharpe_alarm:
    threshold: "rolling-20-trade Sharpe < 0 for 10 consecutive trades per instrument"
    lookback_trades: 20
    action: "HALT shadow for breaching instrument; emit alert; user review required before resume."
    rationale: "Under H1 (monotonic-up, t > 7), rolling-20-Sharpe < 0 for 10 consecutive is > 3-sigma. Ruin-detection, not precision."

  n_fires_floor:
    min_before_kill_verdict_per_instrument: 50
    min_before_confirm_verdict_per_instrument: 200
    verdict_if_below_floor: "UNVERIFIED (NOT DEAD)"
    rationale: "feedback_oos_power_floor.md — 80% power vs IS effect size requires larger N on a single-signal test. Chan Ch 1 p.7 walk-forward discipline."

  shiryaev_roberts_alarm:
    score_function: "per Pepelyshev-Polunchenko 2015 Eq. 17-18; f0 = null rel_vol=median, f1 = alt rel_vol=Q5 IS-calibrated"
    control_limit_arl0: 1000
    alarm_action: "Emit SR alarm to trading_app/live/sr_monitor.py state; log alarm timestamp + trigger index; user review required."
    rationale: "Eq. 11 target ARL_0 ≈ 3-6 month false-alarm lead time under H_0."

  shadow_observation_window:
    min_weeks: 2
    lock: "wall-clock lock from Stage 6 go-live timestamp; no early promotion to real capital regardless of shadow performance"
    rationale: "Chan 2013 Ch 1 p.7 walk-forward discipline + Aronson forward-test discipline."

  heterogeneity_veto:
    rule: "If beta1_shadow sign flips vs IS beta1 > 0 on ANY of 3 instruments after N_fires >= 50 for that instrument, halt that instrument's shadow."
    action: "Halt breaching instrument; emit alarm; pooled claim demoted to asset-conditional (documented in post-shadow review)."
    rationale: "feedback_per_lane_breakdown_required.md + feedback_pooled_not_lane_specific.md."

  real_capital_flip_block:
    blocked_until_all_true:
      - "docs/plans/2026-02-08-phase6-live-trading-design.md § 6e monitoring & alerting delivered"
      - "Numerical DSR compute at K=3 family passes (> 0.95) — G3 remediation"
    rationale: "Two independent hard prerequisites. G7 destruction-shuffle + RNG-null remediation RETIRED on 2026-04-21 after F3 remediation run passed all 3 instruments at empirical p < 0.005."

