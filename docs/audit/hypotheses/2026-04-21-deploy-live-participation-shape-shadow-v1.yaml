lock_note: |
  Amendment — 2026-04-21 post-b081b61c (SUPERSEDES the 2026-04-21 post-F7
  MNQ-only narrowing at d88ecde7):

    The prior amendment (d88ecde7) used F7 DSR — which is an SR-based test
    on the unfiltered-baseline per-trade Sharpe — as the driver to narrow
