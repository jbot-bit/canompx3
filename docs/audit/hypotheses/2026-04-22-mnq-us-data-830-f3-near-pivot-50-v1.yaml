  signal_name: F3_NEAR_PIVOT_50
  feature_predicate: "ABS((((orb_US_DATA_830_high + orb_US_DATA_830_low)/2.0) - ((prev_day_high + prev_day_low + prev_day_close)/3.0)) / atr_20) < 0.50"
