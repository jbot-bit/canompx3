  oos_window:
    description: "HOLDOUT_SACRED_FROM <= trading_day < 2026-04-07"
    policy: "read-only; descriptive only"
  holdout_rule:
    constant_source: "trading_app.holdout_policy.HOLDOUT_SACRED_FROM"
    locked_boundary: "2026-01-01"
  tuning_against_oos: false

feature_definitions:
  - feature_name: F3_NEAR_PIVOT_50
    column_source: "derived from daily_features.prev_day_high, prev_day_low, prev_day_close, atr_20, orb_US_DATA_830_high, orb_US_DATA_830_low"
    canonical_source_of_truth: "research/prior_day_features_orb_mega.py"
    trade_time_knowable: true
    first_complete_time: "ORB end"
    temporal_alignment_note: "RULE 6.1 safe; prior-day pivot is fixed and ORB midpoint is known at ORB end."
    lookahead_check: "PASS"

calibration:
  threshold_source:
    F3_NEAR_PIVOT_50: "fixed exact threshold from the selected exploratory cell"
  lock_policy: "No parameter search inside this study. Threshold is fixed exactly as written."

upstream_discovery_provenance:
  role: PROVENANCE_ONLY
  sources:
    - "docs/audit/results/2026-04-15-prior-day-features-orb-mega-exploration.md"
  upstream_scan_k_framings:
    mega_exploration: "exploratory K_global=6252; this prereg is not that scan"
  note: |
    The mega exploration surfaced the exact cell. This prereg converts it into
    a narrow single-cell confirmation path with no widening.

testing_discipline:
  pathway: B_individual
  k: 1
  significance_threshold:
    raw_p: 0.05
    chordia_t_abs: 3.0
    effect_floor_abs_r: 0.10
  mandatory_downstream_gates_non_waivable:
    - "Criterion 8 OOS direction match and OOS magnitude review when OOS N is sufficient"
    - "Criterion 9 no era-like IS year with persistent sign failure beyond the allowed threshold"
  theory_citation: |
    `docs/institutional/mechanism_priors.md` states that pivot is where value
    traders defend. This path tests whether long breakouts near prior-day pivot
    identify the tradable subset on US_DATA_830 rather than the weak off-signal
    remainder.

hypotheses:
  - id: H01_F3_NEAR_PIVOT_50_LONG
    type: primary
    theory_citation: |
      `docs/institutional/mechanism_priors.md` section 2 and
      `docs/institutional/literature/fitschen_2013_path_of_least_resistance.md`.
    statement: |
      On MNQ US_DATA_830 O5 E2 RR1.0 long trades, rows where the ORB midpoint is
      within 0.50 ATR of prior-day pivot outperform off-signal rows on net ExpR.
      The honest role is a binary take overlay on a weak parent lane.
    pass_metric:
      metric: "delta_IS = ExpR_on_signal - ExpR_off_signal"
      formula: "compare pnl_r means on F3_NEAR_PIVOT_50=1 vs 0 within the locked lane"
      threshold_gte:
        delta_is: 0.10
        welch_t: 3.0
        n_on_is: 200
        years_positive_delta_is: 5
      threshold_lt:
        raw_p: 0.05
      extra_gate: "dir_match_oos = true when N_on_OOS >= 10"
    counted_against_trial_budget: true

trial_budget:
  primary_selection_trials: 1
  schema_locked_before_any_metric: true
  minbtl_bound:
    formula: "2*ln(N_trials)/(E[max_N]^2)"
    n_trials: 1
    expected_max_n: 1.2
    value: 0.0
    within_cap: true
    cap_reference: "docs/institutional/pre_registered_criteria.md Criterion 2"

baseline:
  descriptive_anchor:
    expr_lane_is_resolved: 0.0032
    expr_on_is_resolved: 0.0642
    expr_off_is_resolved: -0.2095
    source: "canonical query on 2026-04-22"

kill_criteria:
  - id: K1
    metric: "raw_p"
    threshold: ">= 0.05"
    action: KILL
  - id: K2
    metric: "abs(welch_t)"
    threshold: "< 3.0"
    action: KILL
  - id: K3
    metric: "delta_IS"
    threshold: "< 0.10"
    action: KILL
  - id: K4
    metric: "years_positive_delta_is"
    threshold: "< 5"
    action: KILL
  - id: K5
    metric: "dir_match_oos"
    threshold: "false when N_on_OOS >= 10"
    action: PARK
  - id: K6
    metric: "N_on_OOS"
    threshold: "< 30"
    action: PARK

decision_rule:
  continue_if: "H01 passes IS delta, p, t, and year-sign gates"
  park_if: "H01 passes IS gates but OOS remains too thin for a hard continuation decision"
  kill_if: "H01 fails any IS gate or shows an OOS sign flip once OOS N is usable"

