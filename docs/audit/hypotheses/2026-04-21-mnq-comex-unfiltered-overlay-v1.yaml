version: 1
status: LOCKED
date: 2026-04-21
slug: mnq-comex-unfiltered-overlay-v1
title: "MNQ COMEX_SETTLE unfiltered overlay family v1"
owner: codex
parent_spec: "docs/plans/2026-04-21-institutional-action-pack.md"

testing_mode: family
pathway: A_family

authority:
  primary:
    - ".claude/rules/backtesting-methodology.md"
    - ".claude/rules/research-truth-protocol.md"
    - "docs/institutional/pre_registered_criteria.md"
    - "docs/institutional/mechanism_priors.md"
    - "docs/audit/results/2026-04-21-comex-settle-orb-g5-failure-pocket-audit.md"
  notes:
    - "Mode A strict: IS uses trading_day < 2026-01-01; OOS is read-only."
    - "This prereg tests where current COMEX edge may live on the unfiltered lane. It is not an ORB_G5 rescue."
    - "All evaluation is scratch-inclusive: scratch rows are counted with pnl_eff=0.0."

reproducibility:
  repo_root: "C:/Users/joshd/canompx3"
  commit_sha: "aef697d4"
  committed_required_before_run: true

scope:
  instrument: MNQ
  lane_id: "MNQ_COMEX_SETTLE_E2_RR1.5_CB1_UNFILTERED"
  session: COMEX_SETTLE
  orb_minutes: 5
  entry_model: E2
  confirm_bars: 1
  rr_target: 1.5
  baseline_filter: none
  directions: pooled
  features_in_scope:
    - rel_vol_COMEX_SETTLE
    - overnight_range_pct
  features_explicitly_out_of_scope:
    - orb_COMEX_SETTLE_break_ts
    - orb_COMEX_SETTLE_break_delay_min
    - orb_COMEX_SETTLE_break_bar_continues
    - orb_COMEX_SETTLE_break_bar_volume
    - orb_COMEX_SETTLE_break_dir
    - ORB_G5 selector value as a tested predictor
    - pooled ML / meta-labeling / black-box ranking
    - any sizing policy or allocator change

data_policy:
  is_window:
    description: "trading_day < HOLDOUT_SACRED_FROM"
    constant_source: "trading_app.holdout_policy.HOLDOUT_SACRED_FROM"
    locked_boundary: "2026-01-01"
  oos_window:
    description: "trading_day >= HOLDOUT_SACRED_FROM"
    policy: "read-only; descriptive only"
  holdout_rule:
    constant_source: "trading_app.holdout_policy.HOLDOUT_SACRED_FROM"
    locked_boundary: "2026-01-01"
  tuning_against_oos: false

feature_definitions:
  - feature_name: rel_vol_HIGH_Q3
    column_source: "daily_features.rel_vol_COMEX_SETTLE"
    canonical_source_of_truth: "pipeline/build_daily_features.py -> rel_vol_{session}"
    trade_time_knowable: true
    first_complete_time: "ORB end"
    temporal_alignment_note: "RULE 6.1 safe ORB-end feature"
    lookahead_check: "PASS if P67 threshold is computed on IS rows only"
  - feature_name: overnight_range_pct_HIGH_Q3
    column_source: "daily_features.overnight_range_pct"
    canonical_source_of_truth: "pipeline/build_daily_features.py -> overnight_range_pct"
    trade_time_knowable: true
    first_complete_time: "17:00 Brisbane; COMEX_SETTLE occurs after this window closes"
    temporal_alignment_note: "RULE 1.2 gated feature valid for COMEX_SETTLE"
    lookahead_check: "PASS if P67 threshold is computed on IS rows only"

calibration:
  quantile_source:
    rel_vol_HIGH_Q3: "IS-only 67th percentile on the exact unfiltered COMEX lane universe"
    overnight_range_pct_HIGH_Q3: "IS-only 67th percentile on the exact unfiltered COMEX lane universe"
  lock_policy: |
    Quantile thresholds are computed once from IS rows, frozen, and then applied
    unchanged to IS and OOS. No threshold changes after first metric inspection.

upstream_discovery_provenance:
  role: PROVENANCE_ONLY
  sources:
    - "docs/audit/results/2026-04-21-comex-settle-orb-g5-failure-pocket-audit.md"
  upstream_scan_k_framings:
    comex_failure_pocket_audit: "confirmatory audit, not current family K"
  note: |
    The upstream audit motivates this prereg by showing that current COMEX edge
    likely lives in the lane, not the stale ORB_G5 split. Those statistics are
    provenance only, not the K accounting for this prereg.

baseline:
  lane_truth:
    pre_holdout_all_entries: 1658
    late_2021_2025_expr_scratch0: 0.1117
    source: "docs/audit/results/2026-04-21-comex-settle-orb-g5-failure-pocket-audit.md"
  baseline_metric:
    description: "scratch-inclusive unfiltered lane ExpR"
    formula: "mean(pnl_eff) where pnl_eff = 0.0 on scratch else pnl_r"

primary_schema:
  k_family: 2
  k_global: 2
  k_lane: 2
  k_session: 2
  k_instrument: 2
  primary_promotion_gate: "BH-FDR q < 0.05 at K_family=2 plus positive-mean floor and dir_match"
  family_cells_structured_as: "2 hypotheses × 1 lane universe"

hypotheses:
  - id: H01_RELVOL_HIGH_Q3
    type: primary
    theory_citation: |
      `docs/institutional/literature/chan_2013_ch7_intraday_momentum.md`
      grounds stop-cascade continuation. `docs/institutional/mechanism_priors.md`
      frames higher participation as stronger continuation fuel for ORB.
    statement: |
      On the unfiltered MNQ COMEX_SETTLE O5 E2 RR1.5 lane, IS rows with
      rel_vol_COMEX_SETTLE above the IS-only 67th percentile outperform off-signal
      rows on scratch-inclusive ExpR.
    pass_metric:
      metric: "delta_IS = ExpR_on_signal - ExpR_off_signal"
      formula: "compare pnl_eff means on rel_vol_HIGH_Q3 vs off-signal rows"
      threshold_gte:
        delta_is: 0.05
        expr_on_is: 0.00
        years_positive_is: 4
      threshold_lt:
        raw_p: 0.05
      extra_gate: "dir_match_oos = true when N_on_OOS >= 5"
    counted_against_trial_budget: true

  - id: H02_OVERNIGHT_RANGE_HIGH_Q3
    type: primary
    theory_citation: |
      `docs/institutional/literature/fitschen_2013_path_of_least_resistance.md`
      grounds intraday trend-follow on equity indices. `docs/institutional/mechanism_priors.md`
      treats displacement / trapped-side pressure as a breakout-quality prior.
    statement: |
      On the unfiltered MNQ COMEX_SETTLE O5 E2 RR1.5 lane, IS rows with
      overnight_range_pct above the IS-only 67th percentile outperform off-signal
      rows on scratch-inclusive ExpR.
    pass_metric:
      metric: "delta_IS = ExpR_on_signal - ExpR_off_signal"
      formula: "compare pnl_eff means on overnight_range_pct_HIGH_Q3 vs off-signal rows"
      threshold_gte:
        delta_is: 0.05
        expr_on_is: 0.00
        years_positive_is: 4
      threshold_lt:
        raw_p: 0.05
      extra_gate: "dir_match_oos = true when N_on_OOS >= 5"
    counted_against_trial_budget: true

trial_budget:
  primary_selection_trials: 2
  schema_locked_before_any_metric: true
  minbtl_bound:
    formula: "2*ln(N_trials)/(E[max_N]^2)"
    n_trials: 2
    expected_max_n: 1.2
    value: 0.96
    within_cap: true
    cap_reference: "docs/institutional/pre_registered_criteria.md Criterion 2"

kill_criteria:
  - id: K1
    metric: "family survivors"
    threshold: "zero hypotheses pass BH-FDR at K=2 plus positive-mean floor"
    action: KILL
  - id: K2
    metric: "dir_match_oos"
    threshold: "false for any apparent IS survivor with N_on_OOS >= 5"
    action: PARK
  - id: K3
    metric: "N_on_IS"
    threshold: "< 100 on any candidate survivor"
    action: KILL

decision_rule:
  continue_if: ">=1 hypothesis survives K_family=2 with delta_IS >= 0.05, expr_on_is > 0, years_positive_is >= 4, and no OOS sign flip"
  park_if: "IS signal exists but OOS remains thin (N_on_OOS < 5) or directional-only"
  kill_if: "zero family survivors or any survivor fails positive-mean / sample / direction gates"

methodology_rules_applied:
  - rule: "RULE 2 filter application timing"
    application: "Study is on the unfiltered lane only; no post-hoc subset rescue."
  - rule: "RULE 3 sacred holdout"
    application: "Thresholds frozen on IS only; OOS descriptive only."
  - rule: "RULE 4 multiple testing"
    application: "Current family K is exactly 2."
  - rule: "RULE 6 trade-time knowability"
    application: "Only ORB-end or pre-session-complete features are admitted."
  - rule: "RULE 7 tautology"
    application: "No ORB_G5-derived predicate is tested."

outputs_required_after_run:
  - "result markdown at docs/audit/results/2026-04-21-mnq-comex-unfiltered-overlay-v1.md"
  - "row-level CSV with pnl_eff, signal fires, IS/OOS split, and yearly breakdown"
  - "BH-FDR table at K=2 with raw p and q values"
  - "scratch-inclusive and resolved-only comparison table"

execution_gate:
  allowed_now: true
  forbidden_now:
    - "any ORB_G5 selector rewrite"
    - "any OOS-based threshold choice"
    - "any R3 sizing policy layered into this run"

not_done_by_this_pre_reg:
  - "Does not promote a live filter."
  - "Does not test sizing or allocator roles."
  - "Does not claim universality across sessions or instruments."
