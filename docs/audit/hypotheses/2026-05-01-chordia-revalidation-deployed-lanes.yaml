# ---------------------------------------------------------------------------
# AUDIT CORRECTION 2026-05-01 (post-design-lock, pre-doctrine-action)
# ---------------------------------------------------------------------------
# This block was added AFTER the runner executed and the result-doc was drafted,
# in response to user-requested grounding audit. It DOES NOT change the
# numerical t-statistics produced by the runner (those are statistical facts
# from canonical orb_outcomes IS data) but it DOES change the lane-level
# has_theory flags and therefore the verdict gate threshold per lane.
#
# What was wrong with the original lock:
# - All 4 H1-H4 hypotheses below declare has_theory=true citing "Fitschen
#   Ch 5-7" plus various Chan citations. On direct PDF extraction:
#     * Fitschen Ch 5 (pp.65-87) covers EXITS, not session mechanisms.
#     * Fitschen Ch 6 (pp.89-105) covers FILTERS but the four-class taxonomy
#       (day-of-week, seasonal, volatility, longer-term-trend) does not include
#       session-specific institutional-flow narratives. Volatility filters in
#       Ch 6 test positive in the SKIP-HIGH-VOL polarity (Table 6.15
#       gain-to-pain 1.23 -> 2.11), which is OPPOSITE to the SKIP-LOW-VOL
#       polarity that ORB_G{N} filters use. Class-grounded but not
#       mechanism-polarity-grounded.
#     * Fitschen Ch 7 (pp.107-117) is by title position-sizing methodology.
#     * Chan 2009 Ch 1 §1.4 does not exist (already audited as phantom in
#       chan_2009_ch1_intraday_session_handling.md, 2026-04-27).
#     * Chan 2013 Ch 7 grounds equity-index intraday momentum + stop-cascade
#       breakout mechanism (legitimate) but does not cover COST_LT{N} cost
#       filters or session-specific narratives.
# - Honest restatement: no lane has mechanism-specific Pathway-A theory
#   grounding for its full (entry + filter) configuration.
# - Conservative default per institutional-rigor.md Rule 7: has_theory=False
#   for all 4 lanes; threshold tightens to 3.79 (CHORDIA_STRICT).
# - Steel-man for H3 NYSE_OPEN: Chan Ch 7 IS legitimate equity-index intraday
#   momentum grounding for the entry mechanism; the COST_LT12 filter overlay
#   isn't grounded but doesn't reverse the entry. Defensible to read H3 as
#   has_theory=True for entry / N/A for filter overlay. Rejected as the
#   verdict-gate basis because the LANE as a configured whole is what's
#   gated, not the entry mechanism alone.
#
# Cascading runner change: research/chordia_revalidation_deployed_2026_05_01.py
# now uses trading_app.chordia.chordia_threshold(has_theory) instead of
# hardcoded CHORDIA_T_WITH_THEORY. This was a runner bug surfaced by the
# audit (the runner had been ignoring the per-lane has_theory flag).
#
# Updated verdicts after honest grounding flags + canonical threshold helper:
#   H1 EUROPE_FLOW + ORB_G5  : t=2.276, threshold=3.79 -> FAIL_BOTH
#   H2 COMEX_SETTLE + ORB_G5 : t=3.276, threshold=3.79 -> FAIL_BOTH
#   H3 NYSE_OPEN + COST_LT12 : t=3.412, threshold=3.79 -> FAIL_BOTH
#   H4 TOKYO_OPEN + COST_LT12: t=3.268, threshold=3.79 -> FAIL_BOTH
# Summary: 4 FAIL_BOTH / 0 PASS. Portfolio-wide failure of the defensive
# Chordia honesty gate.
#
# References for this audit correction:
# - docs/runtime/chordia-revalidation-honest-grounding-design-2026-05-01.md
# - docs/institutional/literature/fitschen_2013_path_of_least_resistance.md
#   (upgraded extract with Ch 5/6/7 audit content)
# - docs/institutional/literature/chan_2009_ch1_intraday_session_handling.md
#   (precedent phantom-citation audit)
# ---------------------------------------------------------------------------
audit_correction_2026_05_01:
  trigger: user-requested grounding audit
  iterations:
    v1_initial: all 4 has_theory=true (per pre-reg lock); verdicts 1 FAIL / 3 PASS_PROTOCOL_A / 0 PASS_CHORDIA
    v2_post_fitschen_pdf: all 4 has_theory=false (Fitschen Ch 5-7 phantom confirmed); verdicts 4 FAIL_BOTH
