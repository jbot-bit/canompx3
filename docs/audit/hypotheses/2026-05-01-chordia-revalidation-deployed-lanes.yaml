# lanes only; the 5th (MGC_TOKYO_OPEN_E2_RR2.0_CB1_ORB_G4_CONT_S075) is not
# in the live allocator and was NOT pre-regged here. Volatile-data rule
# applied: lane set queried live, never cited from memory.

hypotheses:
  - id: H1
    lane: MNQ_EUROPE_FLOW_E2_RR1.5_CB1_ORB_G5
    instrument: MNQ
    session: EUROPE_FLOW
    orb_minutes: 5
    entry_model: E2
    confirm_bars: 1
    rr_target: 1.5
    filter_type: ORB_G5
    economic_theory: |
      Fitschen Ch 5-7 — institutional-flow concentration on European morning
      ORB; ORB_G5 captures min-size-pts gate that filters compression-day
      false breaks. Mechanism: liquidity-driven momentum on session opens
      with size-confirmed ranges.
    economic_theory_citation: docs/institutional/literature/fitschen_2013_path_of_least_resistance.md
    has_theory: true                    # → Criterion 4 threshold = 3.00
    null_hypothesis: mean per-trade R = 0
    test_statistic: t = sharpe_ratio * sqrt(N)
    expected_N_IS: ~210                 # trailing_n=264 includes 2026 OOS; IS subset ~80%
    kill_criteria:
