# ---------------------------------------------------------------------------
# Why this pre-reg exists (the honest framing)
# ---------------------------------------------------------------------------
context: |
  4 lanes are currently DEPLOY in lane_allocation.json (signal-only against
  topstep 20092334). They were validated under a mix of Pathway A BH-FDR and
  Amendment 2.7 grandfathering as research-provisional. This pre-reg asks
  the most basic honesty question per Criterion 4:

      What is each deployed lane's Chordia t-statistic (per-trade Sharpe x
      sqrt(N)) on its IS slice (trading_day < 2026-01-01), and where does
      it land vs the locked thresholds?

  The pre-reg is purposely defensive. It does NOT discover new edge. It
  audits whether the deployed portfolio is statistically defensible before
  any new offensive work (Fitschen O15/O30, Carver Stage-2 sizing,
  GARCH cross-session companion) is done on top of it. Without this gate,
  offensive work risks compounding noise.

