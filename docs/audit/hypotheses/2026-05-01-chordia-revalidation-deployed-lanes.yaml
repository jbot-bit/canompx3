# ---------------------------------------------------------------------------
# Methodology
# ---------------------------------------------------------------------------
data_sources:
  bars: bars_1m                         # canonical layer per Rule 9
  daily_features: daily_features        # triple-join (trading_day, symbol, orb_minutes) per .claude/rules/daily-features-joins.md
  outcomes: orb_outcomes                # canonical
banned_data_sources:
  - validated_setups                    # derived; banned for truth-finding
  - edge_families                       # derived
  - live_config                         # derived
filter_application: |
  Apply each lane's deployed filter via
  trading_app.config.StrategyFilter.matches_row() — never re-encode.
  StrategyFilter resolves ORB_G5, COST_LT12, etc. from canonical config.
holdout_discipline: |
  IS-only: trading_day < pipeline.holdout_policy.HOLDOUT_SACRED_FROM (2026-01-01).
  No 2026 data in scope.
  Sharpe + N computed on IS slice; t = sharpe * sqrt(N) via
  trading_app.chordia.compute_chordia_t.
multiple_testing: |
  Pathway B individual hypothesis testing (Criterion 3, Amendment 3.0).
  K_budget = 4; one hypothesis per lane. Per-lane verdicts only.
  NO POOLED HEADLINE per .claude/rules/pooled-finding-rule.md —
  the result doc will report 4 separate verdicts and explicitly state
  "pooled_finding: false" in front-matter.
power_analysis: |
  N >= 100 expected on every lane (trailing_n on each is 236-264 with
  ~80% IS subset). MinBTL bound (Bailey 2013): K=4 trials at expected
  per-lane Sharpe ~0.18-0.30 → MinBTL well within budget.

# ---------------------------------------------------------------------------
# Result-doc requirements (what the runner output MUST contain)
# ---------------------------------------------------------------------------
result_doc_requirements:
  path: docs/audit/results/2026-05-01-chordia-revalidation-deployed-lanes.md
  frontmatter:
    pooled_finding: false               # explicitly false; per-lane only
  required_sections:
    - "Per-lane verdict table — one row per H1..H4 with: t, p (two-sided),
       BHY-haircut t (Harvey-Liu), N_IS, IS Sharpe, verdict (FAIL_BOTH /
       PASS_PROTOCOL_A / PASS_CHORDIA), and provenance link to runner."
    - "Doctrine action — for each FAIL_BOTH lane, declare downgrade to
       research-provisional + signal-only per Amendment 2.7. Live OOS
       accrual continues; no real-money exposure change. Allocator code
       NOT touched in this session — doctrine-only ledger entry."
    - "What this gate does NOT do — does NOT promote new lanes, does NOT
       relax thresholds, does NOT pool. Per-lane only."

# ---------------------------------------------------------------------------
# Runner spec (deferred to next session unless user GO sooner)
# ---------------------------------------------------------------------------
runner_spec:
  path: research/chordia_revalidation_deployed_2026_05_01.py
  inputs: gold.db (read-only via DUCKDB_PATH env var; NEVER hardcode)
  outputs:
    - stdout: per-lane verdict table
    - file: result_doc_requirements.path
  delegations_mandatory:
    - "trading_app.chordia.compute_chordia_t — never re-derive sqrt(N) math"
    - "trading_app.config.StrategyFilter.matches_row — never re-encode filter logic"
    - "pipeline.holdout_policy.HOLDOUT_SACRED_FROM — never inline date(2026,1,1)"
    - "pipeline.paths.GOLD_DB_PATH — never hardcode db path"
    - "pipeline.cost_model.COST_SPECS — already inside per-trade R if outcomes
       carry net pnl_r; verify cost_model column choice before computing"
  estimate_runtime: <60 seconds (4 lanes, each ~1500 candidate days, IS-only)

# ---------------------------------------------------------------------------
# Failure policy (locked 2026-05-01 by user)
# ---------------------------------------------------------------------------
failure_policy:
  on_FAIL_BOTH: |
    Lane downgrades to research-provisional + signal-only per Amendment 2.7.
    Lane stays in allocator; live OOS accrual continues; NO real-money exposure
    change until clean re-derivation lands. Result doc gets a "Doctrine Action"
    section enumerating the downgrades. An allocator_lane_status doctrine note
    (not a code change) records the provisional flag. Allocator-code edits
    requested only if user gives a separate GO after seeing the numbers.
  on_PASS_PROTOCOL_A: lane retained as deployed; no action.
  on_PASS_CHORDIA: lane retained as deployed; flag for inclusion in Carver Stage-2 sizing pre-reg.

# ---------------------------------------------------------------------------
# Cross-pre-reg dependencies (gates downstream offensive work)
# ---------------------------------------------------------------------------
gates_for:
  - 2026-05-01-carver-stage2-vol-targeted-sizing.yaml  # only sizes lanes that PASS
  - 2026-05-01-mnq-garch-p70-cross-session-companion.yaml  # informs whether D6's home lane is a viable carrier

# ---------------------------------------------------------------------------
# Anti-pigeon-hole disclosure
# ---------------------------------------------------------------------------
why_this_is_in_the_session: |
  This pre-reg is defensive — it does not produce HQ trades on its own.
  It exists because the user's session goal is "no money on the table"
  and "banger trades", which require knowing the existing portfolio is
  not noise before adding new edge. If 3+ of 4 lanes return FAIL_BOTH,
  Carver Stage-2 sizing pre-reg becomes moot (cannot size-up failing
  lanes), and Fitschen O15/O30 + GARCH cross-session become the only
  HQ-trade plays. The re-rank is explicit; pigeon-holing would be
  letting Chordia outcome quietly inform later decisions without
  re-prioritising.
