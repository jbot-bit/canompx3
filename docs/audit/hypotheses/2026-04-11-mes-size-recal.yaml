# Hypothesis Registry — MES Recalibrated Size Gate (G8)
#
# Locked:        2026-04-11T01:00:00+10:00
# Author:        Claude Code session (wave 4 lit-grounded discovery)
# Holdout mode:  A (2026-01-01 sacred)
# Data horizon:  6.65 calendar years (MES real micro 2019-05-06 to 2025-12-31)
# Testing mode:  family (Pathway A, BH FDR at K=24)
#
# AUDIT NOTE: ORB_G8 requires orb_height >= 8 ticks.
# G5 on MES passes 85% NYSE_OPEN — effectively unfiltered.
# G8 passes 53% NYSE_OPEN, 22% CME_PRECLOSE — meaningful selectivity.
# G8 is the economically meaningful size gate for MES given its tick value.

metadata:
  name: "mes-size-recal"
  purpose: |
    Test whether recalibrated size gate (G8 instead of G5) improves MES
    ORB breakout edge. G5 on MES passes 85% NYSE_OPEN, effectively
    unfiltered. G8 provides genuine selectivity (53% NYSE_OPEN, 22%
    CME_PRECLOSE) and requires meaningful ORB size relative to MES tick value.
  date_locked: "2026-04-11T01:00:00+10:00"
  holdout_date: "2026-01-01"
  data_horizon_years_clean: 6.65
  data_source: "real CME Micro E-mini S&P 500 futures 2019-05-06 onwards"
  testing_mode: "family"
  bailey_compliance:
    trials: 24
    horizon_years: 6.65
    e_max_n: 1.0
    min_btl_required_years: 6.36
    headroom_pct: 4.4
    status: "PASS"
  total_expected_trials: 24

hypotheses:
  - id: 1
    name: "MES TOKYO_OPEN ORB_G8 RR1.0"
    theory_citation: "Chan (2009) Quantitative Trading ch.1-2; Crabel (1990) opening range theory"
    economic_basis: |
      G5 on MES passes 85% of NYSE_OPEN days — effectively unfiltered.
      G8 provides genuine selectivity by requiring meaningful ORB size
      relative to MES tick value ($1.25/pt). Larger ORBs have better
      signal-to-noise and can absorb friction more effectively.
    filter:
      type: ORB_G8
      column: orb_height
      thresholds: [8]
    scope:
      instruments: [MES]
      sessions: [TOKYO_OPEN]
      rr_targets: [1.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "BH FDR q=0.05 fails at K=24"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0"
      - "Any era with N >= 50 and ExpR < -0.05"

