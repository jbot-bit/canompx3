hypotheses:
  - id: 1
    name: "London gold pricing at LONDON_METALS"
    theory_citation: "Lucey & Zhao (2008); Baur & Lucey (2010) Financial Review"
    economic_basis: |
      London is THE global gold pricing center. The LBMA Gold Price is set
      during London hours. Physical gold demand (central banks, jewelry,
      ETF custodians, bullion banks) meets CME futures at this session.
      Under Crabel's commitment hypothesis applied to gold, breakouts of
      the London-session opening range continue because the committed
      physical-meets-futures flow defends direction. G5 filters for
      meaningful commitment ($50 per MGC contract).
    filter:
      type: ORB_G5
      column: orb_size_points
    scope:
      instruments: [MGC]
      sessions: [LONDON_METALS]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "BH FDR q=0.05 fails on the pre-registered 5-hypothesis family"
      - "Chordia t-statistic < 3.00"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0 OR < 0.40 x IS ExpR"
      - "Any era with N >= 50 and ExpR < -0.05"
      - "IS Sharpe < 0.95 annualized (Bailey noise floor at N=5 on 3.55yr)"

  - id: 2
    name: "Macro real-rate channel at US_DATA_830"
    theory_citation: "Andersen et al (2003) AER; Baur & Lucey (2010)"
    economic_basis: |
      Gold is a macro-sensitive asset. US data releases (NFP, CPI, PPI)
      affect gold via the USD/real-rate channel: higher-than-expected
      inflation -> lower real rates -> gold up (and vice versa). Per
      Andersen et al, the 08:30 ET release concentrates multi-day macro
      news into seconds. G8 (not G5) per TRADING_RULES deep dive: MGC
      US_DATA_830 is "G12+ or DEAD" — G5 includes structurally noisy
      trades. G8 is the minimum viable threshold.
    filter:
      type: ORB_G8
      column: orb_size_points
    scope:
      instruments: [MGC]
      sessions: [US_DATA_830]
      rr_targets: [2.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
