      - "IS Sharpe < 0.95 annualized"

  - id: 4
    name: "COMEX settlement mandatory flow"
    theory_citation: "O'Hara (1995) Market Microstructure Theory"
    economic_basis: |
      COMEX is the primary US gold futures exchange. Settlement
      concentrates mandatory flow from gold producers hedging forward
      production, central bank reserve managers, ETF authorized
      participants, and commodity trading advisors. Under O'Hara's
      microstructure framework, this forced flow creates directional
      imbalance that breakout entry captures.
    filter:
      type: ORB_G5
      column: orb_size_points
    scope:
      instruments: [MGC]
      sessions: [COMEX_SETTLE]
      rr_targets: [2.0]
