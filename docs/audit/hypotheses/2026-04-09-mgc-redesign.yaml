      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0 OR < 0.40 x IS ExpR"
      - "Any era with N >= 50 and ExpR < -0.05"
      - "IS Sharpe < 0.95 annualized"

  - id: 5
    name: "CME reopen overnight information"
    theory_citation: "Ito, Engle, Lin (1992) JIE"
    economic_basis: |
      CME Globex reopens after the daily maintenance break. Overnight
      gap + first-session positioning reveals accumulated overnight
      information. Under Ito-Engle-Lin's meteor shower framework,
      non-US-session information persists in volatility and carries
      directional implications into the reopen. G5 filters for
      meaningful overnight accumulation.
