      - "Chordia t-statistic < 3.00"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0 OR < 0.40 x IS ExpR"
      - "Any era with N >= 50 and ExpR < -0.05"
      - "IS Sharpe < 0.95 annualized"

  - id: 3
    name: "US equity cross-asset flow at NYSE_OPEN"
    theory_citation: "Capie, Mills, Wood (2005) JIMFIM"
    economic_basis: |
      Gold trades actively during US equity hours. NYSE_OPEN captures
      peak US-session gold volume when equity/gold cross-asset flows
      are highest: equity desks hedge with gold, risk-parity rebalances,
      macro-overlay adjustments. Per Capie-Mills-Wood, gold moves
      inversely with USD during US hours. G5 filters for meaningful
      cross-asset commitment.
    filter:
      type: ORB_G5
      column: orb_size_points
    scope:
      instruments: [MGC]
      sessions: [NYSE_OPEN]
      rr_targets: [2.0]
      entry_models: [E2]
