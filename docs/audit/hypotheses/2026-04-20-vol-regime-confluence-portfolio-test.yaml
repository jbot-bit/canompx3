# ---- Hypothesis set ----
hypotheses:
  - id: 1
    name: "Portfolio-general vol-regime confluence conditioner on MNQ live book"
    theory_citation: |
      Canonical citations via docs/institutional/literature/:

      1. Fitschen (2013) Ch 3 — intraday trend-follow in commodity and stock-index
         futures. Grounds the ORB-continuation premise. High-vol regimes produce
         wider intraday range, facilitating follow-through beyond the
         order-flow imbalance at breakout.
         File: docs/institutional/literature/fitschen_2013_ch3.md (if exists)
         or resources/systematic_trading/fitschen_Ch3.pdf.

      2. Carver (2015) Ch 9-10 — Systematic Trading. Volatility targeting and
         forecast combination. Grounds vol-regime-conditional sizing/entry as
         risk-scaled behavior: exposure is a function of volatility state, not
         a constant.
         File: docs/institutional/literature/carver_2015_ch9_10.md (if exists).

      3. Bailey, Borwein, López de Prado, Zhu (2013) § Proposition 2 —
         compensation effect under distributional shift. Sub-sample ExpR on a
         non-stationary distribution diverges from full-sample ExpR; testing
         whether the "high-vol sub-sample" carries concentrated edge is a
         distributional-partition question, not a discovery question.
         File: docs/institutional/literature/bailey_et_al_2013_pseudo_mathematics.md.

      4. Harvey & Liu (2015) p.16 — BHY dependence-aware FDR. Cells share the
         underlying pnl_r stream (within a lane) so K-framing must respect
         dependence: BH-FDR at K=14 (the primary family), K=variant-level
         K=3 per lane, and K=variant=7 for cross-lane-same-variant.
         File: docs/institutional/literature/harvey_liu_2015_backtesting.md.

      5. Chordia et al (2018) — Two Million Trading Strategies. Chordia-strict
         t >= 3.00 applies here (theory IS specified: Carver + Fitschen above),
         not t >= 3.79.

    economic_basis: |
      The hypothesis is NOT that overnight_range >= 100 or mes_atr_20_pct >= 60
      are new filters. They are already registered in trading_app.config.ALL_FILTERS
      and are already components of 4 research-provisional MNQ COMEX_SETTLE
      validated_setups rows promoted 2026-04-11.

      The hypothesis IS that vol-regime state — detected via either the local-
      MNQ overnight range or the cross-asset sustained-vol (MES ATR top 40%) —
      is a UNIVERSAL conditioner that raises marginal per-trade ExpR on every
      lane currently deployed on MNQ, not just COMEX_SETTLE.

      Mechanism candidate: when vol is expanding, ORB breakouts have more room
      to run before reverting (Fitschen Ch 3 premise). When vol is contracting,
      intraday range is tighter and breakouts revert faster. This should
      generalize across sessions IF the mechanism is vol-regime and not session-
      specific microstructure.

      Competing null (must be refuted by the scan): the COMEX_SETTLE-observed
      confluence effect is microstructural to that session's timing (post-
      COMEX-settlement flow) and does NOT appear on EUROPE_FLOW, NYSE_OPEN,
      SINGAPORE_OPEN, TOKYO_OPEN, US_DATA_1000.

    expected_trial_count: 17

    # BH-FDR multi-framing (RULE 4)
    multi_framing:
      K_primary: 17           # the full family of cells
      K_lane:
        EUROPE_FLOW:        3
        COMEX_SETTLE:       4   # adds london_range_only variant
        NYSE_OPEN:          4   # adds london_range_only variant
        US_DATA_1000:       4   # adds london_range_only variant
        SINGAPORE_OPEN:     1
        TOKYO_OPEN:         1
      K_variant:
        ovn_only:           4  # 4 OVN-valid lanes
        xmes_only:          6  # all 6 lanes
        ovn_or_xmes:        4  # 4 OVN-valid lanes
        london_range_only:  3  # 3 post-London-close lanes
      reporting_rule: "Primary accept at K=17 BH-FDR. Secondary per-variant at K=3,4,6. Per-lane at K=1-4 for provenance only."

    # Pass gates (each cell, per pre_registered_criteria.md)
    cell_pass_gates:
      - "T0 tautology: |corr(variant_fire_mask, base_filter_fire_mask)| < 0.70 per RULE 7"
      - "Fire-rate band: 5% <= fire_rate <= 95% per RULE 8.1"
      - "Arithmetic-only: NOT (|wr_spread| < 3% AND |delta_IS| > 0.10) per RULE 8.2"
      - "Chordia: |t| >= 3.00 on IS ExpR vs zero"
      - "BH-FDR primary: survives BH q < 0.05 at K=14"
      - "Dir match: sign(OOS ExpR) == sign(IS ExpR) per RULE 3.1"
      - "C8 OOS ratio: OOS_ExpR >= 0.40 × IS_ExpR per pre_registered_criteria.md § 8"
      - "Era stability: no era with N >= 50 has ExpR < -0.05 per Criterion 9"
      - "T4 sensitivity: ±20% on OVN threshold {80,100,120} and MES ATR threshold {54,60,66} — sign must not flip"
      - "T6 null floor: block bootstrap p < 0.05 (moving block, preserve autocorr, mask fixed)"

    # Verdict mapping (PRE-COMMITTED — no post-hoc relaxation)
    verdict_decision_tree:
      portfolio_general:
        trigger: "4 or more of 6 lanes have at least 1 variant passing ALL cell_pass_gates"
        implication: "Vol-regime confluence is a BOOK-WIDE conditioner. Phase 5 pre-reg should propose allocator-level vol-regime size-multiplier or admission-gate, NOT lane-specific filters."
      coexists_both:
        trigger: "2 or 3 of 6 lanes have passing variants"
        implication: "Effect is lane-dependent. Phase 5 pre-reg queues per-lane filter candidates on the passing lanes; does NOT claim portfolio-wide mechanism."
      comex_settle_specific:
        trigger: "Only COMEX_SETTLE has passing variants"
        implication: "Effect is session-specific microstructure. Prior exploratory overlap-decomposition was correct arithmetic but wrong framing. Phase 5 queues one COMEX_SETTLE confluence candidate; no broader claim admissible."
      dead:
        trigger: "Zero lanes have passing variants"
        implication: "Confluence effect does NOT generalize. Prior exploratory finding was post-hoc noise. Phase 5 does not carry forward any vol-regime variant. Close the question."

    # Kill criteria (beyond verdict tree — these kill the SCAN not just the hypothesis)
    scan_kill_criteria:
      - "If any cell shows |t| > 10 on IS without theory-matching magnitude: HALT, investigate look-ahead or pipeline bug per RULE 1.4 smell test"
      - "If the pressure-test (Stage L, injecting shuffled mask) does NOT produce p >= 0.5: HALT, null bootstrap implementation is broken"
      - "If independent SQL verification (Stage K) diverges from filter_signal path by more than 0.5% on any cell N: HALT, filter-delegation drift per 2026-04-19 incident"

# ---- Provenance-only (NOT part of primary K) ----
provenance_only:
  ovn_p75_reframe:
    description: |
      Substitute rolling-252-day percentile (OVN_P75) for the absolute
      OVNRNG_100 threshold on survivor cells. This directly addresses the
      non-stationarity problem (OVN fire rate 4%→58% across 2019-2025 years).
      If OVN_P75 variant preserves the edge at stable fire rate, the
      portfolio-general hypothesis gets stronger claim; if it collapses,
      the effect was partially a distribution-drift artifact.
    k_framing: "provenance only — not part of primary K=14"
    trials_extra: 0  # re-uses same pnl_r stream, just swaps filter threshold

  exclude_2019_sensitivity:
    description: |
      Re-run the scan with IS restricted to 2020-01-01 through 2025-12-31
      (excluding 2019 thin-micro drag year per Amendment 2.8 liquidity note).
      Confluence effect should persist; if it collapses, 2019 drag was the
      dominant driver and the finding is weaker than the 7-year arithmetic
      suggests.
    k_framing: "provenance only"

