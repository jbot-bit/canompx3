# Hypothesis Registry — 2026-04-20 vol-regime-confluence-portfolio-test
#
# Locked: 2026-04-20T16:00:00+10:00
# Author: Claude (institutional researcher, autonomous session)
# Committing commit hash: (filled in by pre-commit hook)
# Data horizon: 6.65yr clean MNQ/MES (2019-05-06 through 2025-12-31)
# Intended discovery holdout: 2026-01-01 (Mode A sacred)
# OOS accumulating window: 2026-01-02 through 2026-04-16 (69 trading days)
# Predecessor:
#   - docs/audit/results/2026-04-20-phase-2-9-framing-audit.md (framing audit, COMEX_SETTLE only)
#   - Exploratory overlap-decomposition on MNQ_COMEX_SETTLE_E2_RR1.5_CB1_ORB_G5 dated 2026-04-20 afternoon
#     (post-Phase-2.9-framing self-critique surfaced the "post-hoc, single-lane" weakness of the
#     exploratory finding; THIS pre-reg is the portfolio-general re-test that resolves that weakness)

metadata:
  name: "vol-regime-confluence-portfolio-test"
  purpose: |
    Determine whether the observed vol-regime confluence effect
    (F_lane ∧ OVNRNG_100) and (F_lane ∧ X_MES_ATR60) — where F_lane is the
    lane's currently-deployed filter — is a PORTFOLIO-GENERAL conditioner on
    the MNQ live book, or a COMEX_SETTLE-SPECIFIC artifact. Four lanes are
    tested for full 3-variant confluence; two lanes are limited to the
    cross-asset MES ATR variant due to RULE 1.2 temporal-alignment gate
    (overnight_range is a 09:00-17:00 Brisbane feature; SINGAPORE_OPEN at
    11:00 and TOKYO_OPEN at 10:00 start DURING that window — look-ahead).

    This pre-reg is a hypothesis test on ALREADY-PROMOTED lane edge shape,
    NOT a broader discovery. No new filter is being discovered here; we are
    asking whether two existing canonical filters (OVNRNG_100, X_MES_ATR60)
    add marginal information to each deployed lane's existing filter.

    Decision outcome target: route Phase 5 (clean Mode A rediscovery of
    active families) properly. If the confluence effect is portfolio-
    general, Phase 5 must pre-reg an allocator-level vol-regime
    conditioner. If it is COMEX_SETTLE-specific, Phase 5 queues one
    lane-local pre-reg alongside the existing 6 family rediscoveries.

  date_locked: "2026-04-20T16:00:00+10:00"
  holdout_date: "2026-01-01"
  oos_window_end: "2026-04-16"
  oos_days_available: 69
  data_horizon_years_clean: 6.65
  data_horizon_years_proxy: 0.0  # MNQ/MES 2019+ is real-micro, no proxy
  data_source_mode: "clean"
  testing_mode: "family"  # Pathway A — BH-FDR across the 17-cell family
  pathway: "A"
  scope: "post_promotion_portfolio_generalization"
  total_expected_trials: 17

# ---- MinBTL budget check (Bailey et al 2013 Theorem 1) ----
# MinBTL_years = 2·ln(N_trials) / E[max_N]²
# With N=17, E=1.0 (strict Bailey lower bound): MinBTL = 2·ln(17) = 5.666 years
# Data horizon = 6.65 years → headroom = 6.65 - 5.67 = 0.98 years (15% headroom)
# Status: WITHIN STRICT BAILEY E=1.0 BOUND
minbtl_check:
  trials_N: 17
  e_max_N_floor: 1.0
  minbtl_years_required: 5.666
  data_years_available: 6.65
  headroom_years: 0.984
  status: "WITHIN_BOUND"

# ---- RULE 1.2 temporal-alignment gate (overnight_range validity) ----
# Overnight window: 09:00-17:00 Brisbane (source: pipeline/build_daily_features.py:449-456).
# NAMING CAVEAT (2026-04-20): "overnight_range" is US-centric legacy naming — it actually
# measures the ASIAN SESSION range (09:00-17:00 Brisbane = first 8h of trading day) because
# Asia runs while US is sleeping. It is NOT the Brisbane-local personal-overnight window
# (17:00 Brisbane → 09:00 next-day Brisbane = London+NY+post-NY). For a Brisbane-local
# overnight feature we would need a new canonical column in build_daily_features.py
# (out of scope for this test).
#
# overnight_range is KNOWABLE (no look-ahead) only for ORB sessions starting at 17:00
# Brisbane or later — i.e., AFTER the Asian session closes.
# Session starts verified via pipeline.dst.SESSION_CATALOG resolver on 2024-01-15/07-15.
temporal_alignment_gate:
  overnight_range_valid_at_or_after: "17:00 Brisbane"
  per_lane:
    EUROPE_FLOW:
      winter_start_brisbane: "17:00"
      summer_start_brisbane: "18:00"
      ovn_valid: true
      note: "Winter start == threshold (17:00); RULE 1.2 allows equality — the 09-17 window is closed at 17:00:00 exactly."
    SINGAPORE_OPEN:
      winter_start_brisbane: "11:00"
      summer_start_brisbane: "11:00"
      ovn_valid: false
      note: "Starts DURING overnight window. OVN excluded from this lane's test."
    COMEX_SETTLE:
      winter_start_brisbane: "04:30 (next day)"
      summer_start_brisbane: "03:30 (next day)"
      ovn_valid: true
    NYSE_OPEN:
      winter_start_brisbane: "00:30 (next day)"
      summer_start_brisbane: "23:30 (same day)"
      ovn_valid: true
    TOKYO_OPEN:
      winter_start_brisbane: "10:00"
      summer_start_brisbane: "10:00"
      ovn_valid: false
      note: "Starts DURING overnight window. OVN excluded from this lane's test."
    US_DATA_1000:
      winter_start_brisbane: "01:00 (next day)"
      summer_start_brisbane: "00:00 (next day)"
      ovn_valid: true
  # X_MES_ATR60 uses mes_atr_20_pct which is 20-day rolling on prior closes.
  # Valid at all session starts — no temporal gate required.
  #
  # NEW: session_london_range (18:00-23:00 Brisbane window per RULE 1.2) —
  # closest canonical proxy for "US overnight" / "London → NY open" vol measurement.
  # Valid only for ORB sessions starting >= 23:00 Brisbane (after London close).
  session_london_range_per_lane:
    EUROPE_FLOW:
      london_valid: false
      note: "ORB starts 17/18 Brisbane = AT or DURING London session open. session_london_range is look-ahead. EXCLUDED."
    SINGAPORE_OPEN:
      london_valid: false
      note: "ORB at 11:00 Brisbane is far before London; feature not yet populated. EXCLUDED."
    COMEX_SETTLE:
      london_valid: true
      note: "ORB at 03:30-04:30 next day — London fully closed."
    NYSE_OPEN:
      london_valid: true
      note: "ORB at 23:30-00:30 — London session closed at 23:00."
    TOKYO_OPEN:
      london_valid: false
      note: "ORB at 10:00 Brisbane is far before London. EXCLUDED."
    US_DATA_1000:
      london_valid: true
      note: "ORB at 00:00-01:00 next day — London closed."

  london_threshold_rationale: |
    Threshold `session_london_range >= 100` pre-committed on 2026-04-20 BEFORE
    running the scan. Rationale: symmetry with the canonical filter OVNRNG_100
    (overnight_range >= 100), avoiding any threshold-picking driven by per-cell
    results. IS distribution of MNQ session_london_range (read ONCE during
    pre-reg drafting for threshold-sanity check, NOT for cell selection — N=1721
    pre-2026 IS days):
      median=84.5  p60=98.8  p75=126.8
    Threshold=100 lands between p60 and p75 — matches OVN's fire-rate
    neighborhood. Raw-range correlation with overnight_range is 0.554 on IS
    (moderate — warrants T0 fire-mask correlation check, not tautological).

