metadata:
  name: "mnq_nyseopen_costlt12_rr15_chordia_unlock_v1"
  purpose: >
    Bounded exact-lane Chordia unlock audit for MNQ NYSE_OPEN O5 E2 CB1 RR1.5 COST_LT12.
    Consistency grant with already-audited RR1.0 sibling (MNQ_NYSE_OPEN_E2_RR1.0_CB1_COST_LT12,
    verdict PASS_PROTOCOL_A 2026-05-01). Theory grant: Chan Ch 7 intraday-momentum
    stop-cascade at NYSE open. Hurdle: t >= 3.00 (PASS_PROTOCOL_A pathway).
  date_locked: "2026-05-07T00:00:00+10:00"
  holdout_date: "2026-01-01"
  total_expected_trials: 1
  testing_mode: "individual"
  research_question_type: "conditional_role"

execution:
  mode: "bounded_runner"
  entrypoint: "research/chordia_strict_unlock_v1.py"
  default_args:
    - "--hypothesis-file"
    - "docs/audit/hypotheses/2026-05-07-mnq-nyseopen-costlt12-rr15-chordia-unlock-v1.yaml"

authority:
  primary:
    - "RESEARCH_RULES.md"
    - ".claude/rules/backtesting-methodology.md"
    - ".claude/rules/research-truth-protocol.md"
    - "docs/institutional/pre_registered_criteria.md"
    - "docs/institutional/literature/chan_2013_ch7_intraday_momentum.md"
    - "docs/runtime/chordia_audit_log.yaml"
    - "docs/audit/results/2026-05-01-chordia-revalidation-deployed-lanes.md"
  notes:
    - "This is a consistency-grant unlock for the RR1.5 sibling of an already-audited lane."
    - "Theory grant: Chan Ch 7 p.155 stop-cascade mechanism at NYSE open."
    - "Criterion 4 theory-backed threshold t >= 3.00 applies (PASS_PROTOCOL_A)."
    - "Mode A holdout remains sacred from 2026-01-01."
    - "COST_LT12 is a friction-floor gate, not a theory-grounded filter — theory covers entry mechanism."

scope:
  instrument: MNQ
  strategy_id: "MNQ_NYSE_OPEN_E2_RR1.5_CB1_COST_LT12"
  session: NYSE_OPEN
  orb_minutes: 5
  entry_model: E2
  confirm_bars: 1
  rr_target: 1.5
  direction: pooled
  filter_type: COST_LT12
  filter_source: "trading_app.config.ALL_FILTERS['COST_LT12']"
  baseline: "same session+entry mechanism as already-audited RR1.0 sibling, different geometry"
  out_of_scope:
    - "tighter or looser cost thresholds"
    - "theory-grant attempt for COST_LT12 filter class"
    - "allocator, sizing, or deployment changes"
    - "writes to validated_setups or chordia_audit_log.yaml before execution evidence exists"
    - "adjacent sessions (TOKYO_OPEN, EUROPE_FLOW)"

data_policy:
  is_window:
    description: "trading_day < HOLDOUT_SACRED_FROM"
    constant_source: "trading_app.holdout_policy.HOLDOUT_SACRED_FROM"
    locked_boundary: "2026-01-01"
  oos_window:
    description: "trading_day >= HOLDOUT_SACRED_FROM"
    policy: "read-only descriptive corroboration only; never used to rescue or kill the IS verdict."
  tuning_against_oos: false
  canonical_layers_only: true

feature_definition:
  feature_name: COST_LT12
  canonical_source_of_truth: "trading_app.config.CostRatioFilter"
  delegation_wrapper: "research.filter_utils.filter_signal(df, 'COST_LT12', 'NYSE_OPEN')"
  trade_time_knowable: true
  first_complete_time: "ORB end once raw risk is known"
  temporal_alignment_note: >
    Cost ratio is computed from canonical cost specs and ORB-derived raw risk,
    which are knowable by ORB close. This prereg does not claim friction
    screening is a literature-backed alpha mechanism.
  lookahead_check: "Required PASS before execution."

grounding:
  core_orb_premise:
    - source_file: "resources/Algorithmic_Trading_Chan.pdf"
      extract_proxy: "docs/institutional/literature/chan_2013_ch7_intraday_momentum.md"
      use: >
        Chan Ch 7 p.155: stop-cascade mechanism — intraday momentum triggered by stop
        orders at the open session high/low being elected, creating a self-reinforcing
        price movement. Chan p.156: equity-index futures (FSTX) Sharpe=1.4 as empirical
        precedent for the intraday-momentum class on index futures. NYSE_OPEN is the
        canonical "first-hour-of-cash-session" that Chan Ch 7 identifies as the
        primary venue for this mechanism.
      with_theory_claim: true
    - source_file: "resources/Building_Reliable_Trading_Systems.pdf"
      extract_proxy: "docs/institutional/literature/fitschen_2013_path_of_least_resistance.md"
      use: "grounds intraday trend-follow / breakout continuation on equity-index class"
      with_theory_claim: false
  filter_grounding_status:
    verdict: "NO_THEORY_GRANT"
    basis: >
      COST_LT12 is an execution-quality gate (friction-floor filter), not a
      theory-grounded alpha mechanism. Theory grant covers the NYSE_OPEN session +
      E2 stop-cascade entry combination only. Consistent with the RR1.0 sibling
      audit (MNQ_NYSE_OPEN_E2_RR1.0_CB1_COST_LT12, PASS_PROTOCOL_A 2026-05-01)
      where the same distinction was made.
  consistency_grant_basis:
    sibling_strategy_id: "MNQ_NYSE_OPEN_E2_RR1.0_CB1_COST_LT12"
    sibling_verdict: "PASS_PROTOCOL_A"
    sibling_audit_date: "2026-05-01"
    sibling_t_stat: 3.412
    rationale: >
      Same Chan Ch 7 stop-cascade mechanism applies to both RR1.0 and RR1.5
      geometries on the same lane. The theory grant is for the session+entry
      combination, not the RR target. Consistency with sibling justifies the
      same theory-backed hurdle.

upstream_discovery_provenance:
  role: "PROVENANCE_ONLY"
  sources:
    - "docs/audit/results/2026-05-01-chordia-audit-unlock-triage.md"
  note: >
    The triage doc identified this strategy as a MISSING entry. The plan
    doc (2026-05-07 session) identified this as the only defensible new
    theory-grant target among the 46 MISSING strategies. Those statistics
    motivate this audit but are not the evidence for this prereg's verdict.
    Fresh execution against canonical layers is required.

primary_schema:
  family_cells:
    - id: "MNQ_NYSE_OPEN_O5_RR1.5_COST_LT12"
      strategy_id: "MNQ_NYSE_OPEN_E2_RR1.5_CB1_COST_LT12"
      instrument: MNQ
      session: NYSE_OPEN
      orb_minutes: 5
      rr_target: 1.5
      filter: COST_LT12
  k_family: 1
  k_global: 1
  k_lane: 1
  k_session: 1
  chordia_threshold_basis: "Criterion 4 theory-backed threshold (t >= 3.00)"
  promotion_gate: "PASS_PROTOCOL_A; PASS_CHORDIA requires t >= 3.79"

hypotheses:
  - id: 1
    name: "MNQ NYSE_OPEN O5 RR1.5 COST_LT12 exact-lane theory-grant strict unlock"
    theory_citation: "docs/institutional/literature/chan_2013_ch7_intraday_momentum.md"
    economic_basis: >
      Chan Ch 7 p.155: stop-cascade intraday momentum at market open. NYSE_OPEN
      is the primary venue for this mechanism in equity-index futures. Stop orders
      cluster at the ORB high/low; when price elects these stops it creates momentum
      that ORB-break E2 entries exploit. Chan p.156: equity-index futures (FSTX)
      Sharpe=1.4 precedent. This mechanism is agnostic to the RR_TARGET geometry —
      the same stop-cascade fires whether the target is 1.0R or 1.5R.
      COST_LT12 ensures friction is not the dominant P&L driver; this is a
      structural integrity gate on minimum trade viability, not an alpha claim.
    role:
      kind: "standalone"
      parent: >
        MNQ_NYSE_OPEN_E2_RR1.0_CB1_COST_LT12 (PASS_PROTOCOL_A 2026-05-01).
        Exact sibling lane with different RR geometry; theory applies equally.
      comparator: >
        Replay-selected trades versus the theory-backed Chordia threshold (t >= 3.00)
        and descriptive OOS sign monitor. No sibling rescue or parameter variation.
      primary_metric: "selected_trade_mean_r"
      promotion_target: "chordia_audit_unlock_only"
    filter:
      type: "COST_LT12"
      column: "risk_dollars, cost_ratio_bp"
      thresholds:
        - "fire_vs_off"
    scope:
      instruments: [MNQ]
      sessions: [NYSE_OPEN]
      rr_targets: [1.5]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
      orb_minutes: [5]
    expected_trial_count: 1
    kill_criteria:
      - "IS t-stat < 3.00 (theory-backed hurdle)"
      - "IS ExpR <= 0.0"
      - "N_IS_on < 100"
      - "If OOS N >= 30 AND OOS power >= 0.50, OOS sign opposes IS sign (direction veto); power < 0.50 downgrades to UNVERIFIED not DEAD per backtesting-methodology.md Rule 3.2"
      - "Canonical filter delegation diverges from trading_app.config"
      - "Scratch/null handling is not explicit in the measured trade stream"
    statement: >
      On the fixed MNQ NYSE_OPEN O5 E2 CB1 RR1.5 lane using the canonical
      COST_LT12 filter, the IS sample remains positive and strong enough to
      clear the theory-backed Chordia threshold (t >= 3.00) when recomputed
      honestly on canonical Mode-A data with adversarial split reporting.
      OOS sign must not oppose IS at N_OOS >= 30.
    pass_metric:
      metric: "t_IS"
      formula: "compute_chordia_t(sharpe_IS, N_IS) on canonical IS fired trades after canonical filter delegation"
      threshold_gte:
        t_is: 3.00
        n_is_on: 100
        expr_is: 0.0
      extra_gates:
        - "dir_match_oos = true when OOS N >= 30 (sign-flip veto)"
        - "adversarial split table emitted; no hidden subgroup collapse"
        - "scratch-inclusive accounting required if scratch rows exist"
    counted_against_trial_budget: true

trial_budget:
  primary_selection_trials: 1
  schema_locked_before_any_metric: true

total_hypothesis_count: 1
total_expected_trials: 1
budget_check:
  max_allowed_clean: 300
  max_allowed_proxy: 2000
  status: "under budget"

decision_rule:
  continue_if: "H1 clears theory t >= 3.00 with positive IS ExpR and no harness failure"
  park_if: "H1 clears theory IS gates but OOS directional sign-flip at N_OOS >= 30"
  kill_if: "H1 fails t < 3.00 or ExpR <= 0, or execution integrity fails"

methodology_rules_applied:
  - rule: "RULE 3 sacred holdout"
    application: "IS and OOS are partitioned by HOLDOUT_SACRED_FROM only."
  - rule: "RULE 4 multiple testing"
    application: "Current family K is exactly 1 (consistency grant; not a new scan)."
  - rule: "RULE 6 trade-time knowability"
    application: "COST_LT12 must be shown knowable at ORB close."
  - rule: "RULE 9 canonical data source"
    application: "Reads only canonical layers; no derived-layer proof."
  - rule: "research-truth-protocol canon filter delegation"
    application: "Filter fire mask must come from canonical delegation, never inline re-implementation."

outputs_required_after_run:
  - "result markdown at docs/audit/results/2026-05-07-mnq-nyseopen-costlt12-rr15-chordia-unlock-v1.md"
  - "row-level CSV with IS/OOS split, raw/effective pnl_r, and scratch/null handling"
  - "single-cell summary table with N_IS_on, ExpR_IS, Sharpe_IS, t_IS, OOS sign check, and verdict"
  - "explicit statement that theory grant covers session+entry mechanism, not COST_LT12 filter"

execution_gate:
  allowed_now: true
  execution_surface: "WSL or Windows with .venv"
  forbidden_now:
    - "theory-grant upgrade to adjacent sessions (TOKYO_OPEN, EUROPE_FLOW) without new sourcing"
    - "threshold rescue"
    - "auto-writing PASS rows into chordia_audit_log.yaml without execution evidence"

not_done_by_this_pre_reg:
  - "Does not test TOKYO_OPEN or EUROPE_FLOW sessions."
  - "Does not settle the broader COST_LT filter class."
  - "Does not change live deployment or allocator state."
  - "Does not grant theory to PD_* or ORB_G* filter families."
