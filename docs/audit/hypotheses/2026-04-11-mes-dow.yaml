# Hypothesis Registry — MES Day-of-Week Effects
#
# Locked:        2026-04-11T01:00:00+10:00
# Author:        Claude Code session (wave 4 lit-grounded discovery)
# Holdout mode:  A (2026-01-01 sacred)
# Data horizon:  6.65 calendar years (MES real micro 2019-05-06 to 2025-12-31)
# Testing mode:  family (Pathway A, BH FDR at K=24)
#
# AUDIT NOTE: Two DOW filters with recalibrated G8 size gate for MES:
# ORB_G8_NOFRI (exclude Friday) and ORB_G8_NOMON (exclude Monday).
# Each across 12 sessions x 1 RR = 24 total.

metadata:
  name: "mes-dow"
  purpose: |
    Test whether day-of-week exclusions (no-Friday, no-Monday) with G8
    size gate improve MES ORB breakout edge. Uses G8 (not G5) because
    G5 on MES is effectively unfiltered. Friday position-squaring and
    Monday gap risk are well-documented calendar effects in equity futures.
  date_locked: "2026-04-11T01:00:00+10:00"
  holdout_date: "2026-01-01"
  data_horizon_years_clean: 6.65
  data_source: "real CME Micro E-mini S&P 500 futures 2019-05-06 onwards"
  testing_mode: "family"
  bailey_compliance:
    trials: 24
    horizon_years: 6.65
    e_max_n: 1.0
    min_btl_required_years: 6.36
    headroom_pct: 4.4
    status: "PASS"
  total_expected_trials: 24

hypotheses:
  - id: 1
    name: "MES TOKYO_OPEN ORB_G8_NOFRI RR1.0"
    theory_citation: "French (1980) JFE day-of-week effect in stock returns; Cross (1973) FAJ"
    economic_basis: |
      Friday position-squaring by institutional traders degrades breakout
      follow-through. French (1980) documents significant day-of-week effects
      in equity returns. G8 provides meaningful size selectivity for MES
      (G5 passes 85% NYSE_OPEN — effectively unfiltered).
    filter:
      type: ORB_G8_NOFRI
      column: orb_height
      thresholds: [8]
      dow_exclusion: [5]
    scope:
      instruments: [MES]
      sessions: [TOKYO_OPEN]
      rr_targets: [1.0]
      entry_models: [E2]
      confirm_bars: [1]
      stop_multipliers: [1.0]
    expected_trial_count: 1
    kill_criteria:
      - "BH FDR q=0.05 fails at K=24"
      - "Walk-forward efficiency < 0.50"
      - "2026 OOS ExpR < 0"
      - "Any era with N >= 50 and ExpR < -0.05"

  - id: 2
    name: "MES SINGAPORE_OPEN ORB_G8_NOFRI RR1.0"
    theory_citation: "French (1980) JFE"
    economic_basis: "Same Friday exclusion + G8 mechanism. All sessions tested for honesty."
    filter: { type: ORB_G8_NOFRI, column: orb_height, thresholds: [8], dow_exclusion: [5] }
    scope: { instruments: [MES], sessions: [SINGAPORE_OPEN], rr_targets: [1.0], entry_models: [E2], confirm_bars: [1], stop_multipliers: [1.0] }
    expected_trial_count: 1
    kill_criteria: ["BH FDR q=0.05 fails at K=24", "WFE < 0.50", "OOS ExpR < 0", "Era instability"]

