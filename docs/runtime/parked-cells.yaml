#
# Authority:
#   - Every entry MUST reference a real pre-reg path (docs/audit/hypotheses/*.yaml)
#     AND a real result path (docs/audit/results/*-result.md or equivalent backtest doc).
#   - Verdict text MUST match the result file's "## Decision rule outcome" / "## Verdict"
#     block verbatim (case-insensitive on the canonical token).
#   - Drift check `check_parked_cells_registry_completeness` enforces (a) every
#     Pathway B result file has a matching entry here, (b) the verdict token in
#     the entry appears in the result file, (c) every referenced path exists.
#
# Editing rules:
#   - Append-only for new cells. Do not remove past entries — replay them with
#     a `superseded_by:` field pointing at the successor cell when the verdict
#     is moved by a later pre-reg.
#   - When a cell's status changes (e.g., SR alarm fires, OOS power floor
#     clears), append a new dated event line under `events:` rather than
#     overwriting the verdict.
#   - Status field uses canonical Amendment 3.1/3.2 vocabulary only:
#     PARK_PENDING_OOS_POWER (Amendment 3.1)
#     PARK_CONDITIONAL_DEPLOY_RETAINED (D6 / Amendment 3.2 NOT_OOS_CONFIRMABLE -> CONDITIONAL_DEPLOY)
#     PARK_ABSOLUTE_FLOOR_FAIL (Phase D D-0 v2 / absolute Sharpe floor not cleared)
#     KILL (any KILL_* criterion fired)
#     CANDIDATE_READY_FOR_PHASE_2 (D6 future-state placeholder; not used yet)
#     KEEP_PARKED_INDEFINITELY (Amendment 3.2 alternate path; not used yet)
#
# Drift check authority: pipeline/check_drift.py::check_parked_cells_registry_completeness
