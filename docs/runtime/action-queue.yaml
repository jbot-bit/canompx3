  - id: allocator_chordia_gate
    title: Allocator Chordia gate -- prevent silent rebalance-bypass class
    class: stage
    status: open
    priority: P1
    close_before_new_work: false
    owner_hint: claude-or-codex
    last_verified_at: 2026-05-01
    freshness_sla_days: 14
    next_action: |
      Architectural fix surfaced by chordia_revalidation_2026_05_01 audit.
      Today: rebalance_lanes.py + lane_allocator.build_allocation() emit a
      DEPLOY-ranked JSON with NO Chordia awareness. Next monthly rebalance
      will silently re-promote unaudited lanes (same class as 2026-05-01
      where 6 of 7 candidates had never seen Chordia). Hand-editing JSON
      is a band-aid; the gate belongs in the allocator.
      Stage scope (single stage, narrow):
      (1) Add `chordia_audit_log` table or doctrine-file readable by
          allocator listing (strategy_id, audit_date, verdict, has_theory).
      (2) lane_allocator.compute_lane_scores enriches each LaneScore with
          `chordia_verdict` + `chordia_audit_age_days`.
      (3) build_allocation() refuses to set status=DEPLOY for any
          candidate whose verdict is FAIL_BOTH or whose audit is missing
          or stale (>90d). Demote to PAUSED with structured reason.
      (4) Drift check: lane_allocation.json lanes[] cannot contain a
          strategy_id with FAIL_BOTH or missing chordia state.
      (5) Tests: unit-test the gate with synthetic FAIL_BOTH/PASS rows.
    exit_criteria: |
      Allocator has a working Chordia gate; running
      `python scripts/tools/rebalance_lanes.py --profile topstep_50k_mnq_auto`
      against the current state produces a JSON whose lanes[] contains only
      PASS_PROTOCOL_A or PASS_CHORDIA strategies (i.e. just H3 NYSE_OPEN
      until further audits land). Drift check enforces it. New stage file
      lands in docs/runtime/stages/.
    blocked_by: []
    decision_refs:
      - docs/audit/results/2026-05-01-chordia-revalidation-deployed-lanes.md
      - docs/runtime/chordia-revalidation-decision-audit-2026-05-01.md
