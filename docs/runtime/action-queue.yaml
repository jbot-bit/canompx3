    next_action: |
      Closed 2026-05-01 via PR #197 (squash-merged commit 2a983022 on main).

      Two-layer defense landed:
      (1) `apply_chordia_gate(scores)` invoked inline at top of
          `build_allocation()` -- demotes FAIL_BOTH / FAIL_CHORDIA / MISSING /
          stale-audit (>90d) to PAUSE before ranking. Idempotent.
      (2) Drift check #136 `check_lane_allocation_chordia_gate` -- refuses
          any FAIL_* / missing / stale lane in `lane_allocation.json`.
          Resolves via PROJECT_ROOT (not CWD) -- no fail-open class.

