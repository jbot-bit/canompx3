      - Canonical rebalance rerun for `topstep_50k_mnq_auto` now writes a
        3-lane live book in `docs/runtime/lane_allocation.json`:
        `MNQ_US_DATA_1000_E2_RR1.5_CB1_VWAP_MID_ALIGNED_O15`,
        `MNQ_COMEX_SETTLE_E2_RR1.0_CB1_OVNRNG_100`,
        `MNQ_NYSE_OPEN_E2_RR1.0_CB1_COST_LT12`

      Remaining live PASS_CHORDIA-without-audit names:
      - `MES_CME_PRECLOSE_E2_RR1.0_CB1_COST_LT10_S075`
      - `MNQ_COMEX_SETTLE_E2_RR1.5_CB1_OVNRNG_100`
      - `MNQ_COMEX_SETTLE_E2_RR1.0_CB1_X_MES_ATR60`
      - `MNQ_US_DATA_1000_E2_RR1.0_CB1_VWAP_MID_ALIGNED_O15`

      Important doctrine note:
      - The allocator live gate still recomputes from `validated_setups`
        `sharpe_ratio * sqrt(sample_size)`. Therefore
        `MNQ_CME_PRECLOSE_E2_RR1.0_CB1_X_MES_ATR60` can still appear as live
        `PASS_CHORDIA` in `compute_lane_scores()` even though the new bounded
        strict replay audit row records `FAIL_BOTH`. That mismatch is now
        documented and should be treated as a separate controls/provenance
        follow-up, not resolved ad hoc inside this queue item.

      Per stage:
      (1) Enumerate remaining PASS_CHORDIA-without-audit:
          ```python
          from datetime import date
          from trading_app.lane_allocator import compute_lane_scores
          scores = compute_lane_scores(date.today())
          targets = [s.strategy_id for s in scores
                     if s.chordia_verdict == "PASS_CHORDIA"
                     and s.chordia_audit_age_days is None]
          ```
      (2) For EACH remaining strategy, run Pathway-A revalidation per RESEARCH_RULES.md
          + pre_registered_criteria.md Criterion 4. NOT a sweep -- a per-strategy
          adversarial-split audit with theory grant decision. Pre-reg required.
      (3) On PASS or explicit strict fail, append an entry to
          `chordia_audit_log.yaml` under `audits:`
          with `audit_date`, `verdict`, `t_stat`, `threshold`, `sample_size`.
          Theory-granted strategies also get a `theory_grants:` row with
          required `theory_ref` to `docs/institutional/literature/<file>`.
      (4) Re-run rebalance; verify the JSON now includes the cleared lanes
          with `chordia_audit_age_days = 0`.

      User aim cited at handoff: "+0.4R+", "sky is the limit". Honest framing:
      H3 ExpR ~ +0.079R; +0.4R is 5x. Not reachable by tuning the same setup
      harder. This audit unlock is the institutional path; treat it as the
      portfolio-EV anchor for the next research session.

      Bailey-LdP MinBTL: < 300 trials per audit. No brute force.
