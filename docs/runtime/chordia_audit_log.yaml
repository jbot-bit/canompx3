# Chordia Audit Log — read by allocator's Chordia gate.
#
# Maps strategy_id -> { audit_date, verdict, has_theory, theory_ref }
#
# Doctrine:
#   - Default for any strategy_id NOT in this file: has_theory=False, no audit
#     entry. The allocator then treats audit as missing (PAUSED). Strict
#     default is the institutional prior: burden-of-proof on theory grounding
#     and strict replay evidence, not on their absence.
#   - has_theory=True requires explicit citation in `theory_ref` to a file
#     under `docs/institutional/literature/` with a pre-registered economic
#     mechanism. Adding has_theory=True without theory_ref is a doctrine
#     violation; the gate treats it as has_theory=False.
#   - audit_age_days is computed by the allocator as today - audit_date.
#     Audits older than 90 days are treated as STALE -> PAUSED. Re-audit
#     refreshes audit_date.
#
# Verdict values (must match `trading_app/chordia.py` semantics):
#   - PASS_PROTOCOL_A : 3.00 <= t < 3.79 with has_theory=True. Strategy clears
#                       the theory-backed deployment hurdle but not the strict
#                       Chordia sizing-up hurdle.
#   - PASS_CHORDIA    : t >= 3.79 (strict Chordia 2018 hurdle, regardless of
#                       theory). Used for sizing-up eligibility.
#   - FAIL_BOTH       : t < 3.00. Strategy fails both Harvey-Liu and Chordia
#                       hurdles. Allocator MUST refuse DEPLOY.
#   - FAIL_CHORDIA    : 3.00 <= t < 3.79 with has_theory=False. Strategy clears
#                       the theory-backed hurdle but fails the strict no-theory
#                       Chordia hurdle. Allocator MUST refuse DEPLOY.
#   - PARK            : strict replay did not justify DEPLOY despite clearing
#                       the raw t-hurdle, usually because downstream evidence
#                       (for example OOS sign/power) was not strong enough.
#                       Allocator MUST refuse DEPLOY.
#
# Source of truth for verdict computation: the strict replay that produced the
# recorded audit row. `trading_app/chordia.py` defines the verdict taxonomy and
# thresholds, but the live allocator reads the stored audit-row verdict here.
# `validated_setups` is NOT an admissible replacement source for gate truth.
#
# Schema consumed by `trading_app.chordia.load_chordia_audit_log()` (verified
# against source 2026-05-04):
#   - version, default_has_theory, audit_freshness_days  (top-level scalars)
#   - theory_grants:   (list — read; bare has_theory:true without theory_ref
#                      is demoted to False per loader line 276)
#   - audits:          (list — read; missing strategies fail-closed to MISSING)
#
# Top-level keys NOT in the above list (e.g. `non_auditable_notes`) are
# silently ignored by the loader. Such keys are INFORMATIONAL ONLY — they
# document operator-facing dispositions (e.g. strategies the strict-unlock
# runner refuses by design) but DO NOT participate in the allocator gate.
# A strategy listed only under `non_auditable_notes` resolves to MISSING
# under the live gate and is PAUSED. To change a live deployment decision,
# add to `audits:` or `theory_grants:` — never `non_auditable_notes:`.
#
# @research-source: docs/audit/results/2026-05-01-chordia-revalidation-deployed-lanes.md
# @research-source: docs/institutional/literature/chordia_et_al_2018_two_million_strategies.md (t≥3.79 verbatim p.5)
# @canonical-source: trading_app/chordia.py + docs/runtime/chordia_audit_log.yaml
# @revalidated-for: allocator_chordia_gate stage 2026-05-01; queue closeout 2026-05-03

