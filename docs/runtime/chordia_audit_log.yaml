    rationale: |
      Consistency grant with already-audited RR1.0 sibling
      (MNQ_NYSE_OPEN_E2_RR1.0_CB1_COST_LT12, verdict PASS_PROTOCOL_A 2026-05-01).
      Same Chan Ch 7 intraday-momentum mechanism: stop-triggered breakout cascade
      at market open (p.155), equity-index futures precedent FSTX Sharpe=1.4 (p.156).

  - strategy_id: MNQ_TOKYO_OPEN_E2_RR1.5_CB1_COST_LT08
    has_theory: true
    theory_ref: docs/institutional/literature/chan_2013_ch7_intraday_momentum.md
    rationale: |
      Cash-session-open mechanism extension of the Chan Ch 7 grant already
      held by MNQ_NYSE_OPEN_E2_RR1.x_CB1_COST_LT12 (PASS_PROTOCOL_A 2026-05-01
      + consistency grant 2026-05-08) and MNQ_EUROPE_FLOW_E2_RR1.5_CB1_ORB_G5
      (consistency grant). Chan Ch 7 p.155-157 mechanism is
      session-name-agnostic — "an entry at the market open" with FSTX
      (Eurex equity-index futures) Sharpe 1.4 precedent. TOKYO_OPEN is
      Tokyo cash-session open (10:00 Brisbane = 09:00 Tokyo); MNQ is
      Nasdaq-100 equity-index futures — both within the FSTX precedent
      class. Grant covers the session-entry mechanism, not the COST_LT08
      filter class. Strict Chordia t>=3.79 sizing-up hurdle NOT cleared
      by theory grant; only the Harvey-Liu deployment hurdle (t>=3.00).
      COST_LT12 is a friction-floor gate, not a theory-grounded filter — the theory
      grant covers the session-entry mechanism, not the filter class.

  # Strategies WITHOUT theory grant (has_theory=False, T=3.79):
  #   - MNQ_COMEX_SETTLE_E2_RR1.5_CB1_ORB_G5  (settlement-window pattern; no
  #     pre-registered mechanism)
  #   - MNQ_TOKYO_OPEN_E2_RR1.5_CB1_COST_LT12  (Asian-open momentum lacks the
  #     same depth of literature citation as NYSE/Europe flow)

