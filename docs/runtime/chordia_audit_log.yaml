    theory_ref: docs/institutional/literature/chan_2013_ch7_intraday_momentum.md
    rationale: |
      Same Chan Ch 7 intraday-momentum mechanism as H3 NYSE_OPEN; consistency
      grant. Verdict on raw t-stat is FAIL_BOTH but theory grant means hurdle
      is T=3.00, not T=3.79.

