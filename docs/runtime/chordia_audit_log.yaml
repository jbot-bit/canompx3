      confirms nor falsifies. Listed here for completeness, not as
      supporting evidence. The OOS gate is a kill-on-sign-flip veto only;
      this lane does not trigger the veto. Per
      `.claude/rules/backtesting-methodology.md` RULE 3.2 (`N_on_OOS < 30
      -> directional-only, not confirmatory`), this OOS at N=49 with
      power=0.30 is treated as directional-only.
