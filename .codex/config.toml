#:schema https://developers.openai.com/codex/config-schema.json

profile = "canompx3"
project_doc_max_bytes = 98304
project_root_markers = ["AGENTS.md", "CLAUDE.md", "CODEX.md", "uv.lock", ".git"]
check_for_update_on_startup = true
background_terminal_max_timeout = 900000
developer_instructions = """
Repo-specific Codex startup contract for canompx3:
- Preferred entrypoints are `scripts/infra/codex-project.sh`, `scripts/infra/codex-project-search.sh`, and `scripts/infra/codex-worktree.sh`; they already run session preflight.
- Preferred operator surface is a WSL-home clone plus the Codex app or `codex.bat linux`; `/mnt/c/...` is fallback-only.
- If this session started any other way, run `python3 scripts/tools/session_preflight.py --context codex-wsl` from the repo root before substantial work. Use `python` only if `python3` is unavailable.
- Read `HANDOFF.md` before planning or editing.
- Follow `AGENTS.md`, `CLAUDE.md`, and `CODEX.md`; the Claude layer remains canonical and `.codex/` is additive only.
- If the user's intent is clear but the wording is fuzzy, infer the nearest valid workflow, skill, verification path, and guardrails instead of waiting for exact trigger words.
- If multiple valid routes exist, choose the highest-signal, lowest-risk one and state the mapping briefly.
- Do not mutate `CLAUDE.md`, `.claude/`, `claude.bat`, or Claude-owned settings/hooks unless the user explicitly requests it.
- Do not mutate `.claude/` or `CLAUDE.md` unless the user explicitly asks.
"""

sandbox_mode = "danger-full-access"
[history]
persistence = "save-all"

[windows]
sandbox = "elevated"

[tui]
notifications = true
notification_method = "auto"
alternate_screen = "auto"

[features]
apps = true
codex_hooks = false
fast_mode = true
multi_agent = true
personality = true
prevent_idle_sleep = true
shell_snapshot = true
shell_tool = true
skill_mcp_dependency_install = true

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.openaiDeveloperDocs.tools.list_api_endpoints]
approval_mode = "approve"

[mcp_servers.openaiDeveloperDocs.tools.fetch_openai_doc]
approval_mode = "approve"

[profiles.canompx3]
model = "gpt-5.4"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
service_tier = "fast"
personality = "pragmatic"
model_reasoning_effort = "high"
model_reasoning_summary = "concise"
model_verbosity = "medium"
web_search = "cached"

