name: Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Ruff format check
        run: uv run ruff format --check pipeline/ trading_app/ scripts/ tests/

      - name: Ruff lint check
        run: uv run ruff check pipeline/ trading_app/ scripts/

      - name: Pyright type check (356 errors as of 2026-03-14 — fix before promoting to hard gate)
        run: uv run pyright
        continue-on-error: true

      - name: Drift check (static analysis — advisory in CI, hard gate locally)
        # 5 of 110 drift checks (37, 61, 80, 92, 95) are fail-closed when
        # gold.db is missing — by design for LOCAL workflow where missing DB
        # = broken setup. CI has no DB by policy (CLAUDE.md "local disk, no
        # cloud sync"), so these will always fire here. Keep the run for the
        # OTHER 105 checks (DB-independent — schema sync, import cycles,
        # canonical sources, etc.) but mark advisory so CI gate is honest:
        # local enforcement is the real gate. Same precedent as pyright above.
        run: uv run python pipeline/check_drift.py
        continue-on-error: true

      - name: Behavioral audit
        run: uv run python scripts/tools/audit_behavioral.py

      - name: Check file encoding (UTF-8)
        run: |
          uv run python -c "
          from pathlib import Path
          bad = []
          for ext in ('*.md', '*.txt', '*.py'):
              for f in Path('.').rglob(ext):
                  if '.venv' in f.parts or 'openclaw' in f.parts or 'llm-code-scanner' in f.parts:
                      continue
                  try:
                      f.read_text(encoding='utf-8')
                  except (UnicodeDecodeError, ValueError):
                      bad.append(str(f))
          if bad:
              print('Non-UTF-8 files found:')
              for b in bad: print(f'  {b}')
              raise SystemExit(1)
          print('All tracked text files are UTF-8.')
          "

      - name: Security audit (advisory)
        run: uv run pip-audit --desc on
        continue-on-error: true

      - name: Tests with coverage
        run: uv run pytest tests/ -v --ignore=tests/test_trader_logic.py --cov=pipeline --cov=trading_app --cov-report=term-missing --cov-fail-under=35
