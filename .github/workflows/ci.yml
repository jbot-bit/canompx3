name: Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Sunday 20:00 UTC = Monday 06:00 Brisbane (sized to land before the
    # 06:30 LONDON_OPEN session prep). LHP fitness-transition trigger only —
    # see scripts/cron/lhp_weekly.py and Nugget 2b plan
    # (docs/plans/2026-05-13-ai-mcp-integration-inventory-and-gold-nuggets.md).
    - cron: '0 20 * * 0'

jobs:
  checks:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Ruff format check
        run: uv run ruff format --check pipeline/ trading_app/ scripts/ tests/

      - name: Ruff lint check
        run: uv run ruff check pipeline/ trading_app/ scripts/

      - name: Pyright type check (356 errors as of 2026-03-14 — fix before promoting to hard gate)
        run: uv run pyright
        continue-on-error: true

      - name: Drift check (static analysis — hard gate; CI=true triggers DB-skip helper)
        # 5 of 110 checks (37, 61, 80, 92, 95) are fail-closed when gold.db
        # is missing — correct for LOCAL workflow where missing DB = broken
        # setup. CI has no DB by policy (CLAUDE.md "local disk, no cloud
        # sync"). pipeline.check_drift._skip_db_check_for_ci() returns []
        # (silent skip, runner counts it as skip_count) when CI=true is set
        # (auto by GitHub Actions). Local without DB still fails. Same
        # check, env-controlled response — no `continue-on-error` band-aid.
        run: uv run python pipeline/check_drift.py

      - name: Behavioral audit
        run: uv run python scripts/tools/audit_behavioral.py

      - name: Check file encoding (UTF-8)
        run: |
          uv run python -c "
          from pathlib import Path
          bad = []
          for ext in ('*.md', '*.txt', '*.py'):
              for f in Path('.').rglob(ext):
                  if '.venv' in f.parts or 'openclaw' in f.parts or 'llm-code-scanner' in f.parts:
                      continue
                  try:
                      f.read_text(encoding='utf-8')
                  except (UnicodeDecodeError, ValueError):
                      bad.append(str(f))
          if bad:
              print('Non-UTF-8 files found:')
              for b in bad: print(f'  {b}')
              raise SystemExit(1)
          print('All tracked text files are UTF-8.')
          "

      - name: Security audit (advisory)
        run: uv run pip-audit --desc on
        continue-on-error: true

      - name: Clear coverage data
        run: uv run coverage erase

      - name: Tests with coverage (repo core)
        run: >
          uv run pytest tests/ -q
          --ignore=tests/test_trader_logic.py
          --ignore=tests/test_pipeline
          --ignore=tests/test_trading_app
          --ignore=tests/test_research
          --ignore=tests/test_tools
          --ignore=tests/tools
          --ignore=tests/test_integration
          --ignore=tests/test_mf_futures
          --cov=pipeline --cov=trading_app --cov-report= --cov-append

      - name: Tests with coverage (tools and research)
        run: >
          uv run pytest
          tests/test_research
          tests/test_tools
          tests/tools
          tests/test_integration
          tests/test_mf_futures
          -q
          --cov=pipeline --cov=trading_app --cov-report= --cov-append

      - name: Tests with coverage (pipeline drift)
        run: |
          $paths = Get-ChildItem tests/test_pipeline -File -Filter "test_check_drift*.py" | ForEach-Object { $_.FullName }
          uv run pytest @paths -q --cov=pipeline --cov=trading_app --cov-report= --cov-append

      - name: Tests with coverage (pipeline core)
        run: >
          uv run pytest tests/test_pipeline -q
          --ignore=tests/test_pipeline/test_check_drift.py
          --ignore=tests/test_pipeline/test_check_drift_aperture.py
          --ignore=tests/test_pipeline/test_check_drift_context.py
          --ignore=tests/test_pipeline/test_check_drift_crg.py
          --ignore=tests/test_pipeline/test_check_drift_crypto_pin.py
          --ignore=tests/test_pipeline/test_check_drift_db.py
          --ignore=tests/test_pipeline/test_check_drift_db_path_usage.py
          --ignore=tests/test_pipeline/test_check_drift_e2_lookahead.py
          --ignore=tests/test_pipeline/test_check_drift_scratch_policy.py
          --ignore=tests/test_pipeline/test_check_drift_slow_labels.py
          --ignore=tests/test_pipeline/test_check_drift_ws2.py
          --cov=pipeline --cov=trading_app --cov-report= --cov-append

      - name: Tests with coverage (trading app A-L)
        run: |
          $patterns = @("test_a*.py", "test_b*.py", "test_c*.py", "test_d*.py", "test_e*.py", "test_h*.py", "test_i*.py", "test_l*.py")
          $paths = @()
          foreach ($pattern in $patterns) {
            $paths += Get-ChildItem tests/test_trading_app -File -Filter $pattern | ForEach-Object { $_.FullName }
          }
          $paths += "tests/test_trading_app/test_ai"
          uv run pytest @paths -q --cov=pipeline --cov=trading_app --cov-report= --cov-append

      - name: Tests with coverage (trading app M-P)
        run: |
          $patterns = @("test_m*.py", "test_n*.py", "test_o*.py", "test_p*.py")
          $paths = @()
          foreach ($pattern in $patterns) {
            $paths += Get-ChildItem tests/test_trading_app -File -Filter $pattern | ForEach-Object { $_.FullName }
          }
          $paths += "tests/test_trading_app/test_nested"
          uv run pytest @paths -q --cov=pipeline --cov=trading_app --cov-report= --cov-append

      - name: Tests with coverage (trading app R-S)
        run: |
          $patterns = @("test_r*.py", "test_s*.py")
          $paths = @()
          foreach ($pattern in $patterns) {
            $paths += Get-ChildItem tests/test_trading_app -File -Filter $pattern | ForEach-Object { $_.FullName }
          }
          $paths += "tests/test_trading_app/test_regime"
          $paths += "tests/test_trading_app/test_strategy_validator"
          uv run pytest @paths -q --cov=pipeline --cov=trading_app --cov-report= --cov-append

      - name: Tests with coverage (trading app T-Z)
        run: |
          $patterns = @("test_t*.py", "test_v*.py", "test_w*.py")
          $paths = @()
          foreach ($pattern in $patterns) {
            $paths += Get-ChildItem tests/test_trading_app -File -Filter $pattern | ForEach-Object { $_.FullName }
          }
          uv run pytest @paths -q --cov=pipeline --cov=trading_app --cov-report= --cov-append

      - name: Coverage threshold
        run: uv run coverage report --show-missing --fail-under=35

  lhp_weekly:
    # Sunday 06:00 Brisbane LHP fitness-transition cron. Gated to main so
    # PR push events don't fire the job. Read-only on gold.db; the gate is
    # an aggregate decay+watch+stale count change vs the prior snapshot.
    # See scripts/cron/lhp_weekly.py and Nugget 2b plan.
    if: github.event_name == 'schedule' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    # OpenRouter API key for LHP LLM proposals (scripts/research/lhp/llm_client.py:157).
    # GHA masks the value in logs automatically. Scoped to lhp_weekly only — not
    # exposed to the `checks` job. Repo secret set 2026-05-13.
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: LHP weekly fitness-transition check
        # gold.db is not synced to CI by policy (CLAUDE.md "local disk, no
        # cloud sync"). Without the DB, compute_portfolio_fitness will raise
        # — runner reports FATAL exit 2. The job stays informational until
        # the DB is provisioned to the runner (deferred). For now this
        # validates the schedule wiring fires correctly on cadence.
        run: uv run python scripts/cron/lhp_weekly.py --check-fitness-transition
        continue-on-error: true
