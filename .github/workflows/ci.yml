name: Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Sunday 20:00 UTC = Monday 06:00 Brisbane (sized to land before the
    # 06:30 LONDON_OPEN session prep). LHP fitness-transition trigger only —
    # see scripts/cron/lhp_weekly.py and Nugget 2b plan
    # (docs/plans/2026-05-13-ai-mcp-integration-inventory-and-gold-nuggets.md).
    - cron: '0 20 * * 0'

jobs:
  checks:
    # ubuntu-latest (was windows-latest until 2026-05-25). The GH-hosted
    # windows-latest runner reliably kills pytest with KeyboardInterrupt
    # mid-suite (n=20+ red runs 2026-05-22 → 2026-05-25) when coverage
    # instrumentation runs over file-handle-intensive tests (duckdb.connect,
    # subprocess.run git init). Local Windows 460/460 pass in 3m12s — the
    # interrupt is GH-runner-specific (Defender real-time scan + coverage
    # trace hooks). Prior attempts to fix at the test/plugin layer (pytest-
    # timeout unload, pytest-cov downgrade) all failed because the cause is
    # runner-environmental, not code. Only one test file gates on Windows:
    # tests/test_trading_app/test_instance_lock.py uses `pytest.skip` on
    # non-win32. Repo runtime stays Windows-developed; CI just doesn't need
    # to be. See feedback_ci_keyboardinterrupt_test_session_start_mutex_external_kill.md
    # and project_ci_red_misdiagnosis_2026_05_25.md.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required for SHA-pinned drift checks
          # (e.g. check_107 SHA migration manifest uses `git show <sha>:<path>`).
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Ruff format check
        run: uv run ruff format --check pipeline/ trading_app/ scripts/ tests/

      - name: Ruff lint check
        run: uv run ruff check pipeline/ trading_app/ scripts/

      - name: Pyright type check (356 errors as of 2026-03-14 — fix before promoting to hard gate)
        run: uv run pyright
        continue-on-error: true

      - name: Drift check (static analysis — hard gate; CI=true triggers DB-skip helper)
        # 5 of 110 checks (37, 61, 80, 92, 95) are fail-closed when gold.db
        # is missing — correct for LOCAL workflow where missing DB = broken
        # setup. CI has no DB by policy (CLAUDE.md "local disk, no cloud
        # sync"). pipeline.check_drift._skip_db_check_for_ci() returns []
        # (silent skip, runner counts it as skip_count) when CI=true is set
        # (auto by GitHub Actions). Local without DB still fails. Same
        # check, env-controlled response — no `continue-on-error` band-aid.
        run: uv run python pipeline/check_drift.py

      - name: Behavioral audit
        run: uv run python scripts/tools/audit_behavioral.py

      - name: Check file encoding (UTF-8)
        run: |
          uv run python -c "
          from pathlib import Path
          bad = []
          for ext in ('*.md', '*.txt', '*.py'):
              for f in Path('.').rglob(ext):
                  if '.venv' in f.parts or 'openclaw' in f.parts or 'llm-code-scanner' in f.parts:
                      continue
                  try:
                      f.read_text(encoding='utf-8')
                  except (UnicodeDecodeError, ValueError):
                      bad.append(str(f))
          if bad:
              print('Non-UTF-8 files found:')
              for b in bad: print(f'  {b}')
              raise SystemExit(1)
          print('All tracked text files are UTF-8.')
          "

      - name: Security audit (advisory)
        # PYTHONIOENCODING=utf-8 — pip-audit writes `→` (U+2192) in its
        # description column; default Windows stdout cp1252 raises
        # UnicodeEncodeError mid-flush and the step exits 1 (still advisory
        # via continue-on-error, but the vuln list is lost). Force utf-8.
        env:
          PYTHONIOENCODING: utf-8
        run: uv run pip-audit --desc on
        continue-on-error: true

      - name: Clear coverage data
        run: uv run coverage erase

      # `-p no:timeout` unloads pytest-timeout entirely in CI — the
      # GH-hosted Windows runner + coverage instrumentation reliably
      # races _thread.interrupt_main() against pluggy/_pytest capture-manager
      # module-load gaps, raising KeyboardInterrupt mid-suite. Three earlier
      # patches (per-module timeout overrides on mutex, integration routing
      # split, `--timeout=0` CLI flag) failed to close the class because
      # `--timeout=0` still loads the plugin and arms the watchdog thread,
      # leaving the race surface intact. Removing the plugin from the run
      # completely eliminates the thread, the watchdog, and the race.
      # Per-step `timeout-minutes: 10` already provides genuine hang
      # protection at the GH-Actions layer. Local dev keeps the pyproject
      # 120s default for faster feedback.
      # 2026-05-25 n=4 class-close after `--timeout=0` CLI fix did not close.
      # Enforced by `check_ci_pytest_no_timeout_plugin` drift check.

      - name: Tests with coverage (repo core)
        timeout-minutes: 10
        # `--ignore=tests/test_integration` matches the directory only; the
        # sibling file `tests/test_integration_l1_l2.py` (multi-instrument
        # L1+L2 fixtures, intended to run in the integration step below)
        # was being collected here. Listed explicitly to ensure it stays in
        # the integration step. Same applies to test_trader_logic.py — the
        # file is already excluded explicitly. 2026-05-24 fix.
        run: >
          uv run pytest tests/ -q -p no:timeout
          --ignore=tests/test_trader_logic.py
          --ignore=tests/test_pipeline
          --ignore=tests/test_trading_app
          --ignore=tests/test_research
          --ignore=tests/test_tools
          --ignore=tests/tools
          --ignore=tests/test_integration
          --ignore=tests/test_integration_l1_l2.py
          --ignore=tests/test_mf_futures
          --cov=pipeline --cov=trading_app --cov-report= --cov-append

      - name: Tests with coverage (tools and research)
        timeout-minutes: 10
        run: >
          uv run pytest -p no:timeout
          tests/test_research
          tests/test_tools
          tests/tools
          tests/test_integration
          tests/test_integration_l1_l2.py
          tests/test_mf_futures
          -q
          --cov=pipeline --cov=trading_app --cov-report= --cov-append

      - name: Tests with coverage (pipeline drift)
        timeout-minutes: 10
        shell: pwsh
        run: |
          $paths = Get-ChildItem tests/test_pipeline -File -Filter "test_check_drift*.py" | ForEach-Object { $_.FullName }
          uv run pytest @paths -q -p no:timeout --cov=pipeline --cov=trading_app --cov-report= --cov-append

      - name: Tests with coverage (pipeline core)
        timeout-minutes: 10
        run: >
          uv run pytest tests/test_pipeline -q -p no:timeout
          --ignore=tests/test_pipeline/test_check_drift.py
          --ignore=tests/test_pipeline/test_check_drift_aperture.py
          --ignore=tests/test_pipeline/test_check_drift_context.py
          --ignore=tests/test_pipeline/test_check_drift_crg.py
          --ignore=tests/test_pipeline/test_check_drift_crypto_pin.py
          --ignore=tests/test_pipeline/test_check_drift_db.py
          --ignore=tests/test_pipeline/test_check_drift_db_path_usage.py
          --ignore=tests/test_pipeline/test_check_drift_e2_lookahead.py
          --ignore=tests/test_pipeline/test_check_drift_scratch_policy.py
          --ignore=tests/test_pipeline/test_check_drift_slow_labels.py
          --ignore=tests/test_pipeline/test_check_drift_ws2.py
          --cov=pipeline --cov=trading_app --cov-report= --cov-append

      - name: Tests with coverage (trading app A-L)
        timeout-minutes: 10
        shell: pwsh
        run: |
          $patterns = @("test_a*.py", "test_b*.py", "test_c*.py", "test_d*.py", "test_e*.py", "test_h*.py", "test_i*.py", "test_l*.py")
          $paths = @()
          foreach ($pattern in $patterns) {
            $paths += Get-ChildItem tests/test_trading_app -File -Filter $pattern | ForEach-Object { $_.FullName }
          }
          $paths += "tests/test_trading_app/test_ai"
          uv run pytest @paths -q -p no:timeout --cov=pipeline --cov=trading_app --cov-report= --cov-append

      - name: Tests with coverage (trading app M-P)
        timeout-minutes: 10
        shell: pwsh
        run: |
          $patterns = @("test_m*.py", "test_n*.py", "test_o*.py", "test_p*.py")
          $paths = @()
          foreach ($pattern in $patterns) {
            $paths += Get-ChildItem tests/test_trading_app -File -Filter $pattern | ForEach-Object { $_.FullName }
          }
          $paths += "tests/test_trading_app/test_nested"
          uv run pytest @paths -q -p no:timeout --cov=pipeline --cov=trading_app --cov-report= --cov-append

      - name: Tests with coverage (trading app R-S)
        timeout-minutes: 10
        shell: pwsh
        run: |
          $patterns = @("test_r*.py", "test_s*.py")
          $paths = @()
          foreach ($pattern in $patterns) {
            $paths += Get-ChildItem tests/test_trading_app -File -Filter $pattern | ForEach-Object { $_.FullName }
          }
          $paths += "tests/test_trading_app/test_regime"
          $paths += "tests/test_trading_app/test_strategy_validator"
          uv run pytest @paths -q -p no:timeout --cov=pipeline --cov=trading_app --cov-report= --cov-append

      - name: Tests with coverage (trading app T-Z)
        timeout-minutes: 10
        shell: pwsh
        run: |
          $patterns = @("test_t*.py", "test_v*.py", "test_w*.py")
          $paths = @()
          foreach ($pattern in $patterns) {
            $paths += Get-ChildItem tests/test_trading_app -File -Filter $pattern | ForEach-Object { $_.FullName }
          }
          uv run pytest @paths -q -p no:timeout --cov=pipeline --cov=trading_app --cov-report= --cov-append

      - name: Coverage threshold
        run: uv run coverage report --show-missing --fail-under=35

  lhp_weekly:
    # Sunday 06:00 Brisbane LHP fitness-transition cron. Gated to main so
    # PR push events don't fire the job. Read-only on gold.db; the gate is
    # an aggregate decay+watch+stale count change vs the prior snapshot.
    # See scripts/cron/lhp_weekly.py and Nugget 2b plan.
    if: github.event_name == 'schedule' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    # OpenRouter API key for LHP LLM proposals (scripts/research/lhp/llm_client.py:157).
    # GHA masks the value in logs automatically. Scoped to lhp_weekly only — not
    # exposed to the `checks` job. Repo secret set 2026-05-13.
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history for parity with `checks` job — drift checks called
          # from research/cron scripts also need SHA-pinned history.
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: LHP weekly fitness-transition check
        # Exit codes: 0=ok, 1=IO error, 2=fitness-compute failed (DB missing).
        # gold.db is not synced to CI by policy (CLAUDE.md "local disk, no
        # cloud sync"). Expected failure is exit 2 (DB absent). Any OTHER
        # non-zero exit (e.g. schema drift, import error) must surface as a
        # real failure. Capture rc and re-exit accordingly.
        id: lhp_check
        shell: bash
        run: |
          uv run python scripts/cron/lhp_weekly.py --check-fitness-transition
          rc=$?
          if [ $rc -eq 2 ]; then
            echo "lhp_exit=2" >> "$GITHUB_OUTPUT"
            echo "INFO: fitness computation skipped (DB not provisioned in CI — expected)."
            exit 0
          fi
          echo "lhp_exit=$rc" >> "$GITHUB_OUTPUT"
          exit $rc

      - name: Persist fitness snapshot
        # Commit back the updated snapshot so next Sunday's trigger compares
        # against actual last-run state, not the last human-committed snapshot.
        # No-op when the DB was absent (lhp_exit=2) or nothing changed.
        if: steps.lhp_check.outputs.lhp_exit == '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/runtime/lhp_fitness_snapshot.json docs/runtime/lhp_dedup_index.json
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "chore: lhp weekly snapshot update [skip ci]"
            git push
          fi
